                                        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">

    <script src="{{ url_for('static', filename='assets/js/bundle-app.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/scripts.js') }}"></script>
    <script src="/static/assets/js/i18n.js"></script>
    
    <script>
        const API_BASE = "/api";

        // ==========================================
        // 辅助：获取当前语言文本 (防止未加载时报错)
        // ==========================================
        function getLang(key, fallback) {
            if (window.LANG && window.LANG[key]) {
                return window.LANG[key];
            }
            return fallback;
        }

        // ==========================================
        // 1. 获取模型列表
        // ==========================================
        async function getModels() {
            try {
                const response = await fetch(`${API_BASE}/models`);
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `API Error: ${response.status}`);
                }
                const result = await response.json();
                return result.data || [];
            } catch (error) {
                console.error('Failed to fetch models:', error);
                return [];
            }
        }

        // ==========================================
        // 2. 渲染表格 (修改部分：使用 i18n 文本)
        // ==========================================
        async function renderModels() {
            console.log('Rendering models table...');
            const tbody = document.getElementById('modelTableBody');
            if (!tbody) return;

            // 修改：使用 msg_loading_models
            const loadingText = getLang('msg_loading_models', 'Loading models...');
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-slate-400">${loadingText}</td></tr>`;

            const models = await getModels();
            tbody.innerHTML = '';

            if (models.length === 0) {
                // 修改：使用 msg_no_models
                const noModelText = getLang('msg_no_models', 'No models found. Click "Create New" to add one.');
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-slate-500">${noModelText}</td></tr>`;
                return;
            }

            models.forEach(model => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="border-t border-slate-200 py-3 pe-5 ps-5 last:sticky last:end-0 last:bg-white last:ps-2 dark:border-slate-800 last:dark:bg-slate-950">
                        <div class="flex items-center">
                            <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-3 dark:bg-blue-900/50 dark:text-blue-400">
                                <i class="fas fa-robot"></i>
                            </div>
                            <span class="font-bold text-slate-700 dark:text-slate-200">${model.name}</span>
                        </div>
                    </td>
                    <td class="border-t border-slate-200 py-3 pe-5 ps-5 last:sticky last:end-0 last:bg-white last:ps-2 dark:border-slate-800 last:dark:bg-slate-950">
                        <span class="font-mono text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded dark:bg-slate-800 dark:text-slate-400">
                            ${model.base_url}
                        </span>
                    </td>
                    <td class="border-t border-slate-200 py-3 pe-5 ps-5 last:sticky last:end-0 last:bg-white last:ps-2 dark:border-slate-800 last:dark:bg-slate-950">
                        <span class="text-xs text-slate-500 dark:text-slate-400">${model.created_at || 'Just now'}</span>
                    </td>
                    <td class="border-t border-slate-200 py-3 pe-5 ps-5 text-end last:sticky last:end-0 last:bg-white last:ps-2 dark:border-slate-800 last:dark:bg-slate-950">
                        <button onclick="deleteModel(${model.id})" class="text-slate-400 hover:text-red-600 transition-colors" title="Delete Model">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // ==========================================
        // 3. 创建模型
        // ==========================================
        async function createModel(name, url, apiKey) {
            const response = await fetch(`${API_BASE}/models`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, base_url: url, api_key: apiKey })
            });
            const result = await response.json();
            if (!response.ok || !result.success) {
                throw new Error(result.message || result.error || 'Unknown error');
            }
            return result;
        }

        // ==========================================
        // 4. 删除模型 (修改部分：使用 i18n 文本)
        // ==========================================
        async function deleteModel(id) {
            // 修改：使用 msg_confirm_delete
            const confirmMsg = getLang('msg_confirm_delete', 'Are you sure you want to delete this model?');
            if(!confirm(confirmMsg)) return;

            try {
                const response = await fetch(`${API_BASE}/models/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    // 修改：使用 msg_delete_success
                    alert(getLang('msg_delete_success', 'Model deleted successfully'));
                    await renderModels(); 
                } else {
                    // 修改：使用 msg_delete_fail
                    const failMsg = getLang('msg_delete_fail', 'Failed to delete: ');
                    alert(failMsg + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                // 修改：使用 msg_sys_error
                alert(getLang('msg_sys_error', 'System error while deleting model.'));
            }
        }

        // ==========================================
        // 5. 模态框逻辑 (修改部分：使用 i18n 文本 + ID 变更)
        // ==========================================
        function setupModal() {
            const modal = document.getElementById('createModelModal');
            const openBtn = document.getElementById('createModelBtn');
            const closeBtn = document.getElementById('closeModalBtn');
            const cancelBtn = document.getElementById('cancelCreateBtnM');
            const form = document.getElementById('createModelForm');
            const submitBtn = form.querySelector('button[type="submit"]');

            const showModal = () => {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            };

            const hideModal = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                form.reset();
            };

            if(openBtn) openBtn.addEventListener('click', showModal);
            if(closeBtn) closeBtn.addEventListener('click', hideModal);
            if(cancelBtn) cancelBtn.addEventListener('click', hideModal);

            if(modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) hideModal();
                });
            }

            if(form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    // 修改：因为我们在 HTML 中更改了 input 的 ID 以匹配 JSON 映射
                    // 所以这里获取值时要用新的 ID (ph-model-name 等)
                    const name = document.getElementById('ph-model-name').value;
                    const url = document.getElementById('ph-model-url').value;
                    const key = document.getElementById('ph-api-key').value;

                    const originalBtnText = submitBtn.innerText;
                    // 修改：使用 msg_verifying
                    submitBtn.innerText = getLang('msg_verifying', "Verifying...");
                    submitBtn.disabled = true;

                    try {
                        await createModel(name, url, key);
                        
                        // 修改：使用 msg_add_success
                        alert(getLang('msg_add_success', 'Model Verified & Added Successfully!'));
                        hideModal();
                        await renderModels(); 
                        
                    } catch (err) {
                        // 修改：使用 msg_add_fail
                        const failMsg = getLang('msg_add_fail', 'Failed to add model:\n');
                        alert(failMsg + err.message);
                    } finally {
                        submitBtn.innerText = originalBtnText; // 这里如果不希望恢复成 "Add Model" (英文)，可能需要重新从 html 元素获取原始文本，或者重新调用一次 loadLanguage。但最简单的就是恢复原始文本。
                        // 如果希望按钮文字也恢复成翻译后的，可以这样：
                        const btnLangId = 'btn-submit-model'; 
                        // 尝试重新读取 DOM 的 innerText 或者从 LANG 获取
                        if(window.LANG && window.LANG[btnLangId]) {
                             submitBtn.innerText = window.LANG[btnLangId]; // 如果是中文环境，这会是"添加模型"
                        } else {
                             submitBtn.innerText = "Add Model";
                        }
                        
                        submitBtn.disabled = false;
                    }
                });
            }
        }

        // ==========================================
        // 6. 监听语言切换事件
        // ==========================================
        // i18n.js 会在语言加载完成后触发 'languageLoaded' 事件
        // 我们需要监听这个事件来重新渲染表格（因为表格里的 "Loading" 或 "No data" 是动态生成的）
        document.addEventListener('languageLoaded', () => {
            renderModels();
            // 可以在这里更新其他动态内容
        });

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            setupModal();
            // renderModels 会由 i18n.js 初始化时的 languageLoaded 或者下面的手动调用触发
            // 为了保险起见，稍微延时或直接调用
            renderModels(); 
        });
    </script>
