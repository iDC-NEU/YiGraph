# GraphLLM Engine 配置文件模板
# 复制此文件并根据需要修改配置

# 数据库配置
database:
  graph:
    space_name: "graphllm_space"
    server_ip: "127.0.0.1"
    server_port: "9669"
    create: true
    verbose: false
  
  vector:
    collection_name: "graphllm_collection"
    dim: 1024
    host: "localhost"
    port: 19530

# 模型配置
models:
  llm:
    type: "ollama"  # ollama 或 openai
    model_name: "llama3.1:70b"
    chunk_size: 512
    chunk_overlap: 20
    device: "cuda:0"
    timeout: 150000
    port: 11434  # 仅用于ollama
    openai_base_url: "https://gitaigc.com/v1/"
    openai_api_key:  "sk-wkQq5dWpyYpBtl8PYH0jI85ct0TsobEsXg6AUwEI5OLrfu8K",     # 替换为你的API key  "your-openai-api-key"
    openai_model: "gpt-4o"


  embedding:
    model_name: "BAAI/bge-large-en-v1.5"
    batch_size: 20
    device: "cuda:0"

# RAG配置
rag:
  graph:
    k_hop: 2
    pruning: 30
    data_type: "qa"  # qa 或 summary
    pruning_mode: "embedding_for_perentity"  # embedding 或 embedding_for_perentity
  
  vector:
    k_similarity: 5
    

# 性能监控配置
monitoring:
  enable_metrics: true
  log_level: "INFO"
  save_metrics: true
  metrics_file: "engine_metrics.json"

# 输出配置
output:
  save_intermediate_results: true
  output_dir: "./output"
  log_file: "./engine.log" 