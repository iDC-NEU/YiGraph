# AAG 配置文件
version: 1.0   # 版本号

# 运行模式： interactive / batch
mode: interactive

# 推理模块（Reasoner）配置
reasoner:
  llm:
    provider: "openai" # ollama 或 openai
    ollama:
      model_name: "llama3.1:70b"
      device: "cuda:0"
      timeout: 150000
      port: 11434
    openai:
      base_url: "https://gitaigc.com/v1/"
      api_key: "sk-G30rFStBigqXtuyIOkOo7Zh4QNxO8ZAjfZQ5DYPCgMXbPv8q"
      model: "gpt-4o-mini"

# 检索模块配置
retrieval:
  database:
    vector:
      collection_name: "graphllm_collection"
      host: "localhost"
      port: 19530
    neo4j:
      enabled: true
      uri: "bolt://202.199.13.67:7687"
      user: "neo4j"
      password: "12345678"

  embedding:
    model_name: "BAAI/bge-large-en-v1.5"
    batch_size: 20
    chunk_size: 512
    chunk_overlap: 20
    device: "cuda:2"

# 性能监控配置
monitoring:
  enable_metrics: true
  log_level: "INFO"
  save_metrics: true
  metrics_file: "engine_metrics.json"

# 输出配置
output:
  save_intermediate_results: true
  output_dir: "./output"
  log_file: "./engine.log"