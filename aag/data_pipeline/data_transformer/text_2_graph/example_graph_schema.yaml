datasets:
- name: example_Graph
  description: example_Graph graph generated from ./aag/data_pipeline/data_transformer/text_2_graph/example.txt
  type: graph
  schema:
    vertex:
    - attribute_fields:
      - type
      format: csv
      id_field: id
      label_field: name
      path: ./aag/data_pipeline/data_transformer/text_2_graph/example_entities.csv
      type: entity
    edge:
    - attribute_fields:
      - relation
      format: csv
      label_field: relation
      path: ./aag/data_pipeline/data_transformer/text_2_graph/example_triplets.csv
      source_field: source_id
      target_field: target_id
      type: triplet
    graph:
      directed: true
      heterogeneous: false
      multigraph: false
      weighted: false
    graph_store_info:
      backend: nebula_graph
      vertex_count: 37
      edge_count: 27
      space_name: example_Graph
      status: success
      version: null
