  - In a patient referral and treatment association graph, which medical institutions are most suitable as global coordination
    centers?
  - In a disease transmission relationship graph, which nodes are most suitable as core intervention points?
  - In an accident impact and related diffusion graph, which key nodes are most suitable as unified command or response centers?
