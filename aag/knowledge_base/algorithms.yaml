  Application_scenario: The lexicographical topological sort is particularly useful
    in directed acyclic graphs (DAGs), such as task scheduling and dependency resolution
    scenarios. For example, it can be applied in build systems where tasks must be
    completed in a specific order based on their dependencies, ensuring that all prerequisites
    for a task are completed before the task itself begins.
  Tuning_Mechanisms:
    key: The 'key' parameter allows users to define a custom comparison function for
      node ordering, which can influence the lexicographical order in which nodes
      are returned. Adjusting this parameter can lead to different topological orderings
      when multiple nodes are eligible for exploration, thereby impacting the final
      output sequence.
  Principles:
    description: This algorithm relies on the properties of topological sorting, which
      orders the nodes of a directed acyclic graph so that for every directed edge
      u -> v, node u comes before node v in the ordering. It is designed specifically
      for directed graphs and does not operate on cyclic graphs. The time complexity
      is O(V + E) where V is the number of vertices and E is the number of edges in
      the graph.
