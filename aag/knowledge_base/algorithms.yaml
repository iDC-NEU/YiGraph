          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity
            that indicates how much flow the edge can support. If this attribute is
            not present, the edge is considered to have infinite capacity. Default
            value: ''capacity''.'
          default: capacity
        residual:
          type: NetworkX graph
          description: 'Residual network on which the algorithm is to be executed.
            If None, a new residual network is created. Default value: None.'
          default: null
        value_only:
          type: bool
          description: If True compute only the value of the maximum flow. This parameter
            will be ignored by this algorithm because it is not applicable.
          default: false
        cutoff:
          type: integer, float
          description: 'If specified, the algorithm will terminate when the flow value
            reaches or exceeds the cutoff. In this case, it may be unable to immediately
            determine a minimum cut. Default value: None.'
          default: null
      required:
      - s
      - t
    output_schema:
      type: NetworkX DiGraph
      description: Residual network after computing the maximum flow.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The Edmonds-Karp algorithm is typically used in network flow
    problems where the objective is to determine the maximum flow between a source
    and a sink in a directed graph. It is particularly suitable for transportation
    networks, telecommunications, and supply chain logistics, where capacities of
    edges represent limits on resources. For instance, it can be employed to optimize
    water flow in a pipeline system or data packets in a communication network.
  Tuning_Mechanisms:
    capacity: Adjusting the capacity parameter allows the algorithm to interpret edge
      capacity differently. If the attribute is renamed or contains specific values,
      it can affect the maximum flow results based on the indicated limits of each
      edge.
    cutoff: Setting a cutoff value allows the algorithm to terminate early when a
      certain flow threshold is reached. This can impact performance and may prevent
      the discovery of the actual maximum flow, as the computation will stop before
      potentially finding more augmenting paths.
  Principles:
    description: The core principle of the Edmonds-Karp algorithm is the use of augmenting
      paths to iteratively increase flow from the source to the sink until no more
      augmenting paths can be found. This algorithm specifically works on directed
      graphs and has a time complexity of O(VE^2), where V is the number of vertices
      and E is the number of edges. It requires that the graph have edges with specified
      capacities, and if these are not provided, edges will be assumed to have infinite
      capacity.
    time_complexity: O(V * E^2)
- id: minimum_edge_cut
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for minimum_edge_cut
          required: true
        s:
          type: node
          description: 'Source node. Optional. Default value: None.'
          default: null
        t:
          type: node
          description: 'Target node. Optional. Default value: None.'
          default: null
        flow_func:
          type: function
          description: 'A function for computing the maximum flow among a pair of
            nodes. The function has to accept at least three parameters: a Digraph,
            a source node, and a target node. And return a residual network that follows
            NetworkX conventions (see :meth:`maximum_flow` for details). If flow_func
            is None, the default maximum flow function (:meth:`edmonds_karp`) is used.
            See below for details. The choice of the default function may change from
            version to version and should not be relied on. Default value: None.'
          default: null
    output_schema:
      type: set
      description: Set of edges that, if removed, would disconnect G. If source and
        target nodes are provided, the set contains the edges that if removed, would
        destroy all paths between source and target.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The minimum_edge_cut algorithm is typically used in network
    analysis, specifically in identifying vulnerabilities in flow networks. It is
    particularly useful in telecommunications and transportation networks to determine
    critical edges whose failure would disconnect the network or impede flow between
    designated nodes. For instance, in a logistics company, this algorithm can help
    identify key routes that, if disrupted, would significantly affect the delivery
    of goods.
  Tuning_Mechanisms:
    s: Adjusting the source node parameter alters the starting point of the flow analysis,
      affecting which paths are considered in the minimum cut. Specifying a source
      is crucial for targeted analysis, particularly in flow networks where specific
      origin points are of interest.
    t: Changing the target node parameter defines the endpoint of the flow analysis,
      influencing the edges identified as critical for disconnection. This allows
      for focused studies on the connectivity between specific nodes, which is essential
      in applications requiring precise control over flow paths.
  Principles:
    description: This algorithm works on both directed and undirected graphs to determine
      the set of edges whose removal would disconnect the graph. It employs the concept
      of maximum flow to find the minimum cut in the network between source and target
      nodes. The algorithm is efficient, typically operating in polynomial time depending
      on the maximum flow function used, and it may require adequate memory depending
      on the size of the graph and the flow calculations.
    time_complexity: O(V * E + V^2 log V) (Stoer-Wagner)
- id: minimum_node_cut
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for minimum_node_cut
          required: true
        s:
          type: node
          description: 'Source node. Optional. Default value: None.'
          default: null
        t:
          type: node
          description: 'Target node. Optional. Default value: None.'
          default: null
        flow_func:
          type: function
          description: 'A function for computing the maximum flow among a pair of
            nodes. The function has to accept at least three parameters: a Digraph,
            a source node, and a target node. And return a residual network that follows
            NetworkX conventions (see :meth:`maximum_flow` for details). If flow_func
            is None, the default maximum flow function (:meth:`edmonds_karp`) is used.
            See below for details. The choice of the default function may change from
            version to version and should not be relied on. Default value: None.'
          default: null
    output_schema:
      type: set
      description: Set of nodes that, if removed, would disconnect G. If source and
        target nodes are provided, the set contains the nodes that if removed, would
        destroy all paths between source and target.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The minimum_node_cut algorithm is typically used in network
    analysis, particularly in cases involving flow networks such as transportation,
    telecommunications, and computer networks. It helps identify critical nodes whose
    removal would disrupt communication between a pair of nodes, such as a source
    and a sink in a flow network. For example, in urban transportation networks, finding
    minimum node cuts can inform infrastructure improvements and identify potential
    vulnerabilities.
  Tuning_Mechanisms:
    s: Setting the source node (s) defines the starting point for the disconnection
      analysis. Adjusting this parameter alters which paths are evaluated for disconnection,
      thus impacting the resulting minimum node cut set.
    t: Setting the target node (t) modifies the endpoint for the disconnection criteria.
      Changing this parameter will result in a different evaluation of paths, potentially
      yielding a distinct set of critical nodes that would disconnect the specified
      source and target.
  Principles:
    description: This algorithm is based on the principles of network flow theory,
      utilizing the concept of maximum flow to determine the minimum set of nodes
      that can be removed to disconnect specified nodes in the graph. It is applicable
      to both directed and undirected graphs and can handle various network structures.
      The time complexity generally depends on the maximum flow algorithm used, with
      the default function (Edmonds-Karp) having a time complexity of O(VE^2).
    time_complexity: O(k * V * E^2) (Flow based)
- id: preflow_push
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Edges of the graph are expected to have an attribute called
            'capacity'. If this attribute is not present, the edge is considered to
            have infinite capacity.
          required: true
        s:
          type: node
          description: Source node for the flow.
          required: true
        t:
          type: node
          description: Sink node for the flow.
          required: true
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity
            that indicates how much flow the edge can support. If this attribute is
            not present, the edge is considered to have infinite capacity. Default
            value: ''capacity''.'
          default: capacity
        residual:
          type: NetworkX graph
          description: 'Residual network on which the algorithm is to be executed.
            If None, a new residual network is created. Default value: None.'
          default: null
        global_relabel_freq:
          type: integer, float
          description: 'Relative frequency of applying the global relabeling heuristic
            to speed up the algorithm. If it is None, the heuristic is disabled. Default
            value: 1.'
          default: 1
        value_only:
          type: bool
          description: 'If False, compute a maximum flow; otherwise, compute a maximum
            preflow which is enough for computing the maximum flow value. Default
            value: False.'
          default: false
      required:
      - s
      - t
    output_schema:
      type: NetworkX DiGraph
      description: Residual network after computing the maximum flow.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The 'preflow_push' algorithm is typically used in network
    flow problems, particularly in directed graphs where capacities are prescribed
    for each edge. It effectively solves the maximum flow problem, which is crucial
    in various fields such as transportation networks, telecommunications, and resource
    allocation in supply chains.
  Tuning_Mechanisms:
    global_relabel_freq: Adjusting this parameter can significantly speed up the algorithm
      by controlling how often the global relabeling heuristic is applied. A higher
      frequency may reduce the number of iterations needed to find the maximum flow,
      while a lower frequency could lead to slower convergence.
    value_only: Setting this parameter to True allows the algorithm to compute only
      the maximum preflow value rather than the complete maximum flow, which can save
      computational resources in scenarios where the actual flow paths are not required.
  Principles:
    description: This algorithm operates by maintaining a 'preflow' rather than a
      strict flow, allowing for excess flow at vertices other than the sink. It is
      designed specifically for directed graphs and performs efficiently in cases
      where the graph exhibits high levels of connectivity. The time complexity can
      often be improved through techniques like global relabeling, making it suitable
      for large and complex networks.
    time_complexity: O(V^2 * E) or O(V^3)
- id: hits
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
        max_iter:
          type: integer, optional
          description: Maximum number of iterations in power method.
          default: 100
        tol:
          type: float, optional
          description: Error tolerance used to check convergence in power method iteration.
          default: 1.0e-08
        nstart:
          type: dictionary, optional
          description: Starting value of each node for power method iteration.
          default: null
        normalized:
          type: bool (default=True)
          description: Normalize results by the sum of all of the values.
          default: true
    output_schema:
      type: two-tuple of dictionaries
      description: Two dictionaries keyed by node containing the hub and authority
        values.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The HITS algorithm is typically applied in directed networks,
    such as the World Wide Web, to identify influential web pages based on their overall
    authority and hub characteristics. It addresses the problem of ranking nodes by
    their connectivity and relevance, often useful in search engine optimization,
    recommendation systems, and identifying key resources in social networks.
  Tuning_Mechanisms:
    max_iter: Increasing this value can improve convergence of the algorithm, potentially
      leading to more accurate hub and authority scores, but may also increase computational
      time, thus requiring a balance between accuracy and execution time.
    tol: Adjusting this tolerance value can affect how strictly the algorithm determines
      convergence; a lower tolerance can lead to a more precise result, while a higher
      tolerance may accelerate processing at the risk of compromising accuracy.
  Principles:
    description: 'HITS operates by performing eigenvector iterations to compute two
      separate scores for each node: hub scores and authority scores. It is suited
      for directed graphs and requires the adjacency matrix representation of the
      graph. The algorithm''s efficiency can depend on the parameters set, which influence
      its convergence behavior and stabilization over iterations.'
    time_complexity: O(k * (V + E)) (Iterative)
- id: pagerank
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.  Undirected graphs will be converted to a
            directed graph with two directed edges for each undirected edge.
          required: true
        alpha:
          type: float, optional
          description: Damping parameter for PageRank, default=0.85.
          default: 0.85
        personalization:
          type: dict, optional
          description: The "personalization vector" consisting of a dictionary with
            a key some subset of graph nodes and personalization value each of those.
            At least one personalization value must be non-zero. If not specified,
            a nodes personalization value will be zero. By default, a uniform distribution
            is used.
          default: null
        max_iter:
          type: integer, optional
          description: Maximum number of iterations in power method eigenvalue solver.
          default: 100
        tol:
          type: float, optional
          description: Error tolerance used to check convergence in power method solver.
            The iteration will stop after a tolerance of ``len(G) * tol`` is reached.
          default: 1.0e-06
        nstart:
          type: dictionary, optional
          description: Starting value of PageRank iteration for each node.
          default: null
        weight:
          type: key, optional
          description: Edge data key to use as weight.  If None weights are set to
            1.
          default: weight
        dangling:
          type: dict, optional
          description: The outedges to be assigned to any "dangling" nodes, i.e.,
            nodes without any outedges. The dict key is the node the outedge points
            to and the dict value is the weight of that outedge. By default, dangling
            nodes are given outedges according to the personalization vector (uniform
            if not specified). This must be selected to result in an irreducible transition
            matrix (see notes under google_matrix). It may be common to have the dangling
            dict to be the same as the personalization dict.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with PageRank as value
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: PageRank is commonly used in directed networks, such as the
    World Wide Web, to evaluate the importance of web pages based on their link structure.
    It solves the problem of ranking nodes in a graph according to their relative
    importance, making it essential for search engine optimization and recommendation
    systems. A specific business example includes using PageRank to determine the
    most influential users in a social network.
  Tuning_Mechanisms:
    alpha: Adjusting the damping parameter alpha influences the probability of continuing
      the random walk versus restarting at a random node. A lower alpha will result
      in more PageRank being concentrated on a few nodes, while a higher alpha promotes
      a more uniform distribution across nodes.
    personalization: The personalization vector allows for preferential ranking by
      assigning different weights to specific nodes. Modifying this vector can impact
      the final ranking by ensuring that certain nodes receive more influence, thus
      tailoring the PageRank result to specific use cases or biases.
  Principles:
    description: 'The core principle of PageRank is based on the concept of random
      walks on directed graphs, where the rank of a node is proportional to the sum
      of the ranks of its predecessors: each rank is distributed among its outbound
      links. The algorithm applies to directed graphs and can accommodate weighted
      edges. It has a time complexity of O((V + E) * max_iter), where V is the number
      of vertices and E is the number of edges, making it efficient for large-scale
      graphs.'
    time_complexity: O(k * (V + E)) (Iterative)
- id: adamic_adar_index
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Adamic-Adar index will be computed for each pair of nodes
            given in the iterable. The pairs must be given as 2-tuples (u, v) where
            u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a
        pair of nodes and p is their Adamic-Adar index.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Adamic-Adar index algorithm is commonly used in social
    networks, biological networks, and recommendation systems to predict link formations
    between nodes. It identifies potential new connections by measuring the similarity
    between nodes based on their shared neighbors, thereby addressing connectivity
    and collaboration issues. For instance, in a social networking platform, it can
    suggest friends to users based on their common acquaintances.
  Tuning_Mechanisms:
    ebunch: Modifying the 'ebunch' parameter allows users to specify particular pairs
      of nodes for which the Adamic-Adar index is computed, rather than applying it
      to all non-existent edges in the graph. This can provide more focused results
      and reduce computational overhead when only interested in specific node interactions.
  Principles:
    description: The Adamic-Adar index is based on measuring the shared neighborhood
      of two nodes in a graph, specifically weighing the contributions of each shared
      neighbor according to their degree. It is applicable to both undirected graphs
      and directed graphs, where it calculates the index for pairs of nodes that are
      not directly connected. The algorithm operates efficiently with a time complexity
      of O(mn) for n node pairs and m edges, although it can be optimized depending
      on the graph's density.
    time_complexity: O(E)
- id: jaccard_coefficient
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Jaccard coefficient will be computed for each pair of nodes
            given in the iterable. The pairs must be given as 2-tuples (u, v) where
            u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a
        pair of nodes and p is their Jaccard coefficient.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Jaccard coefficient is typically applied in social networks,
    where it helps identify the similarity between users based on their shared connections.
    It is particularly useful in recommendation systems, where understanding the overlap
    of friends or interests between two users can inform personalized suggestions.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter allows users to specify which pairs of
      nodes they are interested in comparing. By providing this iterable, the algorithm
      can focus its computation on specific pairs, potentially improving performance
      by avoiding unnecessary calculations for unrelated node pairs.
  Principles:
    description: The Jaccard coefficient measures the similarity between two nodes
      based on the ratio of their shared neighbors to the total number of unique neighbors.
      This algorithm is applicable to both directed and undirected graphs, and it
      operates efficiently with a time complexity of O(N + E), where N is the number
      of nodes and E is the number of edges. The input requirement includes a valid
      graph G and an optional iterable of node pairs; if the latter is not provided,
      the algorithm examines all non-existing edges.
    time_complexity: O(E) (O(d^2) per edge)
- id: preferential_attachment
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Preferential attachment score will be computed for each pair
            of nodes given in the iterable. The pairs must be given as 2-tuples (u,
            v) where u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a
        pair of nodes and p is their preferential attachment score.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The preferential attachment algorithm is typically applied
    in network analysis, specifically in modeling the growth of networks where some
    nodes acquire more connections than others, such as social networks, citation
    networks, and the World Wide Web. It addresses the problem of predicting which
    nodes are likely to form new links based on their existing connections, thereby
    helping to understand connectivity dynamics and influence spread.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter alters which pairs of nodes the preferential
      attachment score is calculated for. If provided, it restricts the number of
      pairs to those specified, which can simplify the analysis in specific cases
      but may also omit potential connections in the broader graph if nodes outside
      the defined pairs have high scores.
  Principles:
    description: The core principle of preferential attachment is that the likelihood
      of a new edge being formed is proportional to the current degree of the nodes
      involved. This algorithm can be applied to both directed and undirected graphs,
      and it inherently assumes the existence of a growing network. The time complexity
      of the algorithm is O(E) where E is the number of edges to analyze, making it
      efficient for large networks.
    time_complexity: O(E)
- id: resource_allocation_index
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Resource allocation index will be computed for each pair of
            nodes given in the iterable. The pairs must be given as 2-tuples (u, v)
            where u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a
        pair of nodes and p is their resource allocation index.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The resource allocation index algorithm is commonly applied
    in social networks and recommendation systems to identify potential connections
    between nodes. It helps in predicting link formations by measuring the likelihood
    of connections based on shared neighbors. For instance, in a professional networking
    platform, it can suggest potential collaborations between users with common connections.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter allows users to specify which node pairs
      to evaluate for resource allocation, enabling focused analysis on particular
      connections. When 'ebunch' is set to None, the algorithm automatically evaluates
      all non-existent edges, which may be suitable for exploratory analyses.
  Principles:
    description: This algorithm computes the resource allocation index for pairs of
      nodes based on their common neighbors in the graph. It is applicable to both
      directed and undirected graphs and functions by evaluating the degree of overlap
      between the neighbor sets of the nodes in question. The algorithm operates with
      a time complexity of O(N + E), where N is the number of nodes and E is the number
      of edges in the graph.
    time_complexity: O(E)
- id: is_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for is_matching
          required: true
        matching:
          type: dict or set
          description: A dictionary or set representing a matching. If a dictionary,
            it must have ``matching[u] == v`` and ``matching[v] == u`` for each edge
            ``(u, v)`` in the matching. If a set, it must have elements of the form
            ``(u, v)``, where ``(u, v)`` is an edge in the matching.
          required: true
      required:
      - matching
    output_schema:
      type: any
      description: bool Whether the given set or dictionary represents a valid matching
        in the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The is_matching algorithm is commonly used in bipartite graphs
    to verify the existence of a valid matching, which is essential for problems in
    resource allocation, job assignments, and network flow. Typical application scenarios
    include scheduling systems where tasks (edges) must be assigned to resources (vertices)
    without conflicts, such as pairing students with mentors or matching jobs with
    candidates.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_matching algorithm is to validate whether
      a given matching meets the criteria of being a proper matching in the specified
      graph, meaning no two edges share a common vertex. This algorithm works for
      both directed and undirected graphs, with input constraints specifying that
      the matching must be represented either as a dictionary or a set. The time complexity
      is generally O(E) for E edges in the graph, as it involves checking pairs of
      vertices in the matching.
    time_complexity: O(E)
- id: max_weight_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        maxcardinality:
          type: bool, optional (default=False)
          description: If maxcardinality is True, compute the maximum-cardinality
            matching with maximum weight among all maximum-cardinality matchings.
          default: false
        weight:
          type: string, optional (default='weight')
          description: Edge data key corresponding to the edge weight. If key not
            found, uses 1 as weight.
          default: weight
    output_schema:
      type: set
      description: A maximal matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The max_weight_matching algorithm is particularly useful in
    bipartite networks and general undirected graphs, where one needs to find optimally
    matched pairs with respect to given weights on edges. Typical applications include
    resource allocation problems, job assignment tasks, and optimal pairing in market
    scenarios, where maximizing the overall weight of selected matches is crucial.
  Tuning_Mechanisms:
    maxcardinality: Setting maxcardinality to True alters the algorithm's behavior
      to not only find a matching with maximum weight but also to prioritize obtaining
      the largest possible number of edges in the matching. This can be crucial in
      scenarios where having more pairs matched is as important as maximizing the
      weights.
    weight: Changing the weight parameter allows the user to specify which edge attribute
      to consider for matching. Utilizing different weight keys enables the algorithm
      to adapt to various data contexts, affecting the outcome of the matching by
      prioritizing alternative aspects such as costs, distances, or capacities.
  Principles:
    description: This algorithm computes a maximal matching in a graph by maximizing
      the total weight of the matched edges. It works effectively on undirected graphs
      and can handle graphs with varying edge weights. The algorithm relies on the
      existence of valid weights and functions efficiently within polynomial time
      complexity, making it suitable for relatively large graphs.
    time_complexity: O(V^3)
- id: maximal_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
    output_schema:
      type: set
      description: A maximal matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The maximal_matching algorithm is typically applied in bipartite
    and general graphs where the goal is to find a maximum set of edges such that
    no two edges share a common vertex. This can be crucial in scenarios such as job
    assignment problems, matchmaking applications, and resource allocation where optimal
    pairings need to be identified. For example, in a recruitment system, it could
    help pair candidates to job openings effectively.
  Tuning_Mechanisms: {}
  Principles:
    description: This algorithm operates on the principle of finding a maximal matching,
      which means it ensures that no additional edges can be added without violating
      the matching condition. It works on undirected graphs and has a time complexity
      that is generally linear relative to the number of vertices and edges. There
      are no additional input requirements or constraints aside from the structure
      of the graph itself.
    time_complexity: O(E)
- id: min_weight_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        weight:
          type: string, optional (default='weight')
          description: Edge data key corresponding to the edge weight. If key not
            found, uses 1 as weight.
          default: weight
    output_schema:
      type: set
      description: A minimal weight matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The min_weight_matching algorithm is typically used in network
    problems where pairing of nodes is required with minimized costs, such as in bipartite
    graphs. This can be applied in various fields including supply chain logistics
    for optimizing delivery routes, or in matching job seekers with job vacancies
    based on candidate qualifications and employer needs. Another example is in the
    design of networks where connections need to be established with the least total
    weight.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows the algorithm to interpret the
      edge weight from a different key in the graph data. Changing this key can significantly
      alter the resulting matching as it directly affects which edges are considered
      in the weight calculation. If the specified key does not exist for some edges,
      they will default to a weight of 1, potentially skewing the optimization results.
  Principles:
    description: The core principle of the min_weight_matching algorithm relies on
      identifying pairs of nodes (or edges) in a graph such that the sum of their
      weights is minimized. It operates on undirected graphs with weighted edges and
      uses combinatorial optimization techniques to find the optimal matching. The
      typical time complexity of the algorithm is O(n^3) for dense graphs, where n
      is the number of nodes, and it is subject to the constraint that not all graphs
      are suitable for perfect matching.
    time_complexity: O(V^3)
- id: attribute_assortativity_coefficient
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for attribute_assortativity_coefficient
          required: true
        attribute:
          type: string
          description: Node attribute key
          required: true
        nodes:
          type: list or iterable (optional)
          description: Compute attribute assortativity for nodes in container. The
            default is all nodes.
          default: null
      required:
      - attribute
    output_schema:
      type: any
      description: 'r: float Assortativity of graph for given attribute'
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The attribute_assortativity_coefficient algorithm is typically
    used in social network analysis and biological networks to investigate how nodes
    with similar attributes are connected. It addresses the problem of understanding
    the tendency of nodes to connect with others that have similar or dissimilar characteristics,
    such as age or gender, providing insights into community structure. For example,
    in a social network, it can reveal if people with similar interests are more likely
    to interact, assisting in targeted marketing strategies.
  Tuning_Mechanisms:
    attribute: Adjusting the 'attribute' parameter allows users to focus the assortativity
      analysis on different node characteristics, influencing the resulting coefficient
      based on the chosen attribute's distribution within the network.
    nodes: Modifying the 'nodes' parameter alters the subset of nodes considered in
      the calculation. This can significantly impact the results, allowing for tailored
      insights based on specific segments of the network, which could either highlight
      or obscure trends in attribute assortativity, depending on the selection of
      nodes.
  Principles:
    description: This algorithm calculates the assortativity coefficient for a specified
      node attribute in a graph, which quantifies the degree to which nodes with similar
      attributes tend to connect with each other. It operates on both directed and
      undirected graphs, leveraging the connections defined by the chosen attribute
      to compute the final coefficient. The input requires a valid graph and may optionally
      include a specific attribute and a subset of nodes; however, the performance
      may vary based on the size of the graph and the distribution of attributes.
    time_complexity: O(E)
- id: degree_assortativity_coefficient
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for degree_assortativity_coefficient
          required: true
        x:
          type: string ('in','out')
          description: The degree type for source node (directed graphs only).
          default: out
        y:
          type: string ('in','out')
          description: The degree type for target node (directed graphs only).
          default: in
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a
            weight.  If None, then each edge has weight 1. The degree is the sum of
            the edge weights adjacent to the node.
          default: null
        nodes:
          type: list or iterable (optional)
          description: Compute degree assortativity only for nodes in container. The
            default is all nodes.
          default: null
    output_schema:
      type: float
      description: Assortativity of graph by degree.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The degree assortativity coefficient is commonly used in social
    network analysis to evaluate the tendency of nodes to connect with other nodes
    that have similar degrees. It is particularly valuable in understanding community
    structures and relationship dynamics in directed graphs, such as analyzing friend
    networks on social media platforms or connectivity in citation networks amongst
    academic papers.
  Tuning_Mechanisms:
    x: Adjusting this parameter will define whether to consider the in-degree or out-degree
      of the source nodes in the calculations. Choosing 'in' will focus on incoming
      connections, while 'out' will focus on outgoing connections, thereby influencing
      the resultant assortativity coefficient based on the directionality of connections.
    y: This parameter determines whether to analyze the in-degree or out-degree of
      target nodes. Similar to x, changing this setting affects the interpretation
      of relationships in the graph, as it specifies which aspect of the target nodes'
      connectivity is considered, thus influencing the overall assortativity measure.
  Principles:
    description: This algorithm calculates the degree assortativity coefficient by
      examining the correlation between the degrees of connected nodes in a directed
      graph. It is applicable to directed graphs and relies on the specified degree
      types for source and target nodes. The algorithm operates in linear time with
      respect to the number of edges, making it efficient for large networks, while
      it requires that the edges have weights if a weight parameter is specified.
    time_complexity: O(E)
- id: asyn_lpa_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: Graph
          description: Parameter 'G' for asyn_lpa_communities
          required: true
        weight:
          type: string
          description: 'The edge attribute representing the weight of an edge. If
            None, each edge is assumed to have weight one. In this algorithm, the
            weight of an edge is used in determining the frequency with which a label
            appears among the neighbors of a node: a higher weight means the label
            appears more often.'
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: iterable
      description: Iterable of communities given as sets of nodes.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The asyn_lpa_communities algorithm is typically used in social
    network analysis, particularly for identifying communities or clusters of closely
    connected nodes. It is suitable for both undirected and directed networks, allowing
    researchers and practitioners to uncover hidden patterns in data, such as finding
    groups of users with similar interests or behaviors in online platforms.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter changes how frequently a node's label
      is influenced by its neighbors. Higher edge weights amplify the influence of
      neighboring nodes with the same label, potentially leading to more pronounced
      community structures. Conversely, lower weights treat all connections as more
      equal, which may lead to more fragmented communities.
    seed: The 'seed' parameter controls the random state of the algorithm, affecting
      the reproducibility of the community outputs. Different seeds can result in
      varying community assignments, as they determine the initial label assignments
      and the order of label propagation, thus influencing the final community structures
      identified.
  Principles:
    description: This algorithm is based on the Label Propagation Algorithm (LPA),
      which works by assigning labels to nodes and allowing them to propagate through
      the network based on the labels of their neighbors. It is particularly effective
      in networks with a clear community structure and is efficient for large-scale
      graphs, as it operates with average time complexity close to O(n), where n is
      the number of nodes. The algorithm does not assume any prior knowledge of the
      community structure and can handle both weighted and unweighted graphs.
    time_complexity: O(V + E) per iteration
- id: cn_soundarajan_hopcroft
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'The score will be computed for each pair of nodes given in
            the iterable. The pairs must be given as 2-tuples (u, v) where u and v
            are nodes in the graph. If ebunch is None then all nonexistent edges in
            the graph will be used. Default value: None.'
          default: null
        community:
          type: string, optional (default = 'community')
          description: 'Nodes attribute name containing the community information.
            G[u][community] identifies which community u belongs to. Each node belongs
            to at most one community. Default value: ''community''.'
          default: community
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a
        pair of nodes and p is their score.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The cn_soundarajan_hopcroft algorithm is commonly applied
    in social networks and collaboration networks where community structures play
    a critical role in understanding relationships between nodes. This algorithm helps
    in link prediction by estimating the likelihood of forming an edge between pairs
    of nodes based on their community affiliations. It is particularly useful in scenarios
    such as recommending new friends in social media, predicting future collaborations
    in research, or enhancing connectivity in citation networks.
  Tuning_Mechanisms:
    ebunch: Adjusting the ebunch parameter allows users to restrict the computation
      of scores to a specific set of node pairs rather than evaluating all possible
      non-existent edges. This can lead to performance improvements in large graphs
      where only a few connections are of interest, thus reducing computational overhead.
    community: Modifying the community parameter lets users specify the attribute
      name used to define community membership for nodes. This flexibility enables
      the algorithm to adapt to various datasets where communities may be labeled
      differently, ensuring accurate community detection and score calculations.
  Principles:
    description: The cn_soundarajan_hopcroft algorithm is based on the principle that
      nodes within the same community are more likely to form edges with each other
      compared to nodes from different communities. It works efficiently on undirected
      graphs and computes scores for either specified pairs of nodes or for all non-existent
      edges if no pairs are provided. The algorithm operates under the constraints
      of requiring node community attributes and is designed to facilitate the identification
      of potential connections based on community structures.
    time_complexity: O(E)
- id: girvan_newman
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for girvan_newman
          required: true
        most_valuable_edge:
          type: function
          description: Function that takes a graph as input and outputs an edge. The
            edge returned by this function will be recomputed and removed at each
            iteration of the algorithm. If not specified, the edge with the highest
            :func:`networkx.edge_betweenness_centrality` will be used.
          default: null
    output_schema:
      type: any
      description: iterator Iterator over tuples of sets of nodes in `G`. Each set
        of node is a community, each tuple is a sequence of communities at a particular
        level of the algorithm.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Girvan-Newman algorithm is commonly used in social networks
    and biological networks to detect communities or clusters within these graphs.
    It is particularly useful for identifying tightly-knit groups based on the connections
    between nodes, enabling analysis of social structures, collaboration patterns,
    or even the functional organization of proteins within biological networks.
  Tuning_Mechanisms:
    most_valuable_edge: Adjusting the 'most_valuable_edge' function allows users to
      specify a custom metric for edge importance, potentially leading to different
      community structures based on what is prioritized in the removal process. For
      instance, using a different centrality measure can highlight various aspects
      of the community structure.
  Principles:
    description: The core principle of the Girvan-Newman algorithm is to iteratively
      remove the most central edges in terms of betweenness centrality, which leads
      to the fragmentation of the graph into communities. This algorithm is applicable
      to both directed and undirected graphs, but it can be computationally intensive,
      with a time complexity of O(E^2 * V) for dense graphs, where E is the number
      of edges and V is the number of vertices.
    time_complexity: O(E^2 * V)
- id: has_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters: {}
    output_schema:
      type: any
      description: 算法执行结果
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The has_path algorithm is typically used in network analysis
    to determine if a path exists between two nodes within a graph. This is applicable
    in various types of networks, such as transportation, communication, and social
    networks, where identifying connectivity is crucial for routing, data flow, or
    relationship mapping. For instance, in a transportation network, it can be used
    to verify if a route exists between two cities.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the has_path algorithm is to explore the connectivity
      between nodes in a graph using traversal techniques such as Depth-First Search
      (DFS) or Breadth-First Search (BFS). It can be applied to both directed and
      undirected graphs and is generally efficient with a time complexity of O(V +
      E), where V is the number of vertices and E is the number of edges. The main
      input requirement is a valid graph G, with no specific constraints on the nodes
      being queried.
    time_complexity: O(V + E)
- id: is_connected
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX Graph
          description: An undirected graph.
          required: true
    output_schema:
      type: bool
      description: True if the graph is connected, false otherwise.
    graph_type:
      directed: false
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_connected algorithm is typically used in network analysis
    to determine the connectivity of a graph, which is crucial in various applications
    such as social network analysis, transportation networks, and telecommunications.
    It helps identify whether a network is fully connected, meaning every node can
    be reached from any other node, which is vital for assessing network reliability
    and efficiency.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_connected algorithm is based on the
      traversal of the graph, ensuring all vertices can be reached from a single start
      vertex using Breadth-First Search (BFS) or Depth-First Search (DFS). It is applicable
      to both undirected and directed graphs, although connectivity checks for directed
      graphs may involve additional considerations regarding strongly connected components.
      The time complexity of this algorithm is O(V + E), where V is the number of
      vertices and E is the number of edges.
    time_complexity: O(V + E)
- id: is_strongly_connected
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX Graph
          description: A directed graph.
          required: true
    output_schema:
      type: bool
      description: True if the graph is strongly connected, False otherwise.
    graph_type:
      directed: true
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_strongly_connected algorithm is primarily used in directed
    networks to determine if there exists a path between every pair of vertices in
    both directions. This property is crucial in various applications such as social
    network analysis, web page ranking, and circuit design, where established connectivity
    can indicate robust interactions or dependencies. For instance, in a social network,
    the algorithm can help identify whether every user can reach every other user
    through mutual connections.
  Tuning_Mechanisms: {}
  Principles:
    description: The algorithm is based on the mathematical definition of strong connectivity
      in directed graphs, which requires that for any two vertices, there is a directed
      path from one to the other and vice versa. It works specifically for directed
      graphs and employs depth-first search or Tarjan's algorithm to assess reachability.
      The algorithm operates in O(V + E) time complexity, where V is the number of
      vertices and E is the number of edges.
    time_complexity: O(V + E)
- id: is_weakly_connected
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX Graph
          description: A directed graph.
          required: true
    output_schema:
      type: bool
      description: True if the graph is weakly connected, False otherwise.
    graph_type:
      directed: true
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_weakly_connected algorithm is typically used in directed
    networks, such as social media graphs, transportation networks, and communication
    networks, to determine if there is a path between any two nodes when ignoring
    edge directions. This can help identify clusters of interconnected components
    and is useful for network resilience analysis and data connectivity assessments.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_weakly_connected algorithm is based
      on traversing the graph while disregarding the direction of edges to check if
      all nodes are reachable from any starting node. It effectively operates on directed
      graphs, and its time complexity is O(V + E), where V is the number of vertices
      and E is the number of edges. There are no specific constraints on the type
      of directed graph; however, the algorithm requires that the input graph G is
      a NetworkX graph object.
    time_complexity: O(V + E)
- id: johnson
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for johnson
          required: true
        weight:
          type: string or function
          description: 'If this is a string, then edge weights will be accessed via
            the edge attribute with this key (that is, the weight of the edge joining
            `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute
            exists, the weight of the edge is assumed to be one. If this is a function,
            the weight of an edge is the value returned by the function. The function
            must accept exactly three positional arguments: the two endpoints of an
            edge and the dictionary of edge attributes for that edge. The function
            must return a number.'
          default: weight
    output_schema:
      type: dictionary
      description: Dictionary, keyed by source and target, of shortest paths.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: Johnson's algorithm is typically used in sparse graphs where
    it is essential to find the shortest paths between all pairs of nodes. This is
    particularly useful in transportation networks, such as road maps or flight connections,
    where the costs (weights) can vary dynamically, requiring efficient route planning
    and optimization.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows users to specify how edge weights
      are retrieved, either via a specific edge attribute or through a custom function.
      This affects how the algorithm calculates the shortest paths, particularly when
      weights need to represent distances, costs, or other measures specific to the
      application domain. Using a function can also enable more complex calculations
      based on dynamic conditions.
  Principles:
    description: The core principle of Johnson's algorithm is to apply the Bellman-Ford
      and Dijkstra algorithms in conjunction to find the shortest paths in a graph
      with arbitrary edge weights. It is designed to work with directed graphs and
      can handle negative weights as long as there are no negative weight cycles.
      The time complexity is O(V^2 log V + VE), where V is the number of vertices
      and E is the number of edges, making it efficient for sparse graphs.
    time_complexity: O(V * E + V^2 log V)
- id: min_edge_cover
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected bipartite graph.
          required: true
        matching_algorithm:
          type: function
          description: A function that returns a maximum cardinality matching in a
            given bipartite graph. The function must take one input, the graph ``G``,
            and return a dictionary mapping each node to its mate. If not specified,
            :func:`~networkx.algorithms.bipartite.matching.hopcroft_karp_matching`
            will be used. Other possibilities include :func:`~networkx.algorithms.bipartite.matching.eppstein_matching`,
          default: null
    output_schema:
      type: any
      description: set A set of the edges in a minimum edge cover of the graph, given
        as pairs of nodes. It contains both the edges `(u, v)` and `(v, u)` for given
        nodes `u` and `v` among the edges of minimum edge cover.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The min_edge_cover algorithm is typically used in bipartite
    graphs, where it helps solve problems related to resource allocation and matching
    in various industries. For example, it can be applied in job assignment scenarios
    where jobs (one set of nodes) need to be matched to workers (another set of nodes)
    ensuring that every job is covered by at least one worker, optimizing utilization
    of resources.
  Tuning_Mechanisms:
    matching_algorithm: Adjusting this parameter allows users to select different
      algorithms for obtaining the maximum matching, which can influence the efficiency
      and performance of the overall algorithm. For instance, using a faster algorithm
      may reduce runtime significantly but could affect the quality of the matching
      in specific graph structures.
  Principles:
    description: This algorithm operates based on the concept of maximum matching
      in bipartite graphs. It constructs a minimum edge cover by utilizing the properties
      of matchings; specifically, it derives the minimum edge cover from the maximum
      matching obtained through the provided matching algorithm. It is suitable for
      undirected bipartite graphs and generally operates with a time complexity of
      O(E √V) for the Hopcroft-Karp algorithm used as the default matching approach.
    time_complexity: Depends on matching complexity
- id: ra_index_soundarajan_hopcroft
  task_type_id: Link Prediction
  Deployment_method:
