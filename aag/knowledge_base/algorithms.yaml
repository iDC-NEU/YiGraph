      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The bfs_tree algorithm is typically applied in network analysis to explore the structure of graphs,
    particularly in social networks, web crawling, and transportation networks. It is useful for discovering the shortest
    paths from a source node to other nodes within a specified depth, helping to identify relationships, connections, or clusters
    within the graph. For instance, it can be employed in a social network to identify all users within a certain number of
    connections from a given user.
  Tuning_Mechanisms:
    source: Adjusting the source parameter determines the starting point of the BFS traversal, influencing which nodes will
      be included in the resulting tree. Different choices can lead to different subsets of the graph being explored, thus
      altering the structure of the output tree.
    depth_limit: Changing the depth_limit parameter restricts the maximum distance from the source node that will be explored
      during the BFS. A smaller depth limit can result in a more focused exploration, while a larger limit allows for a broader
      view of the graph's structure.
  Principles:
    description: The bfs_tree algorithm implements the breadth-first search (BFS) strategy to create an oriented tree that
      represents reachable nodes from a specified source node. It is specifically designed for both directed and undirected
      graphs and takes into account parameters like traversal depth and neighbor sorting. The time complexity is O(V + E),
      where V is the number of vertices and E is the number of edges, making it efficient for exploring large graphs.
    time_complexity: O(V + E)
  solvable_questions:
  - Perform BFS starting from a specified node and output the structure of the BFS spanning tree.
  - Run breadth-first search with a specified node as the source and output all edges of the spanning tree formed during traversal.
  - Conduct BFS starting from the given node and output the spanning tree along with the level of each node in the tree.
