    - In the collaboration graph, compute a two-way community split using the modularity spectrum.
    - In the interaction network, find a bipartition that reflects spectral community structure.
    - Compare a spectral bipartition with modularity-based or label-propagation-based communities.
  url: https://doi.org/10.1073/pnas.0601602103

- id: is_d_separator
  task_type_id: Graph Query
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX DAG.
          required: true
        x:
          type: node or set of nodes
          description: First node or set of nodes in G.
          required: true
        y:
          type: node or set of nodes
          description: Second node or set of nodes in G.
          required: true
        z:
          type: node or set of nodes
          description: Potential separator, i.e., the set of conditioning nodes in G. It can be an empty set.
          required: true
    output_schema:
      type: bool
      description: A boolean that is true if x is d-separated from y given z in G.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The is_d_separator algorithm is mainly used in directed acyclic graphs for reasoning about conditional independence under graph structure. It is suitable for Bayesian networks, causal DAG analysis, probabilistic graphical models, and dependency analysis tasks where one needs to determine whether a conditioning set blocks all relevant paths between two variables or variable sets. For example, in a causal graph, it can be used to test whether conditioning on a candidate adjustment set blocks spurious associations between treatment and outcome.
  Tuning_Mechanisms:
    conditioning_set_z: The main mechanism is the choice of the conditioning set z. Different selections of z determine whether paths between x and y remain active or become blocked under d-separation rules. Adding or removing conditioning variables can change the answer from dependent to separated or vice versa.
    node_sets_x_and_y: The algorithm supports both single nodes and sets of nodes for x and y. This allows the user to test pairwise conditional independence or group-wise separation questions.
    graph_validity: The input graph must be a DAG and the node sets x, y, and z should be disjoint. If these requirements are violated, NetworkX raises an error. In practice, validating DAG structure and set disjointness is an important preprocessing step before using the algorithm.
  Principles:
    description: The is_d_separator algorithm determines whether x and y are d-separated by z in a directed acyclic graph. A d-separating set blocks all paths between the two node sets under the standard rules of d-separation. Nodes in z block a path if they are part of the path and are not a collider, or a descendant of a collider. Also, colliders that are not in z block a path. A collider structure along a path has the form ... -> c <- .... In probabilistic graphical models, d-separation is commonly used as a structural criterion for conditional independence.
    time_complexity: The NetworkX reference page does not explicitly state the time complexity.
  solvable_questions:
    - Determine whether node set x is d-separated from node set y given conditioning set z in the current DAG.
    - Test whether two variables are conditionally independent given a specified set of observed variables.
    - Check whether a candidate adjustment set blocks all active paths between treatment and outcome in a causal DAG.
    - In the current Bayesian network, does conditioning on z separate x from y?
    - Identify whether the chosen conditioning variables are sufficient to block dependence between two variable groups.
    - Verify whether two node sets remain connected by any active path after conditioning on z.
    - In a causal graph, test whether a backdoor path is blocked by the proposed control set.
    - Determine whether observed evidence variables screen off one variable set from another in the DAG.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.d_separation.is_d_separator.html

- id: check_planarity
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        counterexample:
          type: bool, optional
          description: If true, a Kuratowski subgraph proving non-planarity is returned when the graph is not planar.
          default: false
    output_schema:
      type: tuple
      description: A tuple (is_planar, certificate), where is_planar is true if the graph is planar. If the graph is planar, certificate is a PlanarEmbedding; otherwise, when counterexample is requested, certificate is a Kuratowski subgraph.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The check_planarity algorithm is mainly used for testing whether a graph can be embedded in the plane without edge crossings. It is suitable for graph drawing, network visualization, circuit layout analysis, topological graph analysis, and preprocessing for algorithms that exploit planar structure. For example, in a network visualization task, it can determine whether the graph admits a crossing-free planar embedding; in circuit or routing analysis, it can help identify whether the interconnection structure can be laid out without crossings in a single plane.
  Tuning_Mechanisms:
    counterexample: The counterexample parameter controls whether a Kuratowski subgraph is returned when the graph is non-planar. Setting it to true is useful when the user needs an explicit structural witness of non-planarity. Leaving it false can avoid the additional cost of counterexample generation.
    graph_structure: The algorithm has no other explicit tunable parameters. The result depends entirely on the topology of the input graph.
  Principles:
    description: The check_planarity algorithm checks whether a graph is planar and returns either a combinatorial embedding or a non-planarity certificate. A graph is planar if and only if it can be drawn in a plane without any edge intersections. If the graph is planar, the returned certificate is a PlanarEmbedding, which represents cyclic orderings of incident edges at each vertex. If the graph is non-planar and counterexample is requested, the returned certificate is a Kuratowski subgraph. The planarity test and extraction of the combinatorial embedding are based on the Left-Right Planarity Test.
    time_complexity: The NetworkX reference page states that generating a counterexample has higher complexity, but it does not provide an explicit asymptotic time complexity for the function.
  solvable_questions:
    - Check whether the current graph is planar.
    - Determine whether the graph can be drawn in the plane without edge crossings.
    - Return a planar embedding for the current graph if it is planar.
    - In the current network, does there exist a crossing-free planar representation?
    - Test whether the graph structure satisfies planarity constraints before planar drawing or routing.
    - Generate a Kuratowski subgraph as a certificate of non-planarity.
    - In a circuit-layout scenario, determine whether the connection graph can be embedded without crossings in one plane.
    - In a graph visualization task, verify whether the graph admits a planar embedding or requires edge crossings.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.planarity.check_planarity.html

- id: average_neighbor_degree
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for average_neighbor_degree
          required: true
        source:
          type: string (\"in\"|\"out\"|\"in+out\"), optional (default=\"out\")
          description: Directed graphs only. Use \"in\"- or \"out\"-neighbors of source node.
          default: out
        target:
          type: string (\"in\"|\"out\"|\"in+out\"), optional (default=\"out\")
          description: Directed graphs only. Use \"in\"- or \"out\"-degree for target node.
          default: out
        nodes:
          type: list or iterable, optional (default=G.nodes)
          description: Compute neighbor degree only for specified nodes.
          default: null
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a weight. If None, then each edge has weight 1.
          default: null
    output_schema:
      type: any
      description: d:dict A dictionary keyed by node to the average degree of its neighbors.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: 
    The algorithm computes the average degree of the neighbors for each node in the graph. 
    In an undirected graph, the neighborhood N(i) of a node i consists of all nodes directly connected to i by an edge. 
    In a directed graph, the neighborhood is determined by the `source` parameter:if `source` is 'in', the neighborhood 
    consists of predecessors of i; if 'out', it consists of successors; and if 'in+out', it includes both predecessors and successors. 
    For each node i, the average neighborhood degree k_nn,i is calculated as the sum of the degrees of its neighbors divided 
    by the number of neighbors:k_nn,i = (1 / |N(i)|) * sum_{j in N(i)} k_j, where k_j is the degree of neighbor j. 
    For weighted graphs, the weighted average neighborhood degree k_nn,i^w is computed as k_nn,i^w = (1 / s_i) * sum_{j in N(i)} w_ij * k_j, 
    where s_i is the sum of the weights of edges incident to i, and w_ij is the weight of the edge between i and j. 
    The output is a dictionary mapping each node to its (weighted) average neighbor degree.
  Tuning_Mechanisms:
    source: 
      Controls which neighbors are considered for each node in directed graphs.
      Options:"in" (predecessors), "out" (successors), or "in+out" (both).
      Choosing different options affects the local neighborhood considered for averaging
      and can highlight incoming vs outgoing connectivity patterns.
    target: 
      Determines which degree of neighbors is used in the calculation for directed graphs:"in","out", or "in+out". Adjusting this can emphasize different aspects of neighbor connectivity.
    weight: 
      If set to a string corresponding to an edge attribute, the algorithm uses weighted degrees
      instead of simple counts. Using weights can better reflect the true importance or strength
      of connections, but increases computational overhead.
    nodes:
      Limits computation to a subset of nodes. Useful for large graphs to save memory
      and speed up calculations while focusing on nodes of interest.
  Principles:
    description: 
      Computes the average degree of neighboring nodes for each node,
      reflecting local connectivity and degree correlation patterns
      in the network.
    time_complexity: O(V + E),Limiting the computation to a subset of nodes (nodes parameter) can reduce practical computation time proportionally.
  solvable_questions:
  - Compute the average neighbor degree of each node in the graph and output the Top-20 nodes with the highest average neighbor degree.
  - Output a ranked table of all nodes based on their average neighbor degree in descending order.
  - Identify nodes whose neighbors are most highly connected, indicating potential hubs or well-connected neighborhoods.
  - In a social network, which users tend to be connected to other highly connected users?
  - In a communication network, which nodes have neighbors with the highest connectivity, suggesting influence or redundancy?
  - In a transportation network, which intersections are connected to other well-connected intersections, indicating robust route hubs?
  - In a biological or neural network, which neurons have neighbors with high connectivity, suggesting critical network regions?
  - When restricting to specific subsets of nodes, which nodes have neighbors that are on average more connected within these subsets?

- id: average_degree_connectivity
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for average_degree_connectivity
          required: true
        source:
          type: \"in\"|\"out\"|\"in+out\" (default:\"in+out\")
          description: Directed graphs only. Use \"in\"- or \"out\"-degree for source node.
          default: in+out
        target:
          type: \"in\"|\"out\"|\"in+out\" (default:\"in+out\")
          description: Directed graphs only. Use \"in\"- or \"out\"-degree for target node.
          default: in+out
        nodes:
          type: list or iterable (optional)
          description: Compute neighbor connectivity for these nodes. The default is all nodes.
          default: null
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a weight. If None, then each edge has weight 1.
          default: null
    output_schema:
      type: dict
      description: A dictionary keyed by degree k with the value of average connectivity.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: 
    The average degree connectivity algorithm is commonly used in network science to analyze
    the correlation between a node's degree and the degrees of its neighbors. It is applied in
    social networks, biological networks, and communication networks to study assortativity
    and local connectivity patterns. For instance, in a social network, it can help identify
    whether high-degree nodes tend to connect to other high-degree nodes, which informs
    strategies for influence spreading or community detection.
  Tuning_Mechanisms:
    source: 
      Controls which neighbors are considered for each node in directed graphs.
      Options:"in" (predecessors), "out" (successors), or "in+out" (both).
      Choosing different options affects the local neighborhood considered for averaging
      and can highlight incoming vs outgoing connectivity patterns.
    target: 
      Determines which degree of neighbors is used in the calculation for directed graphs:"in","out", or "in+out". Adjusting this can emphasize different aspects of neighbor connectivity.
    weight: 
      If set to a string corresponding to an edge attribute, the algorithm uses weighted degrees
      instead of simple counts. Using weights can better reflect the true importance or strength
      of connections, but increases computational overhead.
    nodes:
      Limits computation to a subset of nodes. Useful for large graphs to save memory
      and speed up calculations while focusing on nodes of interest.
  Principles:
    description: 
      he algorithm computes the average degree of neighbors for nodes with degree k. For weighted graphs,
      the weighted average neighbor degree for a node i is calculated as:k_{nn,i}^{w} = (1 / s_i) * sum_{j in N(i)} w_{ij} * k_j
      where s_i is the weighted degree of node i, w_{ij} is the edge weight, and N(i) is the set of neighbors.
      The result is a dictionary keyed by degree k with values of average connectivity.
    time_complexity: O(V + E) for unweighted graphs; O(V + E) with additional O(E) for processing edge weights in weighted graphs.
  solvable_questions:
  - Compute the average neighbor degree for all nodes in the graph and output the Top-20 nodes with the highest average connectivity.
  - Output a ranked table of nodes based on average degree connectivity in descending order.
  - Identify nodes with unusually high or low neighbor connectivity compared to nodes of similar degree.    - In the social network, which users tend to connect to other highly connected users?
  - In the communication network, which nodes are connected to neighbors with the most diverse connectivity?
  - In the transportation network, which intersections tend to connect to hubs with many links?
  - In a biological or neural network, which nodes connect preferentially to other highly connected nodes, indicating assortative patterns?
  - When restricting to specific node subsets, which nodes have neighbors with the highest average degrees, highlighting local connectivity hotspots?

- id: naive_greedy_modularity_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Graph must be simple and undirected.
          required: true
        resolution:
          type: float
          description: If resolution is less than 1, modularity favors larger communities. Greater than 1 favors smaller communities.
          default: 1
        weight:
          type: string or None, optional (default=None)
          description: The name of an edge attribute that holds the numerical value used as a weight.  If None, then each edge has weight 1. The degree is the sum of the edge weights adjacent to the node.
          default: null
    output_schema:
      type: any
      description: list A list of sets of nodes, one for each community. Sorted by length with largest communities first.
    graph_type: 
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: 
    This algorithm is used for community detection in graphs by maximizing modularity.
    It is suitable for analyzing the structure of small-scale networks, where nodes are grouped
    into communities with dense intra-connections and sparse inter-connections.
    It can be applied in social networks, biological networks, and communication networks
    to discover community structure, but is mainly used as a reference or baseline method
    due to its high computational complexity.
  Tuning_Mechanisms:
    resolution: 
      Controls the resolution of detected communities.
      If resolution is less than 1, the algorithm favors larger communities.
      If greater than 1, it favors smaller communities.
      This parameter adjusts the balance between intra-community density and inter-community separation.  
    weight:
      Specifies the edge attribute used as weight.
      If None, all edges are treated as having weight 1.
      Using weights allows the algorithm to consider the strength of connections
      when computing modularity and merging communities.
  Principles:
    description: 
      The algorithm performs greedy modularity maximization for community detection.
      It starts with each node as its own community and iteratively merges the pair of communities
      that results in the largest increase in modularity. This process continues until no further
      improvement in modularity is possible. The algorithm optimizes the generalized modularity
      function, where the resolution parameter controls the scale of communities.
    time_complexity: O(n^4)  
  solvable_questions:
  - Partition the graph into communities by maximizing modularity using a greedy strategy.
  - Identify the community structure of a given undirected network.
  - Determine which nodes belong to the same community based on connectivity patterns.
  - Find densely connected groups of nodes within the graph.
  - Analyze how the resolution parameter affects the number and size of detected communities.
  - Compare community structures under different resolution values to detect multi-scale patterns.
  - Detect large communities first by observing the greedy merging process.
  - Given a graph, output communities sorted by size (largest first).

- id: biconnected_component_edges
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected graph.
          required: true
    output_schema:
      type: generator of lists
      description: Generator of lists of edges, one list for each bicomponent.
    graph_type: 
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: 
    This algorithm is used to analyze the structural robustness of graphs by identifying
    biconnected components and articulation points. It is applicable in network reliability
    analysis, communication networks, transportation systems, and infrastructure networks
    to detect critical nodes whose removal would disconnect the graph. It can also be used
    to identify stable subgraphs that remain connected under single-node failures.
  Tuning_Mechanisms:
    None
  Principles:
    description: 
      The algorithm identifies biconnected components using a depth-first search (DFS) approach.
      It tracks the discovery time of nodes and the lowest reachable ancestor via back edges.
      A node is identified as an articulation point if there exists a subtree rooted at that node
      such that no back edge connects its descendants to its ancestors. Edges traversed between
      articulation points form biconnected components, and each edge belongs to exactly one such component.
    time_complexity: O(V + E)
  solvable_questions:
  - Identify all biconnected components in the graph and return the edges in each component.
  - Determine which nodes are articulation points (cut vertices) in the graph.
  - Find edges that belong to the same biconnected component.
  - Analyze which subgraphs remain connected after removing any single node.
  - Detect critical nodes whose removal would disconnect parts of the graph.
  - Determine how many biconnected components exist in the graph.
  - Identify overlapping nodes that belong to multiple biconnected components.
  url:
    https://dl.acm.org/doi/pdf/10.1145/362248.362272

- id: condensation
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A directed graph.
        scc:
          type: list or generator (optional, default=None)
          description: Strongly connected components. If provided, the elements in `scc` must partition the nodes in `G`. If not provided, it will be calculated as scc=nx.strongly_connected_components(G).
    output_schema:
      type: NetworkX DiGraph
      description: The condensation graph C of G.  The node labels are integers corresponding to the index of the component in the list of strongly connected components of G.  C has a graph attribute named 'mapping' with a dictionary mapping the original nodes to the nodes in C to which they belong.  Each node in C also has a node attribute 'members' with the set of original nodes in G that form the SCC that the node in C represents.
    graph_type: 
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: 
    This algorithm is used to simplify directed graphs by collapsing strongly connected components (SCCs)
    into single nodes, producing a directed acyclic graph (DAG). It is widely applied in program analysis,
    dependency resolution, workflow scheduling, and network structure analysis. For example, in software
    dependency graphs, it can identify cyclic dependencies and reduce them into single units, enabling
    easier topological ordering and high-level structure analysis.
  Tuning_Mechanisms:
    scc:
      Providing a custom SCC partition controls the granularity of the condensation graph
      larger SCCs produce fewer nodes (coarser structure), smaller SCCs produce more nodes
      (finer structure). If None, SCCs are computed automatically.  
  Principles:  
    description: 
      The algorithm constructs the condensation graph by contracting each strongly connected component (SCC)
      of the original directed graph into a single node. All edges between nodes in different SCCs are preserved
      as edges between the corresponding contracted nodes. The resulting graph is guaranteed to be a directed
      acyclic graph (DAG). Each node in the condensed graph represents a set of original nodes, and a mapping
      is maintained from original nodes to their corresponding SCC node.
  time_complexity: O(V + E)
  solvable_questions:
  - Identify all biconnected components in the graph and return the edges in each component.
  - Determine which nodes are articulation points (cut vertices) in the graph.
  - Find edges that belong to the same biconnected component.
  - Analyze which subgraphs remain connected after removing any single node.
  - Detect critical nodes whose removal would disconnect parts of the graph.
  - Determine how many biconnected components exist in the graph.
  - Identify overlapping nodes that belong to multiple biconnected components.


- id: efficiency
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected graph for which to compute the average local efficiency. u, v :node Nodes in the graph ``G``.
    output_schema:
      type: any
      description: float Multiplicative inverse of the shortest path distance between the nodes.
    graph_type: 
      directed: false      
      multigraph: false
      weighted: false      
      heterogeneous: false
  Application_scenario: 
    This algorithm computes the efficiency between pairs of nodes in a graph,
    defined as the multiplicative inverse of the shortest path distance. It is
    widely used in network science to analyze local connectivity, robustness,
    and information flow. For example, in social networks it can measure how
    efficiently information spreads between individuals, or in biological
    networks it can indicate the resilience of connections between cells or
    proteins.
  Tuning_Mechanisms:
    none
  Principles:  
    description: 
       The efficiency between two nodes is defined as the multiplicative inverse of the 
      shortest path distance between them. If there is no path connecting the nodes, 
      the efficiency is 0. This measure quantifies how easily information or influence 
      can travel from one node to another in a network. The local efficiency of a node 
      can be computed by averaging the efficiencies of all pairs of its neighbors, 
      providing insight into the network's fault tolerance and local connectivity. 
      Edge weights are ignored in the computation, so all edges are treated as equal.
  time_complexity: O(V * (V + E))
  solvable_questions:
  - Identify all strongly connected components (SCCs) in the graph.
  - Determine the DAG structure by collapsing SCCs.
  - Map original nodes to their corresponding SCC nodes.
  - Analyze the topological ordering of the condensed graph.
  - Determine critical SCCs whose removal affects graph connectivity.
  - Count the number of SCCs in the graph.
  - Identify SCCs with overlapping node memberships (if any).
  url:
    https://arxiv.org/pdf/cond-mat/0101396

- id: full_join
  task_type_id: Graph Query
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        rename:
          type: tuple
          description: A directed graph.
          default: (None, None)
    output_schema:
      type: The full join graph with the same type as G.
      description: The full join graph with the same type as G.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario:
    This algorithm is used to construct a composite graph by fully connecting
    two disjoint directed graphs. It is particularly useful when modeling scenarios
    where two independent subsystems or node groups must have complete bidirectional
    interactions. For example, in dependency modeling, two modules can be fully linked
    to simulate maximum interaction; in recommendation systems, it can be used to
    initialize a full candidate interaction graph between two sets (e.g., users and items);
    and in network analysis, it helps generate dense cross-group connectivity structures
    for stress testing or structural analysis.
  Tuning_Mechanisms: none
  Principles:
    description: 
      The algorithm constructs the full join of two graphs G and H by first taking their union,
      and then adding all possible edges between every node in G and every node in H.
      Since the graph is directed, edges are added in both directions (from G to H and from H to G).
      The node sets of G and H must be disjoint; otherwise, node renaming is required.
      The resulting graph preserves all original edges and adds complete bipartite-style
      connections across the two graphs.
    time_complexity: O(|V_G| * |V_H| + |E_G| + |E_H|)
  solvable_questions:
  - Merge two graphs and connect every node in one graph to all nodes in the other graph.
  - Construct a graph where two disjoint node sets are fully interconnected with directed edges.
  - Combine two graphs such that all possible cross-edges between them are added.
  - Build a composite graph where every node in G has edges to every node in H and vice versa.
  - Create a fully connected interaction structure between two independent graph modules.
  - Generate a graph that preserves internal edges of two graphs while adding complete bipartite-style connections between them.
  - Connect two disjoint graphs to simulate maximum possible interaction between their nodes.
  - Construct a dense graph by linking all nodes across two separate subgraphs.
  - Form a graph where two components are merged and all cross-component edges are explicitly added.
  - Create a graph structure where every node pair across two graphs is directly connected.

- id: is_tournament
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A directed graph representing a tournament.
          required: true
    output_schema:
      type: any
      description: bool Whether the given graph is a tournament graph.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario:
    This algorithm is used to determine whether a directed graph satisfies
    the structural properties of a tournament graph. It is particularly useful
    in scenarios involving pairwise dominance or competition relationships,
    such as ranking systems, game theory models, and preference aggregation.
    For example, in a round-robin competition, it can verify whether every pair
    of participants has exactly one winner; in social choice or voting systems,
    it can validate whether preferences form a complete asymmetric relation;
    and in network analysis, it helps identify fully comparable directed structures.
  Tuning_Mechanisms: none
  Principles:
    description:
      The algorithm checks whether the input graph G satisfies the definition
      of a tournament graph. Specifically, for every pair of distinct nodes (u, v),
      there must exist exactly one directed edge between them:either u → v or v → u,
      but not both. Additionally, the graph must not contain self-loops or parallel edges.
      The algorithm verifies completeness (every pair is connected) and asymmetry
      (no bidirectional edges), ensuring the structure forms a tournament.
    time_complexity: O(|V|^2)
  solvable_questions:
    - Determine whether a directed graph represents a valid tournament structure.
    - Check if every pair of nodes in a graph has exactly one directed edge between them.
    - Verify whether a graph encodes a complete set of pairwise comparisons.
    - Identify if a directed graph satisfies the properties of a tournament graph.
    - Check whether the graph contains exactly one directed edge for every node pair.
    - Determine if a graph models a round-robin competition outcome.
    - Validate whether the graph is a complete asymmetric directed graph.
    - Check if there are any missing or bidirectional edges violating tournament rules.
    - Identify whether the graph structure corresponds to pairwise dominance relations.
    - Verify if the graph forms a valid comparison network without ties or duplicates.

- id: score_sequence
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A directed graph representing a tournament.
          required: true
    output_schema:
      type: any
      description: list A sorted list of the out-degrees of the nodes of `G`.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario:
    This algorithm is used to analyze tournament graphs by computing the score sequence, which is the sorted list of out-degrees of the nodes. It is useful for evaluating results of round-robin tournaments or competitions where every participant competes with every other participant, studying dominance or ranking structures in social networks, biological networks, or decision-making systems, and generating statistical distributions of node performance in directed networks for simulation, validation, or benchmarking.
  Tuning_Mechanisms: none
  Principles:
    description: 
      The algorithm computes the out-degree (number of outgoing edges) of each node in a directed graph representing a tournament. 
      A tournament graph is a directed graph where every pair of nodes is connected by exactly one directed edge.
      After computing the out-degrees, the algorithm sorts them in ascending order to form the score sequence. 
      The score sequence characterizes the relative dominance or performance of nodes in the tournament.
    time_complexity: O(|V| + |E|) 
  solvable_questions:
  - Rank traders or investment funds in a financial network based on performance comparisons, where each node represents a fund and directed edges indicate outperforming relationships.
  - Analyze dominance relationships between companies in a competitive market, modeling pairwise wins as market share or contract wins.
  - Evaluate performance and interaction patterns of players in esports tournaments or sports leagues using win-loss graphs.
  - Detect leading or influential nodes in a social network where interactions are competitive or directional.
  - Simulate influence propagation in decision-making boards, where each member's proposal is accepted or rejected relative to others.
  - Compare performance of research groups or departments by modeling collaborations and successful outcomes as directed edges.
  - Identify top-performing nodes in a supply chain network where suppliers compete to fulfill orders.
  - Generate risk assessment rankings in financial trading networks by analyzing pairwise competition outcomes.
  - Study hierarchical structures in competitive ecosystems such as startups, where one startup “wins” over another in funding rounds or market presence.
  - Benchmark AI agents or algorithms in multi-agent competitive simulations by computing and comparing their performance graphs.

- id: node_redundancy
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A bipartite graph
          required: true
        nodes:
          type: list or iterable (optional)
          description: Compute redundancy for these nodes. The default is all nodes in G.
          default: null
    output_schema:
      type: dictionar
      description: A dictionary keyed by node with the node redundancy value.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: true
  Application_scenario:
    This algorithm is used to compute node redundancy in bipartite networks, quantifying how much a node's neighbors are already interconnected through other nodes. It is particularly useful for analyzing real-world systems where two types of entities interact, such as user-item networks in recommendation systems, author-paper networks in bibliometrics, company-project networks in project management, or species-resource networks in ecology. By measuring redundancy, one can identify nodes that contribute little unique connectivity, detect bottlenecks, optimize network design, or highlight key nodes whose removal minimally affects overall connectivity.
  Tuning_Mechanisms: none
  Principles:
    description:
      The algorithm calculates the redundancy coefficient for a node v in a bipartite graph G. For node v, it examines all pairs of neighbors and counts how many of these pairs are also jointly connected to at least one other node besides v. The coefficient is the fraction of such pairs over the total possible neighbor pairs. Formally, for vertex v, rc(v) = |{{u,w} ⊆ N(v), ∃ v' ≠ v, (v',u) ∈ E and (v',w) ∈ E}| / (|N(v)|(|N(v)|-1)/2), where N(v) is the neighbor set of v. The resulting values range from 0 (no redundancy) to 1 (fully redundant), reflecting how much a node's neighbors are connected via other nodes.
    time_complexity: O(Σ_v deg(v)^2) 
  solvable_questions:
    - Identify users in a recommendation system whose preferences overlap heavily with others, to improve diversity.
    - Determine authors in a co-authorship network whose papers connect the same collaborators repeatedly.
    - Analyze companies in project networks whose projects involve largely overlapping teams, for resource optimization.
    - Detect ecological species whose resource interactions are redundant, helping to identify keystone species.
    - Highlight nodes whose removal would minimally impact the connectivity of their neighbors.
    - Quantify redundancy in bipartite supply chain networks to optimize supplier allocation.
    - Find highly redundant nodes to simplify network visualization or reduce computational complexity.
    - Evaluate overlap in social affiliation networks, such as members in clubs or organizations.
    - Support feature selection in machine learning tasks based on network redundancy metrics.
    - Provide insights into network resilience by identifying nodes with low redundancy critical for connectivity.

- id: closeness_vitality
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A strongly-connected graph.
          required: true
        node:
          type: object, optional (default=None)
          description: If specified, only the closeness vitality for this node will be returned. Otherwise, a dictionary mapping each node to its closeness vitality will be returned.
          default: null
        weight:
          type: string, optional (default=None)
          description: The name of the edge attribute used as weight. This is passed directly to the NetworkX wiener_index function.
          default: null
        wiener_index:
          type: number, optional (default=None)
          description: If the Wiener index of graph G has already been computed, it can be provided directly. Otherwise, it will be computed automatically.
          default: null
    output_schema:
      type: dictionary or float
      description: If node is None, returns a dictionary of nodes with closeness vitality as the value. Otherwise, returns the closeness vitality value for the specified node.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The closeness vitality algorithm is used to evaluate the structural importance of nodes by measuring how much the total pairwise distance in the network changes after removing a node. It is suitable for transportation networks, communication systems, infrastructure networks, and other graph structures where node failure or removal may significantly affect global connectivity efficiency. For example, in a transportation network, it can help identify critical stations or intersections whose removal would greatly increase the overall travel distance between locations.
  Tuning_Mechanisms:
    node: Specifying a node allows the algorithm to return the closeness vitality of only that node, which is suitable for targeted analysis of a specific entity; leaving it as None enables full-network evaluation by computing vitality values for all nodes.
    weight: When a weight attribute is provided, the algorithm measures the effect of node removal on weighted shortest-path distances, which is useful when edges represent costs, travel times, or capacities. If weight is None, the graph is treated as unweighted.
    wiener_index: Providing a precomputed Wiener index can improve computational efficiency, especially when repeated closeness vitality calculations are required on the same graph. If omitted, the Wiener index will be computed internally.
  Principles:
    description: The closeness vitality of a node is defined as the change in the sum of distances between all node pairs when that node is removed from the graph. It reflects the extent to which a node contributes to maintaining the overall compactness and efficiency of the network. A larger vitality value indicates that removing the node has a greater impact on global shortest-path distances. In some cases, the closeness vitality may be negative infinity if removing the node disconnects the graph.
    time_complexity: Depends on the computation of Wiener index and repeated shortest-path distance calculations; typically high for large graphs, especially when evaluating all nodes.
  solvable_questions:
    - Compute the closeness vitality of each node in the current graph and output the Top-20 nodes with the highest vitality values.
    - Output the closeness vitality table for all nodes in the network, sorted in descending order.
    - Provide the closeness vitality value of a specified node in the current graph.
    - In the current transportation network, which stations or intersections are most critical in maintaining overall distance efficiency?
    - In the communication network, which nodes would cause the greatest increase in overall path lengths if removed?
    - In the infrastructure network, which facilities contribute most to preserving compact connectivity across the system?
    - In the system dependency graph, which modules are most important for keeping dependencies globally efficient?
    - In the citation or collaboration network, which nodes most strongly support short global reachability among all entities?

- id: bridges
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: undirected graph
          description: An undirected graph.
          required: true
        root:
          type: node, optional (default=None)
          description: A node in graph G. If specified, only the bridges in the connected component containing this node will be returned.
          default: null
    output_schema:
      type: generator of edges
      description: Generates edges in the graph whose removal disconnects the graph or increases the number of connected components.
    graph_type:
      directed: false
      multigraph: supported
      weighted: false
      heterogeneous: false
  Application_scenario: The bridges algorithm is used to identify critical edges in a network whose removal would disconnect part of the graph or increase the number of connected components. It is widely used in transportation networks, communication systems, infrastructure networks, and dependency graphs to detect vulnerable links. For example, in a road network, it can help identify roads or junction connections whose failure would isolate regions and reduce overall connectivity.
  Tuning_Mechanisms:
    root: Specifying a root node restricts the analysis to the connected component containing that node, which can improve efficiency when only a local region of the graph is of interest. Leaving it as None allows the algorithm to detect bridges across the entire graph.
  Principles:
    description: A bridge is an edge whose removal increases the number of connected components in a graph. Equivalently, a bridge is an edge that does not belong to any cycle. This implementation is based on chain decomposition:an edge is a bridge if and only if it is not contained in any chain. The algorithm uses the NetworkX chain_decomposition function to find chains. For multigraphs, the graph is first converted to a simple graph, and then candidate bridges are checked to ensure they are not multi-edges.
    time_complexity: O(m + n), ignoring polylogarithmic factors, where n is the number of nodes and m is the number of edges.
  solvable_questions:
    - Find all bridges in the current graph.
    - Output the list of critical edges whose removal would increase the number of connected components in the network.
    - Identify all cut-edges in the current undirected graph.
    - In the current transportation network, which roads are critical so that removing them would disconnect regions?
    - In the communication network, which links are single points of failure between subnetworks?
    - In the infrastructure network, which connections are the most vulnerable because they do not lie on any cycle?
    - In the dependency graph, which edges are essential for maintaining connectivity between modules?
    - For the connected component containing the specified node, which edges are bridges?

- id: maximum_flow
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        flowG:
          type: graph
          description: 
            A NetworkX graph. Edges are expected to have an attribute called 'capacity'.
            If this attribute is not present, the edge is considered to have infinite capacity.
          required: true
        s:
          type: node
          description: Source node for the flow.
          required: true
        t:
          type: node
          description: Sink node for the flow.
          required: true
        capacity:
          type: string
          description: 
            The edge attribute used to represent capacity. If an edge does not have this
            attribute, it is treated as having infinite capacity.
          default: capacity
        flow_func:
          type: function, optional
          description: >-
            A function for computing the maximum flow between a source and a sink in a capacitated graph.
            It must accept at least three parameters: a Graph or Digraph, a source node, and a target node,
            and return a residual network following NetworkX conventions. If None, the default algorithm
            preflow_push() is used.
          default: null
        kwargs:
          type: dict, optional
          description: Additional keyword arguments passed to the selected maximum flow algorithm.
          default: {}
    output_schema:
      type: tuple
      description: 
        A tuple (flow_value, flow_dict), where flow_value is the value of the maximum flow and
        flow_dict is a dictionary describing the flow on each edge.
    graph_type:
      directed: true
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: 
    Maximum flow is a core graph optimization algorithm used to determine the greatest possible amount of flow
    that can be sent from a source node to a sink node under edge capacity constraints. It is widely applied in
    transportation systems, communication networks, logistics routing, supply chain optimization, production planning,
    traffic engineering, image segmentation, and resource allocation. The algorithm is especially useful when modeling
    capacity-limited transfer, routing, or throughput problems in directed networks.
  Tuning_Mechanisms:
    capacity: 
      The 'capacity' parameter specifies which edge attribute should be interpreted as the capacity constraint.
      This allows the same graph structure to be reused with different capacity semantics.
    flow_func: 
      The 'flow_func' parameter determines which maximum flow algorithm is used internally. If not specified,
      NetworkX uses preflow_push() by default. Alternative algorithms may offer different performance characteristics
      depending on graph density, capacity distribution, and problem size.
    kwargs: 
      Additional keyword arguments can be passed to the selected flow algorithm to control internal behavior,
      implementation details, or algorithm-specific optimization settings.
  Principles:
    description: 
      The maximum flow algorithm computes the largest feasible amount of a single commodity that can be sent from
      a source node to a sink node while respecting capacity constraints on edges and flow conservation at intermediate nodes.
      Each edge can carry at most its specified capacity, and for every node other than the source and sink, the total incoming
      flow must equal the total outgoing flow. The algorithm typically works by constructing and updating a residual network,
      which represents the remaining capacity available for sending additional flow and the possibility of canceling previously
      assigned flow. NetworkX supports multiple implementations, and by default uses a preflow-push based method when no custom
      flow function is provided. If the graph contains a source-to-sink path with effectively infinite capacity, the problem
      becomes unbounded and an exception is raised.
    time_complexity: Depends on the selected flow algorithm
  solvable_questions:
    - Compute the maximum amount of flow that can be sent from a source node to a sink node.
    - Determine bottlenecks in a capacitated transportation or logistics network.
    - Analyze the maximum throughput of a communication network under link capacity constraints.
    - Evaluate resource transfer limits between two endpoints in an infrastructure graph.
    - Identify how much supply can be delivered from producers to consumers in a flow network.
    - Support cut-based analysis such as identifying critical links related to source-sink capacity.
    - Compare the effect of different capacity assignments on the achievable network throughput.
    - Solve routing and allocation problems where edge capacities restrict feasible movement.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.flow.maximum_flow.html
  
- id: local_bridges
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: undirected graph
          description: A NetworkX undirected graph. The algorithm only supports simple undirected graphs.
          required: true
        with_span:
          type: bool, optional
          description: If True, return each local bridge as a 3-tuple `(u, v, span)`, where span is the shortest path length
            between the endpoints after removing that edge. If False, return only the edge tuple `(u, v)`.
          default: true
        weight:
          type: function, string or None, optional (default=None)
          description: If function, used to compute edge weights for span calculation. If string, it specifies the edge attribute
            used as weight. If None, all edges are treated as weight 1.
          default: null
    output_schema:
      type: iterator
      description: Yields local bridges as edge 2-tuples `(u, v)`, or as 3-tuples `(u, v, span)` when `with_span=True`.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The local_bridges algorithm is used to identify edges that serve as weak ties or structural connectors
    in a network, where the two endpoint nodes do not share any common neighbors. It is useful in social network analysis for
    detecting weak ties, in communication networks for finding fragile inter-group links, and in collaboration or citation graphs
    for identifying edges that connect otherwise separate local communities. 
  Tuning_Mechanisms:
    with_span: When set to True, the algorithm not only identifies whether an edge is a local bridge, but also evaluates its
      structural importance by computing the span after edge removal. This provides richer analysis but increases computational cost.
    weight: Setting weight allows the span to reflect weighted shortest-path distance instead of hop count. This is useful in
      transportation, infrastructure, or reliability networks where edge cost, distance, or latency matters.
  Principles:
    description: A local bridge is an edge whose two endpoints have no common neighbors, meaning the edge does not participate
      in any triangle. When `with_span=True`, the algorithm temporarily excludes the edge and computes the shortest path length
      between its endpoints; this value is called the span. If no alternative path exists, the span is infinite. The function
      is only implemented for undirected simple graphs in NetworkX. 
    time_complexity: Without span computation, the algorithm scans edges and checks neighbor intersection, so the cost is roughly
      proportional to the number of edges and local neighborhood sizes. With span computation enabled, an additional shortest-path
      computation is performed for each detected local bridge, so the total cost can grow substantially on large graphs. This
      complexity description is an implementation-based summary rather than an explicit official Big-O guarantee.
  solvable_questions:
  - Find all local bridges in the current graph.
  - Return all edges that are not part of any triangle.
  - For each weak tie in the social network, compute its span after removal.
  - Identify edges that connect different local neighborhoods without shared neighbors.
  - In the collaboration network, which links connect authors from otherwise separate local clusters?
  - In the communication graph, which edges are fragile connectors between nearby communities?
  - In the transportation network, which road segments are local bridges, and what is the rerouting distance if each is removed?
  - Output the list of local bridges together with their spans, sorted by span in descending order.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.bridges.local_bridges.html

- id: trophic_levels
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: DiGraph
          description: A NetworkX directed graph. The algorithm is defined for directed graphs.
          required: true
        weight:
          type: string, optional (default='weight')
          description: The edge attribute used as weight in the trophic level calculation. If omitted, the default edge
            attribute name is `weight`.
          default: weight
    output_schema:
      type: dictionary
      description: Dictionary of nodes with trophic level as the value.
    graph_type:
      directed: true
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The trophic_levels algorithm is used to measure the hierarchical position of nodes in a directed
    flow network. It originated in food-web analysis, where basal species are assigned trophic level 1 and higher-level
    consumers are assigned levels based on the weighted average trophic levels of their prey plus one. Beyond ecology, it
    can also be applied to directed dependency, influence, and supply-flow networks to identify layered structure and
    upstream-downstream relationships. 
  Tuning_Mechanisms:
    weight: The `weight` parameter determines which edge attribute is used when computing weighted in-degree and the weighted
      average contribution from predecessor nodes. This is useful when edges represent flow strength, interaction intensity,
      or dependency magnitude rather than simple binary relations.
  Principles:
    description: The trophic level of node i is defined as
      `s_i = 1 + (1 / k_i^in) * sum_j(a_ij * s_j)`,
      where `k_i^in = sum_j a_ij` is the in-degree (or weighted in-degree) of node i. By convention, nodes with zero in-degree
      are assigned trophic level 1. In NetworkX, the function is implemented for directed graphs and follows the method described
      by Stephen Levine in "Several measures of trophic structure applicable to complex food webs" (Journal of Theoretical Biology,
      83(2), 195-207, 1980). 
    time_complexity: The implementation constructs a weighted adjacency matrix, normalizes the non-basal part into a transition-like
      matrix, and solves a linear system through matrix inversion. In practice, this is dominated by dense linear algebra operations,
      so the computational cost is generally cubic in the number of non-basal nodes in the worst case. This is an implementation-based
      summary derived from the NetworkX source rather than an explicitly stated official complexity bound.
  solvable_questions:
  - Compute the trophic level of each node in the current directed graph.
  - Output the trophic level table for all nodes, sorted in descending order.
  - Which nodes are closest to the basal layer in the dependency network?
  - Which nodes occupy the highest trophic positions in the food web?
  - In the citation or influence network, which entities lie furthest downstream in the directed structure?
  - In the supply-chain graph, which components or organizations are positioned at the highest downstream levels?
  - Identify all basal nodes and assign trophic level 1 to them.
  - Compare weighted and unweighted trophic levels under different edge weight settings.
  url: Stephen Levine (1980) J. theor. Biol. 83, 195-207 https://doi.org/10.1016/0022-5193(80)90288-X

- id: non_randomness
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph. The graph must be connected, contain no self-loops, and have at least one edge.
          required: true
        k:
          type: int or None, optional (default=None)
          description: The number of communities in G. If not provided, a default community detection algorithm is used to estimate it.
          default: null
        weight:
          type: string or None, optional (default='weight')
          description: The edge attribute used as the numerical weight. If None, all edges are treated as weight 1.
          default: weight
    output_schema:
      type: tuple
      description: A tuple of two float values. The first is the graph non-randomness, and the second is the relative non-randomness
        with respect to the Erdős–Rényi random graph model.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The non_randomness algorithm is used to quantify how much the structure of a graph deviates from that
    of a random graph. It is particularly useful in social network analysis, community structure evaluation, and graph pattern
    analysis. A higher non-randomness value indicates that the graph exhibits stronger structural regularity or community organization,
    while a lower value suggests that the graph is closer to an Erdős–Rényi random graph. This method is especially useful for
    distinguishing meaningful network organization from random connectivity.
  Tuning_Mechanisms:
    k: The parameter `k` controls the assumed number of communities in the graph. If domain knowledge about community count is
      available, explicitly setting `k` can improve interpretability and consistency; otherwise, the algorithm estimates it automatically.
    weight: The `weight` parameter determines whether the algorithm uses the weighted adjacency matrix or a binary adjacency matrix.
      This is useful when edges represent strengths, frequencies, or capacities rather than simple existence.
  Principles:
    description: The algorithm computes two values. The first is the total non-randomness of the graph, derived from the spectrum
      of the adjacency matrix and reflecting the extent to which edges are concentrated within communities rather than distributed
      randomly. The second is the relative non-randomness, which measures how different the graph is from an Erdős–Rényi random
      graph in probabilistic terms. The closer the relative non-randomness is to 0, the more likely the graph resembles a random
      graph. If edge weights are provided, the weighted adjacency matrix is used instead. The method requires the input graph to
      be undirected, connected, without self-loops, and non-empty.
    time_complexity: The core computation is dominated by spectral analysis of the adjacency matrix, especially eigenvalue-related
      operations. In practice, this makes the algorithm significantly more expensive than simple degree-based measures, and the
      cost grows quickly with graph size. Additional overhead may arise when `k` is not provided and community detection is used
      to estimate the number of communities.
  solvable_questions:
  - Compute the non-randomness and relative non-randomness of the current graph.
  - Determine whether the current network is structurally close to a random graph.
  - Compare the structural randomness of multiple undirected connected graphs.
  - Evaluate whether a social network has strong community organization or resembles random connectivity.
  - In the current graph, how far is the observed topology from an Erdős–Rényi model?
  - Analyze how weighted edges affect the graph's non-randomness score.
  - Estimate the non-randomness of a network under a specified number of communities.
  - Compare the relative non-randomness before and after graph rewiring or perturbation.
  url: https://doi.org/10.1137/1.9781611972795.61

- id: goldberg_radzik
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph. The algorithm works for all graph types, including directed graphs and multigraphs.
          required: true
        source:
          type: node label
          description: Starting node for shortest path computation.
          required: true
        weight:
          type: string or function, optional (default='weight')
          description: If a string, it specifies the edge attribute used as weight. If the attribute does not exist, the weight is assumed to be 1. If a function, it must accept three arguments (u, v, edge_data) and return a numerical weight.
          default: weight
    output_schema:
      type: tuple of dictionaries
      description: Returns two dictionaries (pred, dist). `pred` maps each node to its predecessor on the shortest path, and `dist` maps each node to its shortest path distance from the source.
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The goldberg_radzik algorithm is used to compute shortest paths in weighted graphs, especially when
    negative edge weights are present. It is suitable for transportation networks with cost adjustments, financial graphs with
    gains and losses, and dependency networks where penalties or credits may occur. Compared with Dijkstra’s algorithm, it is
    more general but typically slower. 
  Tuning_Mechanisms:
    weight: The `weight` parameter determines how edge costs are interpreted. Using a string allows direct access to edge attributes,
      while a custom function enables flexible definitions such as dynamic costs, penalties, or composite metrics.
  Principles:
    description: The Goldberg–Radzik algorithm is a label-correcting shortest path algorithm designed to handle graphs with
      negative edge weights. It iteratively relaxes edges and updates distance labels, using a strategy that improves upon
      classical Bellman-Ford by reducing unnecessary relaxations. If a negative cycle is detected during relaxation, the algorithm
      terminates with an exception. Distances are computed as the sum of edge weights along the path, and only nodes reachable
      from the source are included in the result.
    time_complexity: The algorithm has a time complexity of O(V * E), where V is the number of nodes and E is the number of edges.
      In practice, it is often faster than Bellman-Ford but slower than Dijkstra. This complexity reflects worst-case behavior
      for graphs with negative weights.
  solvable_questions:
  - Compute shortest path distances from a given source node in a weighted graph with possible negative edges.
  - Return the predecessor tree of shortest paths from the source.
  - Identify shortest paths in transportation or cost networks with penalties or subsidies.
  - In a financial network, compute minimum-cost paths considering gains and losses.
  - Detect whether a reachable negative cycle exists in the graph.
  - Compare shortest path results under different weight definitions.
  - Extract shortest path distances only for nodes reachable from the source.
  - Analyze path structures in directed or multigraph settings with weighted edges.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.shortest_paths.weighted.goldberg_radzik.html
- id: panther_similarity
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        source:
          type: node
          description: Source node for which to find the top k most similar other nodes.
          required: true
        k:
          type: int, optional (default=5)
          description: The number of most similar nodes to return.
          default: 5
        path_length:
          type: int, optional (default=5)
          description: Length of each randomly generated path used for similarity estimation.
          default: 5
        c:
          type: float, optional (default=0.5)
          description: A universal constant controlling the number of random paths to generate. Larger values increase the number of sampled paths and may improve approximation accuracy at the cost of more computation.
          default: 0.5
        delta:
          type: float, optional (default=0.1)
          description: The probability that the similarity estimate is not an epsilon-approximation. It controls the confidence level of the approximation.
          default: 0.1
        eps:
          type: float or None, optional (default=None)
          description: Error bound for similarity approximation. Smaller values improve accuracy but require more sampled paths. If None, sqrt(1/|E|) is used.
          default: null
        weight:
          type: string or None, optional (default='weight')
          description: The edge attribute used as a numerical weight. If None, all edges are treated as having weight 1.
          default: weight
        seed:
          type: integer, random_state, or None, optional
          description: Random number generation state for reproducible path sampling.
          default: null
    output_schema:
      type: dictionary
      description: Returns a dictionary mapping nodes to Panther similarity scores as floats. The source node itself is not included in the returned dictionary. Therefore, for k = 5, the result contains the top 4 other nodes and their similarity scores.
    graph_type:
      directed: true
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The panther_similarity algorithm is used for fast top-k similarity search in large networks. It is
    suitable for social network analysis, recommendation systems, citation networks, biological interaction graphs, and other
    relational data where two nodes are considered similar if they frequently co-occur on sampled paths. It is especially useful
    when scalable approximate similarity search is preferred over exact but computationally expensive similarity computation.
  Tuning_Mechanisms:
    k: Controls how many of the most similar nodes are returned for the source node.
    path_length: Determines the length of each sampled path. Larger values may capture broader structural similarity but can also introduce more noise.
    c: Controls the number of random paths generated. Increasing c generally improves approximation quality while raising computational cost.
    delta: Controls the confidence of the approximation guarantee. Smaller values imply stronger confidence but require more samples.
    eps: Controls the approximation error bound. Smaller eps yields more accurate similarity estimates but increases the required number of sampled paths.
    weight: Determines whether edge weights influence random path generation. Weighted edges can bias similarity toward stronger or more important connections.
    seed: Fixes the random sampling process for reproducibility.
  Principles:
    description: Panther similarity is based on the idea that two nodes are similar if they frequently appear on the same paths.
      Instead of exhaustively enumerating paths in a graph, the method approximates similarity by generating a collection of random
      paths and counting node co-occurrences along those paths. The similarity between two nodes is then estimated from how often
      they co-occur in the sampled paths. This sampling-based design enables efficient top-k similarity search in large graphs while
      providing probabilistic approximation guarantees controlled by eps and delta.
    time_complexity: The algorithm is designed for fast approximate top-k similarity search on large networks. Its practical cost depends
      on the number of sampled random paths, which is controlled by c, delta, eps, the graph size, and the path_length parameter.
      Increasing the sampling budget improves approximation quality but also increases runtime.
  solvable_questions:
  - Find the top-k nodes most similar to a given source node in a graph.
  - Estimate node similarity based on co-occurrence frequency on sampled random paths.
  - Support approximate similarity search in large-scale social, citation, or recommendation networks.
  - Compare similarity rankings under different path lengths or sampling budgets.
  - Evaluate how weighted versus unweighted edges affect node similarity.
  - Perform reproducible similarity experiments by fixing the random seed.
  - Identify structurally related nodes when exact similarity computation is too expensive.
  - Analyze local-to-mid-range relational similarity centered on a given source node.
  url: https://doi.org/10.1145/2783258.2783267
- id: random_reference
  task_type_id: Small-world
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: An undirected graph with 4 or more nodes.
          required: true
        niter:
          type: integer, optional (default=1)
          description: Approximate number of times each edge is rewired during the randomization process.
          default: 1
        connectivity:
          type: boolean, optional (default=true)
          description: If true, the randomized graph is constrained to remain connected throughout the edge-swapping process.
          default: true
        seed:
          type: integer, random_state, or None, optional
          description: Random number generation state for reproducible graph randomization.
          default: null
    output_schema:
      type: graph
      description: Returns a randomized undirected graph generated by swapping edges of the input graph while approximately preserving the degree distribution.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The random_reference algorithm is used to generate randomized reference graphs by rewiring edges of an
    undirected graph while approximately preserving node degrees. It is widely used in network science for null-model generation,
    significance testing, motif analysis, biological network comparison, and robustness studies. It is especially useful when
    researchers want to compare the structural properties of an observed network against randomized counterparts with similar
    degree characteristics. 
  Tuning_Mechanisms:
    niter: Controls the intensity of randomization by determining how many times edges are approximately rewired. Larger values generally produce more randomized graphs but require more computation.
    connectivity: Controls whether the randomized graph must remain connected. Enabling this option preserves global reachability but may reduce the space of admissible rewiring operations.
    seed: Fixes the random rewiring sequence for reproducibility across repeated experiments.
  Principles:
    description: The random_reference algorithm generates a randomized version of an undirected graph by repeatedly swapping
      pairs of edges. This process preserves the degree of each node while altering the connectivity pattern of the graph.
      The implementation is adapted from the Maslov-Sneppen edge-swapping method, which is commonly used to construct null
      models for complex networks. When connectivity is set to true, the algorithm additionally ensures that the rewired graph
      remains connected during the randomization process.
    time_complexity: The runtime depends on the number of rewiring attempts, which is controlled by niter and the number of edges
      in the graph. In practice, the algorithm performs approximately niter rewiring operations per edge, with additional cost when
      connectivity preservation is enforced because candidate swaps may need to be checked or rejected.
  solvable_questions:
  - Generate a randomized reference graph for an observed undirected network.
  - Construct degree-preserving null models for network comparison.
  - Test whether structural patterns in a graph are statistically significant relative to randomized baselines.
  - Analyze the effect of random rewiring on connectivity and topology.
  - Compare motif frequencies between an empirical network and randomized counterparts.
  - Study robustness or stability of graph measures under degree-preserving randomization.
  - Produce reproducible randomized graphs by fixing the random seed.
  - Preserve network connectedness while randomizing edge arrangements.
  url: https://doi.org/10.1126/science.1065103
- id: spanner
  task_type_id: Sparsifiers
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: An undirected simple NetworkX graph.
          required: true
        stretch:
          type: float
          description: The stretch factor of the spanner. For every pair of nodes, the distance in the spanner is at most `stretch` times the distance in the original graph.
          required: true
        weight:
          type: object, optional
          description: The edge attribute used as distance. If not provided, edges are treated as unweighted.
          default: null
        seed:
          type: integer, random_state, or None, optional
          description: Random number generation state for reproducible randomized spanner construction.
          default: null
    output_schema:
      type: graph
      description: Returns a subgraph of the input graph that is a spanner with the specified stretch. The spanner preserves all original nodes and contains a subset of the original edges.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The spanner algorithm is used to construct a sparse subgraph that approximately preserves pairwise
    distances in the original graph within a specified stretch factor. It is suitable for network design, graph compression,
    routing acceleration, approximation algorithms, distributed systems, and large-scale graph preprocessing where reducing the
    number of edges while maintaining approximate shortest-path structure is important. It is especially useful when a compact
    graph representation is needed without losing too much distance information. 
  Tuning_Mechanisms:
    stretch: Controls the trade-off between sparsity and distance preservation. Smaller stretch values preserve distances more accurately but usually produce denser spanners, while larger stretch values allow sparser subgraphs.
    weight: Determines whether spanner construction is based on weighted or unweighted edge distances.
    seed: Fixes the randomized choices in the Baswana-Sen algorithm for reproducibility.
  Principles:
    description: The spanner algorithm computes a sparse subgraph H = (V, E_S) of the input graph G = (V, E) such that
      for every pair of nodes, the distance in H is at most a specified multiplicative factor, called the stretch, times the
      distance in G. This implementation follows the randomized Las Vegas algorithm of Baswana and Sen. The algorithm always
      returns a valid spanner with the requested stretch, while using randomness to obtain sparsity efficiently. For weighted
      graphs, the construction aims to keep the number of edges small while preserving approximate shortest-path distances.
    time_complexity: The expected running time is O(km), where k = (stretch + 1) // 2 and m is the number of edges in the graph.
      For weighted graphs, the number of edges in the spanner is O(k * n^(1 + 1 / k)), where n is the number of nodes. For
      unweighted graphs, the number of edges is O(n^(1 + 1 / k) + k * n). The algorithm is randomized but always returns a
      correct spanner.
  solvable_questions:
  - Construct a sparse subgraph that approximately preserves shortest-path distances.
  - Reduce graph density while bounding pairwise distance distortion by a given stretch factor.
  - Preprocess large graphs for faster downstream routing or distance-based analysis.
  - Compare sparsity outcomes under different stretch values.
  - Build weighted or unweighted spanners for approximation tasks.
  - Preserve all nodes while selecting only a subset of edges for compact representation.
  - Generate reproducible spanners by fixing the random seed.
  - Study the trade-off between edge count reduction and distance preservation in network design.
  url: https://doi.org/10.1002/rsa.20130

- id: triadic_census
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: digraph
          description: A NetworkX DiGraph.
          required: true
        nodelist:
          type: list, optional (default=None)
          description: List of nodes for which you want to calculate triadic census. If a list of nodes is passed, then only those triads are taken into account which have elements of nodelist in them.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary with triad type as keys (one of the 16 triad names such as '003', '012', '102', '021D', '021U', '021C', '111D', '111U', '030T', '030C', '201', '120D', '120U', '120C', '210', '300') and the number of occurrences of each triad type in G as values.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The triadic_census algorithm is used to analyze the local structural patterns of directed networks by counting how many of the 16 possible isomorphism classes of three-node subgraphs (triads) appear in the graph. It is widely applied in social network analysis to study relational tendencies such as reciprocity, transitivity, hierarchy, and cyclic closure; in biological networks to detect regulatory motifs such as feed-forward loops; in communication and trust networks to reveal information flow patterns; and in organizational or citation networks to characterize local interaction structures. By comparing observed triad counts with those expected under a random null model, researchers can identify over-represented motifs that reflect meaningful structural mechanisms in the system.
  Tuning_Mechanisms:
    nodelist: Supplying nodelist restricts the census so that only triads containing at least one node from the list are counted, which is useful for focusing the analysis on a specific subset of nodes such as a community, a set of high-degree hubs, or a group of interest. If nodelist is None, the algorithm performs a full census over the entire graph, which is appropriate for global structural characterization but may be more computationally demanding on very large graphs.
  Principles:
    description: The triadic_census algorithm enumerates, for every unordered triple of nodes in a directed graph, the specific isomorphism class of the induced subgraph and aggregates the counts into the 16 standard triad types defined by Davis and Leinhardt. Each triad is encoded by a tricode derived from the presence or absence of the six possible directed edges among the three nodes, and the code is mapped to one of the 16 canonical classes such as 003 (empty), 012 (single arc), 102 (mutual), 021D/021U/021C (out-star, in-star, chain), 111D/111U, 030T/030C (transitive and cyclic triangles), 201, 120D/120U/120C, 210, and 300 (fully mutual). The NetworkX implementation follows the subquadratic algorithm of Batagelj and Mrvar, which avoids enumerating all O(n^3) triples by iterating over edges and their shared neighborhoods, and finally recovers the count of the empty triad 003 by subtracting the number of all connected triads from the total number of triples C(n, 3).
    time_complexity: The algorithm runs in O(m) time, where m is the number of edges in the graph, as stated in the NetworkX documentation based on the subquadratic triad census algorithm of Batagelj and Mrvar (A subquadratic triad census algorithm for large sparse networks with small maximum degree, University of Ljubljana).
  solvable_questions:
  - Count how many of each of the 16 triad types appear in a directed graph.
  - Identify which triad configurations are most prevalent in a given directed network.
  - Determine whether transitive triangles (030T) occur more often than cyclic triangles (030C) in a directed graph.
  - Compare the observed triad distribution with that of a random null model to detect over-represented motifs.
  - In a social network, analyze local patterns of reciprocity, transitivity, and hierarchy among users.
  - In a gene regulatory network, detect the frequency of feed-forward loop motifs corresponding to the 030T triad.
  - In a trust or communication network, quantify how often information-flow patterns such as out-stars and in-stars occur.
  - Restrict the triad census to a specific subset of nodes (e.g., a community or a set of hubs) using the nodelist parameter.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.triads.triadic_census.html

- id: rich_club_coefficient
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph with neither parallel edges nor self-loops.
          required: true
        normalized:
          type: bool, optional (default=True)
          description: If True, normalize the rich-club coefficient by dividing it by the corresponding coefficient computed on a randomized graph with the same degree distribution as G, obtained by repeated double-edge swaps.
          default: true
        Q:
          type: float, optional (default=100)
          description: If normalized is True, perform Q * m double-edge swaps, where m is the number of edges in G, to generate the randomized null-model graph used for normalization.
          default: 100
        seed:
          type: integer, random_state, or None, optional (default=None)
          description: Indicator of random number generation state used for the random double-edge swaps during normalization. See NetworkX Randomness documentation.
          default: null
    output_schema:
      type: dictionary
      description: A dictionary keyed by degree k, where each value is the rich-club coefficient phi(k) computed for the subgraph induced by nodes with degree strictly greater than k.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The rich_club_coefficient algorithm is used to investigate whether high-degree nodes in an undirected network tend to be densely interconnected among themselves, forming a so-called rich club. It is widely applied in the analysis of scientific collaboration networks, the Internet at the autonomous-system level, brain connectivity networks, protein interaction networks, transportation and airline networks, and financial networks. By computing the coefficient for each degree threshold k and comparing it against a randomized null model, researchers can determine whether the observed concentration of links among hubs is statistically significant, which in turn reveals hierarchical organization, elite cores, and potential structural backbones of the system.
  Tuning_Mechanisms:
    normalized: Setting normalized to True returns the ratio between the raw rich-club coefficient of G and that of a randomized graph with the same degree sequence, which is necessary to distinguish a true rich-club effect from a trivial consequence of the degree distribution, since high-degree nodes mechanically have more opportunities to be connected. Setting normalized to False returns the raw unnormalized coefficient, which is faster and appropriate when one only needs the descriptive values or plans to perform a custom normalization later.
    Q: The parameter Q controls the thoroughness of the randomization used in the null model, since the algorithm performs Q * m double-edge swaps where m is the number of edges in G. Larger values of Q produce a more fully randomized null model and therefore more reliable normalization, at the cost of increased runtime. The default value Q = 100 follows the recommendation in the NetworkX documentation, which cites Milo et al. for appropriate choices of Q.
    seed: The seed parameter fixes the random number generator used for the double-edge swaps, making the normalized result reproducible across runs. It should be set whenever reproducibility is required, for instance in experiments or published analyses.
  Principles:
    description: The rich_club_coefficient algorithm quantifies, for every degree threshold k, how densely the nodes with degree strictly greater than k are interconnected among themselves. If N_k is the number of such nodes and E_k is the number of edges among them, the rich-club coefficient is defined as phi(k) = 2 * E_k / (N_k * (N_k - 1)), which is the edge density of the subgraph induced by the high-degree nodes. Because hubs naturally have more links, this raw coefficient can be large even in random graphs; the algorithm therefore optionally normalizes phi(k) by the corresponding value phi_rand(k) on a randomized graph with the same degree distribution, generated by Q * m double-edge swaps. A normalized ratio significantly greater than one at high k indicates a genuine rich-club phenomenon beyond what the degree sequence alone would produce. The implementation ignores edge weights and is not defined for directed graphs, multigraphs, or graphs with self-loops.
    time_complexity: The NetworkX documentation does not state an explicit asymptotic time complexity for this function. The dominant costs are the computation of E_k and N_k across degree thresholds on G, and, when normalized is True, the generation of the randomized null-model graph via Q * m double-edge swaps followed by the same rich-club computation on the randomized graph, so the runtime grows roughly linearly with Q and with the number of edges m (McAuley, da Fontoura Costa, and Caetano, "The rich-club phenomenon across complex network hierarchies", Applied Physics Letters, 2007).
  solvable_questions:
  - Compute the rich-club coefficient phi(k) for every degree threshold k in an undirected graph.
  - Determine whether high-degree nodes in a network form a densely connected rich club beyond what is expected by the degree distribution.
  - Compare the normalized rich-club coefficient at different degree thresholds to identify the range of k where the rich-club effect is most pronounced.
  - In a scientific collaboration network, assess whether the most prolific authors are disproportionately connected to one another.
  - In an Internet autonomous-system network, evaluate whether top-tier providers form a tightly interconnected core.
  - In a brain connectivity network, test whether high-degree hub regions constitute a rich-club backbone supporting global integration.
  - In an airline route network, identify whether major hub airports are preferentially connected to other major hubs.
  - In a protein interaction network, investigate whether highly connected proteins interact more densely among themselves than expected at random.
  url: https://networkx.org/documentation/stable/reference/algorithms/richclub.html

- id: dispersion
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        u:
          type: node, optional (default=None)
          description: The source for the dispersion score (e.g. ego node of the network).
          default: null
        v:
          type: node, optional (default=None)
          description: The target of the dispersion score if specified.
          default: null
        normalized:
          type: bool, optional (default=True)
          description: If True, normalize the dispersion value by the embeddedness of the nodes u and v.
          default: true
        alpha:
          type: float, optional (default=1.0)
          description: Exponent applied to the (raw dispersion + b) term in the normalization formula ((dispersion + b) ** alpha) / (embeddedness + c).
          default: 1.0
        b:
          type: float, optional (default=0.0)
          description: Additive constant applied to the raw dispersion in the normalization formula ((dispersion + b) ** alpha) / (embeddedness + c).
          default: 0.0
        c:
          type: float, optional (default=0.0)
          description: Additive constant applied to the embeddedness in the denominator of the normalization formula ((dispersion + b) ** alpha) / (embeddedness + c).
          default: 0.0
    output_schema:
      type: dictionary
      description: If both u and v are specified, returns the dispersion score between u and v as a number. If only u (or only v) is specified, returns a dictionary mapping each neighbor to its dispersion score with respect to the specified node. If neither u nor v is specified, returns a dictionary of dictionaries giving the dispersion score for every pair of adjacent nodes in the graph.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The dispersion algorithm is used to identify especially meaningful or strong relationships between pairs of nodes in a social network by measuring how poorly connected the mutual neighbors of two actors are among themselves. It was originally introduced by Backstrom and Kleinberg to predict romantic partners on Facebook, where a true partner is typically embedded in many otherwise disjoint parts of the ego network rather than in a single tight cluster. Beyond romantic-tie detection, it is applied in social network analysis for identifying close friends, mentors, or key collaborators, in organizational network analysis for surfacing cross-team bridges, in community detection as a complementary signal to embeddedness, and in recommendation and trust systems where structurally distinctive ties should be ranked above merely embedded ones.
  Tuning_Mechanisms:
    u: Specifying u restricts the computation to the ego network of node u and returns dispersion scores between u and each of its neighbors, which is the typical and most efficient usage pattern. If u is left unspecified, the algorithm runs over the entire graph, which is convenient for global analysis but may be expensive on large networks.
    v: Specifying v together with u returns a single dispersion value between the two specified nodes, which is appropriate when the user only needs the score for a particular pair. Specifying v alone (with u left as None) returns dispersion scores from every node toward v.
    normalized: Setting normalized to True divides the raw dispersion by a function of the embeddedness of u and v, which corrects for the trivial effect that pairs with many shared neighbors mechanically allow more dispersing pairs of mutual ties. Setting normalized to False returns the raw count of dispersing pairs, which is useful when the user wants to apply a custom normalization or to compare with the original unnormalized definition.
    alpha: Increasing alpha amplifies the contribution of the raw dispersion term in the normalized score and accentuates differences between strongly and weakly dispersing ties, while values closer to zero compress these differences.
    b: The constant b is added to the raw dispersion before exponentiation and acts as a smoothing term that prevents the score from collapsing to zero when the raw dispersion is small, which is useful on sparse ego networks.
    c: The constant c is added to the embeddedness in the denominator of the normalization and acts as a smoothing term that avoids division by very small embeddedness values, which stabilizes the score for pairs whose mutual neighborhood is small.
  Principles:
    description: The dispersion algorithm quantifies, for a pair of adjacent nodes u and v, how poorly connected the mutual neighbors of u and v are among themselves within the ego network of u. The algorithm first computes the set ST of common neighbors of u and v, then enumerates all unordered pairs (s, t) within ST and counts those pairs such that s and t are not directly connected and additionally do not share any other common neighbor in the ego network of u (excluding u and v themselves). This count is the raw dispersion disp(u, v). When normalization is enabled, the algorithm computes the embeddedness as the size of ST and returns the normalized score ((disp(u, v) + b) ** alpha) / (embeddedness + c) whenever the denominator is nonzero. The intuition is that a tie between u and v is highly dispersive when u and v sit at the intersection of several otherwise disjoint social circles, which empirically characterizes structurally important relationships such as romantic partnerships.
    time_complexity: The NetworkX documentation does not state an explicit asymptotic time complexity for this function and explicitly notes that running dispersion with neither u nor v specified can take some time to complete. The dominant cost for a single pair (u, v) comes from enumerating all unordered pairs of common neighbors and checking, for each such pair, whether they are connected or share further common neighbors in the ego network, so the cost grows roughly with the square of the number of common neighbors of u and v (Lars Backstrom and Jon Kleinberg, "Romantic Partnerships and the Dispersion of Social Ties:A Network Analysis of Relationship Status on Facebook", 2014).
  solvable_questions:
  - Compute the dispersion score for every adjacent pair of nodes in a graph.
  - For a given user u, rank u's neighbors by their dispersion with respect to u to identify structurally distinctive ties.
  - In a Facebook-like social network, predict the romantic partner of a user from the dispersion scores in the user's ego network.
  - Identify close friends, mentors, or key collaborators in a social network beyond what raw embeddedness would suggest.
  - In an organizational network, surface cross-team bridges that connect otherwise disjoint groups around a focal individual.
  - Compare the dispersion-based ranking of ties with embeddedness-based or simple common-neighbor-based rankings to study which signal best captures tie strength.
  - In a recommendation or trust system, rank candidate connections by dispersion to favor structurally distinctive relationships.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.centrality.dispersion.html

- id: reciprocity
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX directed graph.
          required: true
        nodes:
          type: container of nodes, optional (default=None)
          description: Compute reciprocity for nodes in this container. If None, the overall reciprocity of the whole graph is returned. If a single node is given, the reciprocity of that node is returned. If an iterable of nodes is given, a dictionary mapping each node to its reciprocity is returned.
          default: null
    output_schema:
      type: float or dictionary
      description: If nodes is None, returns the overall reciprocity of the graph as a float. If nodes is a single node, returns the reciprocity of that node as a float. If nodes is an iterable of nodes, returns a dictionary keyed by node label with reciprocity values. Reciprocity is not defined for isolated nodes; in such cases the function returns None for that node.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The reciprocity algorithm is used to quantify the tendency of node pairs in a directed network to form mutual connections, which is a fundamental structural property of many real-world systems. It is widely applied in social network analysis to measure mutual following or friendship in platforms such as Twitter, Instagram, and email networks; in trust and trade networks to assess the symmetry of relationships between actors; in trophic and ecological networks to study mutual interactions between species; in citation and collaboration networks to detect mutual citing or co-authorship patterns; and in communication networks to evaluate the balance of information exchange. A high reciprocity indicates a strong tendency toward mutual ties, while a low value reflects a more hierarchical or asymmetric structure.
  Tuning_Mechanisms:
    nodes: If nodes is None, the algorithm computes the overall reciprocity of the graph, which gives a single global summary statistic and is appropriate for characterizing the symmetry of the network as a whole. If a single node is supplied, the algorithm returns the local reciprocity for that node only, which is useful for examining the mutual-tie behavior of a specific actor. If an iterable of nodes is supplied, the algorithm returns a dictionary mapping each node in the container to its local reciprocity, which is appropriate for batch computation over a chosen subset such as a community or a sample of high-degree nodes.
  Principles:
    description: The reciprocity algorithm measures the proportion of directed edges that are accompanied by an edge in the opposite direction. At the global level, the reciprocity of a directed graph is defined as r = |{(u, v) in G :(v, u) in G}| / |{(u, v) in G}|, that is, the ratio of the number of edges that have a reciprocal counterpart to the total number of directed edges in the graph. At the node level, the reciprocity of a single node u is defined analogously as the ratio of the number of edges in both directions incident to u to the total number of edges attached to u, which the NetworkX implementation computes as 2 * |pred(u) ∩ succ(u)| / (|pred(u)| + |succ(u)|), where pred(u) and succ(u) are the sets of predecessors and successors of u. The algorithm is defined only for directed non-multigraphs, and it is undefined for isolated nodes since the denominator is zero in that case.
    time_complexity: The NetworkX documentation does not state an explicit asymptotic time complexity for this function. The dominant cost is the inspection of the predecessor and successor sets of each requested node (or of all nodes when computing the overall reciprocity), so the runtime grows roughly linearly with the total degree of the queried nodes, which is at most O(n + m) for the full-graph computation, where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - Compute the overall reciprocity of a directed graph as a single global summary value.
  - Compute the local reciprocity of a specific node in a directed graph.
  - Compute a dictionary of local reciprocity values for a chosen subset of nodes.
  - In a Twitter-like follower network, measure how often follow relationships are mutual.
  - In an email or messaging network, evaluate the symmetry of communication between users.
  - In an international trade network, assess whether trading relationships between countries tend to be mutual.
  - In a trust or rating network, quantify how often trust relations are reciprocated.
  - In an ecological food web, study mutual interactions between species at the node level.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.reciprocity.reciprocity.html

- id: resistance_distance
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph. The graph must be connected and contain at least one node.
          required: true
        nodeA:
          type: node or None, optional (default=None)
          description: A node within graph G. If None, compute resistance distance using all nodes as source nodes.
          default: null
        nodeB:
          type: node or None, optional (default=None)
          description: A node within graph G. If None, compute resistance distance using all nodes as target nodes.
          default: null
        weight:
          type: string or None, optional (default=None)
          description: The edge data key used to compute the resistance distance. If None, then each edge has weight 1.
          default: null
        invert_weight:
          type: bool, optional (default=True)
          description: Proper calculation of resistance distance requires building the Laplacian matrix with the reciprocal of the weight. Not required if the weight is already inverted. Weight cannot be zero.
          default: true
    output_schema:
      type: float or dictionary
      description: If both nodeA and nodeB are given, returns the resistance distance between nodeA and nodeB as a float. If only one of them is given, returns a dictionary mapping each other node to its resistance distance with respect to the specified node. If neither is given, returns a dictionary of dictionaries giving the resistance distance for every pair of nodes in the graph.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The resistance_distance algorithm computes a notion of distance between nodes that arises from interpreting the graph as an electrical network in which each edge is a resistor with resistance equal to the (reciprocal of the) provided edge weight. Unlike the shortest-path distance, the resistance distance takes all parallel paths between two nodes into account, so well-connected pairs are considered close even when no individual path is short. It is widely applied in chemical graph theory for molecular descriptors and isomer discrimination, in network robustness and vulnerability analysis where alternative paths matter, in spectral graph theory and Laplacian-based learning, in transportation and power-grid analysis, in social network analysis for measuring effective closeness between actors, and in graph-based machine learning as a node similarity feature.
  Tuning_Mechanisms:
    nodeA: Specifying nodeA together with nodeB returns the single resistance distance between this pair, which is the most efficient mode when only one value is required. Leaving nodeA as None instructs the algorithm to use all nodes as sources, producing a dictionary indexed by source node.
    nodeB: Specifying nodeB together with nodeA returns the single resistance distance for this pair. Leaving nodeB as None instructs the algorithm to use all nodes as targets, producing a dictionary indexed by target node. When both nodeA and nodeB are None, the algorithm returns the full all-pairs resistance distance dictionary of dictionaries.
    weight: Setting weight to the name of an edge attribute makes the algorithm interpret that attribute as the per-edge resistance and incorporate it into the Laplacian matrix used in the computation. Leaving weight as None makes every edge contribute uniformly with resistance 1, which is appropriate for unweighted graphs.
    invert_weight: When invert_weight is True (the default), the algorithm internally replaces the supplied weight by its reciprocal before building the Laplacian, which is the correct behavior when the edge attribute represents a conductance-like quantity that has to be inverted to obtain a resistance. Setting invert_weight to False is appropriate when the user has already supplied resistances directly and does not want them to be inverted again. In either case the weight values must be nonzero.
  Principles:
    description: The resistance_distance algorithm interprets the input graph as an electrical network in which each edge is a resistor whose resistance equals the (possibly inverted) edge weight, and defines the resistance distance between two nodes as the effective resistance measured between them in this network. The NetworkX implementation computes this quantity through the pseudo-inverse of the graph Laplacian:it first optionally inverts the supplied edge weights, then constructs the weighted Laplacian matrix L of the graph, computes its Moore-Penrose pseudo-inverse L^+, and obtains the resistance distance between nodes i and j as L^+[i, i] + L^+[j, j] - 2 * L^+[i, j]. The algorithm requires the graph to be connected, treats self-loops as ignored, and is defined only for undirected graphs (including weighted graphs and multigraphs).
    time_complexity: >-
      The NetworkX documentation does not state an explicit asymptotic time complexity for this function. The dominant cost is the computation of the Moore-Penrose pseudo-inverse of the Laplacian matrix via numpy.linalg.pinv, which for a dense n x n matrix runs in roughly O(n^3) time and O(n^2) memory; once the pseudo-inverse is available, individual resistance distances are obtained in constant time per pair (Klein, D. J. and Randić, M., "Resistance distance", Journal of Mathematical Chemistry 12: 81-95, 1993).
  solvable_questions:
  - Compute the resistance distance between two specified nodes in an undirected graph.
  - Compute the all-pairs resistance distance dictionary for an undirected graph.
  - Identify the pair of nodes with the smallest or largest effective resistance in a network.
  - In a chemical graph, use resistance distance as a topological descriptor to discriminate molecular isomers.
  - In a power grid or transportation network, quantify the effective electrical or routing closeness between two stations beyond the shortest path.
  - In a social network, measure the effective closeness between two actors taking all parallel paths into account.
  - In network robustness analysis, identify pairs of nodes whose effective resistance changes most under edge removal.
  - As a similarity feature for graph-based machine learning, derive resistance-distance-based node embeddings.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.distance_measures.resistance_distance.html

- id: weisfeiler_lehman_graph_hash
  task_type_id: Graph Hashing
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: The graph to be hashed. Can have node and/or edge attributes, and can also have no attributes.
          required: true
        edge_attr:
          type: string, optional (default=None)
          description: The key in edge attribute dictionary to be used for hashing. If None, edge labels are ignored.
          default: null
        node_attr:
          type: string, optional (default=None)
          description: The key in node attribute dictionary to be used for hashing. If None, and no edge_attr given, use the degrees of the nodes as labels.
          default: null
        iterations:
          type: int, optional (default=3)
          description: Number of neighbor aggregations to perform. Should be larger for larger graphs.
          default: 3
        digest_size:
          type: int, optional (default=16)
          description: Size (in bytes) of blake2b hash digest to use for hashing node labels.
          default: 16
    output_schema:
      type: string
      description: Hexadecimal string corresponding to the Weisfeiler Lehman hash of G, of length 2 * digest_size. Hashes are identical for isomorphic graphs, and there exist strong guarantees that non-isomorphic graphs will receive different hashes.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The weisfeiler_lehman_graph_hash algorithm produces a fixed-length fingerprint of a graph that is invariant under node relabeling, so isomorphic graphs receive identical hashes while non-isomorphic graphs are very likely to receive different ones. It is widely applied in graph isomorphism testing as a fast necessary check before invoking more expensive exact tests, in deduplication of large graph datasets, in indexing and lookup of graphs in chemistry and bioinformatics where molecules and protein structures are represented as labeled graphs, in graph database systems for canonical-form-based search, and as the conceptual foundation of Weisfeiler-Lehman graph kernels and many modern graph neural networks (such as GIN), where the same neighborhood-aggregation scheme underlies the design of expressive message-passing architectures.
  Tuning_Mechanisms:
    edge_attr: Setting edge_attr to the name of an edge attribute makes the algorithm incorporate edge labels into the neighborhood aggregation, so that graphs that are structurally isomorphic but differ in their edge labeling receive different hashes. Leaving edge_attr as None ignores all edge labels and produces hashes that depend only on graph structure (and possibly node labels).
    node_attr: Setting node_attr to the name of a node attribute uses that attribute as the initial label of each node, which is essential when working with labeled or attributed graphs such as molecular structures with atom types. Leaving node_attr as None and not supplying edge_attr causes the algorithm to use node degrees as initial labels, which is the standard choice for unlabeled graphs.
    iterations: The iterations parameter controls the number of Weisfeiler-Lehman refinement steps applied to the node labels. Each additional iteration extends the radius of the structural neighborhood that influences the hash by one hop, so larger graphs and graphs with subtle structural differences benefit from larger values. Smaller values are faster but may fail to distinguish graphs that differ only in their long-range structure. The value must be a positive integer, otherwise a ValueError is raised.
    digest_size: The digest_size parameter sets the size in bytes of the blake2b hash digest used at every aggregation step and for the final graph hash. Larger digest sizes reduce the probability of accidental hash collisions between non-isomorphic graphs at the cost of longer hash strings, while smaller values produce shorter and more memory-friendly hashes that are still adequate for most practical isomorphism filtering tasks.
  Principles:
    description: The weisfeiler_lehman_graph_hash algorithm implements the 1-dimensional Weisfeiler-Lehman color refinement procedure and compresses its result into a fixed-length string. Each node is first assigned an initial label, namely its node attribute value if node_attr is given, an empty label if only edge_attr is given, or its degree otherwise. Then, for a fixed number of iterations, the algorithm performs a neighborhood aggregation step in which each node's new label is computed by concatenating the labels of its neighbors (optionally prefixed by the value of edge_attr along each connecting edge) and hashing the resulting string with blake2b at the specified digest size. After each iteration, a sorted histogram of the current node labels is appended to a global list, and the final graph hash is obtained by hashing the tuple of all collected histograms. Because the procedure depends only on the multiset structure of the neighborhoods, isomorphic graphs always produce identical hashes, while non-isomorphic graphs are distinguished with high probability up to the well-known limitations of the 1-WL test.
    time_complexity: The NetworkX documentation does not state an explicit asymptotic time complexity for this function. From the implementation, each Weisfeiler-Lehman iteration visits every node and aggregates the labels of its neighbors, so a single iteration runs in O(n + m) time where n is the number of nodes and m is the number of edges, and the total runtime is O(iterations * (n + m)) plus the cost of the blake2b hash operations on the produced label strings (Shervashidze, Schweitzer, Van Leeuwen, Mehlhorn, and Borgwardt, "Weisfeiler-Lehman Graph Kernels", Journal of Machine Learning Research, 2011).
  solvable_questions:
  - Compute a fixed-length Weisfeiler-Lehman hash that serves as a structural fingerprint of a graph.
  - Test whether two graphs are likely isomorphic by comparing their Weisfeiler-Lehman hashes.
  - Quickly filter out clearly non-isomorphic candidates before running an expensive exact isomorphism test.
  - Deduplicate a large collection of graphs by grouping graphs with identical WL hashes.
  - In a chemical or molecular database, index molecules represented as labeled graphs for fast structural lookup.
  - In a protein interaction or biological network repository, detect duplicate or near-duplicate graph entries.
  - Generate canonical-form-based identifiers for graphs in a graph database system.
  - Provide structural fingerprints as input features for downstream graph classification or clustering pipelines.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.graph_hashing.weisfeiler_lehman_graph_hash.html

- id: antichains
  task_type_id: Directed Acyclic Graphs (DAG)
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A directed acyclic graph (DAG)
          type: NetworkX DiGraph
          required: true
        topo_order:
          description: A topological order for G (if None, the function will compute one) Yields
          type: list or tuple
          default: null
    output_schema:
      type: any
      description: Antichains generated from the input DAG, with each antichain represented as a list of nodes.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful in workflow scheduling, prerequisite analysis, and dependency management when a directed acyclic graph represents a partial order and we need to identify sets of items that are mutually incomparable. It can be used to inspect tasks that are not constrained relative to one another and therefore may be considered together at the same decision stage.
  Tuning_Mechanisms:
    topo_order: Providing a valid topological order avoids recomputing one inside NetworkX and can reduce setup overhead on large DAGs. It does not change which antichains are valid, but it can affect the traversal order in which antichains are generated.
  Principles:
    description: This algorithm enumerates antichains in a directed acyclic graph. An antichain is a set of nodes in which no pair of nodes is comparable under the reachability relation of the graph, so no node in the set can reach another along a directed path. The optional topological order can be supplied to avoid recomputing the order before enumeration.
    time_complexity: O(n(n + m) + a n), where n is the number of nodes, m is the number of edges, and a is the number of antichains returned.
  solvable_questions:
  - Enumerate all antichains in the current DAG.
  - Which node subsets in the current precedence DAG are pairwise incomparable?
  - List the antichains of the dependency DAG so I can inspect sets of tasks that are mutually unordered.
  - In this partial-order graph, what collections of elements can appear together without any reachability relation between them?
  - In a clinical treatment guideline DAG, which interventions can be considered together because none depends on another?
  - In a manufacturing workflow DAG, which production steps are mutually unordered and can be scheduled in parallel?
  - In a university prerequisite graph, which courses form an antichain and can be taken in the same semester without prerequisite conflicts?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dag.antichains.html
- id: asyn_fluidc
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Graph must be simple and undirected.
          type: NetworkX graph
          required: true
        k:
          description: The number of communities to be found.
          type: integer
          required: true
        max_iter:
          description: The number of maximum iterations allowed. 
          type: integer
          default: 100
        seed:
          description: Indicator of random number generation state. 
          type: integer, random_state, or None (default)
          default: null
    output_schema:
      type: iterable
      description: Iterable of communities given as sets of nodes.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is suitable for community detection in large sparse undirected networks such as social interaction graphs, collaboration graphs, and communication graphs when the analyst wants to prescribe the number of communities in advance. It is especially useful when scalability and repeated randomized runs are more important than exact optimization of a global objective.
  Tuning_Mechanisms:
    k: The parameter k fixes the number of communities to be found. Smaller values produce coarser partitions, while larger values force the algorithm to split the graph into more communities and may expose finer-grained structure.
    max_iter: Increasing max_iter gives the asynchronous update process more chances to converge, which can improve the stability of the final partition on difficult graphs at the cost of extra runtime. Lower values stop sooner and may return before the community assignments have stabilized.
    seed: The initialization is random, so changing the seed can lead to different community assignments. Fixing the seed is useful when reproducibility matters or when comparing the effect of other parameters.
  Principles:
    description: This algorithm detects communities by initializing k fluid communities at random seed nodes and repeatedly updating node memberships in random order. Each community keeps a total density of 1 that is redistributed across its current members, so communities expand and compete locally until assignments stabilize or the iteration limit is reached. The method works on simple undirected graphs and does not support edge weights.
    time_complexity: O(t(n + m)), where n is the number of nodes, m is the number of edges, and t is the number of iterations executed with t <= max_iter.
  solvable_questions:
  - Partition the current undirected graph into k communities using asynchronous fluid communities.
  - For this sparse social network, what community structure do we obtain if we request 5 communities?
  - How does the detected partition change when I increase the number of target communities in the fluid communities algorithm?
  - Find a scalable community decomposition of the current simple undirected graph with a fixed community count.
  - In a mobile-call network, what communities of subscribers emerge if we require 8 groups?
  - In a collaboration network of researchers, which clusters of authors are detected as likely research communities?
  - In an e-commerce co-purchase graph, how does the community structure change when we increase k from 6 to 10?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.community.asyn_fluid.asyn_fluidc.html
- id: barycenter
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: The connected graph 
          type: networkx.Graph
          required: true
        weight:
          description: Edge attribute used as the distance or cost in shortest-path calculations. If not provided, all edges are treated as having equal distance.
          type: :str
          default: null
        attr:
          description: If given, write the value of the objective function to each node's `attr` attribute. Otherwise do not store the value.
          type: :str
          default: null
        sp:
          description: All pairs shortest path lengths as a dictionary of dictionaries
          type: dict of dicts, optional
          default: null
    output_schema:
      type: any
      description: list Nodes of `G` that induce the barycenter of `G`.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: This algorithm is useful for facility placement, representative node selection, and network service positioning in a connected graph. It identifies the node or nodes with the minimum total shortest-path distance to all other nodes, so it is a natural choice when a network median is needed under either unweighted or weighted distances.
  Tuning_Mechanisms:
    weight: Changing weight changes the distance model used in shortest-path computation, so the barycenter can move when edge costs or lengths are taken into account instead of treating all edges equally.
    attr: If attr is provided, NetworkX stores each node's objective-function value on the graph. This does not change which nodes belong to the barycenter, but it adds useful side information for downstream inspection or ranking.
    sp: Providing all-pairs shortest-path lengths in sp avoids recomputing distances and can substantially reduce runtime when those distances are already available. The result then depends entirely on the supplied shortest-path dictionary, which must be complete and consistent with the graph.
  Principles:
    description: This algorithm computes the barycenter of a connected graph by finding the nodes that minimize the sum of shortest-path distances to all other nodes. In graph-theoretic terms, it returns the median set of the graph. Distances can be computed from an edge-weight attribute, and precomputed all-pairs shortest-path lengths can also be supplied directly.
    time_complexity: O(nm) for unweighted graphs, O(nm + n^2 log n) for weighted graphs, and O(n^2) when all-pairs shortest-path lengths are provided in advance.
  solvable_questions:
  - Which node or nodes minimize the total shortest-path distance to all other nodes in the current connected graph?
  - Find the graph median of the current network.
  - Under the current edge weights, which locations are the barycenter of the network?
  - If I already computed all-pairs shortest-path lengths, what is the barycenter induced by those distances?
  - In a city road network, which intersections are the best locations for a dispatch center under travel distance?
  - In a hospital transfer network, which facility is the median location for minimizing patient transfer distance?
  - In a supply chain network, which warehouse lies closest on average to all other facilities?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.distance_measures.barycenter.html
- id: birank
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A bipartite network
          type: graph
          required: true
        nodes:
          description: Container with all nodes belonging to the first bipartite node set ('top'). The nodes in this set use the hyperparameter `alpha`, and the personalization dictionary `top_personalization`. The nodes in the second bipartite node set ('bottom') are automatically determined by taking the complement of 'top' with respect to the graph `G`.
          type: iterable of nodes
          equired: true
        alpha:
          description: Damping factor for the 'top' nodes. Must be in the interval $[0, 1]$. Larger alpha and beta generally reduce the effect of the personalizations and increase the number of iterations before convergence. Choice of value is largely dependent on use case, and experimentation is recommended.
          type: float
          default: 0.80 if top_personalization not empty, else 1
        beta:
          description: Damping factor for the 'bottom' nodes. Must be in the interval $[0, 1]$. Larger alpha and beta generally reduce the effect of the personalizations and increase the number of iterations before convergence. Choice of value is largely dependent on use case, and experimentation is recommended.
          type: float
          default: 0.80 if bottom_personalization not empty, else 1
        top_personalization:
          description: Dictionary keyed by nodes in 'top' to that node's personalization value. Unspecified nodes in 'top' will be assigned a personalization value of 0. Personalization values are used to encode a priori weights for a given node, and should be non-negative.
          type: dict
          default: None
        bottom_personalization:
          description: Dictionary keyed by nodes in 'bottom' to that node's personalization value. Unspecified nodes in 'bottom' will be assigned a personalization value of 0. Personalization values are used to encode a priori weights for a given node, and should be non-negative.
          type: dict
          default: None
        max_iter:
          description: Maximum number of iterations in power method eigenvalue solver.
          type: int
          default: 100
        tol:
          description: Error tolerance used to check convergence in power method solver. The iteration will stop after a tolerance of both ``len(top) * tol`` and ``len(bottom) * tol`` is reached for nodes in 'top' and 'bottom' respectively.
          type: float
          default: 1.0e-06
        weight:
          description: Edge data key to use as weight.
          type: string or None
          default: weight
    output_schema:
      type: dictionary
      description: Dictionary keyed by node to that node's BiRank score.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: This algorithm is well suited to bipartite ranking problems such as user-item recommendation, author-paper analysis, and user-product popularity estimation. It is most useful when the graph has two node types and the analyst wants rankings that combine graph structure with optional prior preferences on either side of the bipartite network.
  Tuning_Mechanisms:
    nodes: The nodes parameter defines which bipartite node set is treated as the top partition. This choice determines which side uses alpha and top_personalization and therefore changes the semantics of the ranking computation.
    alpha: Alpha controls how strongly scores of top nodes are driven by graph propagation versus top-side personalization. Larger alpha reduces the effect of top_personalization and usually requires more iterations before convergence.
    beta: Beta plays the same role for the bottom partition that alpha plays for the top partition. Increasing beta makes bottom-node scores rely more heavily on the bipartite structure and less on bottom_personalization.
    top_personalization: This dictionary injects prior preferences or prior importance into the top partition. Nonzero entries bias the ranking toward selected top nodes and can be used for personalized recommendation or prior-informed ranking.
    bottom_personalization: This dictionary injects prior preferences or prior importance into the bottom partition. It changes the stationary point toward bottom nodes that are given larger prior mass.
    max_iter: Increasing max_iter allows more power-iteration steps and is helpful when convergence is slow. Smaller values reduce runtime but can terminate before the ranking has stabilized.
    tol: A smaller tolerance asks for a more precise fixed point and can improve numerical accuracy at the cost of more iterations. A larger tolerance speeds up convergence checks but may stop earlier with a rougher approximation.
    weight: The weight parameter determines how strongly each bipartite interaction contributes to the recursive ranking update. Changing the edge weight key can materially alter the scores when interaction strengths are heterogeneous.
  Principles:
    description: This algorithm computes BiRank scores on a bipartite graph by iteratively propagating influence between the two node sets. Each score update depends on edge weights, the weighted degrees of incident nodes, damping factors for the two partitions, and optional personalization vectors that inject prior preferences. The method returns one score for every node in both parts of the bipartite network.
    time_complexity: O(t(n + m)), where n is the total number of nodes, m is the number of edges, and t is the number of power-iteration steps with t <= max_iter.
  solvable_questions:
  - Rank all nodes in the current bipartite graph with BiRank.
  - Using a user-item bipartite network, which items should be recommended when I encode a user's previous interactions as personalization?
  - Which repositories or products appear most important in the current weighted bipartite interaction graph?
  - How do the BiRank scores change if I alter the damping factors or personalization dictionaries for the two bipartite partitions?
  - In a patient-treatment bipartite graph, which therapies should be prioritized for a patient given prior successful treatments?
  - In a shopper-product graph, which products should be recommended to a customer based on past purchases and weighted interactions?
  - In a developer-repository bipartite network, which repositories are most important after weighting contribution intensity?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.bipartite.link_analysis.birank.html
- id: colliders
  task_type_id: Directed Acyclic Graphs (DAG)
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A networkx `~networkx.DiGraph`. Yields:A 3-tuple representation of a collider Each collider is a 3-tuple with the parent, collider, and other parent.
          type: graph
          required: true
    output_schema:
      type: any
      description: Generator of collider triples in the form (parent_1, collider, parent_2).
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful in causal graph analysis and structure learning when one needs to identify places where two parent variables point to the same child variable. These patterns help locate conditioning effects and dependency structures in directed graphical models.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm enumerates collider triples in a directed graph. A collider occurs when two distinct parent nodes both have directed edges into the same child node. The function yields triples in parent-child-parent form and is commonly applied to directed acyclic graphs, although the pattern can also be identified in directed graphs with cycles.
    time_complexity: O(sum_v d_in(v)^2), with worst-case O(n^3), where n is the number of nodes and d_in(v) is the in-degree of node v.
  solvable_questions:
  - List all collider triples in the current directed graph.
  - Which nodes in the current causal DAG have two incoming parents and therefore act as colliders?
  - Find every parent-collider-parent pattern in this directed graph.
  - In the current causal graph, where could conditioning induce associations through a collider structure?
  - In an epidemiological causal graph, which symptoms act as colliders between multiple underlying causes?
  - In a credit-risk causal network, which financial indicators receive converging influence from two separate drivers and form colliders?
  - In a gene regulation network, which genes receive converging influences from two upstream regulators and therefore form collider structures?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dag.colliders.html
- id: dominating_set
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Parameter 'G' for dominating_set
          type: NetworkX graph
          required: true
        start_with:
          description: Node to use as a starting point for the algorithm.
          type: node 
          default: None
    output_schema:
      type: set
      description: A dominating set for G.
    graph_type:
      directed: true
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is appropriate for coverage and monitoring tasks such as placing controllers, selecting representative users, or choosing checkpoint locations in a network. It returns a node set whose members collectively cover the graph through direct adjacency, which is useful when full coverage matters more than exact optimality.
  Tuning_Mechanisms:
    start_with: The procedure is heuristic and not guaranteed to find a minimum dominating set, so the starting node can affect which dominating set is returned. Choosing a high-coverage or strategically important start node can produce a smaller or more interpretable solution in practice.
  Principles:
    description: This algorithm computes a dominating set, meaning a subset of nodes such that every node in the graph either belongs to the subset or is adjacent to a node in it. The procedure is heuristic rather than exact, so it returns a valid dominating set but not necessarily the smallest one. An optional starting node can be supplied to guide the construction process.
    time_complexity: O(n + m), where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - Find a dominating set for the current graph.
  - Which nodes should be selected so that every node is either selected or adjacent to a selected node?
  - Starting from a specific seed node, what dominating set does the heuristic return on this graph?
  - Give me a covering node set for the current network without requiring it to be minimum.
  - In a telecom network, which base stations should be monitored so every station is covered by at least one selected station?
  - In a vaccination contact graph, which individuals should be targeted so every person is either selected or adjacent to a selected person?
  - In a retail service network, which stores should be chosen as regional hubs so all stores are directly covered?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dominating.dominating_set.html
- id: estrada_index
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Parameter 'G' for estrada_index
          type: graph
          required: true
    output_schema:
      type: any
      description: 'estrada index: float'
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful when a simple undirected graph needs a single spectral descriptor of global compactness, communicability, or structural folding. It is often relevant in molecular graph analysis and in comparative studies of undirected network topology.
  Tuning_Mechanisms: {}
  Principles:
    description: This algorithm computes the Estrada index of a simple undirected graph from the eigenvalues of its adjacency matrix. The value is obtained by summing the exponential of each eigenvalue, which produces a scalar summary of how strongly the graph supports closed walks and global structural compactness.
    time_complexity: O(n^3), where n is the number of nodes, due to the matrix eigendecomposition used in the computation.
  solvable_questions:
  - Compute the Estrada index of the current simple undirected graph.
  - How spectrally compact is the current molecular or structural graph according to the Estrada index?
  - Compare the Estrada index across several undirected candidate graphs.
  - Does the current graph have a larger Estrada index than another graph with the same number of nodes?
  - Which molecular structure in this candidate set appears more compact according to the Estrada index?
  - Does the protein interaction network of disease A have a higher Estrada index than disease B?
  - How does the Estrada index change after adding stabilizing links to an infrastructure network?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.centrality.estrada_index.html
- id: girth
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Parameter 'G' for girth
          type: NetworkX Graph
          required: true
    output_schema:
      type: any
      description: int or math.inf
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful in graph structure analysis when we need to know how quickly cycles appear in a network. It helps distinguish tree-like graphs from graphs with short feedback loops and is often used when comparing local cyclic structure across candidate graphs.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm returns the girth of a graph, which is the length of its shortest cycle. If the graph is acyclic, the result is infinity. In effect, it measures the smallest cyclic dependency present in an undirected simple graph.
    time_complexity: O(nm), where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - What is the girth of the current graph?
  - What is the length of the shortest cycle in the current network?
  - Is the current graph acyclic, or if not, how short is its shortest cycle?
  - Compare the shortest-cycle length of several candidate graphs.
  - In a fraud transaction network, what is the length of the shortest suspicious feedback cycle?
  - In a power grid topology, how small is the shortest loop that could support local rerouting?
  - In a social rumor network, does the graph contain very short cycles that could accelerate reinforcement of misinformation?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.cycles.girth.html
- id: harmonic_diameter
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A graph
          type: NetworkX graph
          required: true
        sp:
          description: All-pairs shortest path lengths as a dictionary of dictionaries
          type: dict of dicts
          default: null
        weight:
          description: 'If None, every edge has weight/distance 1. If a string, use this edge attribute as the edge weight. Any edge attribute not present defaults to 1. If a function, the weight of an edge is the value returned by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and the dictionary of edge attributes for that edge. The function must return a number.'
          type: string, function, or None 
          default: None
    output_schema:
      type: float
      description: Harmonic diameter of graph
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: This algorithm is useful for measuring global efficiency in networks that may be disconnected or only partially reachable. It is a good choice in transportation, communication, and small-world style analyses when ordinary diameter or average shortest-path length becomes unstable because some node pairs are unreachable.
  Tuning_Mechanisms:
    sp: Providing all-pairs shortest-path lengths in sp skips the path computation stage and makes the result depend on the supplied distance dictionary. This is useful when shortest-path distances have already been computed elsewhere.
    weight: Changing weight changes the edge-distance model used in shortest-path calculations when sp is not supplied. Weighted distances can materially change the harmonic diameter by emphasizing costly or long edges.
  Principles:
    description: This algorithm computes the harmonic diameter, which is the harmonic mean of shortest-path distances between all distinct node pairs. Because harmonic averaging handles infinite distances gracefully, the measure remains meaningful even when the graph is not fully connected. Distances may be computed from unweighted edges, a weight attribute, or a user-supplied all-pairs distance dictionary.
    time_complexity: O(nm) for unweighted graphs, O(nm + n^2 log n) for weighted graphs, and O(n^2) when all-pairs shortest-path lengths are provided in advance.
  solvable_questions:
  - Compute the harmonic diameter of the current graph.
  - How globally efficient is the current network when unreachable node pairs are allowed?
  - Under the current edge weights, what harmonic diameter does the network have?
  - If I provide precomputed all-pairs shortest-path lengths, what harmonic diameter follows from them?
  - In a global airline network, how efficiently can airports reach one another when some routes are missing?
  - In an emergency communication network, what harmonic diameter do we obtain after several relay nodes fail?
  - In a logistics network with travel times, how does the harmonic diameter change after adding a new distribution link?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.distance_measures.harmonic_diameter.html
- id: is_aperiodic
  task_type_id: Directed Acyclic Graphs (DAG)
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A directed graph
          type: NetworkX DiGraph
          required: true
    output_schema:
      type: any
      description: bool True if the graph is aperiodic False otherwise
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful in Markov-chain analysis and directed state-transition modeling when we need to know whether a strongly connected system revisits states with a fixed period. It is especially relevant when checking whether a transition graph can support aperiodic long-run behavior.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm tests whether a strongly connected directed graph is aperiodic. A graph is aperiodic when there is no integer greater than 1 that divides the lengths of all directed cycles in the graph. The result is a Boolean value indicating whether the cycle structure avoids a common period.
    time_complexity: O(n + m), where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - Is the current strongly connected directed graph aperiodic?
  - Does the Markov-chain graph induced by these transitions satisfy the aperiodicity condition?
  - For the current strongly connected digraph, do all cycle lengths share a common divisor greater than one?
  - Which strongly connected component of the current directed graph is aperiodic?
  - Is the state-transition graph of this manufacturing process aperiodic enough to avoid repeating in a fixed cycle?
  - Does this web surfing Markov chain support convergence to a steady behavior rather than oscillating periodically?
  - Which strongly connected subnetwork of this transportation schedule is aperiodic and therefore mixes without a fixed period?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dag.is_aperiodic.html
- id: is_bipartite
  task_type_id: Bipartite
  Deployment_method:
    support_engine: networkx
    input_schema:
      type: object
      parameters:
        G:
          description: Parameter 'G' for is_bipartite
          type: NetworkX graph
          required: true
    output_schema:
      type: any
      description: Boolean value indicating whether the graph is bipartite.
    graph_type:
      directed: true
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful as a validation step before applying bipartite methods to interaction networks such as user-item, author-paper, or customer-product graphs. It checks whether the graph can be separated into two disjoint node sets with edges running only between the two sets.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm determines whether a graph is bipartite by attempting to assign its nodes to two colors so that adjacent nodes always receive different colors. If such a two-way assignment is possible for the entire graph, the graph is bipartite; otherwise it contains a structural conflict such as an odd cycle.
    time_complexity: O(n + m), where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - Is the current graph bipartite?
  - Can the current network be represented as two disjoint node sets with only cross-partition edges?
  - Before running bipartite algorithms, does this graph satisfy the bipartite property?
  - Does the current graph contain an odd cycle that would prevent it from being bipartite?
  - Can this job-applicant graph be cleanly separated into applicants and positions without same-side links?
  - Is the disease-symptom network truly bipartite, or do symptom-symptom links violate the two-mode structure?
  - Before running a recommendation model, does the customer-product interaction graph satisfy the bipartite condition?
  url: https://networkx.org/documentation/stable/_modules/networkx/algorithms/bipartite/basic.html
- id: kemeny_constant
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Parameter 'G' for kemeny_constant
          type: NetworkX graph
          required: true
        weight:
          description: The edge data key used to compute the Kemeny constant. If None, then each edge has weight 1.
          type: string or None
          default: None
    output_schema:
      type: any
      description: float The Kemeny constant of the graph `G`.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: This algorithm is useful when a connected graph is studied through random walks and the analyst wants a single summary of global mixing or spreading efficiency. It can be applied to weighted undirected networks to compare how quickly a random walk reaches a destination drawn from the stationary distribution.
  Tuning_Mechanisms:
    weight: The weight parameter changes the transition probabilities of the induced random walk by changing edge strengths. Larger or more uneven weights can substantially alter the resulting Kemeny constant and the interpretation of how quickly the walk mixes across the graph.
  Principles:
    description: This algorithm computes the Kemeny constant of a graph by interpreting the graph as a Markov chain. The result is the expected number of steps required to move from a starting state to a random destination drawn from the stationary distribution, and this expectation does not depend on which starting node is chosen. Positive edge weights determine the transition structure when weighted graphs are used.
    time_complexity: O(n^3), where n is the number of nodes, due to the spectral computation involved in the current implementation.
  solvable_questions:
  - Compute the Kemeny constant of the current connected graph.
  - How quickly does a random walk spread across the current weighted network in expectation?
  - How does the graph-wide mixing time summary change when I switch the edge-weight attribute used by the random walk?
  - Which of several connected undirected graphs has the smaller Kemeny constant?
  - Which urban transit network has the lower Kemeny constant and therefore faster average random-walk mixing?
  - How does the Kemeny constant of a protein interaction network change after removing low-confidence edges?
  - In a weighted communication network, does rerouting traffic through stronger links reduce the Kemeny constant?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.distance_measures.kemeny_constant.html
- id: kernighan_lin_bisection
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: Graph must be undirected.
          type: NetworkX graph
          required: true
        partition:
          description: Pair of iterables containing an initial partition. If not specified, a random balanced partition is used.
          type: tuple
          default: null
        max_iter:
          description: Maximum number of times to attempt swaps to find an improvement before giving up.
          type: int
          default: 10
        weight:
          description: 'If this is a string, then edge weights will be accessed via the edge attribute with this key (that is, the weight of the edge joining `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute exists, the weight of the edge is assumed to be one. If this is a function, the weight of an edge is the value returned by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and the dictionary of edge attributes for that edge. The function must return a number or None to indicate a hidden edge.'
          type: string or function 
          default: weight
        seed:
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`. Only used if partition is None
          type: integer, random_state, or None 
          default: None
    output_schema:
      type: tuple
      description: A pair of sets of nodes representing the bipartition.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: This algorithm is useful for two-way graph partitioning when the goal is to split a network into two balanced blocks while reducing the cut between them. It is a practical heuristic for circuit partitioning, balanced workload splitting, and coarse community-style graph bisection.
  Tuning_Mechanisms:
    partition: Supplying an initial partition changes the starting point of the local search and can materially affect the final bipartition because Kernighan-Lin is heuristic and can settle in different local optima.
    max_iter: Increasing max_iter allows more rounds of swap attempts and can improve the cut if the search has not yet stabilized, but it also increases runtime. Smaller values stop earlier and may leave additional improvements undiscovered.
    weight: The weight parameter determines the cut objective by changing how costly each edge is when it crosses the partition. Using a different edge attribute can lead to a very different bisection.
    seed: When partition is not supplied, the initial balanced partition is randomized. Fixing the seed makes the heuristic reproducible, while changing it can reveal alternative locally optimal bisections.
  Principles:
    description: This algorithm partitions an undirected graph into two parts by repeatedly exchanging nodes between the two sides in order to reduce the cut. The search starts from either a user-provided partition or a random balanced split and then performs a sequence of locally improving swaps. Edge weights can be used so that heavier cross-partition edges are penalized more strongly.
    time_complexity: O(k(m + n) log n), where n is the number of nodes, m is the number of edges, and k is the number of outer iterations with k <= max_iter.
  solvable_questions:
  - Partition the current undirected graph into two blocks with Kernighan-Lin bisection.
  - What balanced two-way partition gives a small edge cut in the current network?
  - How does the bisection change if I start from a custom initial partition?
  - Using weighted edges, which two-way split best reduces the weighted cut according to the Kernighan-Lin heuristic?
  - In an electric grid, what balanced two-region split minimizes transmission cut between substations?
  - In a chip netlist graph, how should modules be divided into two balanced partitions to reduce inter-block wiring?
  - In a corporate communication network, what two-way split best separates departments while keeping the cross-team cut small?
  url: https://networkx.org/documentation/stable/_modules/networkx/algorithms/community/kernighan_lin.html
- id: onion_layers
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: An undirected graph without self loops.
          type: NetworkX graph
          required: true
    output_schema:
      type: dictionary
      description: A dictionary keyed by node to the onion layer. The layers are contiguous integers starting at 1.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful for multi-scale structural analysis of undirected networks, especially when k-core decomposition alone is too coarse. It helps identify how deeply each node survives in the recursive peeling process and is therefore valuable for anomaly detection, shell analysis, and robustness studies.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm computes the onion decomposition of an undirected simple graph and assigns each node to an onion layer. The decomposition refines the usual k-core view by recording not only the shell to which a node belongs but also the stage at which it is removed during iterative peeling. The result gives a more detailed picture of internal structure within each shell.
    time_complexity: O(n + m), where n is the number of nodes and m is the number of edges.
  solvable_questions:
  - Return the onion layer of every node in the current graph.
  - How is the current undirected graph organized internally within its k-shell structure?
  - Which nodes appear in the outermost onion layers and which survive to deeper layers?
  - Use onion decomposition to inspect possible topological anomalies in the current network.
  - In a financial exposure network, which institutions lie in the deepest onion layers and form the structural core?
  - In a social network, which users are peeled off early and which remain until the deepest layers of the decomposition?
  - Can onion layers highlight anomalous nodes in an infrastructure graph that look inconsistent with the surrounding shell structure?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.core.onion_layers.html
- id: v_structures
  task_type_id: Directed Acyclic Graphs (DAG)
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          description: A networkx `~networkx.DiGraph`. Yields:A 3-tuple representation of a v-structure Each v-structure is a 3-tuple with the parent, collider, and other parent.
          type: graph
          required: true
    output_schema:
      type: any
      description: Generator of v-structure triples in the form (parent_1, collider, parent_2).
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: This algorithm is useful in causal discovery and directed graphical model analysis when we need to locate unshielded collider patterns. These structures are important because they can support orientation decisions and reveal dependence that appears only after conditioning on a common child.
  Tuning_Mechanisms: null
  Principles:
    description: This algorithm enumerates v-structures in a directed graph. A v-structure is a collider in which two parent nodes both point to the same child node and the two parents are not adjacent to each other. The function therefore filters collider patterns to keep only the unshielded ones that are especially informative in causal graph analysis.
    time_complexity: O(sum_v d_in(v)^2), with worst-case O(n^3), where n is the number of nodes and d_in(v) is the in-degree of node v.
  solvable_questions:
  - List all v-structures in the current directed graph.
  - Which triples in the current causal DAG are unshielded colliders?
  - Find every parent-child-parent pattern in which the two parents are not adjacent.
  - In the current causal graph, where do v-structures provide orientation evidence for edge directions?
  - In a medical causal graph, which diagnoses are unshielded colliders receiving influence from two independent risk factors?
  - In a macroeconomic causal network, where do two nonadjacent indicators converge on the same downstream variable?
  - In a gene regulatory causal graph, which nodes form v-structures that help orient uncertain causal edges?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dag.v_structures.html

- id: subgraph_is_monomorphic
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G1:
          type: directed graph
          description: The host directed graph in which a matching subgraph is searched.
          required: true
        G2:
          type: directed graph
          description: The pattern directed graph to be matched against a subgraph of G1.
          required: true
        node_match:
          type: callable, optional
          description: A function that returns True if a node in G1 and a node in G2 should be considered equal during matching, usually based on node attributes.
          default: null
        edge_match:
          type: callable, optional
          description: A function that returns True if an edge in G1 and an edge in G2 should be considered equal during matching, usually based on edge attributes.
          default: null
    output_schema:
      type: bool
      description: True if a subgraph of G1 is monomorphic to G2, False otherwise.
    graph_type:
      directed: true
      multigraph: false
      weighted: true
      heterogeneous: false
      other: The order of arguments matters; use DiGraphMatcher(G1, G2) to test whether G1 contains G2 as a directed non-induced subgraph pattern.
  Application_scenario: The subgraph_is_monomorphic algorithm is used to determine whether a directed pattern graph appears inside a larger directed host graph when extra edges among matched host nodes are allowed. It is suitable for graph pattern matching, rule-based structure retrieval, fraud-pattern screening, workflow motif search, dependency template lookup, and knowledge graph relation-pattern detection. Typical applications include checking whether a suspicious transaction chain pattern exists inside a larger money-flow network, whether a device-account-address interaction motif appears in an e-commerce risk graph, whether a control-flow fragment occurs inside a larger program graph, and whether a relation template is present in a directed knowledge graph.
  Tuning_Mechanisms:
    node_match: Providing a node_match function enables attribute-aware pattern matching. This is useful when the pattern requires matched nodes to share labels, types, roles, or domain-specific properties rather than matching by topology alone.
    edge_match: Providing an edge_match function enables attribute-aware edge comparison. This is useful when edge direction alone is insufficient and the pattern also depends on edge labels, weights, timestamps, or relation categories.
    argument_order: The order of G1 and G2 is critical. DiGraphMatcher(G1, G2).subgraph_is_monomorphic() checks whether some subgraph of G1 matches G2, not the reverse.
  Principles:
    description: The subgraph_is_monomorphic algorithm checks whether there exists an injective mapping from the nodes of G2 into a subgraph of G1 such that every directed edge in G2 is preserved in G1 under that mapping. Unlike subgraph isomorphism on node-induced subgraphs, monomorphism allows the matched nodes in G1 to contain additional edges that are not present in G2, so it is appropriate for non-induced directed pattern containment. In NetworkX this is implemented through the VF2 matching framework via DiGraphMatcher, which explores candidate node correspondences subject to syntactic feasibility and optional semantic feasibility through node_match and edge_match.
    time_complexity: Worst-case exponential. The underlying directed subgraph matching search is combinatorial; the NetworkX VF2 documentation notes that subgraph isomorphism is NP-complete, so runtime depends heavily on graph size, density, branching structure, and attribute constraints.
  solvable_questions:
    - Does the larger directed graph contain the given directed pattern as a non-induced subgraph?
    - Is this suspicious transaction motif present anywhere inside the current money-flow network?
    - Does the current device-account-address risk graph contain a known fraud interaction template?
    - Is this workflow dependency fragment embedded inside the larger directed process graph?
    - In the knowledge graph, does any local region match the target relation pattern?
    - Does the current program dependence graph contain this directed bug pattern template?
    - Given a host directed graph and a smaller directed pattern graph, return whether the host contains the pattern when extra host edges are allowed.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.isomorphism.DiGraphMatcher.subgraph_is_monomorphic.html

- id: dominance_frontiers
  task_type_id: Dominance
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: DiGraph or MultiDiGraph
          description: The graph where dominance is to be computed.
          required: true
        start:
          type: node
          description: The start node of dominance computation.
          required: true
    output_schema:
      type: dict keyed by nodes
      description: A dict containing the dominance frontiers of each node reachable from start as lists.
    graph_type:
      directed: true
      multigraph: true
      weighted: both
      heterogeneous: false
      other: start must be a node in G; only nodes reachable from start are included in the result.
  Application_scenario: The dominance_frontiers algorithm is mainly used in control-flow analysis, compiler optimization, and dominance-based program analysis. It is suitable for analyzing directed control-flow graphs to determine where dominance relationships stop holding, which is especially useful in SSA construction, placement of phi functions, and reasoning about merge points in execution paths.
  Tuning_Mechanisms:
    start: Changing start changes the root of dominance computation and therefore the reachable region of the graph and all reported dominance frontiers. In control-flow graphs this is usually the entry node.
  Principles:
    description: The algorithm computes, for each reachable node in a directed graph, the set of nodes that are in its dominance frontier. Intuitively, a node y is in the dominance frontier of x when x dominates at least one predecessor of y but does not strictly dominate y.
    time_complexity: The official documentation does not state a time complexity on the function page.
  solvable_questions:
    - Compute the dominance frontier of every reachable node from a given entry node.
    - Identify where dominance of a node stops holding in a control-flow graph.
    - Find merge points relevant to SSA phi-function placement.
    - Determine which nodes lie on the dominance frontier of a selected node.
    - Compare dominance frontier sizes across functions or subgraphs.
    - Restrict dominance analysis to nodes reachable from a specified start node.
    - Detect regions where multiple control-flow branches reconverge.
    - Summarize dominance-frontier structure for compiler-oriented graph analysis.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.dominance.dominance_frontiers.html

- id: flow_hierarchy
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: DiGraph or MultiDiGraph
          description: A directed graph.
          required: true
        weight:
          type: string, optional
          description: Attribute to use for edge weights. If None the weight defaults to 1.
          default: null
    output_schema:
      type: float
      description: Flow hierarchy value.
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
      other: G must have at least one edge.
  Application_scenario: The flow_hierarchy algorithm is mainly used to quantify how hierarchical a directed network is. It is suitable for analyzing citation networks, command chains, dependency graphs, supply chains, and influence networks where one wants to measure how much of the edge structure avoids cycles.
  Tuning_Mechanisms:
    weight: Specifying weight makes the computation use the chosen edge-attribute values instead of treating all edges equally. Leaving it as None gives every edge weight 1.
  Principles:
    description: Flow hierarchy is defined as the fraction of edges not participating in cycles in a directed graph. The NetworkX implementation uses strongly connected components to determine whether an edge belongs to a cycle.
    time_complexity: The official documentation notes that the strongly-connected-components approach can find cycle-participating edges in O(m) time.
  solvable_questions:
    - Compute the flow hierarchy score of a directed network.
    - Measure how close a directed network is to a strict hierarchy.
    - Compare hierarchy levels between multiple directed graphs.
    - Recompute hierarchy after applying edge weights.
    - Detect whether cycles significantly reduce hierarchical structure.
    - Evaluate whether a dependency graph behaves more like a DAG or a cyclic system.
    - Track changes in hierarchical organization over time.
    - Quantify how much of a command or citation network participates in feedback loops.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.hierarchy.flow_hierarchy.html

- id: voronoi_cells
  task_type_id: Graph Query
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: The input graph.
          required: true
        center_nodes:
          type: set
          description: A nonempty set of nodes in the graph G that represent the center of the Voronoi cells.
          required: true
        weight:
          type: string or function
          description: The edge attribute (or an arbitrary function) representing the weight of an edge.
          default: weight
    output_schema:
      type: dictionary
      description: A mapping from center node to set of all nodes in the graph closer to that center node than to any other center node. The keys of the dictionary are the element of center_nodes, and the values of the dictionary form a partition of the nodes of G.
    graph_type:
      directed: both
      multigraph: both
      weighted: true
      heterogeneous: false
      other: center_nodes must be nonempty; for directed graphs this computes outward Voronoi cells, and inward cells require reversing the graph first.
  Application_scenario: The voronoi_cells algorithm is mainly used for graph partitioning by shortest-path proximity. It is suitable for assigning nodes to nearest facilities, service centers, depots, hubs, sources, or representative seeds in transportation, communication, and infrastructure graphs.
  Tuning_Mechanisms:
    center_nodes: Changing center_nodes changes the seeds that define the partition and therefore changes the resulting Voronoi cells.
    weight: Using a weight attribute or custom weight function changes the distance metric that determines cell membership.
  Principles:
    description: The algorithm partitions the nodes of a graph according to shortest-path distance to a specified set of center nodes. Each node is assigned to the center to which it is closer than to any other center.
    time_complexity: The official documentation does not state a time complexity on the function page.
  solvable_questions:
    - Partition a graph into regions around a chosen set of centers.
    - Assign every node to its nearest service center in the network.
    - Recompute territory boundaries under weighted shortest-path distances.
    - Build outward Voronoi zones on a directed graph.
    - Compare how different center selections change graph coverage.
    - Identify which nodes belong to the influence region of each hub.
    - Derive graph partitions for facility-location style analysis.
    - Summarize nearest-center membership for all nodes in the graph.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.voronoi.voronoi_cells.html

- id: minimum_weight_full_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected bipartite graph.
          required: true
        top_nodes:
          type: container, optional
          description: Container with all nodes in one bipartite node set. If not supplied it will be computed.
          default: null
        weight:
          type: string, optional
          description: The edge data key used to provide each value in the matrix. If None, then each edge has weight 1.
          default: weight
    output_schema:
      type: dictionary
      description: The matching is returned as a dictionary, matches, such that matches[v] == w if node v is matched to node w. Unmatched nodes do not occur as a key in matches.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
      other: G must be an undirected bipartite graph; raises ValueError if no full matching exists; raises ImportError if SciPy is not available.
  Application_scenario: The minimum_weight_full_matching algorithm is mainly used for assignment and bipartite pairing problems. It is suitable for worker-task matching, job-machine assignment, entity alignment across two groups, and any rectangular linear assignment problem where one wants a minimum-cost full matching.
  Tuning_Mechanisms:
    top_nodes: Providing top_nodes removes ambiguity about the bipartition and is especially useful when the graph is disconnected or partition inference is undesirable.
    weight: Choosing a different edge attribute changes the cost function being minimized; setting it to None makes all edges unit-weighted.
