- id: gomory_hu_tree
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity that indicates how much flow the edge
            can support. If this attribute is not present, the edge is considered to have infinite capacity. Default value:
            ''capacity''.'
          default: capacity
        flow_func:
          type: function
          description: Function to perform the underlying flow computations. Default value :func:`edmonds_karp`. This function
            performs better in sparse graphs with right tailed degree distributions. :func:`shortest_augmenting_path` will
            perform better in denser graphs.
          default: null
    output_schema:
      type: NetworkX graph
      description: A NetworkX graph representing the Gomory-Hu tree of the input graph.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The Gomory-Hu tree algorithm is typically used in network flow problems to efficiently compute the
    minimum cut between any two nodes in a graph. It is particularly useful in applications involving network design, mobility
    in telecommunication networks, and clustering in social network analysis, where understanding the connectivity and bottlenecks
    between nodes is essential.
  Tuning_Mechanisms:
    capacity: Adjusting the 'capacity' parameter allows for customization of the edge capacity attribute used in flow calculations,
      which directly impacts the resulting minimum cuts. Setting this parameter to an edge attribute other than the default
      can help model specific network characteristics.
    flow_func: Changing the 'flow_func' parameter allows the user to select different algorithms for flow computation. Choosing
      'shortest_augmenting_path' can enhance performance in denser graphs, while 'edmonds_karp' is preferred for sparse graphs,
      thus affecting the efficiency and speed of the algorithm.
  Principles:
    description: The algorithm constructs a Gomory-Hu tree, which is a compact representation of the minimum cut structure
      of the input graph. It operates on undirected graphs and relies on maximum flow computations to identify the minimum
      cuts between all pairs of vertices. The time complexity is O(n^2 m), where n is the number of nodes and m is the number
      of edges, making it suitable for moderate-sized graphs.
    time_complexity: O(V * MaxFlow)
  solvable_questions:
  - Construct the Gomory-Hu Tree for this undirected graph and output the weights of all edges in the tree.
  - Use the Cut Tree to query the min-cut/max-flow between any two nodes and provide the full all-pairs max-flow matrix.
  - Output the topology of the Gomory-Hu Tree, sorting all tree edges by weight in descending order.
  - In a regional power grid, which pairs of nodes have the weakest connection? Output the Top-K cut sets most likely to fragment
    the network.
  - In social networks, how can we quickly identify communication bottlenecks and the minimum cost to disconnect any two groups?
  - In urban emergency planning, if certain roads are blocked, which area pairs will be completely isolated first?
  - 'Evaluate communication network robustness: what is the minimum bandwidth to be cut to disconnect any two core server
    rooms?'
  - In cluster analysis, how can the server network be partitioned into different security isolation zones based on the global
    min-cut structure?
  - Identify the weakest defense points in a water supply network and list the key pipe combinations with the lowest disconnection
    cost.
- id: is_forest
  task_type_id: Basics
  Deployment_method:
