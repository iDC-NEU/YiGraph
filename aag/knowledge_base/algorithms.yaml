    networks, communication networks, and transportation systems. For example, in
    a social network analyzing the reach of individuals, eccentricity helps identify
    those who are more isolated compared to others.
  Tuning_Mechanisms:
    v: Specifying the node through the 'v' parameter allows the user to retrieve the
      eccentricity value for a specific node rather than calculating it for all nodes
      in the graph. This can improve efficiency when only localized information is
      needed.
    sp: Providing a precomputed dictionary of shortest path lengths through the 'sp'
      parameter can significantly decrease computation time, particularly in large
      graphs, by avoiding redundant calculations of path lengths that have already
      been determined.
  Principles:
    description: The eccentricity algorithm computes the maximum shortest path distance
      from a specified node to all other nodes in the graph, thus quantifying the
      node's farthest distance from any other node. This algorithm works on both directed
      and undirected graphs, with a time complexity that typically depends on the
      shortest path algorithm utilized (e.g., O(V + E) using BFS for unweighted graphs
      or O(V^2) using Floyd-Warshall for all-pairs shortest paths). Input constraints
      include ensuring all edge weights are positive and the graph must be connected
      for meaningful eccentricity values.
    time_complexity: O(V * (V + E))
