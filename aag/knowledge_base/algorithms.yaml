- id: shortest_augmenting_path
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Edges of the graph are expected to have an attribute called 'capacity'. If this attribute is not present,
            the edge is considered to have infinite capacity.
          required: true
        s:
          type: node
          description: Source node for the flow.
          required: true
        t:
          type: node
          description: Sink node for the flow.
          required: true
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity that indicates how much flow the edge
            can support. If this attribute is not present, the edge is considered to have infinite capacity. Default value:
            ''capacity''.'
          default: capacity
        residual:
          type: NetworkX graph
          description: 'Residual network on which the algorithm is to be executed. If None, a new residual network is created.
            Default value: None.'
          default: null
        value_only:
          type: bool
          description: If True compute only the value of the maximum flow. This parameter will be ignored by this algorithm
            because it is not applicable.
          default: false
        two_phase:
          type: bool
          description: 'If True, a two-phase variant is used. The two-phase variant improves the running time on unit-capacity
            networks from $O(nm)$ to $O(\min(n^{2/3}, m^{1/2}) m)$. Default value: False.'
          default: false
        cutoff:
          type: integer, float
          description: 'If specified, the algorithm will terminate when the flow value reaches or exceeds the cutoff. In this
            case, it may be unable to immediately determine a minimum cut. Default value: None.'
          default: null
      required:
      - s
      - t
    output_schema:
      type: NetworkX DiGraph
      description: Residual network after computing the maximum flow.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The shortest_augmenting_path algorithm is typically used in networks with capacity constraints, such
    as transportation, telecommunications, and supply chain networks. It solves the maximum flow problem, which is crucial
    for optimizing resource allocation and ensuring efficient flow through a network. For instance, it can be applied to determine
    the optimal routing of goods through a logistics network or the efficient handling of data packets in a computer network.
  Tuning_Mechanisms:
    capacity: Adjusting this parameter influences how the algorithm interprets the edges' capacity in the graph. A different
      attribute can be specified to reflect the edge capacities accurately, which directly affects the calculations of the
      maximum flow.
    cutoff: Setting a cutoff value allows the algorithm to terminate early when a specific flow threshold is reached, which
      can be useful in applications where a minimum viable flow is sufficient. However, this might prevent the algorithm from
      finding the exact maximum flow if the cutoff is set too low.
  Principles:
    description: This algorithm operates on directed graphs, leveraging the concept of augmenting paths to iteratively increase
      the flow from a designated source node to a sink node. It requires edges to have a 'capacity' attribute that denotes
      the maximum flow each edge can support. The time complexity of the algorithm can differ based on the implementation
      and parameters, but generally, it efficiently calculates the maximum flow using the shortest augmenting path approach.
    time_complexity: O(V^2 * E)
  solvable_questions:
  - Calculate the maximum flow of the weighted graph based on the Shortest Augmenting Path algorithm.
  - Output the table of distance label changes for each node during the algorithm's execution.
  - List all edges with zero residual capacity when the network reaches maximum flow.
  - In a large broadband backbone, how can we quickly calculate the maximum throughput between two points? Output the Top-10
    saturated links.
  - For a massive urban traffic network, calculate the maximum vehicle flow from north to south during peak hours.
  - In a global logistics system, how can we maximize total cargo transport using shortest-path principles?
  - Evaluate the instantaneous peak request volume a social platform's server cluster can handle during major events.
  - Calculate the maximum flood discharge capacity of an industrial park's drainage system with flow tables for each outlet.
  - In supply chain allocation, what is the total maximum supply capacity if shortest-path transmission is prioritized?
- id: voterank
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        number_of_nodes:
          type: integer, optional
          description: Number of ranked nodes to extract (default all nodes).
          default: null
    output_schema:
      type: list
      description: Ordered list of computed seeds. Only nodes with positive number of votes are returned.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The voterank algorithm is typically applied in social networks and web graphs to identify influential
    nodes based on their connections and interactions. It addresses the challenge of ranking nodes according to their relevance
    or importance in a network, which is crucial in scenarios like information dissemination, recommendation systems, and
    influence maximization.
  Tuning_Mechanisms:
    number_of_nodes: Adjusting the 'number_of_nodes' parameter alters the number of top-ranked nodes returned by the algorithm.
      Setting this to a lower value allows for extraction of only the most influential nodes, while a higher value provides
      a broader view of node rankings, which can be useful in different analytical contexts.
  Principles:
    description: The core principle of voterank relies on the concept of nodes voting for each other based on their connections,
      allowing for the identification of influential nodes in the network. This algorithm is applicable to both directed and
      undirected graphs and does not have stringent input requirements, although a connected component is ideal for meaningful
      rankings. The time complexity is generally linear with respect to the number of nodes and edges, making it efficient
      for large-scale networks.
    time_complexity: O(k * (V + E))
  solvable_questions:
  - Run the VoteRank algorithm to compute the influence score of each node in the current graph and output the Top-20 nodes
    with the highest influence.
  - Output the VoteRank score table for all nodes in the network, sorted in descending order of score.
  - Provide the list of the top 50 nodes ranked by VoteRank in the current graph.
  - In the social network, which users play the most influential role in information propagation?
  - In the communication network, which nodes are most critical in message diffusion?
  - In the webpage link network, which pages are the most central in information propagation or recommendation?
  - In the paper citation network, which papers have the greatest impact in academic dissemination?
  - In the transaction or collaboration network, which accounts or nodes are the most influential in overall flow?
- id: within_inter_cluster
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'The WIC measure will be computed for each pair of nodes given in the iterable. The pairs must be given
            as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent edges in the graph
            will be used. Default value: None.'
          default: null
        delta:
          type: float, optional (default = 0.001)
          description: 'Value to prevent division by zero in case there is no inter-cluster common neighbor between two nodes.
            See [1]_ for details. Default value: 0.001.'
          default: 0.001
        community:
          type: string, optional (default = 'community')
          description: 'Nodes attribute name containing the community information. G[u][community] identifies which community
            u belongs to. Each node belongs to at most one community. Default value: ''community''.'
          default: community
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their WIC measure.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The within_inter_cluster (WIC) algorithm is typically applied in community detection and social network
    analysis. It is used to measure the proximity or similarity between nodes based on their inter-cluster common neighbors.
    For example, in a social network, it can help identify friendships between users from different communities based on shared
    connections.
  Tuning_Mechanisms:
    delta: Adjusting the delta parameter, which prevents division by zero, affects the handling of pairs with no inter-cluster
      common neighbors. A smaller delta value can make the algorithm more sensitive to the absence of such neighbors, potentially
      resulting in lower similarity scores. Conversely, a larger delta value may provide some baseline similarity even when
      no common neighbors exist.
    community: Changing the community parameter alters the nodes' attribute name used to identify community memberships. This
      can influence the algorithm's effectiveness, as it relies on the correct identification of community structures to compute
      accurate WIC measures between node pairs.
  Principles:
    description: The WIC algorithm calculates a similarity measure between pairs of nodes by assessing their shared neighbors
      across distinct communities. It is suitable for undirected graphs and is particularly useful for detecting relationships
      that span communities. The algorithm's time complexity may depend on the number of edges and nodes involved, while its
      space complexity is influenced by the requirement to store community memberships and neighbor information.
    time_complexity: O(E)
  solvable_questions:
  - Given a community assignment (community labels), compute the WIC (Within/Inter-Cluster common neighbors) measure between
    node u and node v.
  - For a given node u, compute WIC scores between u and all currently non-adjacent nodes, and output the Top-20 candidates
    with the highest WIC.
  - For a given candidate edge list (u,v), compute the WIC score for each pair and output the pairs sorted by score in descending
    order.
  - In the whole graph, find both the Top-50 non-edge node pairs with the highest WIC and the Top-50 with the lowest WIC.
  - 'In a social network, who am I more likely to meet: candidates whose mutual friends mostly come from the same circle or
    candidates whose mutual friends span multiple circles?'
  - In enterprise collaboration, which cross-department employee pairs have more cross-department mutual contacts (low WIC)
    and are more likely to form new cross-team collaborations?
  - In an academic network, which author pairs have mutual collaborators coming from different field communities (low WIC)
    and are more likely to collaborate across disciplines?
  - In community operations, which users should be recommended “new topics/groups within the same community” and which users
    should be encouraged to “explore across communities”?
  - In network operations, which host pairs share more communication peers across different subnets (low WIC) and may form
    new cross-subnet links?
- id: average_shortest_path_length
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for average_shortest_path_length
          required: true
        weight:
          type: None, string or function, optional (default = None)
          description: 'If None, every edge has weight/distance/cost 1. If a string, use this edge attribute as the edge weight.
            Any edge attribute not present defaults to 1. If this is a function, the weight of an edge is the value returned
            by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and
            the dictionary of edge attributes for that edge. The function must return a number.'
          default: null
        method:
          type: string, optional (default = 'unweighted' or 'dijkstra')
          description: The algorithm to use to compute the path lengths. Supported options are 'unweighted', 'dijkstra', 'bellman-ford',
            'floyd-warshall' and 'floyd-warshall-numpy'. Other method values produce a ValueError. The default method is 'unweighted'
            if `weight` is None, otherwise the default method is 'dijkstra'.
          default: null
    output_schema:
      type: any
      description: 算法执行结果
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The average_shortest_path_length algorithm is typically used in network analysis, particularly for
    understanding the average distance between nodes in a graph. It is particularly useful in social networks, transportation
    systems, or any application where connections between entities are analyzed for efficiency, such as logistics and communication
    networks.
  Tuning_Mechanisms:
    weight: Adjusting the weight parameter allows for the incorporation of varying edge costs into the path length calculations.
      When using weights, the algorithm computes average lengths based on the specified weights rather than assuming unit
      costs for all edges, which can provide a more realistic representation of the network's characteristics.
    method: The method parameter determines the algorithm used for computing path lengths. By selecting different methods
      such as 'dijkstra' or 'bellman-ford', users can optimize for performance based on the graph's properties, such as sparsity
      or edge weights, affecting the computation time and resource usage.
  Principles:
    description: This algorithm calculates the average shortest path length in a graph by evaluating the distances between
      all pairs of nodes. It can handle both directed and undirected graphs, and its performance is contingent on the chosen
      method for path length computation, with the overall complexity dependent on both the chosen method and the structure
      of the graph.
    time_complexity: O(V * (V + E)) or O(V * (E + V log V))
  solvable_questions:
  - Calculate the average shortest path length of this weighted graph and output the value.
  - In this unweighted graph, what is the average number of edges that need to be traversed for nodes to be connected to each
    other? Please output the calculation result.
  - Adopt the average shortest path length algorithm to calculate and output the average value of the shortest path lengths
    between all node pairs in this weighted graph.
  - In this social network, what is the average number of intermediate friends that any two people need to go through to get
    to know each other?
  - In the Wikipedia page-jump network, starting from a random page, what is the average number of link clicks required to
    reach another random page?
  - In this brain neuron connection network, what is the average number of synapses that a signal needs to pass through to
    transmit from one random neuron to another?
  - In this urban subway route map, starting from a random station, what is the average number of transfers needed to reach
    another random station?
  - In this paper citation network, starting from a random paper, what is the average number of references that need to be
    traced to find the academic connection with another random paper?
- id: bellman_ford_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for bellman_ford_path
          required: true
        source:
          type: node
          description: Starting node
          required: true
        target:
          type: node
          description: Ending node
          required: true
        weight:
          type: string or function (default="weight")
          description: 'If this is a string, then edge weights will be accessed via the edge attribute with this key (that
            is, the weight of the edge joining `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute exists,
            the weight of the edge is assumed to be one. If this is a function, the weight of an edge is the value returned
            by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and
            the dictionary of edge attributes for that edge. The function must return a number.'
          default: weight
      required:
      - source
      - target
    output_schema:
      type: list
      description: List of nodes in a shortest path.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The Bellman-Ford algorithm is typically applied in networks where negative edge weights might exist,
    making it particularly useful for routing protocols in telecommunications and computer networks. A common business scenario
    includes finding the shortest paths in logistics and transportation networks where routes can have varying costs, including
    potentially negative costs due to discounts or incentives.
  Tuning_Mechanisms:
    source: Adjusting the source parameter modifies the starting point of the pathfinding algorithm, influencing the resulting
      paths since the algorithm calculates distances from this specific node. Consequently, different sources will yield different
      shortest paths.
    target: Changing the target parameter specifies the endpoint of interest in the generated path, which affects the output
      list to present the shortest path from the source to this particular target node instead of to all nodes.
  Principles:
    description: The Bellman-Ford algorithm computes shortest paths from a single source node to all other nodes in a weighted
      graph, handling potential negative weight cycles gracefully. It operates on both directed and undirected graphs and
      has a time complexity of O(V * E), where V is the number of vertices and E is the number of edges, making it suitable
      for sparse graphs.
    time_complexity: O(V * E)
  solvable_questions:
  - Please use the Bellman-Ford algorithm to find the shortest path from node A to node B in the graph, and provide the total
    weight at the same time. The graph may contain edges with negative weights.
  - Use the Bellman-Ford algorithm that supports negative weights to calculate and output the list of shortest path distances
    from node S to all other nodes in the graph.
  - In this graph with negative weights, adopt the Bellman-Ford shortest path algorithm to calculate the node sequence of
    the shortest path from node A to node Z, and output the length of the shortest path.
  - In the logistics transportation network, the transportation cost of some road sections is negative due to subsidies. Please
    find the transportation plan with the lowest total cost for delivering goods from the central warehouse to each distribution
    station, and list the minimum cost for transportation to each station.
  - In the e-commerce supply chain network, the net profit of each transaction is clear. What is the settlement path with
    the lowest net payment cost from Company A to Company B?
  - In this social opinion dissemination network, the weight of supportive relationships is positive, and the weight of opposing
    relationships is negative. How to maximize the net positive impact on user B starting from the remarks of user A?
  - In the logistics transportation network that includes rebate subsidies, what is the distribution plan with the lowest
    total cost from the central warehouse to each distributor? Please list the corresponding distribution plan and the minimum
    distribution cost for each distributor.
  - In the paper citation network, there are "positive citations" and "critical citations". From paper A to paper Z, which
    citation chain has the highest net evaluation? Please provide this path.
- id: dag_longest_path_length
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX DiGraph
          description: A directed acyclic graph (DAG)
          required: true
        weight:
          type: string, optional
