          description: 'Edges of the graph G are expected to have an attribute capacity
            that indicates how much flow the edge can support. If this attribute is
            not present, the edge is considered to have infinite capacity. Default
            value: ''capacity''.'
          default: capacity
        flow_func:
          type: function
          description: Function to perform the underlying flow computations. Default
            value :func:`edmonds_karp`. This function performs better in sparse graphs
            with right tailed degree distributions. :func:`shortest_augmenting_path`
            will perform better in denser graphs.
          default: null
    output_schema:
      type: NetworkX graph
      description: A NetworkX graph representing the Gomory-Hu tree of the input graph.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The Gomory-Hu tree algorithm is typically used in network
    flow problems to efficiently compute the minimum cut between any two nodes in
    a graph. It is particularly useful in applications involving network design, mobility
    in telecommunication networks, and clustering in social network analysis, where
    understanding the connectivity and bottlenecks between nodes is essential.
  Tuning_Mechanisms:
    capacity: Adjusting the 'capacity' parameter allows for customization of the edge
      capacity attribute used in flow calculations, which directly impacts the resulting
      minimum cuts. Setting this parameter to an edge attribute other than the default
      can help model specific network characteristics.
    flow_func: Changing the 'flow_func' parameter allows the user to select different
      algorithms for flow computation. Choosing 'shortest_augmenting_path' can enhance
      performance in denser graphs, while 'edmonds_karp' is preferred for sparse graphs,
      thus affecting the efficiency and speed of the algorithm.
  Principles:
    description: The algorithm constructs a Gomory-Hu tree, which is a compact representation
      of the minimum cut structure of the input graph. It operates on undirected graphs
      and relies on maximum flow computations to identify the minimum cuts between
      all pairs of vertices. The time complexity is O(n^2 m), where n is the number
      of nodes and m is the number of edges, making it suitable for moderate-sized
      graphs.
    time_complexity: O(V * MaxFlow)
- id: is_forest
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: The graph to test.
          required: true
    output_schema:
      type: bool
      description: A boolean that is True if `G` is a forest.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_forest algorithm is typically used in the analysis
    of undirected graphs to determine whether a given graph is a forest, which is
    a disjoint union of trees. It is particularly useful in computer science fields
    such as network design, where ensuring that a graph structure does not contain
    cycles is crucial for tree-like data organization. For example, in a network routing
    protocol, validating the forest property can help optimize resource distribution
    and prevent looping paths.
  Tuning_Mechanisms: {}
  Principles:
    description: The is_forest algorithm operates by checking if the input graph G
      is acyclic and consists of multiple disconnected components, each of which is
      a tree. The algorithm applies to undirected graphs only and uses depth-first
      search (DFS) or union-find strategies to verify the absence of cycles, leading
      to a time complexity of O(V + E), where V is the number of vertices and E is
      the number of edges.
    time_complexity: O(V + E)
- id: is_tree
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: The graph to test.
          required: true
    output_schema:
      type: bool
      description: A boolean that is True if `G` is a tree.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The 'is_tree' algorithm is typically used in graph theory
    applications where it is essential to verify if a given undirected graph is a
    tree structure. This is particularly useful in network design, where tree topologies
    are desired for efficient data routing, or in data structures like hierarchical
    classifications where tree organization is crucial. Examples include checking
    the structure of dependency trees in project management or verifying the architecture
    of network configurations.
  Tuning_Mechanisms: {}
  Principles:
    description: 'The core principle of the ''is_tree'' algorithm is based on the
      properties of trees in graph theory: a tree is an undirected graph that is connected
      and acyclic. The algorithm verifies these conditions by checking for cycles
      and ensuring all nodes are reachable from a single root node. This algorithm
      is applicable only to undirected graphs and operates in linear time complexity
      O(V + E), where V is the number of vertices and E is the number of edges.'
    time_complexity: O(V + E)
- id: maximum_spanning_tree
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: undirected graph
          description: An undirected graph. If `G` is connected, then the algorithm
            finds a spanning tree. Otherwise, a spanning forest is found.
          required: true
        weight:
          type: str
          description: Data key to use for edge weights.
          default: weight
        algorithm:
          type: string
          description: The algorithm to use when finding a maximum spanning tree.
            Valid choices are 'kruskal', 'prim', or 'boruvka'. The default is 'kruskal'.
          default: kruskal
        ignore_nan:
          type: 'bool (default: False)'
          description: If a NaN is found as an edge weight normally an exception is
            raised. If `ignore_nan is True` then that edge is ignored instead.
          default: false
    output_schema:
      type: NetworkX Graph
      description: A maximum spanning tree or forest.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The maximum spanning tree algorithm is typically applied in
    undirected graphs where the goal is to maximize the total weight of the edges
    in the spanning tree. Common applications include network design, such as maximizing
    bandwidth in telecommunications networks, or optimizing resource allocation in
    transportation systems. For example, it can be used to determine the most cost-effective
    layout for connecting cities with roads while maximizing the total capacity.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter changes which edge weights are considered
      when constructing the maximum spanning tree, enabling the algorithm to prioritize
      different resource metrics or cost structures within the graph.
    algorithm: Changing the 'algorithm' parameter allows users to select different
      methods for computing the maximum spanning tree, which can affect performance
      and efficiency depending on the graph's characteristics and edge distribution.
  Principles:
    description: This algorithm operates on undirected weighted graphs to construct
      a subgraph that connects all vertices while maximizing the total edge weight.
      It utilizes methods such as Kruskal's, Prim's, or Borůvka's algorithm to efficiently
      find the maximum spanning tree. The input requires a specific weight attribute
      for edges and can handle NaN values based on the ignore_nan parameter, impacting
      edge inclusion. The time complexity varies by algorithm, typically O(E log V)
      for Kruskal's and Prim's algorithms.
    time_complexity: O(E log V)
- id: minimum_spanning_tree
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: undirected graph
          description: An undirected graph. If `G` is connected, then the algorithm
            finds a spanning tree. Otherwise, a spanning forest is found.
          required: true
        weight:
          type: str
          description: Data key to use for edge weights.
          default: weight
        algorithm:
          type: string
          description: The algorithm to use when finding a minimum spanning tree.
            Valid choices are 'kruskal', 'prim', or 'boruvka'. The default is 'kruskal'.
          default: kruskal
        ignore_nan:
          type: 'bool (default: False)'
          description: If a NaN is found as an edge weight normally an exception is
            raised. If `ignore_nan is True` then that edge is ignored instead.
          default: false
    output_schema:
      type: NetworkX Graph
      description: A minimum spanning tree or forest.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The minimum spanning tree (MST) algorithm is commonly applied
    in network design, such as constructing efficient communication networks or minimizing
    wiring in electrical circuits. It helps solve problems where the goal is to connect
    all nodes with the least total edge weight, ensuring minimal setup costs and reduced
    material usage.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter alters which attribute of the edges is
      used to calculate the total weight of the tree, thus influencing the minimum
      spanning tree's cost and structure.
    algorithm: Changing the 'algorithm' parameter affects the method used to compute
      the minimum spanning tree. Each algorithm may perform differently based on the
      graph's structure and density, possibly leading to variations in performance
      and computational efficiency.
  Principles:
    description: The minimum spanning tree algorithms operate by iteratively selecting
      the edge with the least weight that connects disconnected components until all
      vertices are included in the tree. These algorithms can be applied to undirected
      graphs with non-negative weights and may have time complexities ranging from
      O(E log V) to O(E + V log V) depending on the chosen algorithm. Additionally,
      the algorithms gracefully handle cases with NaN weights when the `ignore_nan`
      parameter is set to True.
    time_complexity: O(E log V) (Kruskal/Prim)
- id: random_spanning_tree
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: nx.Graph
          description: An undirected version of the original graph.
          required: true
        weight:
          type: string
          description: The edge key for the edge attribute holding edge weight.
          default: null
        multiplicative:
          type: bool, default=True
          description: If `True`, the probability of each tree is the product of its
            edge weight over the sum of the product of all the spanning trees in the
            graph. If `False`, the probability is the sum of its edge weight over
            the sum of the sum of weights for all spanning trees in the graph.
          default: true
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: any
      description: nx.Graph A spanning tree using the distribution defined by the
        weight of the tree.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The random_spanning_tree algorithm is typically used in network
    design and optimization problems where a spanning tree structure is required,
    such as in telecommunications and transportation networks. It can be applied to
    find efficient routes or connections that minimize costs based on varying edge
    weights, thus enhancing overall network performance and reliability.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter influences which edge attributes are
      considered for calculating tree probabilities, thereby affecting the resulting
      tree structure based on different criteria for edge importance.
    multiplicative: The 'multiplicative' parameter adjusts how probabilities are computed
      for each tree, with 'True' yielding a product-based probability that can lead
      to different tree configurations compared to the sum-based approach when set
      to 'False', thus impacting the overall tree selection.
  Principles:
    description: The core principle of the random_spanning_tree algorithm is to generate
      a spanning tree from a given weighted graph by selecting edges probabilistically
      based on their weights. It works on undirected graphs and leverages weight attributes
      to determine the distribution of spanning trees. The algorithm's complexity
      is largely dependent on the graph size and the number of edges, typically involving
      polynomial time with respect to these parameters.
    time_complexity: Polynomial (Wilson's Algorithm)
- id: wiener_index
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for wiener_index
          required: true
        weight:
          type: 'string or None, optional (default: None)'
          description: If None, every edge has weight 1. If a string, use this edge
            attribute as the edge weight. Any edge attribute not present defaults
            to 1. The edge weights are used to computing shortest-path distances.
          default: null
    output_schema:
      type: any
      description: number The Wiener index of the graph `G`.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The Wiener index is commonly used in the study of chemical
    graphs, where the vertices represent atoms and edges represent bonds. It helps
    in characterizing the structural properties of molecules by quantifying the degree
    of connectivity between pairs of vertices, which can be essential in drug design
    and molecular studies. Additionally, it can be applied to transportation networks
    to analyze the efficiency and connectivity in road systems.
  Tuning_Mechanisms:
    weight: Adjusting this parameter influences the calculation of shortest-path distances
      by defining the weight of each edge. If set to None, each edge is treated with
      a uniform weight of 1, which may not reflect the true distances in weighted
      scenarios. Providing a string for an edge attribute allows for customized weighting,
      thus yielding a more accurate Wiener index based on real-world data or specific
      graph characteristics.
  Principles:
    description: The Wiener index is calculated as the sum of the shortest-path distances
      between all pairs of vertices in the graph. It can be applied to both undirected
      and directed graphs, depending on how edge weights are assigned. The algorithm
      has a time complexity of O(n^3) using the Floyd-Warshall algorithm for computing
      all-pairs shortest paths, which is typically feasible for small to medium-sized
      graphs.
    time_complexity: O(V * (V + E))
- id: get_node_attributes
  task_type_id: Graph Query
  Application_scenario: This algorithm is fundamental for retrieving detailed profile
    information in knowledge graphs, social networks, or product catalogs.
    For example, in a Customer 360 view, it is used to fetch specific user details
     (age, location, account status) based on their unique User ID; in an e-commerce graph,
      it retrieves product specifications given a product SKU.
  Principles:
    description: The algorithm performs a direct index lookup to retrieve the properties
     or attributes associated with a specific node identifier. It acts as a key-value
      retrieval operation within the graph database, returning the metadata stored on
       the node rather than its structural connections.

- id: k_hop_neighbors
  task_type_id: Graph Query
  Application_scenario: K-hop neighbor queries are widely used in recommendation systems,
   risk analysis, and impact assessment. For instance, in social networks, querying 2-hop
   neighbors helps suggest "Friends of Friends"; in supply chain management, it identifies
    tier-2 and tier-3 suppliers to assess indirect risks; in cybersecurity, it analyzes the
     "blast radius" of a compromised server by finding all connected devices within k steps.
  Principles:
    description: This algorithm traverses the graph starting from a seed node (or set of nodes)
     and expands outwards to find all nodes reachable within exactly 'k' steps or up to 'k' steps.
      It typically uses a Breadth-First Search (BFS) strategy to discover layers of neighbors,
       effectively retrieving the local neighborhood structure around the target node.

- id: common_neighbors
  task_type_id: Graph Query
  Application_scenario: Finding common neighbors is a key heuristic for Link Prediction and similarity
   analysis. In social media, if two users share many mutual friends, the system recommends they connect;
    in fraud detection, identifying that two seemingly unrelated accounts share the same IP address,
     device ID, or phone number (common neighbors) can indicate a sybil attack or collusion.
  Principles:
    description: The algorithm identifies the set of nodes that have a direct connection to both node A and node B.
     Mathematically, it computes the intersection of the neighbor set of node A and the neighbor set of node B.
      It is a measure of structural proximity and is often used as a building block for more complex similarity metrics
       like Jaccard Coefficient or Adamic-Adar.

- id: extract_subgraph
  task_type_id: Graph Query
  Application_scenario: Subgraph extraction is essential for focused analysis, visualization, and machine learning training
   (GNNs). Scenarios include extracting a specific community for visual inspection, isolating a transaction ring suspected
    of money laundering for manual review, or creating an Ego Graph (a node and its immediate context) to train a localized
     prediction model.
  Principles:
    description: This algorithm retrieves a subset of the original graph based on specific criteria, such
     as a list of target nodes or a specific region. It typically returns an "induced subgraph," which
      includes the selected nodes and all existing edges between them from the original graph. This
       allows for analyzing specific structural patterns without processing the entire network.

- id: get_paths_between_two_nodes
  task_type_id: Graph Query
  Application_scenario: Path queries are critical for tracing relationships, logistics, and root cause analysis.
   In a knowledge graph, it answers "How is Person A related to Company B?"; in navigation apps, it finds routes
    between locations; in network operations, it traces the physical or logical link between a user and a server
     to diagnose connectivity issues.
  Principles:
    description: The algorithm searches for sequences of edges that connect a source node to a target node.
     Depending on the specific variation, it can return all simple paths (paths with no repeated nodes),
      the shortest path (minimum hops or weight), or paths constrained by max depth. It reveals the connectivity
       and intermediate hops required to traverse from one entity to another.
