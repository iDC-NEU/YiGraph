          required: true
        s:
          type: node
          description: Source node for the flow.
          required: true
        t:
          type: node
          description: Sink node for the flow.
          required: true
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity that indicates how much flow the edge
            can support. If this attribute is not present, the edge is considered to have infinite capacity. Default value:
            ''capacity''.'
          default: capacity
        residual:
          type: NetworkX graph
          description: 'Residual network on which the algorithm is to be executed. If None, a new residual network is created.
            Default value: None.'
          default: null
        global_relabel_freq:
          type: integer, float
          description: 'Relative frequency of applying the global relabeling heuristic to speed up the algorithm. If it is
            None, the heuristic is disabled. Default value: 1.'
          default: 1
        value_only:
          type: bool
          description: 'If False, compute a maximum flow; otherwise, compute a maximum preflow which is enough for computing
            the maximum flow value. Default value: False.'
          default: false
      required:
      - s
      - t
    output_schema:
      type: NetworkX DiGraph
      description: Residual network after computing the maximum flow.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The 'preflow_push' algorithm is typically used in network flow problems, particularly in directed
    graphs where capacities are prescribed for each edge. It effectively solves the maximum flow problem, which is crucial
    in various fields such as transportation networks, telecommunications, and resource allocation in supply chains.
  Tuning_Mechanisms:
    global_relabel_freq: Adjusting this parameter can significantly speed up the algorithm by controlling how often the global
      relabeling heuristic is applied. A higher frequency may reduce the number of iterations needed to find the maximum flow,
      while a lower frequency could lead to slower convergence.
    value_only: Setting this parameter to True allows the algorithm to compute only the maximum preflow value rather than
      the complete maximum flow, which can save computational resources in scenarios where the actual flow paths are not required.
  Principles:
    description: This algorithm operates by maintaining a 'preflow' rather than a strict flow, allowing for excess flow at
      vertices other than the sink. It is designed specifically for directed graphs and performs efficiently in cases where
      the graph exhibits high levels of connectivity. The time complexity can often be improved through techniques like global
      relabeling, making it suitable for large and complex networks.
    time_complexity: O(V^2 * E) or O(V^3)
  solvable_questions:
