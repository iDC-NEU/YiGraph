  - In the social network, which users are followed by the most active users (Authority)?
  - In the webpage link network, which pages are information hubs (Hub), and which pages are most cited by high-weight pages
    (Authority)?
  - In the paper citation network, which papers cite the most high-impact papers (Hub), and which papers are cited the most
    by high-impact papers (Authority)?
  - In the system component dependency network, which components are the main callers (Hub), and which components are core
