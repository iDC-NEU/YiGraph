- id: leiden_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for leiden_communities
          required: true
        weight:
          type: string or None, optional (default="weight")
          description: The name of an edge attribute that holds the numerical value
            used as a weight. If None then each edge has weight 1.
          default: weight
        resolution:
          type: float, optional (default=1)
          description: If resolution is less than 1, the algorithm favors larger communities.
            Greater than 1 favors smaller communities.
          default: 1
        max_level:
          type: int or None, optional (default=None)
          description: The maximum number of levels (steps of the algorithm) to compute.
            Must be a positive integer or None. If None, then there is no max level
            and the algorithm will run until converged.
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: any
      description: list A list of disjoint sets (partition of `G`). Each set represents
        one community. All communities together contain all the nodes in `G`.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The leiden_communities algorithm is commonly applied in social
    networks, biological networks, and information networks to uncover community structures.
    It is particularly useful for detecting clusters of closely connected nodes, such
    as user groups in social media or functional modules in biological networks. For
    example, in a social network, this algorithm can help to identify communities
    of users who interact frequently with one another.
  Tuning_Mechanisms:
    weight: Adjusting the weight parameter allows users to specify a particular edge
      attribute for edge weights. By doing so, communities may reflect more meaningful
      relationships depending on the weights assigned, thus affecting the resulting
      community structure.
    resolution: Changing the resolution parameter alters the size of the communities
      detected. A resolution less than 1 tends to produce larger communities, while
      a resolution greater than 1 results in smaller, more granular communities, allowing
      for tailored detection of community structures based on specific needs.
  Principles:
    description: The leiden_communities algorithm operates on both directed and undirected
      graphs, using a multi-level optimization approach to partition the graph into
      communities based on edge weights. It maximizes modularity, promoting the formation
      of dense connections within communities while minimizing connections between
      them. The algorithm requires a graph as input and can run until convergence
      or a specified maximum number of levels is reached, with complexity influenced
      by the resolution parameter.
    time_complexity: O(V log V) (Empirical)
- id: louvain_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for louvain_communities
          required: true
        weight:
          type: string or None, optional (default="weight")
          description: The name of an edge attribute that holds the numerical value
            used as a weight. If None then each edge has weight 1.
          default: weight
        resolution:
          type: float, optional (default=1)
          description: If resolution is less than 1, the algorithm favors larger communities.
            Greater than 1 favors smaller communities
          default: 1
        threshold:
          type: float, optional (default=0.0000001)
          description: Modularity gain threshold for each level. If the gain of modularity
            between 2 levels of the algorithm is less than the given threshold then
            the algorithm stops and returns the resulting communities.
          default: 1.0e-07
        max_level:
          type: int or None, optional (default=None)
          description: The maximum number of levels (steps of the algorithm) to compute.
            Must be a positive integer or None. If None, then there is no max level
            and the threshold parameter determines the stopping condition.
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: any
      description: list A list of sets (partition of `G`). Each set represents one
        community and contains all the nodes that constitute it.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The Louvain algorithm is typically applied in undirected networks
    where community structure is of interest, such as social networks, biological
    networks, or transportation networks. It is especially useful for identifying
    clusters of nodes that exhibit a higher density of edges among themselves compared
    to the rest of the network. For example, in a social network, it can help identify
    groups of users with similar interests or behaviors.
  Tuning_Mechanisms:
    weight: Adjusting the weight parameter allows for the customization of edge importance,
      enabling the algorithm to favor certain connections over others based on their
      numerical weight. This can significantly alter the detected communities, especially
      in weighted networks where some edges are more significant than others.
    resolution: Changing the resolution parameter influences the size of the detected
      communities. A value less than 1 will result in larger communities, while a
      value greater than 1 leads to the discovery of smaller, more granular communities.
      This makes it possible to tailor the granularity of community detection to the
      specific needs of the analysis.
  Principles:
    description: The Louvain algorithm works by optimizing modularity, which measures
      the strength of division of a network into communities. It operates on undirected
      graphs and employs a multi-level approach, combining local optimizations into
      a global structure. The complexity is primarily O(n log n) for n nodes, making
      it suitable for large networks. The algorithm requires edge weights if provided;
      otherwise, it assumes unit weights.
    time_complexity: O(V log V) (Empirical)
- id: modularity
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX Graph
          description: Parameter 'G' for modularity
          required: true
        communities:
          type: list or iterable of set of nodes
          description: These node sets must represent a partition of G's nodes.
          required: true
        weight:
          type: string or None, optional (default="weight")
          description: The edge attribute that holds the numerical value used as a
            weight. If None or an edge does not have that attribute, then that edge
            has weight 1.
          default: weight
        resolution:
          type: float (default=1)
          description: If resolution is less than 1, modularity favors larger communities.
            Greater than 1 favors smaller communities.
          default: 1
      required:
      - communities
    output_schema:
      type: float
      description: The modularity of the partition.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The modularity algorithm is commonly employed in the analysis
    of complex networks to detect community structures, which are groups of nodes
    with dense interconnections. This algorithm is particularly useful in social networks,
    biological networks, and information networks where understanding the grouping
    of entities is crucial for insights into the system's functionality and dynamics.
  Tuning_Mechanisms:
    weight: Adjusting the weight parameter influences the sensitivity of the modularity
      calculation to edge weights, allowing the algorithm to consider varying importance
      of edges. Setting this parameter to None treats all edges equally, while specifying
      a weight enables the algorithm to derive a more nuanced understanding of community
      structure based on edge significance.
    resolution: Modifying the resolution parameter impacts the granularity of the
      detected communities. A resolution less than 1 encourages the discovery of larger
      communities, which may unveil broader structural patterns, while a resolution
      greater than 1 favors smaller, more detailed communities that can reveal fine-grained
      interactions.
  Principles:
    description: The modularity algorithm calculates the quality of a given partition
      of a network by comparing the number of edges within communities to the expected
      number of edges if the edges were distributed randomly. It is applicable to
      both undirected and directed graphs, and it operates efficiently in terms of
      time complexity, particularly for sparse networks. The input partitions must
      represent a proper division of the nodes, maintaining exclusive membership without
      overlaps.
    time_complexity: O(V + E)
- id: partition_quality
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
