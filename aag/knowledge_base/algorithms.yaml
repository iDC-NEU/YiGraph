  solvable_questions:
  - Determine whether this directed graph is weakly connected; output True/False.
  - Check the result of is_weakly_connected and return a boolean.
  - Ignore edge directions and test connectivity.
  - In the email-sending network, ignoring direction, does the organization form one connected communication network?
  - In the follow network, ignoring direction, are users all connected as one network?
  - In the page-navigation graph, treating links as undirected, do all pages still belong to a single whole?
  - In the supply-flow graph, if directions are ignored, is the system still one connected network?
  - In the service-call relations, ignoring direction, do all services belong to one connected domain?
- id: johnson
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for johnson
          required: true
        weight:
          type: string or function
          description: 'If this is a string, then edge weights will be accessed via the edge attribute with this key (that
            is, the weight of the edge joining `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute exists,
            the weight of the edge is assumed to be one. If this is a function, the weight of an edge is the value returned
            by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and
            the dictionary of edge attributes for that edge. The function must return a number.'
          default: weight
    output_schema:
      type: dictionary
      description: Dictionary, keyed by source and target, of shortest paths.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: Johnson's algorithm is typically used in sparse graphs where it is essential to find the shortest
    paths between all pairs of nodes. This is particularly useful in transportation networks, such as road maps or flight
    connections, where the costs (weights) can vary dynamically, requiring efficient route planning and optimization.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows users to specify how edge weights are retrieved, either via a specific
      edge attribute or through a custom function. This affects how the algorithm calculates the shortest paths, particularly
      when weights need to represent distances, costs, or other measures specific to the application domain. Using a function
      can also enable more complex calculations based on dynamic conditions.
  Principles:
    description: The core principle of Johnson's algorithm is to apply the Bellman-Ford and Dijkstra algorithms in conjunction
      to find the shortest paths in a graph with arbitrary edge weights. It is designed to work with directed graphs and can
      handle negative weights as long as there are no negative weight cycles. The time complexity is O(V^2 log V + VE), where
      V is the number of vertices and E is the number of edges, making it efficient for sparse graphs.
    time_complexity: O(V * E + V^2 log V)
  solvable_questions:
  - Please use the Johnson's algorithm to calculate the shortest path lengths between all pairs of nodes in this sparse graph
    and output the distance matrix.
  - For this sparse weighted graph, run the Johnson's algorithm to generate a dictionary of the shortest distances between
    all pairs of nodes.
  - Use the Johnson's algorithm to compute the shortest path sequences between all pairs of nodes in the graph and output
    them in tabular form.
  - In the hyperlink topology of a large-scale website (with a large number of pages but limited mutual links), each link
    has an estimated jump time cost. Please calculate the fastest reachable time between any two pages and provide a time
    matrix.
  - In this financial transaction network, there is a large number of users but limited mutual transactions. Each edge is
    weighted by transaction fees or exchange rate losses. Please use the Johnson's algorithm to calculate the minimum cumulative
    cost transaction path between all pairs of accounts and output a complete cost matrix.
  - In this freight transportation road network, each route has a transportation cost, and some routes are subsidized. Please
    calculate the minimum comprehensive cost between any two freight hubs and output a cost matrix.
  - In this sparse knowledge graph concept association network, we hope to find out the minimum number of reasoning steps
    required to establish a connection between any two concepts. Please calculate and output a matrix containing the shortest
    association path lengths between all pairs of concepts.
  - In this social network, edge weights represent intimacy (negative weights may arise from blocking or blacklisting). Please
    use the Johnson's algorithm to calculate the predictable intimacy relationship between any two users (i.e., weighted path
    summation) and provide a result matrix.
- id: min_edge_cover
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected bipartite graph.
          required: true
        matching_algorithm:
          type: function
          description: A function that returns a maximum cardinality matching in a given bipartite graph. The function must
            take one input, the graph ``G``, and return a dictionary mapping each node to its mate. If not specified, :func:`~networkx.algorithms.bipartite.matching.hopcroft_karp_matching`
            will be used. Other possibilities include :func:`~networkx.algorithms.bipartite.matching.eppstein_matching`,
          default: null
    output_schema:
      type: any
      description: set A set of the edges in a minimum edge cover of the graph, given as pairs of nodes. It contains both
        the edges `(u, v)` and `(v, u)` for given nodes `u` and `v` among the edges of minimum edge cover.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The min_edge_cover algorithm is typically used in bipartite graphs, where it helps solve problems
    related to resource allocation and matching in various industries. For example, it can be applied in job assignment scenarios
    where jobs (one set of nodes) need to be matched to workers (another set of nodes) ensuring that every job is covered
    by at least one worker, optimizing utilization of resources.
  Tuning_Mechanisms:
    matching_algorithm: Adjusting this parameter allows users to select different algorithms for obtaining the maximum matching,
      which can influence the efficiency and performance of the overall algorithm. For instance, using a faster algorithm
      may reduce runtime significantly but could affect the quality of the matching in specific graph structures.
  Principles:
    description: This algorithm operates based on the concept of maximum matching in bipartite graphs. It constructs a minimum
      edge cover by utilizing the properties of matchings; specifically, it derives the minimum edge cover from the maximum
      matching obtained through the provided matching algorithm. It is suitable for undirected bipartite graphs and generally
      operates with a time complexity of O(E √V) for the Hopcroft-Karp algorithm used as the default matching approach.
    time_complexity: Depends on matching complexity
  solvable_questions:
  - Compute a minimum edge cover of the graph and output the smallest set of edges that covers all vertices.
  - Run the minimum edge cover algorithm and return the number of edges along with the specific connections.
  - In a social network, how can we select as few social relationships as possible such that every user participates in at
    least one relationship?
  - In a paper network, how can we use the minimum number of paper associations to cover all papers, ensuring that each paper
    appears in at least one association?
  - In a transaction network, how can we select the minimum number of transaction records such that all accounts participate
    in at least one transaction?
