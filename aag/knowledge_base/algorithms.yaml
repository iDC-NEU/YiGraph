  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the out-degree centrality algorithm is to calculate the number of outgoing edges for
      each node in a directed graph, thus identifying nodes that have a greater ability to influence others. It operates on
      directed graphs and has a time complexity of O(N + E), where N is the number of nodes and E is the number of edges,
      and a space complexity of O(N). This algorithm does not require any specific input constraints beyond a valid directed
      graph.
    time_complexity: O(V + E)
  solvable_questions:
  - Compute the out-degree centrality of each node in the current directed graph and output the Top-20 nodes with the highest
    out-degree centrality.
  - Output the out-degree centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by out-degree centrality in the current graph.
  - In the current webpage link network, which pages directly point to the most other pages?
  - In the social follower network, which accounts actively follow the largest number of other accounts?
  - In the paper citation network, which papers directly cite the most other papers?
  - In the transaction transfer network, which accounts have initiated transfers to the largest number of different accounts?
  - In the system call dependency network, which services or modules directly call the most other modules?
- id: subgraph_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for subgraph_centrality
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with subgraph centrality as the value.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: Subgraph centrality is typically used in social networks and biological networks, where the importance
    of nodes is evaluated based on their connectivity within subgraphs. It helps identify influential nodes that contribute
    significantly to the structure and function of the network. For example, in a social media platform, subgraph centrality
    can be used to find key users who can spread information effectively.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of subgraph centrality is to measure the influence of nodes based on the number and quality
      of their connections within all possible subgraphs. It works by counting the contribution of each node in all induced
      subgraphs of the original graph. This algorithm can be applied to both directed and undirected graphs, with a time complexity
      that depends on the graph's structure but may become computationally intensive for large networks due to the need to
      consider many subgraphs.
    time_complexity: O(V^3) (Spectrum based)
  solvable_questions:
  - Compute the subgraph centrality of each node in the current graph and output the Top-20 nodes with the highest subgraph
    centrality.
  - Output the subgraph centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by subgraph centrality in the current graph.
  - In the social network, which users participate in the most tightly-knit small groups?
  - In the communication network, which nodes are part of the most local communication clusters?
  - In the webpage link network, which pages belong to the most interconnected small page clusters?
  - In the paper collaboration network, which authors participate in the most collaboration groups or paper sets?
  - In the system component dependency network, which components are part of the most local dependency substructures?
- id: find_cliques
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected graph.
          required: true
        nodes:
          type: list, optional (default=None)
          description: If provided, only yield *maximal cliques* containing all nodes in `nodes`. If `nodes` isn't a clique
            itself, a ValueError is raised.
          default: null
    output_schema:
      type: any
      description: iterator An iterator over maximal cliques, each of which is a list of nodes in `G`. If `nodes` is provided,
        only the maximal cliques containing all the nodes in `nodes` are returned. The order of cliques is arbitrary.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The find_cliques algorithm is commonly used in social network analysis to identify groups of individuals
    that are all directly connected to one another. This is particularly useful in understanding community structures and
    relationships within networks, such as finding tightly-knit groups in online platforms or identifying potential collaboration
    nodes in a professional setting.
  Tuning_Mechanisms:
    nodes: Providing a list of nodes can significantly narrow down the search space, allowing the algorithm to focus solely
      on maximal cliques that include all specified nodes. If the provided nodes do not form a clique themselves, the algorithm
      will raise a ValueError, ensuring that only valid inputs are processed.
  Principles:
    description: The core principle of the find_cliques algorithm is to exhaustively search for all maximal cliques within
      an undirected graph. It operates by exploring the graph's connections and systematically identifying sets of nodes that
      are fully interconnected. This algorithm is designed specifically for undirected graphs, and its time complexity can
      be exponential in the worst case, making it suitable for small to medium-sized graphs only.
    time_complexity: O(3^(V/3)) (Worst case exponential)
  solvable_questions:
  - Find all maximal cliques in the graph and output the node list for each clique.
  - Count and list all maximal cliques that contain Node A.
  - Iterate through all cliques in the graph and output those with more than 5 members.
  - In social circle analysis, identify all tight-knit groups where everyone knows everyone else.
  - For a protein interaction network, identify all possible protein complexes (fully connected subgraphs).
  - In fraud investigations, find all potential gangs where members are fully interconnected and list them.
  - Identify all tightly coupled academic factions (mutual citations) in a citation network.
  - In product affinity analysis, find all combinations where every product is pairwise correlated with every other product.
  - List all fully meshed sub-network structures within the communication grid.
- id: k_clique_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for k_clique_communities
          required: true
        k:
          type: int
          description: Size of smallest clique
          required: true
        cliques:
          type: list or generator
          description: Precomputed cliques (use networkx.find_cliques(G))
          default: null
      required:
      - k
    output_schema:
      type: any
      description: Yields sets of nodes, one for each k-clique community.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The k_clique_communities algorithm is particularly useful in social network analysis, biological networks,
    and any context where community detection is vital. It identifies tightly knit groups of nodes based on the presence of
    cliques, aiding in the understanding of network structure and the function of interconnected entities. For instance, in
    social media networks, it can help identify groups of users who frequently interact with one another, thereby revealing
    potential interest groups or communities.
  Tuning_Mechanisms:
    k: Adjusting the parameter k modifies the minimum size of cliques that the algorithm considers when forming communities.
      A smaller k may yield larger communities with less structural cohesion, while a larger k can lead to more tightly-knit,
      smaller communities, offering insights into the density of connections within the network.
    cliques: The cliques parameter should contain a comprehensively precomputed list of cliques from the graph. Providing
      a more extensive set of cliques can enhance the algorithm's ability to detect communities, while a limited set might
      overlook significant overlapping structures.
  Principles:
    description: The core principle of the k_clique_communities algorithm is to leverage precomputed cliques in the graph
      to identify larger communities that contain at least one k-clique. The algorithm assumes the input graph can be either
      directed or undirected and processes the list of cliques to uncover overlapping communities. Due to the reliance on
      cliques, the algorithm's performance depends on the computational efficiency of the clique-finding step, with a typical
      time complexity influenced by the size and structure of the graph.
    time_complexity: Exponential (Clique finding)
  solvable_questions:
  - Find all k-clique communities in the graph (set k=3).
  - Use the percolation method to detect overlapping communities and output the list of communities composed of k-cliques.
  - Identify overlapping community structures in the graph based on k-clique adjacency.
  - Find large societies in the network that are structurally very solid, formed by the fusion of multiple fully connected
    small circles.
  - Allowing a person to belong to multiple circles, please identify those overlapping tight groups in the social network.
  - In research collaboration, find academic communities formed by multiple tight cooperation groups sharing members.
  - Identify core communities where internal connections are extremely tight, and almost everyone knows everyone else.
  - Search for groups in the network formed by multiple solid "iron triangle" structures buckled together like a chain.
- id: max_weight_clique
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        weight:
          type: string or None, optional (default='weight')
          description: The node attribute that holds the integer value used as a weight. If None, then each node has weight
            1.
          default: weight
    output_schema:
      type: list
      description: 'the nodes of a maximum weight clique weight : int the weight of a maximum weight clique'
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The max_weight_clique algorithm is typically applied in social networks, bioinformatics, and resource
    allocation problems, where identifying a group of highly interconnected nodes with maximum weights is essential. For example,
    it can be used to find the most influential individuals in a social network or to identify subsets of genes that are co-expressed
    in a biological study.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows users to specify which node attribute is considered for calculating weights
      in the clique. If set to None, all nodes are treated equally with a default weight of 1, which may impact the identification
      of high-value cliques when certain nodes have significantly different weights.
  Principles:
    description: This algorithm operates by identifying subsets of nodes in an undirected graph that form cliques (fully connected
      subgraphs) while maximizing the total weight of the nodes in the clique. It specifically requires undirected graphs
      and can work with both weighted and unweighted nodes based on the weight parameter. The algorithm's complexity may vary
      based on the size of the graph, typically leading to NP-hard problems as the size increases.
    time_complexity: Exponential
  solvable_questions:
  - In a weighted graph, find the clique with the maximum sum of node weights and output the total weight.
  - Calculate the fully connected subgraph with the highest weight and list all its edges and weights.
  - Output the Top-10 cliques with the highest weights based on node profit values.
  - When forming a project team, how to select a group where everyone is compatible (fully connected) and the total skill
    score is maximized?
  - In portfolio analysis, find a group of pairwise highly correlated stocks such that their total market cap is maximized.
  - For a weighted social network (weights = intimacy), find the "inner circle" with the highest total intimacy score.
  - In bioinformatics, identify a gene module where genes are fully co-expressed and the total expression significance is
    maximized.
  - Plan a set of interconnected logistics nodes such that the sum of their throughput ratings is maximized.
  - In ad targeting, select a set of channels with fully overlapping audiences that yields the highest combined conversion
    value score.
- id: average_clustering
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for average_clustering
          required: true
        nodes:
          type: container of nodes, optional (default=all nodes in G)
          description: Compute average clustering for nodes in this container.
          default: null
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a weight. If None, then each edge has weight
            1.
          default: null
        count_zeros:
          type: bool
          description: If False include only the nodes with nonzero clustering in the average.
          default: true
    output_schema:
      type: float
      description: Average clustering
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The average_clustering algorithm is typically used in social network analysis, where it helps measure
    the degree to which nodes tend to cluster together. This is particularly useful in understanding community structures
    and reinforcing the relationships within a network. For instance, in a recommendation system, it can identify tightly-knit
    groups of users with similar interests.
  Tuning_Mechanisms:
    nodes: Adjusting the nodes parameter allows for the analysis of clustering coefficients on a specific subset of nodes
      rather than the entire graph, providing a more focused understanding of particular areas within the network.
    weight: By setting the weight parameter, you can influence the clustering computation based on the importance or strength
      of connections between nodes. This helps in scenarios where edge weights represent varying degrees of relationships,
      affecting the resultant average clustering value.
  Principles:
    description: The average_clustering algorithm computes the average clustering coefficient for specified nodes in a graph,
      which is a measure of the likelihood that two neighbors of a node are also neighbors of each other. It works on both
      directed and undirected graphs, and considers edge weights if specified. This algorithm has a time complexity of O(n
      + m), where n is the number of nodes and m is the number of edges.
    time_complexity: O(V * d^2)
  solvable_questions:
  - Calculate the average clustering coefficient of the current graph.
  - Provide the global average clustering coefficient value for the entire network.
  - Evaluate the average clustering degree of the graph and return a floating-point number between 0 and 1.
  - From an overall perspective, how tight is this social network?
  - Evaluate the average level of local connectivity in the current power grid structure.
  - Does this research collaboration network tend to form tight small circles or are the connections relatively loose?
  - Calculate the average probability that users in the entire network form tight relationships.
  - When comparing communication networks in two different regions, calculate which network has a more obvious tendency for
    local clustering.
- id: clustering
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for clustering
          required: true
        nodes:
          type: node, iterable of nodes, or None (default=None)
          description: If a singleton node, return the number of triangles for that node. If an iterable, compute the number
            of triangles for each of those nodes. If `None` (the default) compute the number of triangles for all nodes in
            `G`.
          default: null
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a weight. If None, then each edge has weight
            1.
          default: null
    output_schema:
      type: float, or dictionary
      description: Clustering coefficient at specified nodes
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The clustering algorithm is typically used in social network analysis to identify community structures
    and measure the tendency of nodes to cluster together. It helps in understanding the cohesiveness of the network, such
    as finding tightly-knit groups in social platforms or identifying potential redundancies in communication networks.
  Tuning_Mechanisms:
    nodes: Adjusting this parameter allows the user to focus on specific nodes in the graph. If a single node is specified,
      the algorithm will return the clustering coefficient for that particular node, while if an iterable is provided, it
      computes the clustering coefficients for each node in the iterable. If left as None, the clustering coefficients for
      all nodes in the graph will be calculated.
    weight: Modifying the weight parameter affects how edge weights contribute to the clustering coefficient. If set to a
      specific edge attribute, the algorithm computes the clustering based on those weights, allowing for an analysis of the
      clustering tendency of nodes considering the importance or strength of connections, thereby providing a more nuanced
      understanding of network structure.
  Principles:
    description: The clustering algorithm computes the clustering coefficient, which quantifies the degree to which nodes
      in a graph tend to cluster together. It is applicable to both directed and undirected graphs and operates by calculating
      the number of triangles (three-node complete subgraphs) associated with specified nodes. The time complexity is O(N
      + E) where N is the number of nodes and E is the number of edges, making it efficient for large networks.
    time_complexity: O(V * d^2) where d is average degree
  solvable_questions:
  - Calculate the clustering coefficient for each node in the graph and list the top 20 nodes with the highest values.
  - Output a table of clustering coefficients for all nodes in the graph, sorted in descending order.
  - List all nodes in the graph that have a clustering coefficient of 1.0 (completely closed).
  - In a social network, whose friend circles are the tightest?
  - In a protein interaction network, identify which proteins form locally dense connection structures.
  - In telecommunication records, which users' contact circles constitute a closed small group?
  - In anti-fraud analysis, which accounts are located at the center of highly interconnected dense gangs?
  - Identify which nodes in the network have the tightest connections among their neighbors.
- id: square_clustering
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for square_clustering
          required: true
        nodes:
          type: container of nodes, optional (default=all nodes in G)
          description: Compute clustering for nodes in this container.
          default: null
    output_schema:
      type: dictionary
      description: A dictionary keyed by node with the square clustering coefficient value.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The square clustering coefficient algorithm is typically used in social network analysis, biological
    networks, and information networks where the interconnectedness of nodes is crucial. It addresses problems related to
    node clustering tendencies, helping to identify how tightly-knit groups or communities are within the network. For example,
    in social media, this can reveal influential users who are connected through many mutual friends.
  Tuning_Mechanisms:
    nodes: Adjusting the 'nodes' parameter allows users to specify a subset of nodes for which the square clustering coefficient
      is computed, impacting the resulting output dictionary to only include values for these specified nodes. This can enhance
      performance and focus analyses on particular areas of interest within larger networks.
  Principles:
    description: This algorithm calculates the square clustering coefficient for each node in a graph, which measures the
      likelihood that two neighbors of a node are connected to each other, thus providing insight into local network structure.
      It works on both directed and undirected graphs and does not have strict input constraints beyond the requirement of
      a valid NetworkX graph. The time complexity is linear with respect to the number of edges and nodes in the graph, ensuring
      efficient computation.
    time_complexity: O(V * d^2)
  solvable_questions:
  - Calculate the Square Clustering Coefficient for each node in the graph.
  - Output the list of Top-20 nodes with the highest square clustering coefficients.
  - Provide a distribution table of square clustering coefficients for all nodes.
  - In this bipartite graph, which users are most inclined to form a quadrilateral relationship of "buying the same two items"
    with other users?
  - In a social network, identify which people are most often in a four-person ring structure of "knowing the same person
    through two different mutual friends."
  - 'Evaluate the power grid structure: which nodes participate most frequently in redundant structures of four-node loops?'
  - In a corporate interlocking directorate network, which companies are in the most dense four-way interlocking relationships?
  - Find the nodes involved in the most dense "4-cycle" structures in the network.
- id: transitivity
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for transitivity
          required: true
    output_schema:
      type: float
      description: Transitivity
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The transitivity algorithm is often used in social network analysis to evaluate the degree of clustering
    in a graph. It is particularly relevant in undirected networks where relationships among nodes can be represented as triangles,
    helping to identify tightly knit groups. For instance, in a recommendation system, transitivity can assist in identifying
    communities with strong interconnections among users.
  Tuning_Mechanisms: {}
  Principles:
    description: The transitivity algorithm measures the extent to which pairs of vertices in a graph tend to cluster together.
      It calculates the ratio of the number of closed triplets (triangles) to the number of all possible triplets in the graph.
      This algorithm is designed for undirected graphs and operates with a time complexity of O(n^3) in the worst case, making
      it effective for analyzing small to medium-sized networks.
    time_complexity: O(V * d^2)
  solvable_questions:
  - Calculate the global Transitivity coefficient of the entire graph.
  - Give a value between 0 and 1 representing the overall transitivity degree of the graph.
  - Output the global average probability that the rule "If A-B and B-C, then A-C" holds true in this network.
  - From a network-wide perspective, does this social circle tend to follow "a friend of a friend is a friend"?
  - In the entire product association network, what is the overall possibility that a user will buy item C related to both
    A and B, after purchasing A and B?
  - Evaluate the overall ratio of forming closed propagation loops in this epidemic spreading network.
  - 'Without focusing on specific nodes, tell me with a single value: is the overall clustering tendency of this network closer
    to a random network or a small-world network?'
  - In the citation network of this field, what is the network-wide prevalence of citation relationships forming a closed
    loop?
- id: triangles
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph
          required: true
        nodes:
          type: node, iterable of nodes, or None (default=None)
          description: If a singleton node, return the number of triangles for that node. If an iterable, compute the number
            of triangles for each of those nodes. If `None` (the default) compute the number of triangles for all nodes in
            `G`.
          default: null
    output_schema:
      type: dict or int
      description: If `nodes` is a container of nodes, returns number of triangles keyed by node (dict). If `nodes` is a specific
        node, returns number of triangles for the node (int).
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The triangles algorithm is commonly used in social network analysis to identify tightly knit groups
    of nodes, such as friends in a social media platform or collaborators in a research network. It helps in understanding
    the structure and connectivity of the network by revealing the presence of interconnected triplets. This algorithm can
    also be applicable in recommendation systems, where the existence of triangles may indicate stronger relational ties that
    can enhance the quality of suggestions.
  Tuning_Mechanisms:
    nodes: Adjusting the 'nodes' parameter allows the user to specify which nodes they are interested in assessing for triangle
      counts. If an iterable is provided, the algorithm will compute triangles for each node, potentially leading to a more
      computationally intensive operation if many nodes are specified. If set to None, the algorithm computes triangles for
      all nodes, simplifying the user request but possibly resulting in excessive computation for large graphs.
  Principles:
    description: The triangles algorithm operates on both directed and undirected graphs to count the number of triangles
      (i.e., sets of three interconnected nodes). It does this by examining the adjacency relationships between nodes and
      checking for the presence of complete subgraphs of three nodes. The input can be either a single node, an iterable of
      nodes, or None, with the algorithm returning a dictionary of triangle counts per node or a single integer count for
      a specific node. The time complexity is generally O(n^3) due to the need to evaluate connections among triplets, making
      it more suitable for relatively small graphs.
    time_complexity: O(V * d^2) or O(E^1.5)
  solvable_questions:
  - Count the specific number of triangle structures each node in the graph participates in, and output the Top-20 nodes.
  - Calculate the number (Count) of triangles belonging to a specific node.
  - Traverse the entire graph and output a list of triangle counts for all nodes.
  - Who are the "connectors" in the social circle? Please find the list of users who participate in the most "three-person
    mutual following groups."
  - In transaction records, count the specific number of times each account is involved in a "A transfers to B, B to C, C
    back to A" triangular cyclic transaction.
  - Which employees appear most frequently in various tight three-person cooperation groups?
  - In the power grid topology, count the number of minimum triangular loops formed by each substation connection.
  - Find the core concept entities in the knowledge base that are included in the most ternary association closed loops.
- id: greedy_color
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for greedy_color
          required: true
        strategy:
          type: string or function(G, colors)
          description: A function (or a string representing a function) that provides the coloring strategy, by returning
            nodes in the ordering they should be colored. ``G`` is the graph, and ``colors`` is a dictionary of the currently
            assigned colors, keyed by nodes. The function must return an iterable over all the nodes in ``G``. If the strategy
            function is an iterator generator (that is, a function with ``yield`` statements), keep in mind that the ``colors``
            dictionary will be updated after each ``yield``, since this function chooses colors greedily. If ``strategy``
            is a string, it must be one of the following, each of which represents one of the built-in strategy functions.
            * ``'largest_first'`` * ``'random_sequential'`` * ``'smallest_last'`` * ``'independent_set'`` * ``'connected_sequential_bfs'``
            * ``'connected_sequential_dfs'`` * ``'connected_sequential'`` (alias for the previous strategy) * ``'saturation_largest_first'``
            * ``'DSATUR'`` (alias for the previous strategy)
          default: largest_first
        interchange:
          type: bool
          description: Will use the color interchange algorithm described by [3]_ if set to ``True``. Note that ``saturation_largest_first``
            and ``independent_set`` do not work with interchange. Furthermore, if you use interchange with your own strategy
            function, you cannot rely on the values in the ``colors`` argument.
          default: false
    output_schema:
      type: any
      description: A dictionary with keys representing nodes and values representing corresponding coloring.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The greedy_color algorithm is typically used in graph coloring problems, which arise in scheduling,
    resource allocation, and register allocation in compiler design. For instance, it can be applied to assign frequencies
    to radio towers in a telecommunications network to avoid interference, or to schedule exams for students while ensuring
    that no two students with overlapping subjects are assigned the same time slot.
  Tuning_Mechanisms:
    strategy: Adjusting the 'strategy' parameter allows for the customization of the node ordering, which can significantly
      impact the efficiency and quality of the coloring. Different strategies may lead to varying results in terms of the
      number of colors used and performance.
    interchange: Setting the 'interchange' parameter to True activates a color interchange phase that aims to optimize the
      initial coloring by reducing the total number of colors used. This can lead to better coloring solutions but is not
      compatible with all strategies, which may hinder its effectiveness.
  Principles:
    description: The greedy_color algorithm employs a strategy of color assignment based on a specified ordering of nodes,
      coloring them iteratively while respecting the constraints of adjacent nodes receiving different colors. It works on
      both directed and undirected graphs, with time complexity primarily influenced by the node ordering strategy chosen,
      and it can be efficient for sparse graphs. However, certain strategies may impose specific restrictions on the use of
      additional features like color interchange.
    time_complexity: O(V + E)
  solvable_questions:
  - Apply the greedy graph colouring algorithm to the graph and output the colour index assigned to each node.
  - Run the greedy colouring algorithm and return the total number of colours used along with the colour index of each node.
  - In a social relationship network, how can users be grouped such that users with direct relationships are not assigned
    to the same group?
  - In a paper citation network, how can papers be grouped so that related papers do not belong to the same group?
  - In a transaction network, how can accounts be grouped so that accounts with direct transaction relationships are not placed
    in the same group?
- id: greedy_modularity_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for greedy_modularity_communities
          required: true
        weight:
          type: string or None, optional (default=None)
          description: The name of an edge attribute that holds the numerical value used as a weight.  If None, then each
            edge has weight 1. The degree is the sum of the edge weights adjacent to the node.
          default: null
        resolution:
          type: float, optional (default=1)
          description: If resolution is less than 1, modularity favors larger communities. Greater than 1 favors smaller communities.
          default: 1
        cutoff:
          type: int, optional (default=1)
          description: A minimum number of communities below which the merging process stops. The process stops at this number
            of communities even if modularity is not maximized. The goal is to let the user stop the process early. The process
            stops before the cutoff if it finds a maximum of modularity.
          default: 1
        best_n:
          type: int or None, optional (default=None)
          description: A maximum number of communities above which the merging process will not stop. This forces community
            merging to continue after modularity starts to decrease until `best_n` communities remain. If ``None``, don't
            force it to continue beyond a maximum.
