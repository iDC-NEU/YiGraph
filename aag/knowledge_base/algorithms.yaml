- id: random_spanning_tree
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: nx.Graph
          description: An undirected version of the original graph.
          required: true
        weight:
          type: string
          description: The edge key for the edge attribute holding edge weight.
          default: null
        multiplicative:
          type: bool, default=True
          description: If `True`, the probability of each tree is the product of its edge weight over the sum of the product
            of all the spanning trees in the graph. If `False`, the probability is the sum of its edge weight over the sum
            of the sum of weights for all spanning trees in the graph.
          default: true
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: any
      description: nx.Graph A spanning tree using the distribution defined by the weight of the tree.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The random_spanning_tree algorithm is typically used in network design and optimization problems where
    a spanning tree structure is required, such as in telecommunications and transportation networks. It can be applied to
    find efficient routes or connections that minimize costs based on varying edge weights, thus enhancing overall network
    performance and reliability.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter influences which edge attributes are considered for calculating tree probabilities,
      thereby affecting the resulting tree structure based on different criteria for edge importance.
    multiplicative: The 'multiplicative' parameter adjusts how probabilities are computed for each tree, with 'True' yielding
      a product-based probability that can lead to different tree configurations compared to the sum-based approach when set
      to 'False', thus impacting the overall tree selection.
  Principles:
    description: The core principle of the random_spanning_tree algorithm is to generate a spanning tree from a given weighted
      graph by selecting edges probabilistically based on their weights. It works on undirected graphs and leverages weight
      attributes to determine the distribution of spanning trees. The algorithm's complexity is largely dependent on the graph
      size and the number of edges, typically involving polynomial time with respect to these parameters.
    time_complexity: Polynomial (Wilson's Algorithm)
  solvable_questions:
  - Randomly generate a spanning tree from the given graph and output all edges and corresponding nodes of that tree.
  - Use random walk or related algorithms to generate 5 different random spanning trees and provide the edge list for each
    set.
  - Randomly sample a spanning tree of the graph and output all connection relationships sorted by Node ID in ascending order.
  - In maze game design, please randomly generate a layout path that connects all rooms without any cycles.
  - For distributed network stress testing, randomly extract a temporary backbone structure covering the entire network from
    the existing topology.
  - In sampling survey tasks, how can we randomly generate a cycle-free scheme that connects all sampling points within the
    current geographic grid?
  - In game map natural landscape generation, randomly create a set of non-fixed routes connecting all key landmarks.
  - To prevent traffic monitoring from identifying fixed patterns, provide a randomly generated alternative network architecture
    connecting all branch nodes.
  - In infrastructure resilience simulation, randomly generate a set of backup link combinations connecting the entire network
    and output the Top-K critical segments.
