          description: Starting node for path. If not specified, compute shortest
            paths for each possible starting node.
          default: null
        target:
          type: node, optional
          description: Ending node for path. If not specified, compute shortest paths
            to all possible nodes.
          default: null
        weight:
          type: None, string or function, optional (default = None)
          description: 'If None, every edge has weight/distance/cost 1. If a string,
            use this edge attribute as the edge weight. Any edge attribute not present
            defaults to 1. If this is a function, the weight of an edge is the value
            returned by the function. The function must accept exactly three positional
            arguments: the two endpoints of an edge and the dictionary of edge attributes
            for that edge. The function must return a number.'
          default: null
        method:
          type: string, optional (default = 'dijkstra')
          description: 'The algorithm to use to compute the path. Supported options:
            ''dijkstra'', ''bellman-ford''. Other inputs produce a ValueError. If
            `weight` is None, unweighted graph methods are used, and this suggestion
            is ignored.'
          default: dijkstra
    output_schema:
      type: any
      description: 'path: list or dictionary or iterator All returned paths include
        both the source and target in the path. If the source and target are both
        specified, return a single list of nodes in a shortest path from the source
        to the target. If only the source is specified, return a dictionary keyed
        by targets with a list of nodes in a shortest path from the source to one
        of the targets. If only the target is specified, return a dictionary keyed
        by sources with a list of nodes in a shortest path from one of the sources
        to the target. If neither the source nor target are specified, return an iterator
        over (source, dictionary) where dictionary is keyed by target to list of nodes
        in a shortest path from the source to the target.'
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The shortest_path algorithm is typically applied in various
    types of networks, including transportation networks, communication networks,
    and social graphs, to determine the most efficient route between nodes. It is
    particularly useful for scenarios such as GPS navigation, where users seek the
    quickest driving route from one location to another, or for network routing in
    telecommunications that minimizes latency and cost.
  Tuning_Mechanisms:
    source: Specifying the source node directs the algorithm to compute the shortest
      path(s) starting from that node, producing either a single path to a specified
      target or a dictionary of paths to all reachable nodes. Adjusting this parameter
      reduces computational overhead compared to calculating paths from multiple starting
      points.
    target: Defining the target node allows the algorithm to focus on finding the
      shortest path to that specific node, streamlining the output to a single path
      or the paths from multiple sources. This can significantly enhance performance
      when the user's interest lies in a specific destination.
  Principles:
    description: The algorithm operates by calculating the minimum-weight path between
      nodes within a graph, utilizing techniques such as Dijkstra's or Bellman-Ford
      methods for finding shortest paths. It is applicable to both directed and undirected
      graphs, and if no weights are specified, it treats all edges as having a uniform
      weight of 1. The computational complexity varies based on the chosen method,
      typically O(V^2) for Dijkstra with a simple implementation and O(E + V log V)
      when using priority queues, where V is the number of vertices and E is the number
      of edges.
    time_complexity: O(V + E) for unweighted, O(E + V log V) for weighted
