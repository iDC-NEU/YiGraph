- id: edge_connectivity
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected or directed graph
          required: true
        s:
          type: node
          description: 'Source node. Optional. Default value: None.'
          default: null
        t:
          type: node
          description: 'Target node. Optional. Default value: None.'
          default: null
        flow_func:
          type: function
          description: 'A function for computing the maximum flow among a pair of
            nodes. The function has to accept at least three parameters: a Digraph,
            a source node, and a target node. And return a residual network that follows
            NetworkX conventions (see :meth:`maximum_flow` for details). If flow_func
            is None, the default maximum flow function (:meth:`edmonds_karp`) is used.
            See below for details. The choice of the default function may change from
            version to version and should not be relied on. Default value: None.'
          default: null
        cutoff:
          type: 'integer, float, or None (default: None)'
          description: If specified, the maximum flow algorithm will terminate when
            the flow value reaches or exceeds the cutoff. This only works for flows
            that support the cutoff parameter (most do) and is ignored otherwise.
          default: null
    output_schema:
      type: integer
      description: Edge connectivity for G, or local edge connectivity if source and
        target were provided
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The edge connectivity algorithm is typically applied in network
    design and reliability analysis, where it helps determine the minimum number of
    edges that need to be removed to disconnect the network. This is particularly
    useful in telecommunications, transportation networks, and computer networks to
    assess the resilience of the infrastructure against failures or attacks.
  Tuning_Mechanisms:
    flow_func: Adjusting the flow function can influence the efficiency and behavior
      of the algorithm, as different implementations may optimize performance based
      on the graph's characteristics. Selecting a different flow function may lead
      to varying results in terms of speed and memory usage.
    cutoff: Setting a cutoff value allows the algorithm to terminate early once the
      flow meets or exceeds a specified threshold, potentially saving computation
      time. However, this may not yield the complete edge connectivity result for
      smaller values if premature termination occurs.
  Principles:
    description: The edge connectivity algorithm computes the minimum cut value between
      nodes in a graph, determining the network's connectivity level. It works for
      both directed and undirected graphs and relies on max-flow min-cut theorem principles.
      The algorithm's performance can vary based on the selected flow function, with
      a general time complexity of O(E*V) for Edmonds-Karp implementation, where E
      is the number of edges and V is the number of vertices.
    time_complexity: O(k * V * E^2) (Flow based)
