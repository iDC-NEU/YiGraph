- id: katz_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        alpha:
          type: float, optional (default=0.1)
          description: Attenuation factor
          default: 0.1
        beta:
          type: scalar or dictionary, optional (default=1.0)
          description: Weight attributed to the immediate neighborhood. If not a scalar, the dictionary must have a value
            for every node.
          default: 1.0
        max_iter:
          type: integer, optional (default=1000)
          description: Maximum number of iterations in power method.
          default: 1000
        tol:
          type: float, optional (default=1.0e-6)
          description: Error tolerance used to check convergence in power method iteration.
          default: 1.0e-06
        nstart:
          type: dictionary, optional
          description: Starting value of Katz iteration for each node.
          default: null
        normalized:
          type: bool, optional (default=True)
          description: If True normalize the resulting values.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used
            as weight. In this measure the weight is interpreted as the connection strength.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with Katz centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The Katz centrality algorithm is commonly applied in social networks, citation networks, and biological
    networks to identify influential nodes based on their connectivity. It is particularly useful for assessing the importance
    of nodes in directed graphs where not only direct connections but also indirect connections play a significant role. For
    instance, in a social media platform, it can help to find key influencers who have a strong impact through both direct
    and indirect relationships.
  Tuning_Mechanisms:
    alpha: Adjusting the alpha parameter changes the attenuation factor, impacting how much influence indirect connections
      have on the centrality measure. A higher alpha diminishes the influence of distant connections, focusing more on the
      immediate neighborhood.
    beta: The beta parameter determines the weight given to immediate neighboring nodes in the Katz centrality calculation.
      Setting it to a higher value emphasizes the contribution of direct connections, whereas a lower value may lead to a
      more balanced consideration of both direct and indirect connections.
  Principles:
    description: Katz centrality measures the influence of a node in a network by considering both direct and indirect paths
      to that node, weighted by an attenuation factor. The algorithm is applicable to both directed and undirected graphs
      and iteratively evaluates the centrality values of the nodes through a power method, which can converge based on the
      specified error tolerance. The time complexity is generally O(n + m) per iteration, where n is the number of nodes and
      m is the number of edges.
    time_complexity: O(k * (V + E)) (Iterative)
  solvable_questions:
  - Compute the Katz centrality of each node in the current graph and output the Top-20 nodes with the highest Katz centrality.
  - Output the Katz centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by Katz centrality in the current graph.
  - In the social network, which users not only have many direct connections but also indirectly connect to a large number
    of other users?
  - In the webpage link network, which pages are not only directly linked but also closely connected to important pages via
    multi-hop paths?
  - In the paper citation network, which papers are not only directly cited but also indirectly influence other papers through
    citation chains?
  - In the transaction network, which accounts not only trade frequently directly but also indirectly connect to other key
    accounts through the transaction network?
  - In the system component dependency network, which components are not only directly depended upon but also indirectly influence
    other components through multi-level dependency chains?
- id: load_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph.
          required: true
        cutoff:
          type: bool, optional (default=None)
          description: If specified, only consider paths of length <= cutoff.
          default: null
        normalized:
          type: bool, optional (default=True)
          description: If True the betweenness values are normalized by b=b/(n-1)(n-2) where n is the number of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, edge weights are ignored. Otherwise holds the name of the edge attribute used as weight. The
            weight of an edge is treated as the length or distance between the two sides.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The load centrality algorithm is typically applied in transportation and communication networks, where
    it helps to identify key nodes that manage significant flows of resources or information. This algorithm aids in optimizing
    network performance, identifying bottlenecks, and enhancing reliability by pinpointing critical nodes that, if compromised,
    could disrupt overall network functionality.
  Tuning_Mechanisms:
    cutoff: Adjusting the cutoff parameter limits the consideration of paths to a maximum length, which can lead to a more
      focused analysis of local centrality within a specific range. This can help in reducing computational complexity in
      large networks, but may overlook longer-range interactions in the flow of resources.
    normalized: Setting the normalized parameter to True scales the betweenness values relative to the size of the graph,
      allowing for easy comparison between nodes in graphs of different sizes. However, if set to False, the raw values are
      used, which may provide more insight into absolute centrality measures, but can complicate analyses across diverse network
      sizes.
  Principles:
    description: The core principle of load centrality is based on the idea of measuring the extent to which each node contributes
      to the network's overall flow, treating edges as conduits of resources. It works on both directed and undirected graphs,
      and it has a time complexity of O(n^3) for dense graphs or O(m+n) for sparse graphs, where n is the number of nodes
      and m is the number of edges. The algorithm requires a well-defined graph structure, and its performance hinges on the
      proper definition of weights if utilized.
    time_complexity: O(V * E)
  solvable_questions:
  - Compute the load centrality of each node in the current graph and output the Top-20 nodes with the highest load centrality.
  - Output the load centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by load centrality in the current graph.
  - In the transportation network, which intersections carry the most traffic on the shortest paths between different origins
    and destinations?
  - In the communication network, which nodes handle the most relay tasks in message-passing paths?
  - In the social network, which users act as the most frequent intermediaries in information propagation?
  - In the supply chain network, which links carry the most logistics traffic across different supply paths?
  - In the system module dependency network, which modules handle the most calls in the invocation paths?
- id: out_degree_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
    output_schema:
