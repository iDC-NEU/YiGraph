    S to all other nodes, and output a list.
  - In this weighted graph, adopt Dijkstra's path length algorithm to calculate the length of the shortest path from node
    A to node Z and output the result.
  - In this traffic network, what is the minimum number of kilometers required to drive from the city center to the airport?
  - In this financial transaction relationship graph, each transaction route involves handling fees. What is the minimum handling
    fee for a financial transaction from user A to user B?
  - In this logistics and distribution network, there is a defined delivery time between each pair of locations. What is the
    shortest time required to deliver an order from logistics center A to city B?
  - In this communication network, each network link has a known latency. What is the minimum latency in milliseconds from
