    output_schema:
      type: any
      description: int Longest path length
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The `dag_longest_path_length` algorithm is typically used in directed acyclic graphs (DAGs) to find
    the longest path in scenarios such as project scheduling, where tasks are represented as nodes and dependencies as edges.
    This is particularly useful in operations research and computer science to optimize workflows and resource allocation.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows the user to specify a key in the edge data that represents the weight
      of the edges, which will be taken into account in calculating the longest path. This can modify the resulting longest
      path length based on the specified edge weights.
    default_weight: The 'default_weight' parameter defines the weight for edges that do not have a specified weight attribute.
      By changing this value, users can influence the overall path length calculation by treating unweighted edges as either
      more or less significant, depending on the assigned default weight.
  Principles:
    description: This algorithm calculates the length of the longest path in a DAG by utilizing dynamic programming principles,
      ensuring that node dependencies are respected. It is specifically designed for directed graphs without cycles and has
      a time complexity of O(V + E), where V is the number of vertices and E is the number of edges.
    time_complexity: O(V + E)
  solvable_questions:
  - Calculate the total length (sum of weights) of the longest path from node S to node T in this Directed Acyclic Graph (DAG).
  - Find the length of the longest path (globally longest path) in this DAG and output the length value.
  - Calculate the length of the longest reachable path starting from the source node A.
  - In a task dependency graph of an engineering project, each task has an estimated duration. What is the minimum possible
    total duration, in days, from the project initiation to its final completion?
  - In a paper citation DAG of a research field, each paper has a reading time. Starting from a foundational paper, what is
    the minimum number of hours required to fully understand a cutting-edge paper?
  - In this financial transaction network, a complex transaction involves multiple intermediary links with a strict sequence,
    and each link has a standard processing time. How many hours are needed at minimum from the initiation to the final completion
    of this transaction?
  - In this product assembly process graph, each process has a standard operation time, and there is a strict sequential relationship
    between processes. How many minutes are needed at minimum to produce one finished product?
  - An online tutorial website stipulates that chapters must be completed in order to unlock the next one. The reading time
    of each tutorial page is known. What is the minimum total reading time, in minutes, for a user to navigate from the "Course
    Homepage" to the "Final Exam" page?
- id: dijkstra_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for dijkstra_path
          required: true
        source:
          type: node
          description: Starting node
          required: true
        target:
          type: node
          description: Ending node
          required: true
        weight:
          type: string or function
          description: 'If this is a string, then edge weights will be accessed via the edge attribute with this key (that
            is, the weight of the edge joining `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute exists,
            the weight of the edge is assumed to be one. If this is a function, the weight of an edge is the value returned
            by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and
            the dictionary of edge attributes for that edge. The function must return a number or None to indicate a hidden
            edge.'
          default: weight
      required:
      - source
      - target
    output_schema:
      type: list
      description: List of nodes in a shortest path.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: Dijkstra's algorithm is commonly applied in network routing problems, particularly in weighted graphs
    where edges represent distances or costs. It is widely used in transportation networks to find the shortest path between
    two locations, such as navigating roads or optimizing delivery routes.
  Tuning_Mechanisms:
    source: Adjusting the source parameter changes the starting point of the pathfinding process, potentially resulting in
      different shortest paths depending on the specific structure of the graph.
    target: Changing the target parameter affects the endpoint for which the shortest path is sought, thus influencing the
      final output path based on the connection and distance from the source.
  Principles:
    description: Dijkstra's algorithm operates by iteratively exploring the shortest tentative distance from the source node
      to all other nodes in the graph. It is applicable to both directed and undirected graphs, but requires that all edge
      weights be non-negative. The time complexity is O((V + E) log V) with a priority queue, where V is the number of vertices
      and E is the number of edges.
    time_complexity: O(E + V log V)
  solvable_questions:
  - In this weighted graph, use Dijkstra's algorithm to find the shortest path from node A to node F, and provide the complete
    node sequence of this path.
  - With node A as the source node, run Dijkstra's algorithm to calculate and output the table of shortest distance node sequences
    from it to all other nodes in the graph.
  - Please use Dijkstra's algorithm to calculate the shortest path from node A to node B, and provide the node sequence of
    this path.
  - In an urban road traffic network, each road has an estimated travel time (in minutes). What is the fastest driving route
    from "Central Park" to "Airport"? Please provide the node sequence.
  - In the current web page link relationship graph, each page jump has a loading time cost. Which links does the user need
    to click to get from page A to page B in the fastest way? Please provide the node sequence.
  - On Wikipedia, I want to jump from entry A to entry B. Each hyperlink has an estimated reading time. What is the browsing
    path with the shortest total reading time? Please provide the node sequence.
  - Transfer money to a friend through a payment transaction network, where a small handling fee is charged for each intermediate
    payment channel passed through. What is the payment path with the lowest total handling fee from my wallet to the recipient's
    wallet? Please provide the node sequence.
  - In a paper citation network, the reading time of each paper is known. What is the reference chain with the shortest total
    reading time from paper A to paper B? Please provide the node sequence.
