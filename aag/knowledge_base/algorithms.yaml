      is specifically designed for directed acyclic graphs (DAGs), where cycles would
      invalidate the concept of a topological sort. Its time complexity is primarily
      affected by the number of vertices and edges, with the potential to generate
      an exponential number of results depending on the structure of the graph, thus
      making space complexity significant as well.
    time_complexity: Exponential (depends on number of sorts)
