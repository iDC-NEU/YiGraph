- id: maximum_spanning_tree
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: undirected graph
          description: An undirected graph. If `G` is connected, then the algorithm finds a spanning tree. Otherwise, a spanning
            forest is found.
          required: true
        weight:
          type: str
          description: Data key to use for edge weights.
          default: weight
        algorithm:
          type: string
          description: The algorithm to use when finding a maximum spanning tree. Valid choices are 'kruskal', 'prim', or
            'boruvka'. The default is 'kruskal'.
          default: kruskal
        ignore_nan:
          type: 'bool (default: False)'
          description: If a NaN is found as an edge weight normally an exception is raised. If `ignore_nan is True` then that
            edge is ignored instead.
          default: false
    output_schema:
      type: NetworkX Graph
      description: A maximum spanning tree or forest.
    graph_type:
      directed: false
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The maximum spanning tree algorithm is typically applied in undirected graphs where the goal is to
    maximize the total weight of the edges in the spanning tree. Common applications include network design, such as maximizing
    bandwidth in telecommunications networks, or optimizing resource allocation in transportation systems. For example, it
    can be used to determine the most cost-effective layout for connecting cities with roads while maximizing the total capacity.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter changes which edge weights are considered when constructing the maximum spanning
      tree, enabling the algorithm to prioritize different resource metrics or cost structures within the graph.
    algorithm: Changing the 'algorithm' parameter allows users to select different methods for computing the maximum spanning
      tree, which can affect performance and efficiency depending on the graph's characteristics and edge distribution.
  Principles:
    description: This algorithm operates on undirected weighted graphs to construct a subgraph that connects all vertices
      while maximizing the total edge weight. It utilizes methods such as Kruskal's, Prim's, or Borůvka's algorithm to efficiently
      find the maximum spanning tree. The input requires a specific weight attribute for edges and can handle NaN values based
      on the ignore_nan parameter, impacting edge inclusion. The time complexity varies by algorithm, typically O(E log V)
      for Kruskal's and Prim's algorithms.
    time_complexity: O(E log V)
  solvable_questions:
  - Calculate the Maximum Spanning Tree (MaxST) of this weighted undirected graph and output all edges and their weights.
  - Find the spanning tree with the maximum total weight and provide the Top-10 edges with the highest weights in that tree.
  - Output the node connection matrix of the MaxST, sorted in descending order by edge weight.
  - In backbone communication network design, how should links be selected to maximize the total bandwidth capacity of the
    entire spanning tree?
  - In social influence propagation, if edges represent trust values, find the propagation backbone path table that constitutes
    the highest total trust.
  - In financial asset correlation analysis, output a set of core structures that connect all stocks with the maximum sum
    of correlation coefficients.
  - Assuming road segments between cities have safety ratings, plan a scheme covering all cities that maximizes the total
    safety score.
  - In a logistics transport network, if edges represent throughput, which layout ensures full coverage while maximizing total
    transport efficiency?
  - In ecological species evolution research, which tree structure best represents the maximization of feature similarity
    between species? Output the Top-20 similarity pairs.
