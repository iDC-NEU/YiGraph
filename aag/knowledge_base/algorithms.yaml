- id: find_cycle
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A directed/undirected graph/multigraph.
          required: true
        source:
          type: node, list of nodes
          description: >-
            The node from which the traversal begins. If None, then a source is chosen arbitrarily and repeatedly until all
            edges from each node in the graph are searched.
          default: null
        orientation:
          type: 'None | ''original'' | ''reverse'' | ''ignore'' (default: None)'
          description: >-
            For directed graphs and directed multigraphs, edge traversals need not respect the original orientation of the
            edges. When set to 'reverse' every edge is traversed in the reverse direction. When set to 'ignore', every edge
            is treated as undirected. When set to 'original', every edge is treated as directed. In all three cases, the yielded
            edge tuples add a last entry to indicate the direction in which that edge was traversed. If orientation is None,
            the yielded edge has no direction indicated. The direction is respected, but not reported.
          default: null
    output_schema:
      type: directed edges
      description: >-
        A list of directed edges indicating the path taken for the loop. If no cycle is found, then an exception is raised.
        For graphs, an edge is of the form `(u, v)` where `u` and `v` are the tail and head of the edge as determined by the
        traversal. For multigraphs, an edge is of the form `(u, v, key)`, where `key` is the key of the edge. When the graph
        is directed, then `u` and `v` are always in the order of the actual directed edge. If orientation is not None then
        the edge tuple is extended to include the direction of traversal ('forward' or 'reverse') on that edge.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: >-
    The find_cycle algorithm is particularly useful in detecting cycles within directed and undirected graphs, such as in
    task scheduling, deadlock detection in concurrent programming, and analyzing feedback loops in directed network structures.
    It can be applied in various domains including computer science, operations research, and systems engineering where understanding
    cyclic dependencies is essential.
  Principles: >-
    This algorithm operates by traversing the graph starting from a specified source node to search for cycles. It works on
    both directed and undirected graphs and is capable of handling multigraphs. The time complexity is generally O(V + E),
    where V represents the number of vertices and E represents the number of edges, making it efficient for sparse graphs.
  Tuning_Mechanisms:
    source: >-
      Adjusting the source parameter allows the user to specify the starting node for the cycle detection. If set to None,
      the algorithm will arbitrarily select a starting node, which may influence the traversal paths taken but does not affect
      the overall cycle detection capability.
    orientation: >-
      The orientation parameter impacts how edge directions are treated during traversal. By setting it to 'ignore', the algorithm
      treats all edges as undirected, potentially finding cycles that would otherwise be missed in a directed context. Using
      'reverse' examines the graph in the opposite direction, which could reveal different cycles depending on the graph's
      structure.
  solvable_questions:
    - List all circular transaction paths related to Anna.
    - List all circular transaction paths related to Anna.
    
- id: common_neighbor_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default=None)
          description: Common Neighbor and Centrality based Parameterized Algorithm (CCPA) scores will be computed for each pair of nodes given in the iterable. The pairs must be given as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None, then all nonexistent edges in the graph will be used.
          default: null
        alpha:
          type: float, optional
          description: Parameter controlling the relative contribution of the common neighbor term and the centrality-distance term in the CCPA score. Values should normally be between 0 and 1. A higher alpha increases the contribution of common neighbors, while a lower alpha increases the contribution of the distance-based centrality term.
          default: 0.8
    output_schema:
      type: iterator of 3-tuples
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their Common Neighbor and Centrality based Parameterized Algorithm (CCPA) score.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The common_neighbor_centrality algorithm is mainly used in link prediction tasks in undirected networks, especially in social networks, collaboration networks, biological interaction networks, citation networks, and recommendation systems. It evaluates the likelihood of a future or missing connection between two nodes by jointly considering the number of their common neighbors and their distance-based structural centrality. For example, in a social network, it can be used to identify pairs of users who are likely to become friends in the future because they not only share many mutual contacts but are also structurally close in the network.
  Tuning_Mechanisms:
    alpha: Adjusting alpha changes the balance between local neighborhood overlap and global structural proximity. When alpha is set closer to 1, the score relies more heavily on the number of common neighbors, making the method more locally focused. When alpha is set closer to 0, the score gives more emphasis to the distance-based centrality term N / d_uv, making the method more sensitive to structural closeness in the whole graph. The default value 0.8 is commonly used because the original study reported good empirical performance across datasets.
    ebunch: Supplying ebunch allows the algorithm to evaluate only a selected subset of node pairs, which is useful for targeted link prediction, candidate ranking, or reducing computational cost in large graphs. If ebunch is omitted, the algorithm evaluates all nonexistent edges, which is convenient for full-network missing link discovery but may be more computationally expensive.
  Principles:
    description: The common_neighbor_centrality algorithm computes a link prediction score between two nodes by combining two complementary signals. The first term, |\Gamma(u) ∩ \Gamma(v)|, measures the number of shared neighbors and captures local topological similarity. The second term, N / d_uv, incorporates a distance-based notion of centrality or structural proximity, where N is the total number of nodes in the graph and d_uv is the shortest path distance between u and v. The complete score is defined as CCPA(u, v) = alpha * |\Gamma(u) ∩ \Gamma(v)| + (1 - alpha) * (N / d_uv). This design allows the method to exploit both local clustering effects and broader graph connectivity patterns when estimating the likelihood of a missing link.
    time_complexity: Depends on the number of evaluated node pairs and the cost of shortest path computations. In practice, the common-neighbor part is relatively inexpensive, while the shortest-path distance term may dominate runtime on large sparse graphs if many node pairs are evaluated.
  solvable_questions:
  - Predict which nonexistent node pairs in the current undirected graph are most likely to form edges using the CCPA score.
  - Compute the common_neighbor_centrality score for all candidate node pairs and rank them in descending order.
  - Output the Top-20 node pairs with the highest CCPA scores in the current network.
  - In the current social network, which pairs of users are most likely to become connected based on shared neighbors and structural proximity?
  - In the collaboration network, which pairs of researchers are the most promising candidates for future collaboration?
  - In the citation network, which pairs of papers are likely to become strongly related based on common references and network closeness?
  - In the biological interaction network, which pairs of proteins are most likely to interact according to neighborhood overlap and graph distance?
  - In the recommendation graph, which user-item or entity pairs have the highest latent connection likelihood under the CCPA metric?
  url: https://doi.org/10.1007/978-3-540-31856-9_44

- id: communicability
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A simple undirected NetworkX graph.
          required: true
    output_schema:
      type: dictionary of dictionaries
      description: A dictionary of dictionaries keyed by nodes, where the value comm[u][v] is the communicability between node u and node v.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: 
    The communicability algorithm is used to measure the ability of information propagation, structural accessibility, and overall connectivity strength between pairs of nodes in a network. It considers not only shortest paths but also all possible walks of different lengths between nodes, with different contributions depending on walk length. It is suitable for analyzing latent interactions, indirect relationships, and propagation potential in complex networks such as social networks, biological networks, transportation systems, and other complex systems.
  Tuning_Mechanisms:
    graph_structure: 
      The communicability algorithm does not include explicit tunable parameters. Its results are determined by the structure of the graph, including connectivity, number of alternative paths, distribution of walk lengths, and spectral properties. In general, nodes connected by more and shorter walks have higher communicability.
    preprocessing: 
      In practice, preprocessing steps can influence results, such as extracting the largest connected component, removing noisy nodes or edges, or simplifying graph structure. Since the algorithm requires a simple undirected graph, directed, weighted, or multigraph inputs must typically be transformed before use.
  Principles:
    description: 
      The communicability algorithm quantifies the communication strength between pairs of nodes by considering all possible walks between them. The adjacency matrix powers encode the number of walks of different lengths, and the algorithm effectively sums over these contributions. From a spectral perspective, if the adjacency matrix has eigenvalues lambda_j and corresponding orthonormal eigenvectors phi_j, then the communicability between nodes u and v is defined as C(u, v) = sum_j [phi_j(u) * phi_j(v) * exp(lambda_j)]. This formulation integrates contributions from walks of all lengths and provides a comprehensive measure of structural proximity and information propagation capability.
    time_complexity: 
      The computational cost is dominated by the spectral decomposition of the adjacency matrix. This can be expensive for large dense graphs, making the algorithm more suitable for small to medium-sized networks or applications requiring detailed structural analysis.
  solvable_questions:
    - Compute communicability values for all pairs of nodes in the graph.
    - Identify node pairs with the highest communicability.
    - Analyze which node pairs have strong indirect connectivity through multiple paths.
    - In a social network, which users have strong latent interaction potential despite not being directly connected?
    - In a biological network, which protein pairs exhibit strong functional association potential?
    - In a transportation network, which node pairs have the highest overall accessibility?
    - In a complex system, which node pairs are most effective for global information propagation?
    - Compare structural proximity between node pairs beyond shortest path distance.
  url: https://doi.org/10.1103/PhysRevE.77.036111

- id: k_truss
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: An undirected NetworkX graph.
          required: true
        k:
          type: int
          description: The order of the truss.
          required: true
    output_schema:
      type: graph
      description: Returns the k-truss subgraph of G, that is, the maximal induced subgraph with at least three vertices in which every edge is incident to at least k-2 triangles.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario:
    The k_truss algorithm is used to extract cohesive subgraphs from an undirected network by enforcing triangle-based support on each edge. It is suitable for social network analysis, community mining, collaboration analysis, and dense subgraph discovery.
  Tuning_Mechanisms:
    k:
      The parameter k controls the cohesiveness threshold of the extracted subgraph. Larger k values produce smaller and denser subgraphs, while smaller k values retain broader but less cohesive structures.
    graph_constraints:
      The algorithm only applies to simple undirected graphs without self-loops. It raises an exception if the input graph is directed, a multigraph, or contains self-loops.
  Principles:
    description:
      A k-truss is the maximal induced subgraph containing at least three vertices such that every edge belongs to at least k-2 triangles within the subgraph. The algorithm iteratively removes edges that do not satisfy the triangle-support condition until all remaining edges meet the requirement.
    notes:
      A k-clique is a (k-2)-truss, and a k-truss is a (k+1)-core. This implementation follows the original definition requiring each edge to belong to at least k-2 triangles.
  solvable_questions:
    - Extract cohesive subgraphs based on triangle support.
    - Identify dense communities in undirected graphs.
    - Analyze triangle-based structural cohesion in a network.
    - Compare subgraph density under different k thresholds.
  url: https://arxiv.org/abs/1806.05523v2
  
- id: immediate_dominators
  task_type_id: Dominance
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: directed_graph
          description: A DiGraph or MultiDiGraph where dominance is to be computed.
          required: true
        start:
          type: node
          description: The start node of dominance computation.
          required: true
    output_schema:
      type: dict
      description: A dictionary keyed by nodes, containing the immediate dominator of each node reachable from start, except for start itself.
    graph_type:
      directed: true
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario:
    The immediate_dominators algorithm is used to compute dominance relationships in directed graphs. It is widely applied in control-flow graph analysis, compiler optimization, program analysis, static analysis, dependency analysis, and flow-based graph reasoning. It is especially useful for constructing dominator trees, identifying control dependencies, and analyzing how information or execution paths propagate from a designated start node.
  Tuning_Mechanisms:
    start:
      The parameter start specifies the root node from which dominance is computed. Only nodes reachable from start are included in the result. Different choices of start may lead to different dominance structures.
    graph_constraints:
      The algorithm only applies to directed graphs. It raises an exception if the input graph is undirected. It also raises an error if the start node is not contained in the graph.
    reachability_effect:
      Immediate dominators are defined only for nodes reachable from the start node. Unreachable nodes are excluded from the output.
  Principles:
    description:
      In a directed graph, a node d dominates a node n if every path from the start node to n passes through d. The immediate dominator of a node is the unique closest dominator of that node, and these immediate dominator relationships form the dominator tree. Every node reachable from start has an immediate dominator except the start node itself. The algorithm computes, for each reachable node, its parent in the dominator tree.
    notes:
      The immediate dominators are the parents of their corresponding nodes in the dominator tree. This operation is fundamental in flowgraph analysis and control-structure reasoning.
  solvable_questions:
    - Compute the immediate dominator of each reachable node in a directed graph.
    - Construct the dominator tree rooted at a given start node.
    - Analyze control-flow dependencies in a program graph.
    - Identify mandatory intermediate nodes on all paths from a source.
    - Study reachability-constrained structural dependencies in directed networks.
    - Support compiler analysis and optimization tasks based on dominance relations.
  url: https://hdl.handle.net/1911/96345

- id: quotient_graph
  task_type_id: Graph Query
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: The NetworkX graph for which to construct the quotient graph.
          required: true
        partition:
          type: function or dict or list
          description: Specifies an equivalence relation or a valid partition of the nodes of G. It may be given as a function, a dict whose values are blocks, or a list of sets representing the partition blocks.
          required: true
        edge_relation:
          type: function, optional
          description: A Boolean function on pairs of blocks that determines whether an edge should exist between them in the quotient graph. If not specified, two blocks are adjacent when some node in one block is adjacent to some node in the other block in G.
          default: null
        node_data:
          type: function, optional
          description: A function mapping a block to a dictionary of node attributes for the corresponding quotient-graph node.
          default: null
        edge_data:
          type: function, optional
          description: A function mapping a pair of blocks to a dictionary of edge attributes for the corresponding quotient-graph edge.
          default: null
        weight:
          type: string or null, optional
          description: The name of an edge attribute holding the numerical weight value. If None, each edge is treated as having weight 1.
          default: weight
        relabel:
          type: bool, optional
          description: If True, relabel quotient-graph nodes to nonnegative integers. Otherwise, nodes are represented by frozensets of the corresponding partition blocks.
          default: false
        create_using:
          type: graph constructor, optional
          description: Graph type to create. If a graph instance is provided, it is cleared before being populated.
          default: nx.Graph
    output_schema:
      type: graph
      description: Returns the quotient graph of G induced by the equivalence relation or partition specified by partition.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario:
    The quotient_graph algorithm is used to compress a graph by merging nodes that belong to the same equivalence class or partition block, producing a higher-level graph representation over groups of nodes. It is useful in graph coarsening, clustering analysis, blockmodeling, community abstraction, network summarization, hierarchical modeling, and structural reduction. This operation is especially valuable when the goal is to analyze relationships among groups rather than among individual nodes.
  Tuning_Mechanisms:
    partition:
      The partition parameter is the core mechanism controlling how nodes are aggregated. It may be defined by an equivalence-relation function or explicitly by blocks. Different partitions lead to different quotient structures and different levels of abstraction.
    edge_relation:
      The edge_relation parameter controls when two blocks should be connected in the quotient graph. If omitted, adjacency is inherited from the existence of at least one edge between the corresponding blocks in the original graph. Custom edge relations allow the user to impose stricter or domain-specific block connectivity rules.
    node_data:
      The node_data function controls the attributes assigned to quotient nodes. If not provided, default attributes include the represented subgraph, the number of nodes, the number of internal edges, and the density of the corresponding block.
    edge_data:
      The edge_data function controls the attributes assigned to quotient edges. This is useful when edge summaries such as counts, aggregate weights, or semantic labels are needed for block-level analysis.
    relabel_and_create_using:
      The relabel option affects the naming convention of quotient-graph nodes, while create_using controls the output graph type. These options are important for downstream compatibility and representation preferences.
  Principles:
    description:
      A quotient graph is formed by collapsing each equivalence class or partition block of the original graph into a single node. Two quotient nodes are connected if their corresponding blocks satisfy the specified edge relation. In the default case, two blocks are adjacent when there exists at least one edge in the original graph joining a node in one block to a node in the other. This construction preserves inter-block connectivity while simplifying the graph structure to a coarser level of representation.
    notes:
      The partition must be a valid partition of the node set of G, meaning that every node belongs to exactly one block. If this condition is violated, the algorithm raises an exception. When relabel is False, quotient-graph nodes are represented by frozensets corresponding to the partition blocks.
    time_complexity:
      The runtime depends on the size of the graph, the number and size of partition blocks, and the cost of evaluating the partition and edge-relation logic. In practice, the complexity is driven by checking block membership and determining adjacency or aggregated attributes between blocks.
  solvable_questions:
    - Compress a graph into a higher-level graph based on a node partition.
    - Analyze interactions among groups, clusters, or communities instead of individual nodes.
    - Build a block-level representation for network summarization.
    - Study structural relationships between equivalence classes in a graph.
    - Aggregate node sets into supernodes and inspect inter-block connectivity.
    - Support graph coarsening and hierarchical abstraction workflows.
    - Construct generalized blockmodels from a given partition of nodes.
    - Compare graph structure before and after node-group aggregation.
  url: https://doi.org/10.1017/CBO9780511529869
  
- id: second_order_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A connected and undirected NetworkX graph.
          required: true
        weight:
          type: string or null, optional
          description: The name of an edge attribute that holds the numerical value used as a weight. If None, each edge has weight 1.
          default: weight
    output_schema:
      type: dict
      description: A dictionary keyed by node, where each value is the second order centrality of that node.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario:
    The second_order_centrality algorithm is used to evaluate node importance in a connected undirected graph from the perspective of random-walk return-time variability. It is suitable for identifying critical or structurally central nodes in communication networks, social networks, transportation systems, and other complex networks. Compared with shortest-path-based or flow-based centrality measures, it characterizes how regularly a perpetual random walk returns to a node, making it useful for assessing node criticity and stability in network dynamics.
  Tuning_Mechanisms:
    weight:
      The weight parameter determines which edge attribute is used as the numerical weight in the computation. If None, all edges are treated as having equal weight. Different edge weights can significantly affect the random-walk dynamics and therefore the resulting centrality values.
    graph_constraints:
      The algorithm requires the input graph to be nonempty, connected, and undirected, and it does not allow negative edge weights. If these conditions are violated, the implementation raises an exception.
    graph_size:
      This implementation has cubic time complexity in the number of nodes, so it is mainly suitable for relatively small graphs when executed on a single machine.
  Principles:
    description:
      The second order centrality of a node is defined as the standard deviation of the return times to that node for a perpetual random walk on the graph. Lower values indicate higher centrality, because they mean the random walk returns to the node more regularly and predictably. This implementation uses the analytical version of the method rather than simulation, and computes the measure on a transformed graph in which self-loops are added so that each node has equal in-degree under the unbiased random-walk model.
    notes:
      Lower second order centrality values correspond to more central nodes. The method is based on the analytical formulation introduced by Kermarrec, Le Merrer, Sericola, and Trédan. It is conceptually different from path-counting or geodesic-based centrality measures such as betweenness centrality.
    time_complexity:
      The time complexity of this implementation is O(n^3), where n is the number of nodes in G. As a result, it is practical mainly for small graphs.
  solvable_questions:
    - Measure the importance of nodes using random-walk return-time variability.
    - Identify structurally critical nodes in a connected undirected network.
    - Compare node centrality from the perspective of stochastic traversal dynamics.
    - Detect nodes that are revisited more regularly by an unbiased random walk.
    - Analyze node criticity in communication, social, or transportation networks.
    - Rank nodes by second order centrality values.
    - Study how edge weights affect random-walk-based centrality.
    - Complement other centrality analyses with a return-time-based metric.
  url: https://doi.org/10.1016/j.comcom.2010.06.007
- id: is_isomorphic
  task_type_id: Basics
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G1:
          type: graph
          description: The first NetworkX graph. Must be the same type as G2 (e.g., both Graph, both DiGraph).
          required: true
        G2:
          type: graph
          description: The second NetworkX graph. Must be the same type as G1.
          required: true
        node_match:
          type: callable
          description: A function that returns True if node n1 in G1 and n2 in G2 should be considered equal during the isomorphism test. The function receives the node attribute dictionaries of n1 and n2 as inputs. If not specified, node attributes are not considered.
          default: null
        edge_match:
          type: callable
          description: A function that returns True if the edge attribute dictionary for the pair of nodes (u1, v1) in G1 and (u2, v2) in G2 should be considered equal during the isomorphism test. The function receives the edge attribute dictionaries of the edges under consideration. If not specified, edge attributes are not considered.
          default: null
    output_schema:
      type: bool
      description: True if the graphs G1 and G2 are isomorphic, False otherwise.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The is_isomorphic algorithm is used to determine whether two graphs have the same structural topology, regardless of node or edge labels. Typical applications include chemical informatics (comparing molecular structures), network template matching (checking whether two network topologies are structurally equivalent), plagiarism detection in circuit or schema designs, and database query optimization where subgraph pattern matching is required.
  Tuning_Mechanisms:
    node_match: Providing a node_match function enables attribute-aware isomorphism testing. For example, in a molecular graph where nodes represent atoms, node_match can enforce that matched nodes must have the same element type, making the comparison chemically meaningful rather than purely structural.
    edge_match: Providing an edge_match function enables edge-attribute-aware comparison. For instance, in a weighted graph, edge_match can require that matched edges have the same or similar weights, which is useful when structural equivalence alone is insufficient.
  Principles:
    description: The is_isomorphic algorithm determines whether two graphs G1 and G2 are isomorphic, i.e., whether there exists a bijection between their node sets that preserves all adjacency relationships. The algorithm is implemented using the VF2 algorithm (Cordella et al., 2001), which performs a recursive tree-search with constraint propagation to efficiently find a valid node mapping or prove that none exists. It supports undirected graphs, directed graphs, and multigraphs.
    time_complexity: Worst case exponential O(n! · n); efficient in practice for many graph classes (VF2 algorithm, Cordella et al., 2001)
  solvable_questions:
  - Are the two input graphs structurally identical, regardless of node labels?
  - Do these two transaction networks share the same topological structure, indicating they may represent the same underlying pattern?
  - In a chemical database, does this query molecule match the structural pattern of a known compound?
  - Are these two organizational hierarchy graphs structurally equivalent, even though the personnel names differ?
  - In a circuit design system, do these two circuit diagrams represent the same logical structure?
  - Given two social network snapshots from different time periods, have they retained the same overall structural topology?
  - In a knowledge graph, do two subgraphs representing different entities follow the same relational pattern?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.isomorphism.is_isomorphic.html

- id: laplacian_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        normalized:
          type: bool, optional
          description: If True the centrality score is scaled so the sum over all nodes is 1. If False the centrality score for each node is the raw drop in Laplacian energy when that node is removed.
          default: true
        nodelist:
          type: list, optional
          description: The rows and columns of the Laplacian matrix are ordered according to the nodes in nodelist. If nodelist is None, then the ordering is produced by G.nodes().
          default: null
        weight:
          type: string or None, optional (default='weight')
          description: The edge data key used to compute each value in the Laplacian matrix. If None, then each edge has weight 1.
          default: weight
        walk_type:
          type: string or None, optional
          description: Optional parameter used when calling directed_laplacian_matrix. One of "random", "lazy", or "pagerank". If None (the default), then a value is selected according to the properties of G. "random" if G is strongly connected and aperiodic; "lazy" if G is strongly connected but not aperiodic; "pagerank" for all other cases.
          default: null
        alpha:
          type: real, optional
          description: Optional parameter used when calling directed_laplacian_matrix. (1 - alpha) is the teleportation probability used with pagerank.
          default: 0.95
    output_schema:
      type: dictionary
      description: Dictionary of nodes with Laplacian centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Laplacian centrality is used to identify nodes whose removal would most significantly reduce the overall connectivity and energy of a network. It is particularly effective in weighted networks where edge strengths matter. Typical applications include infrastructure vulnerability analysis (identifying critical power grid or communication nodes), weighted social network analysis (finding influential users in interaction-weighted graphs), and biological network analysis (detecting essential proteins in weighted protein interaction networks).
  Tuning_Mechanisms:
    normalized: When True, scores are scaled to sum to 1, making them comparable across graphs of different sizes. When False, the raw Laplacian energy drop is returned, which is more interpretable in absolute terms for a single graph analysis.
    nodelist: Specifying a nodelist controls the ordering of rows and columns in the Laplacian matrix. This can be useful when a consistent node ordering is needed across multiple analyses or when comparing results with external matrix computations.
    weight: Specifying the weight attribute allows the algorithm to incorporate edge strengths into the centrality computation, making it sensitive to both topology and interaction intensity. Setting weight to None treats all edges equally.
    walk_type: For directed graphs, walk_type controls the type of random walk used in computing the directed Laplacian matrix. Choosing "random", "lazy", or "pagerank" affects how the stationary distribution is computed, which in turn influences the centrality scores. If not specified, the algorithm automatically selects the most appropriate type based on graph connectivity and periodicity properties.
    alpha: The alpha parameter controls the teleportation probability in the pagerank-based directed Laplacian computation. A higher alpha (closer to 1) means the random walker is less likely to teleport, staying closer to the graph structure. A lower alpha increases teleportation, smoothing out the influence of graph topology.
  Principles:
    description: Laplacian centrality measures the importance of a node by quantifying the drop in Laplacian energy of the graph after that node is removed. The Laplacian energy is defined as the sum of the squared eigenvalues of a graph's Laplacian matrix. A node with high Laplacian centrality contributes significantly to the overall spectral energy of the graph, indicating strong local connectivity and high interaction with its neighbors. The algorithm is extended to directed graphs via the directed Laplacian matrix. Based on Qi et al. (2012), Information Sciences, 194:240-253.
    time_complexity: O(n + m) where n is the number of nodes and m is the number of edges, based on algebraic computation of node degrees and neighbor weights (Qi et al., 2012)
  solvable_questions:
  - Which nodes in the network, if removed, would cause the greatest drop in overall connectivity energy?
  - In a weighted communication network, which nodes are most critical to the overall information flow capacity?
  - In a power grid network, which substations contribute most to the network's overall spectral robustness?
  - Rank all nodes by their Laplacian centrality score and output the top 20 most critical nodes.
  - In a weighted protein interaction network, which proteins are most essential based on their contribution to the network's Laplacian energy?
  - Which users in a weighted social network have the highest Laplacian centrality, indicating their structural importance beyond simple degree?
  - In a supply chain network with weighted edges representing transaction volumes, which suppliers are most critical to overall network stability?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.centrality.laplacian_centrality.html

- id: astar_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        source:
          type: node
          description: Starting node for path.
          required: true
        target:
          type: node
          description: Ending node for path.
          required: true
        heuristic:
          type: callable, optional (default=None)
          description: A function to evaluate the estimate of the distance from a node to the target. The function takes two node arguments and must return a number. If the heuristic is inadmissible (overestimates the cost), the result may not be a shortest path. The algorithm does not support updating heuristic values for the same node due to caching the first heuristic calculation per node. If None, the heuristic is assumed to be zero, and the algorithm reduces to Dijkstra's algorithm.
          default: null
        weight:
          type: string or callable, optional (default='weight')
          description: If a string, edge weights are accessed via the edge attribute with this key. If a callable, the weight of an edge is the value returned by the function, which must accept exactly three positional arguments (two endpoints and the edge attribute dictionary). If the function returns None, the edge is treated as hidden.
          default: weight
        cutoff:
          type: float, optional (default=None)
          description: If provided, the search is bounded to this value. A node n is not expanded if g(n) + h(n) > cutoff, where g(n) is the cost from source to n and h(n) is the heuristic estimate. Note that if the heuristic is inadmissible, valid paths may be missed.
          default: null
    output_schema:
      type: list
      description: List of nodes in the shortest path from source to target.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The astar_path algorithm is used to find the shortest path between two nodes in a weighted graph using an informed search strategy. It is widely applied in robotics and game AI for navigation (using Euclidean distance as heuristic), road network routing (using geographic distance as heuristic), logistics and supply chain optimization, and any domain where domain-specific distance estimates can accelerate pathfinding compared to Dijkstra's algorithm.
  Tuning_Mechanisms:
    heuristic: Providing a well-designed admissible heuristic function significantly reduces the search space and speeds up the algorithm compared to Dijkstra's algorithm. The heuristic must never overestimate the true cost to ensure optimality. For spatial graphs, Euclidean or Manhattan distance are common choices. Setting heuristic to None makes the algorithm equivalent to Dijkstra's.
    weight: Specifying a weight string allows the algorithm to use stored edge attributes as costs. Providing a callable instead gives full control over edge cost computation, including the ability to hide edges by returning None, which is useful for dynamic or conditional pathfinding.
    cutoff: Setting a cutoff value prunes the search space by ignoring nodes whose estimated total cost exceeds the threshold. This is useful when only paths below a certain cost are of interest, and can significantly reduce computation time on large graphs.
  Principles:
    description: The astar_path algorithm finds the shortest path from source to target using the A* search algorithm. It maintains a priority queue ordered by f(n) = g(n) + h(n), where g(n) is the exact cost from the source to node n and h(n) is the heuristic estimate of the remaining cost to the target. At each step, the node with the lowest f(n) is expanded. If the heuristic is admissible (never overestimates), A* guarantees an optimal path. A* subsumes Dijkstra's algorithm as the special case where h(n) = 0 for all nodes.
    time_complexity: O((V + E) log V) in the worst case using a priority queue, where V is the number of nodes and E is the number of edges; in practice significantly faster than Dijkstra when a good heuristic is provided.
  solvable_questions:
  - Find the shortest path between two nodes in a weighted graph using a domain-specific distance heuristic.
  - In a road network with geographic coordinates, find the fastest route between two locations using straight-line distance as a heuristic.
  - In a game map, find the optimal movement path for an agent from its current position to a target position.
  - In a logistics network, find the minimum-cost delivery route between two warehouses given known distance estimates.
  - Find a shortest path between two nodes but restrict the search to paths whose total cost does not exceed a given budget.
  - In a spatial graph, compare the path found by A* with a given heuristic against the result from Dijkstra to evaluate heuristic quality.
  - In a knowledge graph with edge weights representing semantic distances, find the most related reasoning chain between two concepts.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.shortest_paths.astar.astar_path.html

- id: maximal_independent_set
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        nodes:
          type: list or iterable, optional (default=None)
          description: Nodes that must be part of the independent set. This set of nodes must itself be independent (no two nodes in the list can be adjacent). If None, a random starting node is selected.
          default: null
        seed:
          type: integer, random_state, or None, optional (default=None)
          description: Indicator of random number generation state. Controls the randomness in node selection during the greedy expansion of the independent set.
          default: null
    output_schema:
      type: list
      description: List of nodes that form a maximal independent set.
    raises:
      NetworkXUnfeasible: If the nodes in the provided list are not part of the graph or do not form an independent set.
      NetworkXNotImplemented: If G is directed.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The maximal_independent_set algorithm is used to find a set of mutually non-adjacent nodes that cannot be extended further. Typical applications include resource allocation (assigning resources to non-conflicting tasks), wireless network channel assignment (selecting non-interfering transmitters), social network analysis (identifying groups of users with no direct connections), and combinatorial optimization problems where conflict-free subsets are required.
  Tuning_Mechanisms:
    nodes: Specifying a seed set of nodes forces the algorithm to include those nodes in the result, which is useful when certain nodes must be part of the solution by domain constraints. The provided nodes must form an independent set themselves, otherwise an exception is raised.
    seed: Setting the seed controls the randomness of the greedy node selection process, enabling reproducible results across runs. Different seeds may produce different maximal independent sets of the same or different sizes, since multiple valid maximal independent sets can exist in a graph.
  Principles:
    description: The maximal_independent_set algorithm finds a maximal independent set using a randomized greedy approach. Starting from an initial set of nodes (provided or randomly chosen), it iteratively adds randomly selected available nodes that are not adjacent to any node already in the set, until no more nodes can be added. The result is guaranteed to be maximal (no node can be added without violating independence) but not necessarily maximum (it may not be the largest possible independent set). The algorithm does not support directed graphs.
    time_complexity: O(V + E) where V is the number of nodes and E is the number of edges.
  solvable_questions:
  - Find a maximal independent set in the current undirected graph.
  - In a conflict graph where edges represent resource conflicts, find a maximal set of non-conflicting resources that can be allocated simultaneously.
  - In a wireless network, identify a maximal set of transmitters that can operate simultaneously without interference.
  - Find a maximal independent set that is guaranteed to include a specified subset of nodes.
  - In a social network, identify a maximal group of users who share no direct connections with each other.
  - In a task scheduling graph where edges represent task conflicts, find a maximal set of tasks that can be executed in parallel.
  - Generate multiple different maximal independent sets by varying the random seed to explore the solution space.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.mis.maximal_independent_set.html

- id: lowest_common_ancestor
  task_type_id: Tree & Spanning Tree
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: directed graph
          description: A NetworkX directed graph.
          required: true
        node1:
          type: node
          description: The first node in the graph for which to compute the lowest common ancestor.
          required: true
        node2:
          type: node
          description: The second node in the graph for which to compute the lowest common ancestor.
          required: true
        default:
          type: object
          description: Returned if no common ancestor between node1 and node2.
          default: null
    output_schema:
      description: The lowest common ancestor of node1 and node2, or default if they have no common ancestors.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The lowest_common_ancestor algorithm is used to find the most recent common ancestor of two nodes in a directed acyclic graph. Typical applications include compiler design and program analysis (finding common dominators in control flow graphs), version control systems (finding the common base commit of two branches), biological taxonomy (finding the common ancestor of two species in a phylogenetic tree), and ontology reasoning (finding the most specific common concept of two nodes in a knowledge hierarchy).
  Tuning_Mechanisms:
    default: Setting a custom default value allows the caller to distinguish between the case where no common ancestor exists and the case where the ancestor is None. This is useful in downstream logic that needs to handle missing ancestors differently from found ones.
  Principles:
    description: The lowest_common_ancestor algorithm computes the lowest common ancestor of the given pair of nodes in a directed graph. The graph must be a directed acyclic graph; the algorithm is not defined for graphs with cycles.
  solvable_questions:
  - Find the lowest common ancestor of two given nodes in a directed acyclic graph.
  - In a version control DAG, find the most recent common commit of two branches.
  - In a phylogenetic tree represented as a DAG, find the most recent common ancestor of two species.
  - In a company organizational hierarchy, find the lowest common manager of two employees.
  - In a knowledge graph ontology, find the most specific common concept shared by two entities.
  - In a compilation dependency DAG, find the nearest common dependency of two modules.
  - Given two nodes with no common ancestors, return a custom default value instead of None.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.lowest_common_ancestors.lowest_common_ancestor.html

- id: percolation_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        attribute:
          type: None or string, optional (default='percolation')
          description: Name of the node attribute to use for percolation state, used if states is None. If a node does not set the attribute, the state of that node will be set to the default value of 1. If all nodes do not have the attribute, all nodes will be set to 1 and the centrality measure will be equivalent to betweenness centrality.
          default: percolation
        states:
          type: None or dict, optional (default=None)
          description: Specify percolation states for the nodes, nodes as keys states as values.
          default: null
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used as weight. The weight of an edge is treated as the length or distance between the two sides. For weighted graphs the edge weights must be greater than zero. Zero edge weights can produce an infinite number of equal length paths between pairs of nodes.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with percolation centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Percolation centrality is used to identify nodes that are most influential in the propagation of a percolation process through a network, taking into account both the network topology and the current percolation state of each node. It is especially suited for dynamic network scenarios such as epidemic spreading in social networks (tracking infection states), computer virus propagation in computer networks, and disease transmission across geographic networks of towns. It reduces to betweenness centrality when all nodes share the same percolation state.
  Tuning_Mechanisms:
    attribute: Specifying the node attribute name allows the algorithm to read percolation states directly from node data already stored in the graph, which is convenient when the graph is pre-annotated with state information such as infection status or activation level.
    states: Providing a states dictionary directly overrides the attribute-based lookup, giving full programmatic control over each node's percolation state without modifying the graph's node attributes. This is useful for simulating different percolation scenarios without altering graph data.
    weight: Setting a weight attribute makes the algorithm use weighted shortest paths, which affects how percolated paths are counted. This is appropriate when edge weights represent distances or transmission costs. Edge weights must be strictly positive; zero edge weights can produce an infinite number of equal length paths between pairs of nodes.
  Principles:
    description: Percolation centrality of a node v is defined as the proportion of percolated paths passing through v, weighted by the percolation states of the source nodes. It quantifies the relative impact of v based on both its topological position on shortest paths and the percolation states of nodes in the network. The algorithm is based on Piraveenan et al. (2013), with pair dependencies accumulated using the method of Brandes (2001) for betweenness centrality. When all nodes are in the same percolation state, the measure is equivalent to betweenness centrality.
  solvable_questions:
  - Compute percolation centrality for all nodes given their current infection or activation states.
  - In an epidemic simulation, which nodes are most critical to the spread of infection given the current infection state of each node?
  - In a computer network under virus attack, which nodes most frequently lie on paths between infected and uninfected nodes?
  - Rank nodes by their percolation centrality to identify the most influential spreaders at a specific stage of a percolation process.
  - How does the centrality ranking of nodes change as the percolation state of the network evolves over time?
  - In a geographic disease transmission network, which towns are most critical to inter-regional disease spread given current infection rates?
  - Compare percolation centrality with betweenness centrality to assess the impact of node percolation states on node importance.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.centrality.percolation_centrality.html

- id: all_simple_paths
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        source:
          type: node
          description: Starting node for path.
          required: true
        target:
          type: node or iterable of nodes
          description: Single node or iterable of nodes at which to end path.
          required: true
        cutoff:
          type: integer, optional (default=None)
          description: Depth to stop the search. Only paths with length <= cutoff are returned, where the length of a path is the number of edges (len(path) - 1). If None, no depth limit is applied.
          default: null
    output_schema:
      type: generator
      description: A generator that produces lists of simple paths from source to target, in no particular order. If parallel edges exist, the same node sequence may be returned multiple times.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The all_simple_paths algorithm is used to enumerate all loop-free paths between two nodes in a graph. Typical applications include network reliability analysis (finding all possible routes between two points), security and audit analysis (discovering all possible access paths between nodes in an access control graph), fault tolerance evaluation (identifying all alternative paths in a communication network), and dependency analysis (enumerating all dependency chains between two modules).
  Tuning_Mechanisms:
    cutoff: Setting a cutoff limits the maximum path length returned, which is essential for large graphs where the number of simple paths can grow exponentially (up to O(n!) in complete graphs). A smaller cutoff drastically reduces computation time and memory usage, at the cost of missing longer paths. If the graph is large and no cutoff is set, the function may run for a very long time.
  Principles:
    description: The all_simple_paths algorithm generates all simple paths (paths with no repeated nodes) from source to target using a modified depth-first search. Starting from the source node, it explores neighbors recursively, tracking visited nodes to avoid repetition, until the target is reached or the cutoff depth is exceeded. The algorithm does not guarantee any particular ordering of the returned paths. For multigraphs, if parallel edges allow the same node sequence to be traversed in multiple ways, that sequence is returned once per viable edge combination. Based on Sedgewick (2001).
    time_complexity: O(V + E) per path found; total runtime can be O(n!) in the worst case (complete graph) due to the exponential number of simple paths.
  solvable_questions:
  - Find all simple paths between two nodes in the graph.
  - In a network reliability analysis, enumerate all loop-free routes between a source and a destination.
  - In an access control graph, find all possible permission chains from a user node to a resource node.
  - Find all simple paths with length no greater than k between two nodes.
  - In a dependency graph, enumerate all dependency chains between two modules.
  - In a directed acyclic graph, find all paths from root nodes to leaf nodes.
  - How many distinct simple paths exist between two nodes in the network?
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.simple_paths.all_simple_paths.html

- id: shortest_simple_paths
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph. MultiGraph and MultiDiGraph are not supported.
          required: true
        source:
          type: node
          description: Starting node for path.
          required: true
        target:
          type: node
          description: Ending node for path.
          required: true
        weight:
          type: string or callable, optional (default=None)
          description: If a string, it is the name of the edge attribute to be used as weight. If a callable, the weight of an edge is the value returned by the function, which must accept exactly three positional arguments (two endpoints and the edge attribute dictionary) and return a number or None. The weight function can be used to hide edges by returning None. If None, all edges are considered to have unit weight. No negative weights are allowed.
          default: null
    output_schema:
      type: generator
      description: A generator that produces lists of simple paths in order from shortest to longest.
    raises:
      NetworkXNoPath: If no path exists between source and target.
      NetworkXError: If source or target nodes are not in the input graph.
      NetworkXNotImplemented: If the input graph is a Multi[Di]Graph.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The shortest_simple_paths algorithm generates all simple paths between two nodes in order from shortest to longest, implementing Yen's K-shortest paths algorithm. It is commonly used in network routing (finding the K most efficient routes between two points as backup paths), logistics optimization (ranking delivery routes by cost), network resilience analysis (evaluating alternative paths in order of efficiency), and recommendation systems (finding the K closest relationship chains between two entities in a knowledge graph).
  Tuning_Mechanisms:
    weight: Providing a weight string or callable makes the algorithm rank paths by total edge weight rather than hop count, which is appropriate when edges have different costs, distances, or latencies. Setting weight to None ranks paths by number of edges. Note that negative weights are not permitted and will cause incorrect results.
  Principles:
    description: The shortest_simple_paths algorithm generates all simple paths from source to target in non-decreasing order of length (or total weight if weighted), based on Yen's K-shortest loopless paths algorithm (Yen, 1971). Finding the first K paths requires O(KN^3) operations. The algorithm does not support multigraphs (MultiGraph or MultiDiGraph).
    time_complexity: O(K * N^3) to find the first K paths, where N is the number of nodes (Yen, 1971).
  solvable_questions:
  - Generate all simple paths between two nodes in order from shortest to longest.
  - Find the K shortest simple paths between two nodes in a weighted graph.
  - In a network routing scenario, find the top-3 shortest backup routes between two routers.
  - In a logistics network, rank all delivery routes between two warehouses by total cost.
  - In a knowledge graph, find the K shortest relationship chains between two entities.
  - What is the second shortest path between two nodes, considering only simple paths?
  - In a road network, enumerate all simple routes from source to destination sorted by total travel distance.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.simple_paths.shortest_simple_paths.html
  
- id: simrank_similarity
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph. SimRank is typically applied to directed graphs, where similarity is defined based on incoming neighbors, but the function accepts a NetworkX graph object.
          required: true
        source:
          type: node, optional
          description: If specified, return only the SimRank similarities from this source node to all other nodes, or to the target node if target is also specified.
          default: null
        target:
          type: node, optional
          description: If specified together with source, return only the SimRank similarity between the source node and the target node.
          default: null
        importance_factor:
          type: float, optional
          description: Decay factor controlling how much similarity propagates through neighbors across iterations. It is commonly denoted by C in the SimRank formulation. Must typically be between 0 and 1.
          default: 0.9
        max_iterations:
          type: int, optional
          description: Maximum number of fixed-point iterations used to compute SimRank scores.
          default: 1000
        tolerance:
          type: float, optional
          description: Error tolerance used as the stopping criterion for iterative convergence.
          default: 0.0001
    output_schema:
      type: float or dictionary
      description: If both source and target are specified, returns a single float similarity score. If only source is specified, returns a dictionary keyed by target nodes with their SimRank similarities to the source. If neither source nor target is specified, returns a dictionary of dictionaries keyed by node pairs.
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The simrank_similarity algorithm is mainly used for node similarity analysis in graph-structured data, especially in directed relational networks such as citation networks, web graphs, recommendation graphs, knowledge graphs, and social interaction graphs. It is suitable for identifying structurally similar nodes even when they are not directly connected. For example, in a citation network, two papers may receive a high SimRank score if they are cited by similar sets of papers; in a recommendation graph, two items may be considered similar if they are connected to similar users or entities.
  Tuning_Mechanisms:
    importance_factor: Adjusting importance_factor changes how strongly similarity propagates through the graph. A larger value places more weight on recursive structural similarity from neighbors and allows similarity to travel farther through the network, while a smaller value emphasizes more local structure and reduces long-range influence. The default value 0.9 is commonly used in SimRank-style similarity propagation.
    max_iterations: Increasing max_iterations allows more refinement of the iterative fixed-point solution, which may improve accuracy on large or structurally complex graphs. However, it also increases runtime. In practice, this parameter is important when the graph is large, sparse, or slow to converge.
    tolerance: A smaller tolerance enforces stricter convergence and can yield more stable similarity estimates, but may require more iterations. A larger tolerance allows earlier stopping and faster computation at the cost of lower numerical precision.
    source_target_selection: Supplying source or source plus target can greatly reduce the amount of computation and memory required when only local or pairwise similarity queries are needed. Omitting both is convenient for full similarity analysis over the whole graph, but can be much more expensive on large networks.
  Principles:
    description: The simrank_similarity algorithm is based on the recursive principle that two nodes are similar if they are referenced by similar nodes. In its standard form for directed graphs, the similarity between two nodes u and v is defined as s(u, v) = 1 when u = v, and otherwise s(u, v) = C / (|I(u)| |I(v)|) * sum over a in I(u), b in I(v) of s(a, b), where I(u) and I(v) are the in-neighbor sets of u and v, and C is the importance_factor. This recursive definition is solved iteratively until convergence or until the maximum number of iterations is reached. The method captures structural equivalence rather than simple local overlap, making it useful for discovering latent similarity patterns in relational graphs.
    time_complexity: The computational cost depends on graph size, average in-degree, and the number of iterations required for convergence. Full all-pairs SimRank can be expensive in both time and memory on large graphs, so restricted source-target queries are often preferred in practice.
  solvable_questions:
    - Compute SimRank similarities between all pairs of nodes in the current graph.
    - Compute the SimRank similarity between a specified source node and target node.
    - Rank the Top-20 nodes most structurally similar to a given node.
    - In the citation network, which papers are most structurally similar because they are cited by similar papers?
    - In the web graph, which pages are most similar based on incoming link structure?
    - In the recommendation graph, which items are most similar because they are connected to similar users?
    - In the social interaction graph, which users occupy similar structural roles despite not being directly connected?
    - Find latent structural similarity beyond direct neighbors or shortest path proximity.
  url: https://dl.acm.org/doi/10.1145/775047.775126

- id: graph_edit_distance
  task_type_id: Graph Query
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G1:
          type: graph
          description: The first NetworkX graph. It must be of the same graph type as G2.
          required: true
        G2:
          type: graph
          description: The second NetworkX graph. It must be of the same graph type as G1.
          required: true
        node_match:
          type: callable, optional
          description: A function that returns True if a node in G1 and a node in G2 should be considered equal during matching, usually based on node attributes.
          default: null
        edge_match:
          type: callable, optional
          description: A function that returns True if an edge in G1 and an edge in G2 should be considered equal during matching, usually based on edge attributes.
          default: null
        node_subst_cost:
          type: callable, optional
          description: A function returning the substitution cost for replacing a node in G1 with a node in G2. If specified, it overrides node_match.
          default: null
        node_del_cost:
          type: callable, optional
          description: A function returning the deletion cost for removing a node from G1.
          default: null
        node_ins_cost:
          type: callable, optional
          description: A function returning the insertion cost for adding a node from G2.
          default: null
        edge_subst_cost:
          type: callable, optional
          description: A function returning the substitution cost for replacing an edge in G1 with an edge in G2. If specified, it overrides edge_match.
          default: null
        edge_del_cost:
          type: callable, optional
          description: A function returning the deletion cost for removing an edge from G1.
          default: null
        edge_ins_cost:
          type: callable, optional
          description: A function returning the insertion cost for adding an edge from G2.
          default: null
        roots:
          type: 2-tuple of nodes, optional
          description: A pair of root nodes, one from G1 and one from G2, that are forced to match. This is useful when alignment should be anchored at specified nodes.
          default: null
        upper_bound:
          type: numeric, optional
          description: An upper bound on the graph edit distance. Search branches with cost above this bound may be pruned.
          default: null
        timeout:
          type: numeric, optional
          description: Maximum number of seconds allowed for the search. If exceeded, the best distance found so far may be returned.
          default: null
    output_schema:
      type: float or None
      description: Returns the graph edit distance between G1 and G2, i.e., the minimum cost of transforming G1 into a graph isomorphic to G2 using node and edge edit operations. If the computation does not finish within constraints, the result may be approximate or None depending on search progress and stopping conditions.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
      other: The two graphs G1 and G2 must be of the same type
  Application_scenario: The graph_edit_distance algorithm is mainly used in graph similarity, graph matching, structural comparison, pattern recognition, and graph-based retrieval tasks. It is suitable for comparing whether two graphs represent similar structures when exact isomorphism is too strict. Typical application domains include molecular graph comparison, biological network matching, program dependence graph comparison, scene graph alignment, document structure comparison, and trajectory or workflow graph matching. For example, in a molecular application, it can measure how much one molecular graph must be edited to become another; in workflow analysis, it can quantify how different two task dependency graphs are.
  Tuning_Mechanisms:
    node_match_edge_match: Supplying node_match and edge_match allows the algorithm to respect semantic equality defined by attributes rather than relying only on topology. This is useful when labels, types, or categories of nodes and edges are important for the similarity notion.
    substitution_insertion_deletion_costs: Custom cost functions are the main mechanism for shaping the meaning of similarity. Higher substitution costs make attribute mismatches more significant, while lower insertion or deletion costs make missing or extra structure less penalized. By adjusting these costs, the user can emphasize topology, labels, or domain-specific semantics.
    roots: Providing roots constrains the alignment by forcing a specific node in G1 to correspond to a specific node in G2. This is useful for anchored matching, query-based alignment, or scenarios where a known correspondence must be preserved.
    upper_bound: Setting upper_bound can reduce search effort by pruning solutions whose cost already exceeds an acceptable threshold. This is valuable when only sufficiently similar graph pairs are of interest.
    timeout: Setting timeout limits computation time on hard graph matching instances. This is especially important because graph edit distance search can become very expensive on larger graphs.
  Principles:
    description: The graph_edit_distance algorithm measures graph similarity as the minimum total cost of an edit path that transforms graph G1 into a graph isomorphic to G2. Allowed edit operations typically include node substitution, node deletion, node insertion, edge substitution, edge deletion, and edge insertion. When no custom cost functions are given, default matching behavior is used; when cost functions are supplied, the algorithm minimizes the total domain-specific transformation cost. Conceptually, graph edit distance extends the idea of Levenshtein distance from strings to graphs by searching over possible correspondences and edit operations. A smaller distance indicates greater similarity between the two graphs, while a larger distance indicates greater structural or semantic difference.
    time_complexity: Graph edit distance is computationally expensive and generally grows combinatorially with graph size because it involves searching over possible node correspondences and edit paths. In practice, runtime depends heavily on graph size, structure, attribute constraints, pruning effectiveness, upper_bound, and timeout settings.
  solvable_questions:
    - Compute the graph edit distance between two given graphs.
    - Compare two workflow graphs and quantify how structurally different they are.
    - Determine which graph in a candidate set is most similar to a query graph.
    - In a molecular graph dataset, which molecule is most structurally similar to the target molecule under edit cost constraints?
    - In a program analysis setting, how different are two control-flow or dependence graphs?
    - In a scene graph application, which object-relation graph best matches the query scene?
    - In a biological network setting, how much editing is required to transform one interaction network motif into another?
    - Evaluate whether two dependency graphs are nearly equivalent when exact graph isomorphism fails.
  url: https://hal.science/hal-01168816

- id: node_boundary
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph. The function returns the boundary nodes adjacent to a specified node set. It can be applied to undirected graphs and directed graphs, though the interpretation in directed graphs depends on edge direction.
          required: true
        nbunch1:
          type: container of nodes
          description: A set, list, or other iterable container of nodes representing the source subset whose external node boundary is to be computed.
          required: true
        nbunch2:
          type: container of nodes, optional
          description: A second set of candidate nodes to restrict the search space for boundary nodes. If specified, only nodes in nbunch2 that are adjacent to nbunch1 and not contained in nbunch1 are returned.
          default: null
    output_schema:
      type: list or iterator of nodes
      description: Returns an iterator over nodes that are not in nbunch1 but have at least one edge connecting them to a node in nbunch1. If nbunch2 is provided, the result is restricted to nodes in nbunch2.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The node_boundary algorithm is mainly used for identifying the external frontier of a node subset in a graph. It is suitable for graph partition analysis, community boundary detection, contagion and diffusion modeling, influence scope analysis, cut and separator analysis, and local neighborhood expansion. For example, in a social network, it can identify users outside a target group who are directly connected to members of that group; in a communication network, it can reveal the next-hop exposure region of a compromised subnetwork; in community analysis, it helps characterize how a cluster interfaces with the rest of the graph.
  Tuning_Mechanisms:
    nbunch1_selection: The choice of nbunch1 determines which subgraph frontier is being examined. A tightly knit community, a candidate partition, a seed set, or a suspicious node subset may produce very different boundary structures. This is the primary way to control the semantic meaning of the result.
    nbunch2_restriction: Supplying nbunch2 restricts the boundary search to a specified candidate region. This is useful when the analysis only concerns interactions between two known groups, such as cross-community interfaces, bipartite-style exposures, or controlled partition comparisons.
    graph_directionality: In directed graphs, whether outgoing adjacency, incoming adjacency, or the library’s default neighborhood semantics are used affects interpretation. Users should align the result with the application semantics, such as information flow, citation direction, or dependency direction.
  Principles:
    description: The node_boundary algorithm identifies the set of nodes lying just outside a given node subset. Formally, for a node set S, the node boundary consists of all nodes v not in S such that there exists at least one edge between some node u in S and v. If a restricting set T is provided through nbunch2, the boundary is limited to nodes in T that satisfy this adjacency condition. Conceptually, node_boundary captures the immediate external interface of a subset, making it useful for studying local expansion, exposure surfaces, and graph cuts at the node level.
    time_complexity: The computational cost depends mainly on the size of nbunch1 and the total adjacency volume of nodes in nbunch1. In practice, it is usually efficient for local subset analysis, especially when compared with full-graph global metrics.
  solvable_questions:
    - Find all external boundary nodes adjacent to a specified node set in the current graph.
    - Which nodes lie immediately outside a given community but connect directly to it?
    - In the dependency graph, which tasks are outside the selected task group but directly depend on or interact with it?
    - In the social network, which users are directly exposed to the influence of the target user group?
    - Restrict the boundary analysis to a second candidate node set and identify cross-group interface nodes.
    - For a suspicious subgraph, which outside nodes form its immediate contact surface?
    - Compare the external frontiers of two communities by examining their node boundaries.
    - Identify the next-step reachable frontier around a seed set before performing graph expansion.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.boundary.node_boundary.html

- id: edge_expansion
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        S:
          type: collection of nodes
          description: A collection of nodes in G.
          required: true
        T:
          type: collection of nodes
          description: A collection of nodes in G.
          required: true
        weight:
          type: object, optional
          description: Edge attribute key to use as weight. If not specified, edges have weight one.
          default: null
    output_schema:
      type: number
      description: The edge expansion between the two sets S and T.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The edge_expansion algorithm is mainly used for measuring how strongly two node subsets are connected through edges in a graph. It is suitable for graph partition analysis, community separability evaluation, cut quality assessment, bottleneck detection, and connectivity analysis between two regions of a network. For example, in a social network, it can quantify how strongly two user groups interact; in a communication network, it can measure the coupling strength between two subnetworks; in a task dependency graph, it can indicate how tightly two modules are connected.
  Tuning_Mechanisms:
    subset_selection: The choice of node sets S and T directly determines the semantic meaning of the result. Different candidate communities, partitions, or functional modules may exhibit very different expansion values.
    weight: Supplying a weight attribute allows the algorithm to measure weighted connectivity instead of simply counting edges. This is useful when edges carry capacities, communication frequencies, strengths, or other domain-specific importance values.
    partition_design: The metric is most informative when S and T represent meaningful graph regions, such as two communities, two subnetworks, or two task groups being compared for coupling strength.
  Principles:
    description: The edge_expansion algorithm measures the degree of connectivity between two node sets S and T by examining the boundary edges crossing between them and normalizing by the size of the smaller side. Conceptually, it reflects how easily one subset expands into the other through graph connections. A larger value indicates stronger interconnection between the two sets, while a smaller value suggests weaker coupling or clearer separation. When a weight attribute is provided, the computation uses weighted edge contributions instead of treating every edge equally.
    time_complexity: The computational cost depends mainly on the number of edges incident to nodes in S and T and is generally efficient for local partition or subset-to-subset connectivity analysis.
  solvable_questions:
    - Compute the edge expansion between two specified node sets in the current graph.
    - Measure how strongly two communities are connected.
    - Compare the coupling strength between different pairs of graph partitions.
    - In the communication graph, how strongly are two subnetworks linked?
    - In the task dependency graph, how tightly connected are two functional modules?
    - Evaluate whether two candidate communities are well separated or strongly entangled.
    - Measure weighted connectivity between two node groups when edge weights represent interaction strength.
    - Detect whether the boundary between two graph regions is sparse or dense.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.cuts.edge_expansion.html
  
- id: minimum_cycle_basis
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX Graph.
          required: true
        weight:
          type: string, optional
          description: Name of the edge attribute to use for edge weights.
          default: null
    output_schema:
      type: list of cycle lists
      description: A list of cycle lists. Each cycle list is a list of nodes which forms a cycle (loop) in G.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The minimum_cycle_basis algorithm is used to compute a minimum weight cycle basis of an undirected graph. It is suitable for scenarios where one needs a compact set of independent cycles whose total weight is minimal. In unweighted graphs, the algorithm minimizes the total cycle length; in weighted graphs, it minimizes the total edge-weight sum of the returned cycle basis. It can be used in circuit analysis, transportation loop analysis, network redundancy analysis, and other structural studies of undirected graphs.
  Tuning_Mechanisms:
    weight: The weight parameter controls how cycle cost is measured. If weight is not provided, the graph is treated as unweighted and the returned basis minimizes total cycle length. If weight is specified, the corresponding edge attribute is used as the edge weight, and the returned basis minimizes total weight.
  Principles:
    description: The minimum_cycle_basis algorithm returns a minimum weight cycle basis for G. A cycle basis is a collection of cycles such that any cycle in the graph can be written as a sum of cycles in the basis. Minimum weight means a cycle basis for which the total weight, or total length in the unweighted case, of all cycles is minimum.
    time_complexity: The NetworkX reference page does not explicitly state the time complexity.
  solvable_questions:
    - Compute a minimum weight cycle basis for the current undirected graph.
    - Find a cycle basis whose total weight is minimal.
    - In an unweighted graph, find the cycle basis with minimum total length.
    - In a weighted graph, find the cycle basis minimizing the sum of edge weights.
    - Return all cycles in a minimum cycle basis of the current graph.
    - Identify the independent cycles that form the minimum weight cycle basis.
    - In the current network, which cycles should be selected so that all other cycles can be represented with minimum total cost?
    - In a transportation network, find the minimum cost set of independent loops.
  url: http://link.springer.com/article/10.1007/s00453-007-9064-z

- id: hamiltonian_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A directed graph representing a tournament.
          required: true
    output_schema:
      type: list
      description: A list of nodes which form a Hamiltonian path in G.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
      extra: A directed graph representing a tournament.
  Application_scenario: The hamiltonian_path algorithm is used to return a Hamiltonian path in a tournament graph. It is suitable for structural analysis of tournaments, ordering problems on complete oriented graphs, and theoretical analysis of tournament connectivity. Since every tournament has a Hamiltonian path, this function is used when the input graph is known to be a tournament and one wants an ordering of nodes along such a path.
  Tuning_Mechanisms:
    graph_requirement: This function has no explicit tunable parameters. The input must be a tournament graph. The responsibility is on the caller to ensure that the graph is a tournament.
  Principles:
    description: The hamiltonian_path algorithm returns a Hamiltonian path in the given tournament graph. Each tournament has a Hamiltonian path. If furthermore the tournament is strongly connected, then the returned Hamiltonian path is a Hamiltonian cycle by joining the endpoints of the path.
    time_complexity: The NetworkX reference page does not explicitly state the time complexity.
  solvable_questions:
    - Compute a Hamiltonian path in the current tournament graph.
    - Return an ordering of nodes that forms a Hamiltonian path in the tournament.
    - In a strongly connected tournament, find a Hamiltonian path whose endpoints can be joined to form a Hamiltonian cycle.
    - Determine a valid linear ordering of all nodes such that each consecutive pair is connected by a directed edge.
    - In the current tournament graph, output one Hamiltonian path that visits every node exactly once.
    - Given a tournament graph, produce a node sequence representing a Hamiltonian path.
    - In a ranking scenario modeled as a tournament, find an ordering of entities consistent with pairwise outcomes.
    - In a competition graph where each pair has a winner, compute a path that visits all participants exactly once following edge directions.
  url: https://networkx.org/documentation/stable/reference/algorithms/generated/networkx.algorithms.tournament.hamiltonian_path.html

- id: current_flow_betweenness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        normalized:
          type: bool, optional
          description: If True the betweenness values are normalized by 2/((n-1)(n-2)) for graphs with n nodes.
          default: true
        weight:
          type: string or None, optional
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used as the numerical weight. Weights are interpreted as resistances.
          default: null
        dtype:
          type: data-type, optional
          description: Default data type for internal matrices. Set to float for lower memory consumption or to double for higher precision.
          default: float
        solver:
          type: string, optional
          description: Type of linear system solver to use. Supported options are "full", "lu", and "cg".
          default: full
    output_schema:
      type: dictionary
      description: Dictionary of nodes with current-flow betweenness centrality as the value.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The current_flow_betweenness_centrality algorithm is used to compute node centrality under an electrical-current model of information spreading. Unlike shortest-path betweenness, it considers flow through all possible paths in the graph. It is suitable for network analysis tasks where influence, communication, or transport is better modeled as distributed flow rather than strict shortest-path routing, such as social diffusion networks, transportation systems, communication networks, infrastructure graphs, and biological interaction networks.
  Tuning_Mechanisms:
    normalized: The normalized parameter controls whether the returned current-flow betweenness centrality values are scaled by a normalization factor depending on the number of nodes in the graph. This is useful when comparing centrality values across graphs of different sizes.
    weight: The weight parameter specifies the edge attribute used as the numerical weight, interpreted as resistance. If omitted, all edges are treated equally. Supplying a weight attribute allows the method to account for heterogeneous edge costs or resistances in the network.
    dtype: The dtype parameter controls the numerical precision and memory usage of the internal matrix computations. Using float reduces memory cost, while using double may improve numerical stability and precision.
    solver: The solver parameter controls how the required linear systems are solved. The available options are "full", "lu", and "cg", and the choice can affect runtime and memory usage depending on graph size and sparsity.
  Principles:
    description: The current_flow_betweenness_centrality algorithm computes current-flow betweenness centrality for nodes. It uses an electrical current model for information spreading in contrast to standard betweenness centrality, which uses shortest paths. This measure is also known as random-walk betweenness centrality. The method is based on solving linear systems derived from the graph Laplacian and evaluating how much current passes through each node when unit current is injected and extracted over node pairs.
    time_complexity: According to the NetworkX documentation, the algorithm requires O(I(n - 1) + m n log n) space and O((1/2) n^3 + m n^2 log n) time, where I is the number of floating-point numbers needed for storing intermediate results.
  solvable_questions:
    - Compute current-flow betweenness centrality for all nodes in the current graph.
    - Rank all nodes by current-flow betweenness centrality.
    - Identify the Top-20 nodes with the highest current-flow betweenness centrality.
    - In the current network, which nodes are most central under an electrical-current flow model?
    - In the communication graph, which nodes carry the most distributed flow across all paths?
    - In the transportation network, which intersections are most important when flow can spread through multiple alternative routes?
    - In the infrastructure graph, which nodes are the most critical bridges under resistance-weighted flow?
    - Compare shortest-path betweenness centrality and current-flow betweenness centrality for the same graph.
  url: https://doi.org/10.1007/978-3-540-31856-9_44

- id: spectral_modularity_bipartition
  task_type_id: Clustering & Community
  Deployment_method:
