        source:
          type: node
          description: Starting node
          required: true
        target:
          type: node
          description: Ending node
          required: true
        weight:
          type: string or function
          description: 'If this is a string, then edge weights will be accessed via
            the edge attribute with this key (that is, the weight of the edge joining
            `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute
            exists, the weight of the edge is assumed to be one. If this is a function,
            the weight of an edge is the value returned by the function. The function
            must accept exactly three positional arguments: the two endpoints of an
            edge and the dictionary of edge attributes for that edge. The function
            must return a number or None to indicate a hidden edge.'
          default: weight
      required:
      - source
      - target
    output_schema:
      type: list
      description: List of nodes in a shortest path.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: Dijkstra's algorithm is commonly applied in network routing
    problems, particularly in weighted graphs where edges represent distances or costs.
    It is widely used in transportation networks to find the shortest path between
    two locations, such as navigating roads or optimizing delivery routes.
  Tuning_Mechanisms:
    source: Adjusting the source parameter changes the starting point of the pathfinding
      process, potentially resulting in different shortest paths depending on the
      specific structure of the graph.
    target: Changing the target parameter affects the endpoint for which the shortest
      path is sought, thus influencing the final output path based on the connection
      and distance from the source.
  Principles:
    description: Dijkstra's algorithm operates by iteratively exploring the shortest
      tentative distance from the source node to all other nodes in the graph. It
      is applicable to both directed and undirected graphs, but requires that all
      edge weights be non-negative. The time complexity is O((V + E) log V) with a
      priority queue, where V is the number of vertices and E is the number of edges.
    time_complexity: O(E + V log V)
- id: dijkstra_path_length
  task_type_id: Path
  Deployment_method:
