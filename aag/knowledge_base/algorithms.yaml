    network, it can identify influential individuals based on their core positions within communities.
  Tuning_Mechanisms: {}
  Principles:
    description: This algorithm operates by calculating the core number of each node, which reflects its connectivity within
      the graph. The core number represents the highest order of a k-core that includes the node, indicating its level of
      involvement in densely connected subgraphs. It is applicable to both undirected and directed graphs, and typically operates
