      can go from the source node, effectively controlling the size of the resulting
      tree. A smaller depth limit may lead to a more compact tree, whereas a larger
      limit could produce a more extensive exploration of the graph.
  Principles:
    description: The core principle of the dfs_tree algorithm is to perform a depth-first
      search (DFS) on a directed graph, resulting in a tree that represents the traversal
      order of nodes. It is designed for directed graphs and imposes a depth limit
      to control the extent of the search. The algorithm generally operates with a
      time complexity of O(V + E), where V is the number of vertices and E is the
      number of edges in the graph.
    time_complexity: O(V + E)
- id: gomory_hu_tree
  task_type_id: Flow & Cut
  Deployment_method:
