    output_schema:
      type: number
      description: Shortest path length.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The Dijkstra's path length algorithm is commonly used in transportation networks, such as road and
    rail systems, to find the shortest route between two points. It is also applied in network routing protocols and telecommunications
    to optimize data packet transfers. For instance, in a logistic application, it can determine the least cost path for delivering
    goods from warehouses to stores.
  Tuning_Mechanisms:
    source: Adjusting the source parameter changes the starting point of the pathfinding process, which directly affects the
      resulting shortest path and its length. Choosing a different source node may lead to a completely different path being
      identified as the shortest.
    target: Modifying the target parameter alters the endpoint for the pathfinding operation. This ensures that the algorithm
      computes the shortest path based on the newly defined destination, potentially resulting in a significantly different
      route and travel length.
  Principles:
    description: Dijkstra's algorithm operates by iteratively exploring the nearest unexplored vertex from the source, maintaining
      a priority queue of nodes to visit next based on their cumulative weight from the source. It is applicable to both directed
      and undirected graphs and is limited to graphs with non-negative weights. The time complexity of the algorithm is O((V
      + E) log V) with priority queue, where V is the number of vertices and E is the number of edges.
    time_complexity: O(E + V log V)
  solvable_questions:
  - Use Dijkstra's algorithm to calculate the length of the shortest path from node A to node Z.
