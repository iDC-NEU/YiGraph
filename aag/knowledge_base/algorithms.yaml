          description: 'Source node. Optional. Default value: None.'
          default: null
        t:
          type: node
          description: 'Target node. Optional. Default value: None.'
          default: null
        flow_func:
          type: function
          description: 'A function for computing the maximum flow among a pair of nodes. The function has to accept at least
            three parameters: a Digraph, a source node, and a target node. And return a residual network that follows NetworkX
            conventions (see :meth:`maximum_flow` for details). If flow_func is None, the default maximum flow function (:meth:`edmonds_karp`)
            is used. See below for details. The choice of the default function may change from version to version and should
            not be relied on. Default value: None.'
          default: null
    output_schema:
      type: integer
      description: Node connectivity of G, or local node connectivity if source and target are provided.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The node_connectivity algorithm is typically used in network analysis to evaluate the resilience and
    reliability of communication networks. It is particularly useful for assessing how many node failures a network can tolerate
    before it becomes disconnected. For instance, in telecommunications or transportation networks, understanding node connectivity
    helps in network design and failure recovery strategies.
  Tuning_Mechanisms:
    s: Adjusting the source node 's' impacts the calculation by determining the starting point for node connectivity analysis.
      The result reflects how critical 's' is in maintaining connectivity to 't'.
    t: Modifying the target node 't' alters the endpoint of the connectivity assessment. The output will showcase the connectivity
      level between 's' and 't', thus the specific connection quality and resilience between these two points are analyzed.
  Principles:
    description: This algorithm calculates the minimum number of nodes that need to be removed to disconnect a given pair
      of nodes in a graph, thereby working on the principles of flow networks. It applies to both directed and undirected
      graphs, leveraging max-flow min-cut theorems. The time complexity can vary based on the maximum flow implementation
      used, but generally, it is efficient for sparse graphs.
    time_complexity: O(k * V * E^2) (Flow based)
  solvable_questions:
  - Compute node_connectivity of the graph and output an integer.
  - Output the node connectivity of the network.
  - Return the node_connectivity result.
  - What is the minimum number of nodes that must fail to split the network?
  - In the datacenter topology, what is the minimum number of devices whose failure disconnects the network?
  - In the city road network, what is the minimum number of intersections to close to make the network disconnected?
  - In the logistics-station network, what is the minimum number of hubs to shut down to split the network?
  - In the collaboration network, what is the minimum number of members to remove to split the team network?
