- id: is_eulerian
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A graph, either directed or undirected.
          required: true
    output_schema:
      type: any
      description: 算法执行结果
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_eulerian algorithm is typically applied in graphs to determine the existence of Eulerian paths
    or circuits, which are essential in routing and traversal problems. It is particularly useful in network design, circuit
    design, and route optimization scenarios, such as the classic problem of the Seven Bridges of Königsberg or in logistical
    applications where a successful traversal of every path is required.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_eulerian algorithm is based on the Eulerian graph theory, which states that
      a graph is Eulerian if all its vertices have even degrees for undirected graphs, or exactly zero or two vertices have
      odd degrees for directed graphs. This algorithm works for both directed and undirected graphs and operates in linear
      time, O(V + E), where V is the number of vertices and E is the number of edges, requiring no specific input constraints
      beyond the definition of the graph itself.
    time_complexity: O(V + E)
  solvable_questions:
  - Use the is_eulerian algorithm to check whether this graph contains an Euler circuit, and output "Yes" or "No".
  - Please determine whether this graph contains an Euler circuit, and output only "Exists" or "Does not exist".
  - Determine whether there is an Euler circuit in the graph that traverses each edge exactly once, and give the answer as
    Yes/No.
  - In this webpage link jump graph, is there a way to start from a certain webpage, click each hyperlink exactly once, and
    finally return to the starting webpage?
  - In this "friend recommendation" relationship network, can we find a closed loop that starts from a user, traverses each
    "recommendation" relationship exactly once, and finally returns to that user?
  - In this paper citation network, can we find a path that starts from a paper, traces each citation relationship exactly
    once, and finally returns to the starting paper?
  - In this transaction transfer record network, can we find a circular capital flow that passes through each historical transfer
    record exactly once and returns to the starting account?
  - In this urban one-way road network graph, is there a route that allows a vehicle to start from a certain intersection,
    pass through each one-way road without repetition, and finally return to the starting point?
- id: capacity_scaling
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: DiGraph or MultiDiGraph on which a minimum cost flow satisfying all demands is to be found.
          required: true
        demand:
          type: string
          description: 'Nodes of the graph G are expected to have an attribute demand that indicates how much flow a node
            wants to send (negative demand) or receive (positive demand). Note that the sum of the demands should be 0 otherwise
            the problem in not feasible. If this attribute is not present, a node is considered to have 0 demand. Default
            value: ''demand''.'
          default: demand
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity that indicates how much flow the edge
            can support. If this attribute is not present, the edge is considered to have infinite capacity. Default value:
            ''capacity''.'
          default: capacity
        weight:
          type: string
          description: 'Edges of the graph G are expected to have an attribute weight that indicates the cost incurred by
            sending one unit of flow on that edge. If not present, the weight is considered to be 0. Default value: ''weight''.'
          default: weight
        heap:
          type: class
          description: 'Type of heap to be used in the algorithm. It should be a subclass of :class:`MinHeap` or implement
            a compatible interface. If a stock heap implementation is to be used, :class:`BinaryHeap` is recommended over
            :class:`PairingHeap` for Python implementations without optimized attribute accesses (e.g., CPython) despite a
            slower asymptotic running time. For Python implementations with optimized attribute accesses (e.g., PyPy), :class:`PairingHeap`
            provides better performance. Default value: :class:`BinaryHeap`.'
          default: <class 'networkx.utils.heaps.BinaryHeap'>
    output_schema:
      type: integer
      description: 'Cost of a minimum cost flow satisfying all demands. flowDict : dictionary If G is a digraph, a dict-of-dicts
        keyed by nodes such that flowDict[u][v] is the flow on edge (u, v). If G is a MultiDiGraph, a dict-of-dicts-of-dicts
        keyed by nodes so that flowDict[u][v][key] is the flow on edge (u, v, key).'
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The capacity_scaling algorithm is typically applied in transportation and logistics networks where
    the flow of goods or resources must meet specific supply and demand requirements. It is particularly useful for optimizing
    costs while ensuring that all demands are satisfied in networks with various capacity limitations, such as in urban transportation
    planning or network data routing.
  Tuning_Mechanisms:
    demand: Adjusting the 'demand' parameter allows users to specify which node attributes to consider for flow demands, thereby
      affecting the feasibility of flow solutions and overall cost calculations.
    capacity: Modifying the 'capacity' parameter enables users to set edge attributes that limit flow, influencing both the
      maximum flow possible and the potential costs incurred in the flow optimization process.
  Principles:
    description: The core principle of the capacity_scaling algorithm is to iteratively augment flow in the network while
      maintaining minimum cost, leveraging capacities of edges and the demands of nodes. It is suitable for directed graphs
      (digraphs) and handles constraints effectively, with time complexity typically being O(E log U), where U is the maximum
      capacity. The algorithm requires that the sum of demands equals zero for a feasible solution, and edges can have infinite
      capacity if not specified.
    time_complexity: O(E^2 log C)
  solvable_questions:
  - Calculate the maximum flow using Capacity Scaling and output results under different scaling factors (Delta).
  - Provide a ranked table of flow percentages for each edge when the final maximum flow is reached.
  - Output the augmenting paths selected during execution along with their corresponding scaling thresholds.
  - In long-term energy planning, how can we evaluate the maximum transport increase after pipeline expansion in stages?
  - For inter-provincial trade, calculate the maximum trade carrying capacity in the context of bulk commodity transport.
  - In large-scale base station deployment, how can we identify high-throughput core links through capacity grading?
  - Evaluate port container throughput and identify the shipping lanes that saturate first under high-load pressure.
  - Calculate the maximum flow velocity distribution of an industrial fluid distribution system at different pressure levels.
  - In cloud resource allocation, how can we calculate maximum bandwidth guarantees for users based on service tiers (capacity
    gradients)?
- id: edmonds_karp
  task_type_id: Flow & Cut
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Edges of the graph are expected to have an attribute called 'capacity'. If this attribute is not present,
            the edge is considered to have infinite capacity.
          required: true
        s:
          type: node
          description: Source node for the flow.
          required: true
        t:
          type: node
          description: Sink node for the flow.
          required: true
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity that indicates how much flow the edge
            can support. If this attribute is not present, the edge is considered to have infinite capacity. Default value:
            ''capacity''.'
          default: capacity
        residual:
          type: NetworkX graph
          description: 'Residual network on which the algorithm is to be executed. If None, a new residual network is created.
            Default value: None.'
          default: null
        value_only:
          type: bool
          description: If True compute only the value of the maximum flow. This parameter will be ignored by this algorithm
            because it is not applicable.
          default: false
        cutoff:
          type: integer, float
          description: 'If specified, the algorithm will terminate when the flow value reaches or exceeds the cutoff. In this
            case, it may be unable to immediately determine a minimum cut. Default value: None.'
          default: null
      required:
      - s
      - t
    output_schema:
      type: NetworkX DiGraph
      description: Residual network after computing the maximum flow.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The Edmonds-Karp algorithm is typically used in network flow problems where the objective is to determine
    the maximum flow between a source and a sink in a directed graph. It is particularly suitable for transportation networks,
    telecommunications, and supply chain logistics, where capacities of edges represent limits on resources. For instance,
    it can be employed to optimize water flow in a pipeline system or data packets in a communication network.
  Tuning_Mechanisms:
    capacity: Adjusting the capacity parameter allows the algorithm to interpret edge capacity differently. If the attribute
      is renamed or contains specific values, it can affect the maximum flow results based on the indicated limits of each
      edge.
    cutoff: Setting a cutoff value allows the algorithm to terminate early when a certain flow threshold is reached. This
      can impact performance and may prevent the discovery of the actual maximum flow, as the computation will stop before
      potentially finding more augmenting paths.
  Principles:
    description: The core principle of the Edmonds-Karp algorithm is the use of augmenting paths to iteratively increase flow
      from the source to the sink until no more augmenting paths can be found. This algorithm specifically works on directed
      graphs and has a time complexity of O(VE^2), where V is the number of vertices and E is the number of edges. It requires
      that the graph have edges with specified capacities, and if these are not provided, edges will be assumed to have infinite
      capacity.
    time_complexity: O(V * E^2)
  solvable_questions:
  - Use the Edmonds-Karp algorithm to calculate the maximum flow from the source to the sink.
  - Output all augmenting paths and their respective flows during the maximum flow computation.
  - Provide a flow distribution table (edge—flow) for all edges under the maximum flow result.
  - What is the maximum water supply from the reservoir to the target city? Output the distribution plan for each pipe.
  - What is the maximum wattage this power grid can carry without overloading?
  - During peak travel season, what is the maximum passenger capacity from Station A to B? List the saturation levels per
    segment.
  - Evaluate the data transmission limits between data centers and identify the bottleneck paths.
  - If all supplies need to be moved from the warehouse to the port, what is the maximum hourly vehicle capacity of the road
    network?
  - Calculate the maximum daily throughput for the current crude oil pipeline while maintaining safe pressure levels.
- id: minimum_edge_cut
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for minimum_edge_cut
          required: true
        s:
          type: node
          description: 'Source node. Optional. Default value: None.'
          default: null
        t:
          type: node
          description: 'Target node. Optional. Default value: None.'
          default: null
        flow_func:
          type: function
          description: 'A function for computing the maximum flow among a pair of nodes. The function has to accept at least
            three parameters: a Digraph, a source node, and a target node. And return a residual network that follows NetworkX
            conventions (see :meth:`maximum_flow` for details). If flow_func is None, the default maximum flow function (:meth:`edmonds_karp`)
            is used. See below for details. The choice of the default function may change from version to version and should
            not be relied on. Default value: None.'
          default: null
    output_schema:
      type: set
      description: Set of edges that, if removed, would disconnect G. If source and target nodes are provided, the set contains
        the edges that if removed, would destroy all paths between source and target.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The minimum_edge_cut algorithm is typically used in network analysis, specifically in identifying
    vulnerabilities in flow networks. It is particularly useful in telecommunications and transportation networks to determine
    critical edges whose failure would disconnect the network or impede flow between designated nodes. For instance, in a
    logistics company, this algorithm can help identify key routes that, if disrupted, would significantly affect the delivery
    of goods.
  Tuning_Mechanisms:
    s: Adjusting the source node parameter alters the starting point of the flow analysis, affecting which paths are considered
      in the minimum cut. Specifying a source is crucial for targeted analysis, particularly in flow networks where specific
      origin points are of interest.
    t: Changing the target node parameter defines the endpoint of the flow analysis, influencing the edges identified as critical
      for disconnection. This allows for focused studies on the connectivity between specific nodes, which is essential in
      applications requiring precise control over flow paths.
  Principles:
    description: This algorithm works on both directed and undirected graphs to determine the set of edges whose removal would
      disconnect the graph. It employs the concept of maximum flow to find the minimum cut in the network between source and
      target nodes. The algorithm is efficient, typically operating in polynomial time depending on the maximum flow function
      used, and it may require adequate memory depending on the size of the graph and the flow calculations.
    time_complexity: O(V * E + V^2 log V) (Stoer-Wagner)
  solvable_questions:
  - Compute minimum_edge_cut and output the cut-edge list.
  - Output a minimum edge cut set whose removal disconnects the graph.
  - Return the minimum_edge_cut result and output the list of edge pairs.
  - In the datacenter link topology, which smallest set of links to cut would disconnect the network?
  - In the road network, which smallest set of roads to close would break connectivity?
  - In the logistics-route network, which smallest set of routes to disrupt would split the network?
  - In the collaboration network, which smallest set of ties to remove would disconnect the network?
  - In the grid-line graph, which smallest set of lines to cut would partition the grid?
