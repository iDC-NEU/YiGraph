          default: null
        core_number:
          type: dictionary, optional
          description: Precomputed core numbers for the graph G.
          default: null
    output_schema:
      type: NetworkX graph
      description: The k-core subgraph
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The k-core algorithm is commonly used in social network analysis, biological networks, and other complex
    networks to identify cohesive groups of nodes. It helps in understanding the structure and functionality of networks by
    focusing on subgraphs where nodes have a degree of at least k, thus revealing robust clusters or communities. For example,
    in social networks, it can identify groups of friends who interact frequently.
  Tuning_Mechanisms:
    k: Adjusting the value of k will change the threshold for node inclusion in the k-core, meaning a higher k may yield smaller
      but more interconnected subgraphs, while a lower k might include larger groups with weaker connections.
    core_number: Providing precomputed core numbers can significantly speed up the computation of the k-core since it avoids
      the need for recalculating core values. This is particularly useful for large graphs where the core numbers are stable
      across different runs.
  Principles:
    description: The k-core algorithm works by recursively removing nodes with a degree less than k from an undirected graph
      until no such nodes remain. It is applicable to both directed and undirected graphs, but the interpretation differs
      between them. The time complexity is O(n + m) where n is the number of nodes and m is the number of edges, making it
      efficient for large sparse graphs.
    time_complexity: O(V + E)
  solvable_questions:
