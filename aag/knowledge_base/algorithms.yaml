      description: Dictionary of nodes with out-degree centrality as values.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The out-degree centrality algorithm is commonly applied in directed networks to assess the influence
    of nodes based on their connectivity. It is useful in social network analysis, where a person’s influence can be determined
