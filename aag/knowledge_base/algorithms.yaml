- id: betweenness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        k:
          type: int, optional (default=None)
          description: If k is not None use k node samples to estimate betweenness.
            The value of k <= n where n is the number of nodes in the graph. Higher
            values give better approximation.
          default: null
        normalized:
          type: bool, optional
          description: If True the betweenness values are normalized by `2/((n-1)(n-2))`
            for graphs, and `1/((n-1)(n-2))` for directed graphs where `n` is the
            number of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds
            the name of the edge attribute used as weight. Weights are used to calculate
            weighted shortest paths, so they are interpreted as distances.
          default: null
        endpoints:
          type: bool, optional
          description: If True include the endpoints in the shortest path counts.
          default: false
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
            Note that this is only used if k is not None.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with betweenness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The betweenness centrality algorithm is commonly used in social
    network analysis, transportation networks, and communication networks to identify
    influential nodes or to measure the extent to which a node lies on paths between
    other nodes. For instance, in a transportation network, it can help determine
    critical junctions that facilitate travel between various locations, thus assisting
    in infrastructure development.
  Tuning_Mechanisms:
    k: Adjusting the value of k allows for a trade-off between accuracy and computational
      efficiency; a higher k yields a more accurate estimate of betweenness centrality
      but increases time complexity, whereas a lower k speeds up the computation at
      the expense of precision.
    normalized: When set to True, normalizing the betweenness values makes them comparable
      across different graphs, which is useful when analyzing graphs of varying sizes
      and structures; however, if left as False, the raw count of shortest paths is
      returned, which might skew comparative analysis.
  Principles:
    description: The betweenness centrality algorithm calculates the extent to which
      a node lies on the shortest paths between other nodes in a graph, effectively
      identifying nodes that serve as bridges within the network. It is applicable
      to both directed and undirected graphs, and its time complexity is O(n^3) for
      exact calculations, while approximations using k samples can reduce computation
      time significantly depending on the chosen k.
    time_complexity: O(V * E) for unweighted, O(V * E + V^2 log V) for weighted
- id: closeness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
        u:
          type: node, optional
          description: Return only the value for node u
          default: null
        distance:
          type: edge attribute key, optional (default=None)
          description: Use the specified edge attribute as the edge distance in shortest
            path calculations.  If `None` (the default) all edges have a distance
            of 1. Absent edge attributes are assigned a distance of 1. Note that no
            check is performed to ensure that edges have the provided attribute.
          default: null
        wf_improved:
          type: bool, optional (default=True)
          description: If True, scale by the fraction of nodes reachable. This gives
            the Wasserman and Faust improved formula. For single component graphs
            it is the same as the original formula.
          default: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with closeness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The closeness centrality algorithm is typically applied in
    social networks, transportation networks, and communication networks to identify
    influential nodes based on their proximity to other nodes. It helps in optimizing
    resource allocation, improving information dissemination, and enhancing connectivity
    within the network. For example, in a social media platform, identifying key users
    who can spread information quickly can help in marketing strategies.
  Tuning_Mechanisms:
    u: Specifying a single node 'u' will limit the output to the closeness centrality
      value for that particular node, allowing for focused analysis on specific nodes
      instead of the entire graph.
    distance: Adjusting the 'distance' parameter allows the user to define custom
      edge weights or distances, which can significantly impact the calculated centrality
      values, especially in weighted networks where paths may vary in significance.
    wf_improved: Setting 'wf_improved' to False will calculate closeness centrality
      based on raw distances without scaling by the fraction of reachable nodes, which
      can yield different insights into the node's importance in the network.
  Principles:
    description: The core principle of the closeness centrality algorithm is based
      on measuring how close a node is to all other nodes in a graph. It computes
      the shortest paths from a node to all other nodes and uses these distances to
      determine centrality. This algorithm is applicable to both directed and undirected
      graphs, and its time complexity is O(V^2) for dense graphs, where V is the number
      of nodes. It is important to note that the algorithm may not yield meaningful
      results in disconnected graphs without considering components separately.
    time_complexity: O(V * (V + E))
- id: degree_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with degree centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: Degree centrality is commonly used in social network analysis
    to identify influential nodes within a network. It can be applied in various domains,
    such as marketing to understand key influencers for campaigns, or in transportation
    networks to identify critical junctions that could affect overall traffic flow.
  Tuning_Mechanisms: {}
  Principles:
    description: The degree centrality algorithm calculates the centrality of nodes
      based on the number of connections (or edges) they have in the graph. It works
      with both directed and undirected graphs, and efficiently computes the degree
      of each node in O(n + m) time complexity, where n is the number of nodes and
      m is the number of edges.
    time_complexity: O(V + E)
- id: edge_betweenness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        k:
          type: int, optional (default=None)
          description: If k is not None use k node samples to estimate betweenness.
            The value of k <= n where n is the number of nodes in the graph. Higher
            values give better approximation.
          default: null
        normalized:
          type: bool, optional
          description: If True the betweenness values are normalized by $2/(n(n-1))$
            for graphs, and $1/(n(n-1))$ for directed graphs where $n$ is the number
            of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds
            the name of the edge attribute used as weight. Weights are used to calculate
            weighted shortest paths, so they are interpreted as distances.
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
            Note that this is only used if k is not None.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of edges with betweenness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The edge_betweenness_centrality algorithm is typically used
    in social networks, transportation networks, and communication networks to identify
    critical edges that serve as bridges between different parts of the network. It
    helps in analyzing network efficiency, vulnerability, and the influence of specific
    connections in facilitating interactions. For example, in a social network, it
    can highlight which friendships (edges) enhance the overall connectivity between
    groups of friends (nodes).
  Tuning_Mechanisms:
    k: Adjusting the parameter k influences the number of node samples used to estimate
      the betweenness centrality. A higher k can lead to more accurate approximations
      of the centrality values, particularly in large or complex networks, while a
      lower k may result in a faster but less precise calculation.
    normalized: Setting the normalized parameter to True scales the betweenness values
      appropriately for comparisons across different graph sizes. This normalization
      allows for meaningful interpretation of centrality values, particularly when
      comparing results from graphs with different numbers of nodes or directed versus
      undirected edges.
  Principles:
    description: This algorithm calculates the betweenness centrality of edges in
      a graph by measuring the extent to which an edge lies on the shortest paths
      between pairs of nodes. It can be applied to both directed and undirected graphs,
      making it versatile for various applications. The time complexity is generally
      O(nm) for unweighted graphs, where n is the number of nodes and m is the number
      of edges, which may increase with larger datasets and if weights are involved.
    time_complexity: O(V * E)
- id: eigenvector_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph.
          required: true
        max_iter:
          type: integer, optional (default=100)
          description: Maximum number of power iterations.
          default: 100
        tol:
          type: float, optional (default=1.0e-6)
          description: Error tolerance (in Euclidean norm) used to check convergence
            in power iteration.
          default: 1.0e-06
        nstart:
          type: dictionary, optional (default=None)
          description: Starting value of power iteration for each node. Must have
            a nonzero projection on the desired eigenvector for the power method to
            converge. If None, this implementation uses an all-ones vector, which
            is a safe choice.
          default: null
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds
            the name of the edge attribute used as weight. In this measure the weight
            is interpreted as the connection strength.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with eigenvector centrality as the value. The
        associated vector has unit Euclidean norm and the values are nonegative.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Eigenvector centrality is commonly applied in social networks,
    citation networks, and web graphs to identify influential nodes that are well-connected
    to other influential nodes. It solves the problem of ranking vertices based on
    their overall importance within the network structure. For instance, in a social
    media platform, it can help identify key users who have a significant impact on
    information dissemination.
  Tuning_Mechanisms:
    max_iter: Increasing this parameter allows more iterations of the power method,
      which can lead to better convergence and more accurate centrality measures,
      albeit with higher computational costs. Conversely, a lower value may result
      in premature convergence, affecting accuracy.
    tol: Adjusting this parameter modifies the threshold for convergence in the power
      iteration process. A smaller tolerance may enhance the precision of the computed
      centrality values, but it can also increase the number of iterations required,
      thus affecting runtime.
  Principles:
    description: The eigenvector centrality algorithm computes the principal eigenvector
      of the graph's adjacency matrix to assign centrality scores, reflecting nodes'
      importance based on their connections. It works on both directed and undirected
      graphs and requires a connected graph for meaningful results. The time complexity
      is O(n + m) per iteration, where n is the number of nodes and m is the number
      of edges, while space complexity is O(n).
    time_complexity: O(k * (V + E)) (Iterative)
- id: harmonic_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
        nbunch:
          type: 'container (default: all nodes in G)'
          description: Container of nodes for which harmonic centrality values are
            calculated.
          default: null
        distance:
          type: edge attribute key, optional (default=None)
          description: Use the specified edge attribute as the edge distance in shortest
            path calculations.  If `None`, then each edge will have distance equal
            to 1.
          default: null
        sources:
          type: 'container (default: all nodes in G)'
          description: Container of nodes `v` over which reciprocal distances are
            computed. Nodes not in `G` are silently ignored.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with harmonic centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Harmonic centrality is particularly applicable in social network
    analysis, transportation networks, and communication networks, where understanding
    the influence or importance of nodes is crucial. It helps in identifying key individuals
    or hubs by analyzing the efficiency of node connectivity, thereby addressing problems
    such as targeted marketing or resource allocation.
  Tuning_Mechanisms:
    nbunch: Adjusting this parameter defines the specific subset of nodes for which
      the harmonic centrality is calculated, allowing focused analysis on particular
      sections of the graph. This can significantly improve performance by reducing
      computational overhead when only a portion of the graph is of interest.
    distance: By specifying an edge attribute for distance, it allows for flexibility
      in defining how distances between nodes are measured. This can lead to different
      harmonic centrality values depending on the weights assigned to the edges, making
      the algorithm adaptable to various scenarios where edge costs are not uniform.
  Principles:
    description: The harmonic centrality algorithm computes the centrality of nodes
      based on the inverse distance to other nodes in the graph, effectively capturing
      the connectivity and influence of each node. It works on both directed and undirected
      graphs and assumes that the graph is connected. The algorithm operates in O(n^2)
      time complexity in dense graphs, making it suitable for medium-sized networks.
    time_complexity: O(V * (V + E))
- id: in_degree_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with in-degree centrality as values.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The in_degree_centrality algorithm is typically applied in
    directed networks, where it is used to identify the importance of nodes based
    on the number of incoming connections they have. This is particularly useful in
    social network analysis, citation networks, and web page ranking, where nodes
    represent users, papers, or pages, respectively, and the connections indicate
    relationships or citations.
  Tuning_Mechanisms: {}
  Principles:
    description: The in_degree_centrality algorithm calculates the centrality of nodes
      based on their in-degree, which is the number of edges directed towards them.
      It works specifically on directed graphs and has a time complexity of O(V +
      E), where V is the number of vertices and E is the number of edges, making it
      efficient for large networks. The algorithm assumes that the input graph is
      connected and does not require any additional parameters beyond the graph itself.
    time_complexity: O(V + E)
- id: katz_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        alpha:
          type: float, optional (default=0.1)
          description: Attenuation factor
          default: 0.1
        beta:
          type: scalar or dictionary, optional (default=1.0)
          description: Weight attributed to the immediate neighborhood. If not a scalar,
            the dictionary must have a value for every node.
          default: 1.0
        max_iter:
          type: integer, optional (default=1000)
          description: Maximum number of iterations in power method.
          default: 1000
        tol:
          type: float, optional (default=1.0e-6)
          description: Error tolerance used to check convergence in power method iteration.
          default: 1.0e-06
        nstart:
          type: dictionary, optional
          description: Starting value of Katz iteration for each node.
          default: null
        normalized:
          type: bool, optional (default=True)
          description: If True normalize the resulting values.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds
            the name of the edge attribute used as weight. In this measure the weight
            is interpreted as the connection strength.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with Katz centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The Katz centrality algorithm is commonly applied in social
    networks, citation networks, and biological networks to identify influential nodes
    based on their connectivity. It is particularly useful for assessing the importance
    of nodes in directed graphs where not only direct connections but also indirect
    connections play a significant role. For instance, in a social media platform,
    it can help to find key influencers who have a strong impact through both direct
    and indirect relationships.
  Tuning_Mechanisms:
    alpha: Adjusting the alpha parameter changes the attenuation factor, impacting
      how much influence indirect connections have on the centrality measure. A higher
      alpha diminishes the influence of distant connections, focusing more on the
      immediate neighborhood.
    beta: The beta parameter determines the weight given to immediate neighboring
      nodes in the Katz centrality calculation. Setting it to a higher value emphasizes
      the contribution of direct connections, whereas a lower value may lead to a
      more balanced consideration of both direct and indirect connections.
  Principles:
    description: Katz centrality measures the influence of a node in a network by
      considering both direct and indirect paths to that node, weighted by an attenuation
      factor. The algorithm is applicable to both directed and undirected graphs and
      iteratively evaluates the centrality values of the nodes through a power method,
      which can converge based on the specified error tolerance. The time complexity
      is generally O(n + m) per iteration, where n is the number of nodes and m is
      the number of edges.
    time_complexity: O(k * (V + E)) (Iterative)
- id: load_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph.
          required: true
        cutoff:
          type: bool, optional (default=None)
          description: If specified, only consider paths of length <= cutoff.
          default: null
        normalized:
          type: bool, optional (default=True)
          description: If True the betweenness values are normalized by b=b/(n-1)(n-2)
            where n is the number of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, edge weights are ignored. Otherwise holds the name
            of the edge attribute used as weight. The weight of an edge is treated
            as the length or distance between the two sides.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The load centrality algorithm is typically applied in transportation
    and communication networks, where it helps to identify key nodes that manage significant
    flows of resources or information. This algorithm aids in optimizing network performance,
    identifying bottlenecks, and enhancing reliability by pinpointing critical nodes
    that, if compromised, could disrupt overall network functionality.
  Tuning_Mechanisms:
    cutoff: Adjusting the cutoff parameter limits the consideration of paths to a
      maximum length, which can lead to a more focused analysis of local centrality
      within a specific range. This can help in reducing computational complexity
      in large networks, but may overlook longer-range interactions in the flow of
      resources.
    normalized: Setting the normalized parameter to True scales the betweenness values
      relative to the size of the graph, allowing for easy comparison between nodes
      in graphs of different sizes. However, if set to False, the raw values are used,
      which may provide more insight into absolute centrality measures, but can complicate
      analyses across diverse network sizes.
  Principles:
    description: The core principle of load centrality is based on the idea of measuring
      the extent to which each node contributes to the network's overall flow, treating
      edges as conduits of resources. It works on both directed and undirected graphs,
      and it has a time complexity of O(n^3) for dense graphs or O(m+n) for sparse
      graphs, where n is the number of nodes and m is the number of edges. The algorithm
      requires a well-defined graph structure, and its performance hinges on the proper
      definition of weights if utilized.
    time_complexity: O(V * E)
- id: out_degree_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with out-degree centrality as values.
    graph_type:
      directed: true
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The out-degree centrality algorithm is commonly applied in
    directed networks to assess the influence of nodes based on their connectivity.
    It is useful in social network analysis, where a person’s influence can be determined
    by how many connections they initiate or broadcast to others. For instance, in
    a Twitter network, a user with a high out-degree centrality indicates they actively
    engage with and reach out to many followers.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the out-degree centrality algorithm is to calculate
      the number of outgoing edges for each node in a directed graph, thus identifying
      nodes that have a greater ability to influence others. It operates on directed
      graphs and has a time complexity of O(N + E), where N is the number of nodes
      and E is the number of edges, and a space complexity of O(N). This algorithm
      does not require any specific input constraints beyond a valid directed graph.
    time_complexity: O(V + E)
- id: subgraph_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for subgraph_centrality
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with subgraph centrality as the value.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: Subgraph centrality is typically used in social networks and
    biological networks, where the importance of nodes is evaluated based on their
    connectivity within subgraphs. It helps identify influential nodes that contribute
    significantly to the structure and function of the network. For example, in a
    social media platform, subgraph centrality can be used to find key users who can
    spread information effectively.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of subgraph centrality is to measure the influence
      of nodes based on the number and quality of their connections within all possible
      subgraphs. It works by counting the contribution of each node in all induced
      subgraphs of the original graph. This algorithm can be applied to both directed
      and undirected graphs, with a time complexity that depends on the graph's structure
      but may become computationally intensive for large networks due to the need
      to consider many subgraphs.
    time_complexity: O(V^3) (Spectrum based)
- id: find_cliques
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: An undirected graph.
          required: true
        nodes:
          type: list, optional (default=None)
          description: If provided, only yield *maximal cliques* containing all nodes
            in `nodes`. If `nodes` isn't a clique itself, a ValueError is raised.
          default: null
    output_schema:
      type: any
      description: iterator An iterator over maximal cliques, each of which is a list
        of nodes in `G`. If `nodes` is provided, only the maximal cliques containing
        all the nodes in `nodes` are returned. The order of cliques is arbitrary.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The find_cliques algorithm is commonly used in social network
    analysis to identify groups of individuals that are all directly connected to
    one another. This is particularly useful in understanding community structures
    and relationships within networks, such as finding tightly-knit groups in online
    platforms or identifying potential collaboration nodes in a professional setting.
  Tuning_Mechanisms:
    nodes: Providing a list of nodes can significantly narrow down the search space,
      allowing the algorithm to focus solely on maximal cliques that include all specified
      nodes. If the provided nodes do not form a clique themselves, the algorithm
      will raise a ValueError, ensuring that only valid inputs are processed.
  Principles:
    description: The core principle of the find_cliques algorithm is to exhaustively
      search for all maximal cliques within an undirected graph. It operates by exploring
      the graph's connections and systematically identifying sets of nodes that are
      fully interconnected. This algorithm is designed specifically for undirected
      graphs, and its time complexity can be exponential in the worst case, making
      it suitable for small to medium-sized graphs only.
    time_complexity: O(3^(V/3)) (Worst case exponential)
- id: k_clique_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for k_clique_communities
          required: true
        k:
          type: int
          description: Size of smallest clique
          required: true
        cliques:
          type: list or generator
          description: Precomputed cliques (use networkx.find_cliques(G))
          default: null
      required:
      - k
    output_schema:
      type: any
      description: Yields sets of nodes, one for each k-clique community.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The k_clique_communities algorithm is particularly useful
    in social network analysis, biological networks, and any context where community
    detection is vital. It identifies tightly knit groups of nodes based on the presence
    of cliques, aiding in the understanding of network structure and the function
    of interconnected entities. For instance, in social media networks, it can help
    identify groups of users who frequently interact with one another, thereby revealing
    potential interest groups or communities.
  Tuning_Mechanisms:
    k: Adjusting the parameter k modifies the minimum size of cliques that the algorithm
      considers when forming communities. A smaller k may yield larger communities
      with less structural cohesion, while a larger k can lead to more tightly-knit,
      smaller communities, offering insights into the density of connections within
      the network.
    cliques: The cliques parameter should contain a comprehensively precomputed list
      of cliques from the graph. Providing a more extensive set of cliques can enhance
      the algorithm's ability to detect communities, while a limited set might overlook
      significant overlapping structures.
  Principles:
    description: The core principle of the k_clique_communities algorithm is to leverage
      precomputed cliques in the graph to identify larger communities that contain
      at least one k-clique. The algorithm assumes the input graph can be either directed
      or undirected and processes the list of cliques to uncover overlapping communities.
      Due to the reliance on cliques, the algorithm's performance depends on the computational
      efficiency of the clique-finding step, with a typical time complexity influenced
      by the size and structure of the graph.
    time_complexity: Exponential (Clique finding)
- id: max_weight_clique
  task_type_id: Cliques & Cores
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        weight:
          type: string or None, optional (default='weight')
          description: The node attribute that holds the integer value used as a weight.
            If None, then each node has weight 1.
          default: weight
    output_schema:
      type: list
      description: 'the nodes of a maximum weight clique weight : int the weight of
        a maximum weight clique'
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The max_weight_clique algorithm is typically applied in social
    networks, bioinformatics, and resource allocation problems, where identifying
    a group of highly interconnected nodes with maximum weights is essential. For
    example, it can be used to find the most influential individuals in a social network
    or to identify subsets of genes that are co-expressed in a biological study.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows users to specify which node attribute
      is considered for calculating weights in the clique. If set to None, all nodes
      are treated equally with a default weight of 1, which may impact the identification
      of high-value cliques when certain nodes have significantly different weights.
  Principles:
    description: This algorithm operates by identifying subsets of nodes in an undirected
      graph that form cliques (fully connected subgraphs) while maximizing the total
      weight of the nodes in the clique. It specifically requires undirected graphs
      and can work with both weighted and unweighted nodes based on the weight parameter.
      The algorithm's complexity may vary based on the size of the graph, typically
      leading to NP-hard problems as the size increases.
    time_complexity: Exponential
- id: average_clustering
  task_type_id: Clustering & Community
  Deployment_method:
