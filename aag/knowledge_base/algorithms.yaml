- id: betweenness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        k:
          type: int, optional (default=None)
          description: If k is not None use k node samples to estimate betweenness. The value of k <= n where n is the number
            of nodes in the graph. Higher values give better approximation.
          default: null
        normalized:
          type: bool, optional
          description: If True the betweenness values are normalized by `2/((n-1)(n-2))` for graphs, and `1/((n-1)(n-2))`
            for directed graphs where `n` is the number of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used
            as weight. Weights are used to calculate weighted shortest paths, so they are interpreted as distances.
          default: null
        endpoints:
          type: bool, optional
          description: If True include the endpoints in the shortest path counts.
          default: false
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`. Note that this is only
            used if k is not None.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with betweenness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The betweenness centrality algorithm is commonly used in social network analysis, transportation networks,
    and communication networks to identify influential nodes or to measure the extent to which a node lies on paths between
    other nodes. For instance, in a transportation network, it can help determine critical junctions that facilitate travel
    between various locations, thus assisting in infrastructure development.
  Tuning_Mechanisms:
    k: Adjusting the value of k allows for a trade-off between accuracy and computational efficiency; a higher k yields a
      more accurate estimate of betweenness centrality but increases time complexity, whereas a lower k speeds up the computation
      at the expense of precision.
    normalized: When set to True, normalizing the betweenness values makes them comparable across different graphs, which
      is useful when analyzing graphs of varying sizes and structures; however, if left as False, the raw count of shortest
      paths is returned, which might skew comparative analysis.
  Principles:
    description: The betweenness centrality algorithm calculates the extent to which a node lies on the shortest paths between
      other nodes in a graph, effectively identifying nodes that serve as bridges within the network. It is applicable to
      both directed and undirected graphs, and its time complexity is O(n^3) for exact calculations, while approximations
      using k samples can reduce computation time significantly depending on the chosen k.
    time_complexity: O(V * E) for unweighted, O(V * E + V^2 log V) for weighted
  solvable_questions:
  - Compute the betweenness centrality of each node in the current graph and output the Top-20 nodes with the highest betweenness
    centrality.
  - Output the betweenness centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by betweenness centrality in the current graph.
  - In the current social network, which users most frequently appear on the shortest paths between other users?
  - In the communication network, which nodes act as the most frequent intermediaries on paths between different node pairs?
  - In the paper citation network, which papers most frequently lie on citation paths between other papers, connecting different
    research directions?
  - In the transportation or road network, which intersections are most frequently traversed by the shortest paths between
    different origins and destinations?
  - In the system dependency network, which modules most frequently lie on the paths between other modules, serving as critical
    intermediaries?
- id: closeness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
        u:
          type: node, optional
          description: Return only the value for node u
          default: null
        distance:
          type: edge attribute key, optional (default=None)
          description: Use the specified edge attribute as the edge distance in shortest path calculations.  If `None` (the
            default) all edges have a distance of 1. Absent edge attributes are assigned a distance of 1. Note that no check
            is performed to ensure that edges have the provided attribute.
          default: null
        wf_improved:
          type: bool, optional (default=True)
          description: If True, scale by the fraction of nodes reachable. This gives the Wasserman and Faust improved formula.
            For single component graphs it is the same as the original formula.
          default: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with closeness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The closeness centrality algorithm is typically applied in social networks, transportation networks,
    and communication networks to identify influential nodes based on their proximity to other nodes. It helps in optimizing
    resource allocation, improving information dissemination, and enhancing connectivity within the network. For example,
    in a social media platform, identifying key users who can spread information quickly can help in marketing strategies.
  Tuning_Mechanisms:
    u: Specifying a single node 'u' will limit the output to the closeness centrality value for that particular node, allowing
      for focused analysis on specific nodes instead of the entire graph.
    distance: Adjusting the 'distance' parameter allows the user to define custom edge weights or distances, which can significantly
      impact the calculated centrality values, especially in weighted networks where paths may vary in significance.
    wf_improved: Setting 'wf_improved' to False will calculate closeness centrality based on raw distances without scaling
      by the fraction of reachable nodes, which can yield different insights into the node's importance in the network.
  Principles:
    description: The core principle of the closeness centrality algorithm is based on measuring how close a node is to all
      other nodes in a graph. It computes the shortest paths from a node to all other nodes and uses these distances to determine
      centrality. This algorithm is applicable to both directed and undirected graphs, and its time complexity is O(V^2) for
      dense graphs, where V is the number of nodes. It is important to note that the algorithm may not yield meaningful results
      in disconnected graphs without considering components separately.
    time_complexity: O(V * (V + E))
  solvable_questions:
  - Compute the closeness centrality of each node in the current graph and output the Top-20 nodes with the highest closeness
    centrality.
  - Output the closeness centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by closeness centrality in the current graph.
  - In the current social network, which users have the smallest average distance to other users?
  - In the communication network, which nodes require the fewest average hops to reach other nodes?
  - In the paper citation network, which papers have the shortest average distance to other papers in the overall citation
    structure?
  - In the webpage link network, which pages can reach other pages with the fewest number of clicks?
  - In the system component interaction network, which components have the shortest average interaction distance to other
    components?
- id: degree_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph
          required: true
    output_schema:
      type: dictionary
      description: Dictionary of nodes with degree centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: Degree centrality is commonly used in social network analysis to identify influential nodes within
    a network. It can be applied in various domains, such as marketing to understand key influencers for campaigns, or in
    transportation networks to identify critical junctions that could affect overall traffic flow.
  Tuning_Mechanisms: {}
  Principles:
    description: The degree centrality algorithm calculates the centrality of nodes based on the number of connections (or
      edges) they have in the graph. It works with both directed and undirected graphs, and efficiently computes the degree
      of each node in O(n + m) time complexity, where n is the number of nodes and m is the number of edges.
    time_complexity: O(V + E)
  solvable_questions:
  - Compute the degree centrality of each node in the current graph and output the Top-20 nodes with the highest degree centrality.
  - Output the degree centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by degree centrality in the current graph.
  - In the current social network, which users have the most direct connections with others?
  - In the transaction network, which accounts have directly interacted with the largest number of other accounts?
  - In the co-authorship network, which authors have direct collaborations with the largest number of different authors?
  - In the communication network, which nodes have direct connections to the most other nodes?
  - In the webpage link network, which pages directly link to or are linked by the most other pages?
- id: edge_betweenness_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.
          required: true
        k:
          type: int, optional (default=None)
          description: If k is not None use k node samples to estimate betweenness. The value of k <= n where n is the number
            of nodes in the graph. Higher values give better approximation.
          default: null
        normalized:
          type: bool, optional
          description: If True the betweenness values are normalized by $2/(n(n-1))$ for graphs, and $1/(n(n-1))$ for directed
            graphs where $n$ is the number of nodes in G.
          default: true
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used
            as weight. Weights are used to calculate weighted shortest paths, so they are interpreted as distances.
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`. Note that this is only
            used if k is not None.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of edges with betweenness centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The edge_betweenness_centrality algorithm is typically used in social networks, transportation networks,
    and communication networks to identify critical edges that serve as bridges between different parts of the network. It
    helps in analyzing network efficiency, vulnerability, and the influence of specific connections in facilitating interactions.
    For example, in a social network, it can highlight which friendships (edges) enhance the overall connectivity between
    groups of friends (nodes).
  Tuning_Mechanisms:
    k: Adjusting the parameter k influences the number of node samples used to estimate the betweenness centrality. A higher
      k can lead to more accurate approximations of the centrality values, particularly in large or complex networks, while
      a lower k may result in a faster but less precise calculation.
    normalized: Setting the normalized parameter to True scales the betweenness values appropriately for comparisons across
      different graph sizes. This normalization allows for meaningful interpretation of centrality values, particularly when
      comparing results from graphs with different numbers of nodes or directed versus undirected edges.
  Principles:
    description: This algorithm calculates the betweenness centrality of edges in a graph by measuring the extent to which
      an edge lies on the shortest paths between pairs of nodes. It can be applied to both directed and undirected graphs,
      making it versatile for various applications. The time complexity is generally O(nm) for unweighted graphs, where n
      is the number of nodes and m is the number of edges, which may increase with larger datasets and if weights are involved.
    time_complexity: O(V * E)
  solvable_questions:
  - Compute the edge betweenness centrality of each edge in the current graph and output the Top-20 edges with the highest
    edge betweenness centrality.
  - Output the edge betweenness centrality table for all edges in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 edges ranked by edge betweenness centrality in the current graph.
  - In the transportation or road network, which roads most frequently appear on the shortest paths between different origins
    and destinations?
  - In the communication network, which links are most frequently traversed by information transfer paths?
  - In the social network, which relationship edges most frequently appear on the shortest interaction paths between users?
  - In the supply chain network, which supply links most frequently lie on critical flow paths between different nodes?
  - In the system module dependency network, which dependency edges most frequently lie on paths between other modules?
- id: eigenvector_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph.
          required: true
        max_iter:
          type: integer, optional (default=100)
          description: Maximum number of power iterations.
          default: 100
        tol:
          type: float, optional (default=1.0e-6)
          description: Error tolerance (in Euclidean norm) used to check convergence in power iteration.
          default: 1.0e-06
        nstart:
          type: dictionary, optional (default=None)
          description: Starting value of power iteration for each node. Must have a nonzero projection on the desired eigenvector
            for the power method to converge. If None, this implementation uses an all-ones vector, which is a safe choice.
          default: null
        weight:
          type: None or string, optional (default=None)
          description: If None, all edge weights are considered equal. Otherwise holds the name of the edge attribute used
            as weight. In this measure the weight is interpreted as the connection strength.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with eigenvector centrality as the value. The associated vector has unit Euclidean
        norm and the values are nonegative.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Eigenvector centrality is commonly applied in social networks, citation networks, and web graphs to
    identify influential nodes that are well-connected to other influential nodes. It solves the problem of ranking vertices
    based on their overall importance within the network structure. For instance, in a social media platform, it can help
    identify key users who have a significant impact on information dissemination.
  Tuning_Mechanisms:
    max_iter: Increasing this parameter allows more iterations of the power method, which can lead to better convergence and
      more accurate centrality measures, albeit with higher computational costs. Conversely, a lower value may result in premature
      convergence, affecting accuracy.
    tol: Adjusting this parameter modifies the threshold for convergence in the power iteration process. A smaller tolerance
      may enhance the precision of the computed centrality values, but it can also increase the number of iterations required,
      thus affecting runtime.
  Principles:
    description: The eigenvector centrality algorithm computes the principal eigenvector of the graph's adjacency matrix to
      assign centrality scores, reflecting nodes' importance based on their connections. It works on both directed and undirected
      graphs and requires a connected graph for meaningful results. The time complexity is O(n + m) per iteration, where n
      is the number of nodes and m is the number of edges, while space complexity is O(n).
    time_complexity: O(k * (V + E)) (Iterative)
  solvable_questions:
  - Compute the eigenvector centrality of each node in the current graph and output the Top-20 nodes with the highest eigenvector
    centrality.
  - Output the eigenvector centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by eigenvector centrality in the current graph.
  - In the social network, which users are directly or indirectly connected to the most important users?
  - In the webpage link network, which pages are closely connected to high-weight pages?
  - In the paper citation network, which papers are cited or indirectly cited the most by important papers?
  - In the transaction network, which accounts have the most direct or indirect trading relationships with key accounts?
  - In the system component interaction network, which components are most closely related to core components?
- id: harmonic_centrality
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph
          required: true
        nbunch:
          type: 'container (default: all nodes in G)'
          description: Container of nodes for which harmonic centrality values are calculated.
          default: null
        distance:
          type: edge attribute key, optional (default=None)
          description: Use the specified edge attribute as the edge distance in shortest path calculations.  If `None`, then
            each edge will have distance equal to 1.
          default: null
        sources:
          type: 'container (default: all nodes in G)'
          description: Container of nodes `v` over which reciprocal distances are computed. Nodes not in `G` are silently
            ignored.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with harmonic centrality as the value.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: Harmonic centrality is particularly applicable in social network analysis, transportation networks,
    and communication networks, where understanding the influence or importance of nodes is crucial. It helps in identifying
    key individuals or hubs by analyzing the efficiency of node connectivity, thereby addressing problems such as targeted
    marketing or resource allocation.
  Tuning_Mechanisms:
    nbunch: Adjusting this parameter defines the specific subset of nodes for which the harmonic centrality is calculated,
      allowing focused analysis on particular sections of the graph. This can significantly improve performance by reducing
      computational overhead when only a portion of the graph is of interest.
    distance: By specifying an edge attribute for distance, it allows for flexibility in defining how distances between nodes
      are measured. This can lead to different harmonic centrality values depending on the weights assigned to the edges,
      making the algorithm adaptable to various scenarios where edge costs are not uniform.
  Principles:
    description: The harmonic centrality algorithm computes the centrality of nodes based on the inverse distance to other
      nodes in the graph, effectively capturing the connectivity and influence of each node. It works on both directed and
      undirected graphs and assumes that the graph is connected. The algorithm operates in O(n^2) time complexity in dense
      graphs, making it suitable for medium-sized networks.
    time_complexity: O(V * (V + E))
  solvable_questions:
  - Compute the harmonic centrality of each node in the current graph and output the Top-20 nodes with the highest harmonic
    centrality.
  - Output the harmonic centrality table for all nodes in the network, sorted in descending order of centrality.
  - Provide the list of the top 50 nodes ranked by harmonic centrality in the current graph.
  - In the social network, which users can reach other users in the network the fastest?
  - In the communication network, which nodes have the shortest average distance to other nodes?
  - In the webpage link network, which pages can access other pages with the fewest number of clicks?
  - In the paper citation network, which papers have the shortest average distance to other papers in the overall citation
    structure?
  - In the system component interaction network, which components have the shortest average path to other components?
