- id: eulerian_circuit
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A graph, either directed or undirected.
          required: true
        source:
          type: node, optional
          description: Starting node for circuit.
          default: null
        keys:
          type: bool
          description: If False, edges generated by this function will be of the form
            ``(u, v)``. Otherwise, edges will be of the form ``(u, v, k)``. This option
            is ignored unless `G` is a multigraph.
          default: false
    output_schema:
      type: iterator
      description: An iterator over edges in the Eulerian circuit.
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The Eulerian circuit algorithm is typically used in scenarios
    where one needs to traverse every edge of a graph exactly once. This is commonly
    found in routing problems, such as the Chinese postman problem, where a delivery
    route must be optimized to minimize distance while covering all streets (edges)
    in a neighborhood. It is applicable in both directed and undirected graphs, making
    it versatile for various applications including logistics, urban planning, and
    network design.
  Tuning_Mechanisms:
    source: Adjusting the 'source' parameter determines the starting point of the
      Eulerian circuit. If a specific starting node is provided, the resulting circuit
      will commence from this node, influencing the traversal order of edges based
      on the initial selection. If not specified, the algorithm will choose an arbitrary
      node, which may lead to variations in the generated circuit.
    keys: The 'keys' parameter affects the format of the edges returned by the algorithm
      in a multigraph. If set to True, edges will be represented as tuples with keys,
      allowing for differentiation between multiple edges between the same pair of
      nodes. Conversely, if set to False, edges will be returned as simple tuples,
      which may simplify the output but lose information about multiple connections.
  Principles:
    description: The core principle of the Eulerian circuit algorithm lies in identifying
      a path in a graph that starts and ends at the same vertex while traversing each
      edge exactly once. It is applicable to both directed and undirected multigraphs,
      as long as the necessary conditions for Eulerian circuits are met (i.e., all
      vertices have even degree for undirected graphs or all vertices with non-zero
      degree in the same strongly connected component for directed graphs). The algorithm
      typically operates with a time complexity of O(E), where E represents the number
      of edges in the graph.
    time_complexity: O(E)
