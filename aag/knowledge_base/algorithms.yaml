      heterogeneous: false
  Application_scenario: Dijkstra's algorithm is commonly applied in network routing problems, particularly in weighted graphs
    where edges represent distances or costs. It is widely used in transportation networks to find the shortest path between
    two locations, such as navigating roads or optimizing delivery routes.
  Tuning_Mechanisms:
    source: Adjusting the source parameter changes the starting point of the pathfinding process, potentially resulting in
      different shortest paths depending on the specific structure of the graph.
    target: Changing the target parameter affects the endpoint for which the shortest path is sought, thus influencing the
      final output path based on the connection and distance from the source.
  Principles:
    description: Dijkstra's algorithm operates by iteratively exploring the shortest tentative distance from the source node
      to all other nodes in the graph. It is applicable to both directed and undirected graphs, but requires that all edge
      weights be non-negative. The time complexity is O((V + E) log V) with a priority queue, where V is the number of vertices
      and E is the number of edges.
    time_complexity: O(E + V log V)
  solvable_questions:
  - In this weighted graph, use Dijkstra's algorithm to find the shortest path from node A to node F, and provide the complete
    node sequence of this path.
  - With node A as the source node, run Dijkstra's algorithm to calculate and output the table of shortest distance node sequences
    from it to all other nodes in the graph.
  - Please use Dijkstra's algorithm to calculate the shortest path from node A to node B, and provide the node sequence of
    this path.
  - In an urban road traffic network, each road has an estimated travel time (in minutes). What is the fastest driving route
