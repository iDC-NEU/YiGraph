  - When building a regional logistics distribution network, which connection scheme minimizes total path expenditure? Output
    the minimum expenditure connection list between distribution points.
  - Assuming edge weights represent communication latency, how can we establish a topology covering all base stations with
    the lowest overall total latency?
  - In road emergency repairs, which set of repair segments has the shortest total duration to ensure all villages are reconnected?
