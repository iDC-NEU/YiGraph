          default: weight
        default_weight:
          type: int, optional
          description: The weight of edges that do not have a weight attribute
          default: 1
    output_schema:
      type: any
      description: int Longest path length
    graph_type:
      directed: true
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The `dag_longest_path_length` algorithm is typically used
    in directed acyclic graphs (DAGs) to find the longest path in scenarios such as
    project scheduling, where tasks are represented as nodes and dependencies as edges.
    This is particularly useful in operations research and computer science to optimize
    workflows and resource allocation.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows the user to specify a key in the
      edge data that represents the weight of the edges, which will be taken into
      account in calculating the longest path. This can modify the resulting longest
      path length based on the specified edge weights.
    default_weight: The 'default_weight' parameter defines the weight for edges that
      do not have a specified weight attribute. By changing this value, users can
      influence the overall path length calculation by treating unweighted edges as
      either more or less significant, depending on the assigned default weight.
  Principles:
    description: This algorithm calculates the length of the longest path in a DAG
      by utilizing dynamic programming principles, ensuring that node dependencies
      are respected. It is specifically designed for directed graphs without cycles
      and has a time complexity of O(V + E), where V is the number of vertices and
      E is the number of edges.
    time_complexity: O(V + E)
- id: dijkstra_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for dijkstra_path
