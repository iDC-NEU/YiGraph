- id: pagerank
  task_type_id: Centrality
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX graph.  Undirected graphs will be converted to a directed graph with two directed edges
            for each undirected edge.
          required: true
        alpha:
          type: float, optional
          description: Damping parameter for PageRank, default=0.85.
          default: 0.85
        personalization:
          type: dict, optional
          description: The "personalization vector" consisting of a dictionary with a key some subset of graph nodes and personalization
            value each of those. At least one personalization value must be non-zero. If not specified, a nodes personalization
            value will be zero. By default, a uniform distribution is used.
          default: null
        max_iter:
          type: integer, optional
          description: Maximum number of iterations in power method eigenvalue solver.
          default: 100
        tol:
          type: float, optional
          description: Error tolerance used to check convergence in power method solver. The iteration will stop after a tolerance
            of ``len(G) * tol`` is reached.
          default: 1.0e-06
        nstart:
          type: dictionary, optional
          description: Starting value of PageRank iteration for each node.
          default: null
        weight:
          type: key, optional
          description: Edge data key to use as weight.  If None weights are set to 1.
          default: weight
        dangling:
          type: dict, optional
          description: The outedges to be assigned to any "dangling" nodes, i.e., nodes without any outedges. The dict key
            is the node the outedge points to and the dict value is the weight of that outedge. By default, dangling nodes
            are given outedges according to the personalization vector (uniform if not specified). This must be selected to
            result in an irreducible transition matrix (see notes under google_matrix). It may be common to have the dangling
            dict to be the same as the personalization dict.
          default: null
    output_schema:
      type: dictionary
      description: Dictionary of nodes with PageRank as value
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: PageRank is commonly used in directed networks, such as the World Wide Web, to evaluate the importance
    of web pages based on their link structure. It solves the problem of ranking nodes in a graph according to their relative
    importance, making it essential for search engine optimization and recommendation systems. A specific business example
    includes using PageRank to determine the most influential users in a social network.
  Tuning_Mechanisms:
    alpha: Adjusting the damping parameter alpha influences the probability of continuing the random walk versus restarting
      at a random node. A lower alpha will result in more PageRank being concentrated on a few nodes, while a higher alpha
      promotes a more uniform distribution across nodes.
    personalization: The personalization vector allows for preferential ranking by assigning different weights to specific
      nodes. Modifying this vector can impact the final ranking by ensuring that certain nodes receive more influence, thus
      tailoring the PageRank result to specific use cases or biases.
  Principles:
    description: 'The core principle of PageRank is based on the concept of random walks on directed graphs, where the rank
      of a node is proportional to the sum of the ranks of its predecessors: each rank is distributed among its outbound links.
      The algorithm applies to directed graphs and can accommodate weighted edges. It has a time complexity of O((V + E) *
      max_iter), where V is the number of vertices and E is the number of edges, making it efficient for large-scale graphs.'
    time_complexity: O(k * (V + E)) (Iterative)
  solvable_questions:
  - Compute the PageRank score of each node in the current graph and output the Top-20 nodes with the highest PageRank.
  - Output the PageRank table for all nodes in the network, sorted in descending order of score.
  - Provide the list of the top 50 nodes ranked by PageRank in the current graph.
  - In the current webpage link network, which pages are the most critical and worth prioritizing?
  - In the social follower network, which accounts have the highest overall influence across the entire network?
  - In the paper citation network, which papers are the most authoritative in academic dissemination?
  - In the transaction network, which accounts are the most central and influential in the overall transaction relationships?
  - In the email communication network, which people are the most critical communication contacts?
- id: adamic_adar_index
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Adamic-Adar index will be computed for each pair of nodes given in the iterable. The pairs must be
            given as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent edges in
            the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their Adamic-Adar
        index.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Adamic-Adar index algorithm is commonly used in social networks, biological networks, and recommendation
    systems to predict link formations between nodes. It identifies potential new connections by measuring the similarity
    between nodes based on their shared neighbors, thereby addressing connectivity and collaboration issues. For instance,
    in a social networking platform, it can suggest friends to users based on their common acquaintances.
  Tuning_Mechanisms:
    ebunch: Modifying the 'ebunch' parameter allows users to specify particular pairs of nodes for which the Adamic-Adar index
      is computed, rather than applying it to all non-existent edges in the graph. This can provide more focused results and
      reduce computational overhead when only interested in specific node interactions.
  Principles:
    description: The Adamic-Adar index is based on measuring the shared neighborhood of two nodes in a graph, specifically
      weighing the contributions of each shared neighbor according to their degree. It is applicable to both undirected graphs
      and directed graphs, where it calculates the index for pairs of nodes that are not directly connected. The algorithm
      operates efficiently with a time complexity of O(mn) for n node pairs and m edges, although it can be optimized depending
      on the graph's density.
    time_complexity: O(E)
  solvable_questions:
  - Compute the Adamic–Adar index between node u and node v (sum over common neighbors weighted by 1/log(degree)).
  - For a given node u, compute Adamic–Adar scores between u and all currently non-adjacent nodes, and output the Top-20 potential
    new links by score.
  - For a given candidate edge list (u,v), compute the Adamic–Adar score for each pair and output the pairs sorted by score
    in descending order.
  - In the whole graph, find the Top-50 non-edge node pairs with the highest Adamic–Adar scores as the most likely new edges.
  - 'In a social network, recommend friends based on “rare mutual friends” (mutual friends with small degree): who is more
    likely to be a high-quality friend?'
  - In an anti-fraud/AML network, if two accounts share a few low-degree intermediates as common neighbors, does it indicate
    a hidden relationship?
  - In a co-authorship network, which author pairs share multiple mutual collaborators whose collaboration circles are small,
    making them more likely to collaborate again?
  - In a host communication network, which host pairs share multiple uncommon relay nodes and may form new direct communications?
  - In content recommendation, which users share more niche liked content (rather than only popular content) and are therefore
    more likely to follow/interact with each other?
- id: jaccard_coefficient
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Jaccard coefficient will be computed for each pair of nodes given in the iterable. The pairs must
            be given as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent edges
            in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their Jaccard coefficient.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Jaccard coefficient is typically applied in social networks, where it helps identify the similarity
    between users based on their shared connections. It is particularly useful in recommendation systems, where understanding
    the overlap of friends or interests between two users can inform personalized suggestions.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter allows users to specify which pairs of nodes they are interested in comparing.
      By providing this iterable, the algorithm can focus its computation on specific pairs, potentially improving performance
      by avoiding unnecessary calculations for unrelated node pairs.
  Principles:
    description: The Jaccard coefficient measures the similarity between two nodes based on the ratio of their shared neighbors
      to the total number of unique neighbors. This algorithm is applicable to both directed and undirected graphs, and it
      operates efficiently with a time complexity of O(N + E), where N is the number of nodes and E is the number of edges.
      The input requirement includes a valid graph G and an optional iterable of node pairs; if the latter is not provided,
      the algorithm examines all non-existing edges.
    time_complexity: O(E) (O(d^2) per edge)
  solvable_questions:
  - Compute the Jaccard coefficient between node u and node v (the ratio of common neighbors to the union of their neighbors).
  - For a given node u, compute Jaccard scores between u and all currently non-adjacent nodes, and output the Top-20 potential
    new links by score.
  - For a given candidate edge list (u,v), compute the Jaccard score for each pair and output the pairs sorted by score in
    descending order.
  - In the whole graph, find the Top-50 non-edge node pairs with the highest Jaccard scores as the most likely new edges.
  - In a social network, which users have the highest “mutual-friend ratio” with me and should be recommended as friends?
  - In a user–item interaction graph, which items have the highest overlap ratio of common buyers/viewers with item A?
  - In a webpage link network, which pages have the highest neighborhood-set overlap with page A and may deserve mutual links?
  - In a paper network, which papers share the largest proportion of references/co-citations with paper A and are likely most
    related in topic?
  - In a transaction network, which accounts share a highly overlapping set of counterparties (high ratio) with suspicious
    account A and may be related?
- id: preferential_attachment
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Preferential attachment score will be computed for each pair of nodes given in the iterable. The pairs
            must be given as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their preferential
        attachment score.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The preferential attachment algorithm is typically applied in network analysis, specifically in modeling
    the growth of networks where some nodes acquire more connections than others, such as social networks, citation networks,
    and the World Wide Web. It addresses the problem of predicting which nodes are likely to form new links based on their
    existing connections, thereby helping to understand connectivity dynamics and influence spread.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter alters which pairs of nodes the preferential attachment score is calculated for.
      If provided, it restricts the number of pairs to those specified, which can simplify the analysis in specific cases
      but may also omit potential connections in the broader graph if nodes outside the defined pairs have high scores.
  Principles:
    description: The core principle of preferential attachment is that the likelihood of a new edge being formed is proportional
      to the current degree of the nodes involved. This algorithm can be applied to both directed and undirected graphs, and
      it inherently assumes the existence of a growing network. The time complexity of the algorithm is O(E) where E is the
      number of edges to analyze, making it efficient for large networks.
    time_complexity: O(E)
  solvable_questions:
  - Compute the Preferential Attachment score between node u and node v (deg(u) × deg(v)).
  - For a given node u, compute Preferential Attachment scores between u and all currently non-adjacent nodes, and output
    the Top-20 potential new links by score.
  - For a given candidate edge list (u,v), compute the Preferential Attachment score for each pair and output the pairs sorted
    by score in descending order.
  - In the whole graph, find the Top-50 non-edge node pairs with the highest Preferential Attachment scores as the most likely
    new edges.
  - In a social platform, which highly connected “hub” accounts is a new user most likely to follow first?
  - In a web/citation network, which high-degree pages/papers is a new page/paper most likely to link to or cite?
  - In a transaction network, which highly active hub accounts is a new merchant/account most likely to transact with?
  - In a supply-chain network, which core enterprises with the largest procurement scale is a new supplier most likely to
    partner with?
  - In an API call / microservice dependency network, which frequently called core services is a new service most likely to
    depend on first?
- id: resource_allocation_index
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'Resource allocation index will be computed for each pair of nodes given in the iterable. The pairs
            must be given as 2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent
            edges in the graph will be used. Default value: None.'
          default: null
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their resource allocation
        index.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The resource allocation index algorithm is commonly applied in social networks and recommendation
    systems to identify potential connections between nodes. It helps in predicting link formations by measuring the likelihood
    of connections based on shared neighbors. For instance, in a professional networking platform, it can suggest potential
    collaborations between users with common connections.
  Tuning_Mechanisms:
    ebunch: Adjusting the 'ebunch' parameter allows users to specify which node pairs to evaluate for resource allocation,
      enabling focused analysis on particular connections. When 'ebunch' is set to None, the algorithm automatically evaluates
      all non-existent edges, which may be suitable for exploratory analyses.
  Principles:
    description: This algorithm computes the resource allocation index for pairs of nodes based on their common neighbors
      in the graph. It is applicable to both directed and undirected graphs and functions by evaluating the degree of overlap
      between the neighbor sets of the nodes in question. The algorithm operates with a time complexity of O(N + E), where
      N is the number of nodes and E is the number of edges in the graph.
    time_complexity: O(E)
  solvable_questions:
  - Compute the Resource Allocation (RA) index between node u and node v (sum over common neighbors weighted by 1/deg).
  - For a given node u, compute RA scores between u and all currently non-adjacent nodes, and output the Top-20 potential
    new links by score.
  - For a given candidate edge list (u,v), compute the RA score for each pair and output the pairs sorted by score in descending
    order.
  - In the whole graph, find the Top-50 non-edge node pairs with the highest RA scores as the most likely new edges.
  - In a social network, if I share several mutual friends who themselves have few friends, I am more likely to connect with
    that person.
  - In an enterprise email/IM communication network, which employee pairs share multiple intermediates with narrow contact
    circles and are therefore more likely to communicate directly in the future?
  - In a co-authorship network, which author pairs are connected via several mutual collaborators with limited collaboration
    breadth, making a new collaboration more likely?
  - In e-commerce recommendation, which item pairs are co-purchased by multiple users with narrow purchasing ranges, indicating
    a stronger association?
  - In an AML transaction network, which account pairs share multiple low-degree intermediates along which “resources” could
    flow, suggesting hidden fund relationships?
- id: is_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for is_matching
          required: true
        matching:
          type: dict or set
          description: A dictionary or set representing a matching. If a dictionary, it must have ``matching[u] == v`` and
            ``matching[v] == u`` for each edge ``(u, v)`` in the matching. If a set, it must have elements of the form ``(u,
            v)``, where ``(u, v)`` is an edge in the matching.
          required: true
      required:
      - matching
    output_schema:
      type: any
      description: bool Whether the given set or dictionary represents a valid matching in the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The is_matching algorithm is commonly used in bipartite graphs to verify the existence of a valid
    matching, which is essential for problems in resource allocation, job assignments, and network flow. Typical application
    scenarios include scheduling systems where tasks (edges) must be assigned to resources (vertices) without conflicts, such
    as pairing students with mentors or matching jobs with candidates.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_matching algorithm is to validate whether a given matching meets the criteria
      of being a proper matching in the specified graph, meaning no two edges share a common vertex. This algorithm works
      for both directed and undirected graphs, with input constraints specifying that the matching must be represented either
      as a dictionary or a set. The time complexity is generally O(E) for E edges in the graph, as it involves checking pairs
      of vertices in the matching.
    time_complexity: O(E)
  solvable_questions:
  - Check whether the currently selected set of edges forms a valid graph matching, and return True or False.
  - Verify whether the input list of node pairs constitutes a valid graph matching.
  - Determine whether there are conflicts caused by shared vertices in the given set of connections, and confirm whether it
    is a matching.
  - In a social network, does the given set of user pairings contain any case where a user is paired more than once?
  - In a paper network, does the given list of paper pairings contain any paper that appears in multiple pairs?
  - In a transaction matching scheme, does the current set of one-to-one transactions contain conflicts where an account participates
    in multiple transactions?
- id: max_weight_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        maxcardinality:
          type: bool, optional (default=False)
          description: If maxcardinality is True, compute the maximum-cardinality matching with maximum weight among all maximum-cardinality
            matchings.
          default: false
        weight:
          type: string, optional (default='weight')
          description: Edge data key corresponding to the edge weight. If key not found, uses 1 as weight.
          default: weight
    output_schema:
      type: set
      description: A maximal matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The max_weight_matching algorithm is particularly useful in bipartite networks and general undirected
    graphs, where one needs to find optimally matched pairs with respect to given weights on edges. Typical applications include
    resource allocation problems, job assignment tasks, and optimal pairing in market scenarios, where maximizing the overall
    weight of selected matches is crucial.
  Tuning_Mechanisms:
    maxcardinality: Setting maxcardinality to True alters the algorithm's behavior to not only find a matching with maximum
      weight but also to prioritize obtaining the largest possible number of edges in the matching. This can be crucial in
      scenarios where having more pairs matched is as important as maximizing the weights.
    weight: Changing the weight parameter allows the user to specify which edge attribute to consider for matching. Utilizing
      different weight keys enables the algorithm to adapt to various data contexts, affecting the outcome of the matching
      by prioritizing alternative aspects such as costs, distances, or capacities.
  Principles:
    description: This algorithm computes a maximal matching in a graph by maximizing the total weight of the matched edges.
      It works effectively on undirected graphs and can handle graphs with varying edge weights. The algorithm relies on the
      existence of valid weights and functions efficiently within polynomial time complexity, making it suitable for relatively
      large graphs.
    time_complexity: O(V^3)
  solvable_questions:
  - Compute the maximum-weight matching of the current graph and output the list of all matched edges.
  - Run the maximum-weight matching algorithm and output the matched edges along with the corresponding total weight.
  - In the current social relationship network, each pair of individuals has an interaction strength score. How can we perform
    one-to-one pairing to maximise the total interaction strength?
  - In a paper citation/association network, how can we pair papers two by two based on their relevance weights so as to maximise
    the overall relevance score?
  - In a transaction transfer network, how can we perform one-to-one transaction matching based on historical transaction
    amounts as edge weights in order to maximise the total transaction volume?
- id: maximal_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
    output_schema:
      type: set
      description: A maximal matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The maximal_matching algorithm is typically applied in bipartite and general graphs where the goal
    is to find a maximum set of edges such that no two edges share a common vertex. This can be crucial in scenarios such
    as job assignment problems, matchmaking applications, and resource allocation where optimal pairings need to be identified.
    For example, in a recruitment system, it could help pair candidates to job openings effectively.
  Tuning_Mechanisms: {}
  Principles:
    description: This algorithm operates on the principle of finding a maximal matching, which means it ensures that no additional
      edges can be added without violating the matching condition. It works on undirected graphs and has a time complexity
      that is generally linear relative to the number of vertices and edges. There are no additional input requirements or
      constraints aside from the structure of the graph itself.
    time_complexity: O(E)
  solvable_questions:
  - Find a maximal matching in the graph and output the list of all matched edges.
  - Generate a maximal matching in the graph and output all matched edges.
  - In the current social relationship network, how can we perform one-to-one pairing such that no additional pairing can
    be added without breaking existing pairings?
  - In a paper network, how can we select a set of pairwise non-conflicting paper associations such that no further paper
    pairs can be added?
  - In a transaction relationship network, how can we form a set of one-to-one transaction relationships such that no additional
    non-conflicting transactions can be added?
- id: min_weight_matching
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Undirected graph
          required: true
        weight:
          type: string, optional (default='weight')
          description: Edge data key corresponding to the edge weight. If key not found, uses 1 as weight.
          default: weight
    output_schema:
      type: set
      description: A minimal weight matching of the graph.
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The min_weight_matching algorithm is typically used in network problems where pairing of nodes is
    required with minimized costs, such as in bipartite graphs. This can be applied in various fields including supply chain
    logistics for optimizing delivery routes, or in matching job seekers with job vacancies based on candidate qualifications
    and employer needs. Another example is in the design of networks where connections need to be established with the least
    total weight.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter allows the algorithm to interpret the edge weight from a different key in the
      graph data. Changing this key can significantly alter the resulting matching as it directly affects which edges are
      considered in the weight calculation. If the specified key does not exist for some edges, they will default to a weight
      of 1, potentially skewing the optimization results.
  Principles:
    description: The core principle of the min_weight_matching algorithm relies on identifying pairs of nodes (or edges) in
      a graph such that the sum of their weights is minimized. It operates on undirected graphs with weighted edges and uses
      combinatorial optimization techniques to find the optimal matching. The typical time complexity of the algorithm is
      O(n^3) for dense graphs, where n is the number of nodes, and it is subject to the constraint that not all graphs are
      suitable for perfect matching.
    time_complexity: O(V^3)
  solvable_questions:
  - Compute the minimum-weight matching of the current graph and output the list of all matched edges.
  - Compute the minimum-weight matching of the current graph, and output the set of matched edges along with the corresponding
    total weight.
  - In a social network, if the cost of mismatch between users is modelled as edge weights, how can we perform one-to-one
    pairing so as to minimise the overall mismatch cost?
  - In a paper relationship network, where topic dissimilarity between papers is used as the edge weight, how can papers be
    paired two by two to minimise the total dissimilarity?
  - In a transaction network, if each potential transaction incurs a transaction fee as cost, how can we perform one-to-one
    matching to minimise the total transaction fees?
- id: attribute_assortativity_coefficient
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for attribute_assortativity_coefficient
          required: true
        attribute:
          type: string
          description: Node attribute key
          required: true
        nodes:
          type: list or iterable (optional)
          description: Compute attribute assortativity for nodes in container. The default is all nodes.
          default: null
      required:
      - attribute
    output_schema:
      type: any
      description: 'r: float Assortativity of graph for given attribute'
    graph_type:
      directed: both
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The attribute_assortativity_coefficient algorithm is typically used in social network analysis and
    biological networks to investigate how nodes with similar attributes are connected. It addresses the problem of understanding
    the tendency of nodes to connect with others that have similar or dissimilar characteristics, such as age or gender, providing
    insights into community structure. For example, in a social network, it can reveal if people with similar interests are
    more likely to interact, assisting in targeted marketing strategies.
  Tuning_Mechanisms:
    attribute: Adjusting the 'attribute' parameter allows users to focus the assortativity analysis on different node characteristics,
      influencing the resulting coefficient based on the chosen attribute's distribution within the network.
    nodes: Modifying the 'nodes' parameter alters the subset of nodes considered in the calculation. This can significantly
      impact the results, allowing for tailored insights based on specific segments of the network, which could either highlight
      or obscure trends in attribute assortativity, depending on the selection of nodes.
  Principles:
    description: This algorithm calculates the assortativity coefficient for a specified node attribute in a graph, which
      quantifies the degree to which nodes with similar attributes tend to connect with each other. It operates on both directed
      and undirected graphs, leveraging the connections defined by the chosen attribute to compute the final coefficient.
      The input requires a valid graph and may optionally include a specific attribute and a subset of nodes; however, the
      performance may vary based on the size of the graph and the distribution of attributes.
    time_complexity: O(E)
  solvable_questions:
  - From an overall structural perspective, assess whether the connections between nodes exhibit homologous or heterologous
    characteristics on this attribute dimension.
  - Provide the quantitative results of homologation for this graph under specified node attribute conditions.
  - Return the connectivity preference index for nodes on this attribute dimension.
  - In the account association and fund transfer system, are accounts with the same risk level or account type more likely
    to be associated with each other?
  - From the overall structural perspective, does this fund relationship system exhibit a significant "clustering of similar-type
    accounts" phenomenon?
  - In medical collaboration and referral relationships, are medical institutions with the same hospital level or specialty
    attributes more likely to establish collaborative relationships?
  - From the overall collaboration structure perspective, do medical institutions primarily form connections within the same
    attribute category?
  - In the process unit or equipment association system, are units with the same process type or risk level more likely to
    form coupling relationships?
- id: degree_assortativity_coefficient
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for degree_assortativity_coefficient
          required: true
        x:
          type: string ('in','out')
          description: The degree type for source node (directed graphs only).
          default: out
        y:
          type: string ('in','out')
          description: The degree type for target node (directed graphs only).
          default: in
        weight:
          type: string or None, optional (default=None)
          description: The edge attribute that holds the numerical value used as a weight.  If None, then each edge has weight
            1. The degree is the sum of the edge weights adjacent to the node.
          default: null
        nodes:
          type: list or iterable (optional)
          description: Compute degree assortativity only for nodes in container. The default is all nodes.
          default: null
    output_schema:
      type: float
      description: Assortativity of graph by degree.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The degree assortativity coefficient is commonly used in social network analysis to evaluate the tendency
    of nodes to connect with other nodes that have similar degrees. It is particularly valuable in understanding community
    structures and relationship dynamics in directed graphs, such as analyzing friend networks on social media platforms or
    connectivity in citation networks amongst academic papers.
  Tuning_Mechanisms:
    x: Adjusting this parameter will define whether to consider the in-degree or out-degree of the source nodes in the calculations.
      Choosing 'in' will focus on incoming connections, while 'out' will focus on outgoing connections, thereby influencing
      the resultant assortativity coefficient based on the directionality of connections.
    y: This parameter determines whether to analyze the in-degree or out-degree of target nodes. Similar to x, changing this
      setting affects the interpretation of relationships in the graph, as it specifies which aspect of the target nodes'
      connectivity is considered, thus influencing the overall assortativity measure.
  Principles:
    description: This algorithm calculates the degree assortativity coefficient by examining the correlation between the degrees
      of connected nodes in a directed graph. It is applicable to directed graphs and relies on the specified degree types
      for source and target nodes. The algorithm operates in linear time with respect to the number of edges, making it efficient
      for large networks, while it requires that the edges have weights if a weight parameter is specified.
    time_complexity: O(E)
  solvable_questions:
  - Output the degree matching coefficient of the relation structure.
  - Provide a matching index between the connection degrees of nodes in the structure to determine whether highly connected
    nodes are more likely to connect with each other.
  - In the account association and fund transfer system, are highly active accounts more likely to associate with each other,
    or more likely to connect with less active accounts?
  - From the overall structure, does the fund relationship system exhibit obvious characteristics of "clustering of highly
    active accounts" or "mixed connections of active and inactive accounts"?
  - In medical collaboration and referral relationships, are medical institutions with more collaborative relationships more
    likely to establish connections with institutions with similarly dense collaboration?
  - From the overall collaboration structure, does the medical system exhibit obvious hierarchical differentiation?
  - In cross-departmental collaboration relationships, are departments with frequent collaboration more likely to form collaborative
    relationships with each other, rather than connecting with departments with less collaboration?
- id: asyn_lpa_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: Graph
          description: Parameter 'G' for asyn_lpa_communities
          required: true
        weight:
          type: string
          description: 'The edge attribute representing the weight of an edge. If None, each edge is assumed to have weight
            one. In this algorithm, the weight of an edge is used in determining the frequency with which a label appears
            among the neighbors of a node: a higher weight means the label appears more often.'
          default: null
        seed:
          type: integer, random_state, or None (default)
          description: Indicator of random number generation state. See :ref:`Randomness<randomness>`.
          default: null
    output_schema:
      type: iterable
      description: Iterable of communities given as sets of nodes.
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The asyn_lpa_communities algorithm is typically used in social network analysis, particularly for
    identifying communities or clusters of closely connected nodes. It is suitable for both undirected and directed networks,
    allowing researchers and practitioners to uncover hidden patterns in data, such as finding groups of users with similar
    interests or behaviors in online platforms.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter changes how frequently a node's label is influenced by its neighbors. Higher
      edge weights amplify the influence of neighboring nodes with the same label, potentially leading to more pronounced
      community structures. Conversely, lower weights treat all connections as more equal, which may lead to more fragmented
      communities.
    seed: The 'seed' parameter controls the random state of the algorithm, affecting the reproducibility of the community
      outputs. Different seeds can result in varying community assignments, as they determine the initial label assignments
      and the order of label propagation, thus influencing the final community structures identified.
  Principles:
    description: This algorithm is based on the Label Propagation Algorithm (LPA), which works by assigning labels to nodes
      and allowing them to propagate through the network based on the labels of their neighbors. It is particularly effective
      in networks with a clear community structure and is efficient for large-scale graphs, as it operates with average time
      complexity close to O(n), where n is the number of nodes. The algorithm does not assume any prior knowledge of the community
      structure and can handle both weighted and unweighted graphs.
    time_complexity: O(V + E) per iteration
  solvable_questions:
  - Use the Asynchronous Label Propagation algorithm to detect community structures.
  - Run Asynchronous Label Propagation and return the list of found communities.
  - Based on the asynchronous update strategy, provide the community affiliation partition for nodes in the graph.
  - Simulate a more realistic asynchronous interaction environment to identify natural groups in the network through neighbor
    influence.
  - Under random node update orders, determine which user groups will eventually stabilize together.
  - Utilize the asynchronous propagation mechanism to discover loose communities formed based on local consensus.
  - Perform rapid grouping on a dynamic and asynchronously updating social network and output the grouping results.
  - Derive the most probable community structure in the network based on the random interaction order of nodes and their neighbors.
- id: cn_soundarajan_hopcroft
  task_type_id: Link Prediction
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A NetworkX undirected graph.
          required: true
        ebunch:
          type: iterable of node pairs, optional (default = None)
          description: 'The score will be computed for each pair of nodes given in the iterable. The pairs must be given as
            2-tuples (u, v) where u and v are nodes in the graph. If ebunch is None then all nonexistent edges in the graph
            will be used. Default value: None.'
          default: null
        community:
          type: string, optional (default = 'community')
          description: 'Nodes attribute name containing the community information. G[u][community] identifies which community
            u belongs to. Each node belongs to at most one community. Default value: ''community''.'
          default: community
    output_schema:
      type: iterator
      description: An iterator of 3-tuples in the form (u, v, p) where (u, v) is a pair of nodes and p is their score.
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The cn_soundarajan_hopcroft algorithm is commonly applied in social networks and collaboration networks
    where community structures play a critical role in understanding relationships between nodes. This algorithm helps in
    link prediction by estimating the likelihood of forming an edge between pairs of nodes based on their community affiliations.
    It is particularly useful in scenarios such as recommending new friends in social media, predicting future collaborations
    in research, or enhancing connectivity in citation networks.
  Tuning_Mechanisms:
    ebunch: Adjusting the ebunch parameter allows users to restrict the computation of scores to a specific set of node pairs
      rather than evaluating all possible non-existent edges. This can lead to performance improvements in large graphs where
      only a few connections are of interest, thus reducing computational overhead.
    community: Modifying the community parameter lets users specify the attribute name used to define community membership
      for nodes. This flexibility enables the algorithm to adapt to various datasets where communities may be labeled differently,
      ensuring accurate community detection and score calculations.
  Principles:
    description: The cn_soundarajan_hopcroft algorithm is based on the principle that nodes within the same community are
      more likely to form edges with each other compared to nodes from different communities. It works efficiently on undirected
      graphs and computes scores for either specified pairs of nodes or for all non-existent edges if no pairs are provided.
      The algorithm operates under the constraints of requiring node community attributes and is designed to facilitate the
      identification of potential connections based on community structures.
    time_complexity: O(E)
  solvable_questions:
  - Given a community assignment (community labels), compute the Soundarajan–Hopcroft common-neighbors score between node
    u and node v.
  - For a given node u, compute SH common-neighbors scores between u and all currently non-adjacent nodes, and output the
    Top-20 potential new links.
  - For a given candidate edge list (u,v), compute the SH common-neighbors score for each pair and output the pairs sorted
    by score in descending order.
  - In the whole graph, find the Top-50 non-edge node pairs with the highest SH common-neighbors scores as the most likely
    new edges.
  - 'In a social network, recommend friends based on shared interest communities: within the same community, which users share
    the most mutual friends with me?'
  - In an enterprise network, which employee pairs share more mutual colleagues within the same department and are more likely
    to form new collaborations?
  - In a forum/community network, which user pairs are connected via many mutual members within the same board and may form
    new interactions/follows?
  - In a paper network, which author pairs share more mutual collaborators within the same field community and are more likely
    to collaborate next?
  - In network operations, which host pairs share more mutual communication peers within the same subnet and are likely to
    establish direct connections?
- id: girvan_newman
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for girvan_newman
          required: true
        most_valuable_edge:
          type: function
          description: Function that takes a graph as input and outputs an edge. The edge returned by this function will be
            recomputed and removed at each iteration of the algorithm. If not specified, the edge with the highest :func:`networkx.edge_betweenness_centrality`
            will be used.
          default: null
    output_schema:
      type: any
      description: iterator Iterator over tuples of sets of nodes in `G`. Each set of node is a community, each tuple is a
        sequence of communities at a particular level of the algorithm.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The Girvan-Newman algorithm is commonly used in social networks and biological networks to detect
    communities or clusters within these graphs. It is particularly useful for identifying tightly-knit groups based on the
    connections between nodes, enabling analysis of social structures, collaboration patterns, or even the functional organization
    of proteins within biological networks.
  Tuning_Mechanisms:
    most_valuable_edge: Adjusting the 'most_valuable_edge' function allows users to specify a custom metric for edge importance,
      potentially leading to different community structures based on what is prioritized in the removal process. For instance,
      using a different centrality measure can highlight various aspects of the community structure.
  Principles:
    description: The core principle of the Girvan-Newman algorithm is to iteratively remove the most central edges in terms
      of betweenness centrality, which leads to the fragmentation of the graph into communities. This algorithm is applicable
      to both directed and undirected graphs, but it can be computationally intensive, with a time complexity of O(E^2 * V)
      for dense graphs, where E is the number of edges and V is the number of vertices.
    time_complexity: O(E^2 * V)
  solvable_questions:
  - Use the Girvan-Newman algorithm to detect community structures in the graph and output the top-level partition results.
  - Run the Girvan-Newman method to identify communities by removing edges with the highest betweenness.
  - Provide the community partition schemes for the first 3 hierarchical levels based on the Girvan-Newman algorithm.
  - By continuously removing "bridge" connections in the network, dismantle this tightly coupled system into the most core
    independent modules.
  - Identify and cut off critical weak links between different societies to reveal the potential factional structure in the
    network.
  - Find "bottleneck" paths connecting different groups and use them as boundaries to divide the network into different subgroups.
  - In this small elite network, display the internal inner circles hierarchically by peeling off cross-boundary contacts.
  - Simulate cutting off main roads in a traffic network; into which regions will the network naturally split?
- id: has_path
