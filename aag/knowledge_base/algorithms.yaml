          required: true
        weight:
          type: string, optional (default= 'weight')
          description: Edge data key corresponding to the edge weight.
          default: weight
    output_schema:
      type: dict
      description: A dictionary,  keyed by source and target, of shortest paths distances
        between nodes.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The Floyd-Warshall algorithm is typically used in dense graphs
    to compute the shortest paths between all pairs of nodes. It is particularly useful
    in scenarios such as transportation networks, where the need to assess the shortest
    routes between multiple locations is crucial. An example application is in urban
    planning, where city planners can analyze road networks to optimize traffic flow
    and minimize travel times.
  Tuning_Mechanisms:
    weight: Adjusting the 'weight' parameter changes the edge data key used to obtain
      the weights for the edges in the graph. This allows the user to define how the
      distances or costs between nodes are represented, impacting the computed shortest
      paths accordingly. For instances where multiple edge attributes are present,
      selecting the appropriate weight attribute is crucial for obtaining accurate
      results.
  Principles:
    description: The core principle of the Floyd-Warshall algorithm is dynamic programming,
      which builds up a solution by iteratively improving the shortest path estimates
      between nodes. This algorithm works on both directed and undirected graphs but
      requires that edge weights be non-negative for correct functionality. The time
      complexity of this algorithm is O(V^3), where V is the number of vertices, making
      it suitable for graphs with a moderate number of nodes.
    time_complexity: O(V^3)
- id: shortest_path
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
