- id: is_connected
  task_type_id: Connectivity & Components
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX Graph
          description: An undirected graph.
          required: true
    output_schema:
      type: bool
      description: True if the graph is connected, false otherwise.
    graph_type:
      directed: false
      multigraph: true
      weighted: false
      heterogeneous: false
  Application_scenario: The is_connected algorithm is typically used in network analysis to determine the connectivity of
    a graph, which is crucial in various applications such as social network analysis, transportation networks, and telecommunications.
    It helps identify whether a network is fully connected, meaning every node can be reached from any other node, which is
    vital for assessing network reliability and efficiency.
  Tuning_Mechanisms: {}
  Principles:
    description: The core principle of the is_connected algorithm is based on the traversal of the graph, ensuring all vertices
      can be reached from a single start vertex using Breadth-First Search (BFS) or Depth-First Search (DFS). It is applicable
      to both undirected and directed graphs, although connectivity checks for directed graphs may involve additional considerations
      regarding strongly connected components. The time complexity of this algorithm is O(V + E), where V is the number of
      vertices and E is the number of edges.
    time_complexity: O(V + E)
  solvable_questions:
  - Determine whether this undirected graph is connected; output True/False.
  - Check the result of is_connected and return a boolean value.
  - Provide the conclusion on whether the undirected network is connected.
  - In the “store-to-store” route network, can any two stores reach each other via routes?
  - In the datacenter device interconnect topology, do all devices belong to one single connected network?
  - In the (undirected) city road network, is there any area completely isolated from the main road network?
  - In the friendship network, is the user base split into multiple disconnected circles?
  - In the factory device collaboration network, is the system a single whole (with no disconnected subnetworks)?
- id: is_strongly_connected
  task_type_id: Connectivity & Components
  Deployment_method:
