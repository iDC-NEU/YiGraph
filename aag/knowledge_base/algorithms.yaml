- id: center
  task_type_id: Distance & Measures
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: A graph
          required: true
        e:
          type: eccentricity dictionary, optional
          description: A precomputed dictionary of eccentricities.
          default: null
        usebounds:
          type: bool, optional
          description: If `True`, use extrema bounding (see Notes) when computing the center for undirected graphs. Extrema
            bounding may accelerate the distance calculation for some graphs. `usebounds` is ignored if `G` is directed or
            if `e` is not `None`. Default is `False`.
          default: false
        weight:
          type: string, function, or None
          description: 'If this is a string, then edge weights will be accessed via the edge attribute with this key (that
            is, the weight of the edge joining `u` to `v` will be ``G.edges[u, v][weight]``). If no such edge attribute exists,
            the weight of the edge is assumed to be one. If this is a function, the weight of an edge is the value returned
            by the function. The function must accept exactly three positional arguments: the two endpoints of an edge and
            the dictionary of edge attributes for that edge. The function must return a number. If this is None, every edge
            has weight/distance/cost 1. Weights stored as floating point values can lead to small round-off errors in distances.
            Use integer weights to avoid this. Weights should be positive, since they are distances.'
          default: null
    output_schema:
      type: list
      description: List of nodes in center
    graph_type:
      directed: both
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The center algorithm is commonly used in network analysis to identify the most central nodes within
    various types of graphs, such as social networks or transportation networks. It helps in determining optimal locations
    for resources or influence, thereby enhancing connectivity and accessibility. For instance, in urban planning, the center
    of a transportation network can indicate where to build transit hubs for minimal travel distance.
  Tuning_Mechanisms:
    e: Providing a precomputed eccentricity dictionary can significantly enhance performance as it eliminates the need for
      on-the-fly eccentricity calculations, leading to faster execution times.
    usebounds: Setting this parameter to True may speed up the center calculation for undirected graphs by allowing the algorithm
      to skip unnecessary distance calculations, while it is disregarded for directed graphs or if eccentricities are provided.
  Principles:
    description: This algorithm calculates the center of a graph, defined as the node(s) with the minimum eccentricity, which
      reflects the greatest distance to other nodes. It works on both directed and undirected graphs, though certain optimizations
      like extrema bounding are only applicable to undirected graphs when the eccentricity is not precomputed. The time complexity
      generally depends on the graph's density, with a worst-case scenario of O(n^2) for dense graphs.
    time_complexity: O(V * (V + E))
  solvable_questions:
  - Calculate the central node of the current graph.
  - In this graph, find all nodes with the smallest eccentricity.
  - Output the list of central nodes of this network.
  - In a fraudulent fund association graph, which accounts are most suitable as core entry points for risk monitoring, minimizing
    the worst-case tracing distance to all suspicious accounts?
  - In complex account relationships, which nodes are located in the "most central position" of the overall structure?
  - In a patient referral and treatment association graph, which medical institutions are most suitable as global coordination
    centers?
  - In a disease transmission relationship graph, which nodes are most suitable as core intervention points?
  - In an accident impact and related diffusion graph, which key nodes are most suitable as unified command or response centers?
