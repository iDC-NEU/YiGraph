  Application_scenario: The Wiener index is commonly used in the study of chemical graphs, where the vertices represent atoms
    and edges represent bonds. It helps in characterizing the structural properties of molecules by quantifying the degree
    of connectivity between pairs of vertices, which can be essential in drug design and molecular studies. Additionally,
    it can be applied to transportation networks to analyze the efficiency and connectivity in road systems.
  Tuning_Mechanisms:
    weight: Adjusting this parameter influences the calculation of shortest-path distances by defining the weight of each
      edge. If set to None, each edge is treated with a uniform weight of 1, which may not reflect the true distances in weighted
      scenarios. Providing a string for an edge attribute allows for customized weighting, thus yielding a more accurate Wiener
      index based on real-world data or specific graph characteristics.
  Principles:
    description: The Wiener index is calculated as the sum of the shortest-path distances between all pairs of vertices in
      the graph. It can be applied to both undirected and directed graphs, depending on how edge weights are assigned. The
      algorithm has a time complexity of O(n^3) using the Floyd-Warshall algorithm for computing all-pairs shortest paths,
      which is typically feasible for small to medium-sized graphs.
    time_complexity: O(V * (V + E))
  solvable_questions:
  - Calculate the Wiener Index of the current graph.
  - Output the sum of the shortest path lengths for all node pairs in the network (Wiener Index).
  - In the fund flow and account association graph, from an overall structural perspective, what is the total association
    distance cost between any two accounts?
  - In the patient referral and medical collaboration graph, how tight is the connectivity of the overall medical system?
  - In the cross-departmental collaboration and information flow graph, from a global perspective, what is the total collaboration
    distance cost between departments?
  - In the process unit and risk transmission graph, what is the total transmission distance between any two units in the
    overall system?
  - In the supply chain association and traceability graph, from a full-chain perspective, what is the overall reachability
    distance level between nodes?
- id: get_node_attributes
  task_type_id: Graph Query
  Application_scenario: This algorithm is fundamental for retrieving detailed profile information in knowledge graphs, social
    networks, or product catalogs. For example, in a Customer 360 view, it is used to fetch specific user details (age, location,
    account status) based on their unique User ID; in an e-commerce graph, it retrieves product specifications given a product
    SKU.
  Principles:
    description: The algorithm performs a direct index lookup to retrieve the properties or attributes associated with a specific
      node identifier. It acts as a key-value retrieval operation within the graph database, returning the metadata stored
      on the node rather than its structural connections.
  solvable_questions:
  - For user ID = U1024, return all attribute information of this node.
  - Query the node details for product number SKU-88991.
  - Based on the unique identifier "Node_X," locate the corresponding node and list all its Labels and attributes.
  - (Social Network) Please display the personal profile of user account "User_Alice".
  - (Transaction Transfer) Query the account with account ID "ACC_998877".
  - (Paper Network) Help me list the title, abstract, and publication year of the paper with DOI "10.1145/xxx".
  - (Transaction Transfer) Retrieve the detailed amount and timestamp of the transaction with serial number "TX_20240101".
  - (Web Links) What is the page information corresponding to this webpage URL in the system?
- id: k_hop_neighbors
  task_type_id: Graph Query
  Application_scenario: K-hop neighbor queries are widely used in recommendation systems, risk analysis, and impact assessment.
    For instance, in social networks, querying 2-hop neighbors helps suggest "Friends of Friends"; in supply chain management,
    it identifies tier-2 and tier-3 suppliers to assess indirect risks; in cybersecurity, it analyzes the "blast radius" of
    a compromised server by finding all connected devices within k steps.
  Principles:
    description: This algorithm traverses the graph starting from a seed node (or set of nodes) and expands outwards to find
      all nodes reachable within exactly 'k' steps or up to 'k' steps. It typically uses a Breadth-First Search (BFS) strategy
      to discover layers of neighbors, effectively retrieving the local neighborhood structure around the target node.
  solvable_questions:
  - Find all neighbor nodes connected by outgoing edges from node 7 and return a list of their IDs.
  - List all nodes with a distance of 1 from node 11, along with their edge attributes.
  - Count the number of one-hop neighbors for Hernandez Alexis.
  - (Social Network) Who does user 0 follow? Please list the top 20 user IDs from his following list.
  - (Transaction Transfer) In the most recent records, which accounts has "Lee Alex" directly transferred money to? List the
    recipients.
  - (Paper Network) Which references does the paper "GraphSAGE" cite? List the titles of all cited papers.
  - (Social Network) Who follows user 2? Display the top 50 active accounts from his follower list.
  - (Transaction Transfer) Which accounts have transferred money to account "Brewer Debra"? List the 3 most recent payers.
  - (Paper Network) Which papers cite "Attention is All You Need"? Please provide a list of the citing papers.
- id: common_neighbors
  task_type_id: Graph Query
  Application_scenario: Finding common neighbors is a key heuristic for Link Prediction and similarity analysis. In social
    media, if two users share many mutual friends, the system recommends they connect; in fraud detection, identifying that
    two seemingly unrelated accounts share the same IP address, device ID, or phone number (common neighbors) can indicate
    a sybil attack or collusion.
  Principles:
    description: The algorithm identifies the set of nodes that have a direct connection to both node A and node B. Mathematically,
      it computes the intersection of the neighbor set of node A and the neighbor set of node B. It is a measure of structural
      proximity and is often used as a building block for more complex similarity metrics like Jaccard Coefficient or Adamic-Adar.
  solvable_questions:
  - Find the common neighbor nodes of node A and node B, and return the IDs of these nodes.
  - Calculate the intersection of the neighbor sets of "Node_X" and "Node_Y," and output the detailed information of the nodes
    within the intersection.
  - List all intermediate nodes that have direct connections with both node M and node N.
  - (Social Network) What mutual friends do Nunez Mitchell and Lee Alex have? Please list their IDs.
  - (Transaction Transfer) Have account A and account B transferred money to the same recipients? List these common recipient
    accounts.
  - (Paper Network) Which foundational papers do paper A and paper B both reference? List these co-cited references.
  - (Social Network) What mutual followers do accounts "KOL_1" and "KOL_2" have? List the overlapping followers.
  - (Transaction Transfer) From which sources did both suspicious account X and suspicious account Y receive funds? Identify
    their common remittance sources.
- id: extract_subgraph
  task_type_id: Graph Query
  Application_scenario: Subgraph extraction is essential for focused analysis, visualization, and machine learning training
    (GNNs). Scenarios include extracting a specific community for visual inspection, isolating a transaction ring suspected
    of money laundering for manual review, or creating an Ego Graph (a node and its immediate context) to train a localized
    prediction model.
  Principles:
    description: This algorithm retrieves a subset of the original graph based on specific criteria, such as a list of target
      nodes or a specific region. It typically returns an "induced subgraph," which includes the selected nodes and all existing
      edges between them from the original graph. This allows for analyzing specific structural patterns without processing
      the entire network.
  solvable_questions:
  - Starting from node "Center_Node," extract all nodes and edges within a 2-hop range and return the subgraph data.
  - Retrieve the subgraph containing the node list [A, B, C] and all connecting edges between them.
  - Construct the subgraph composed of Morales Brent and its 1-hop neighbors, and calculate the number of nodes in the graph.
  - (Transaction Transfer) Using the suspicious account Lee Alex as the core, display the fund flow network within 3 layers
    of relationships to investigate potential money laundering groups.
  - (Social Network) Extract the social circle data of user Morales Brent, including their friends and friends of friends.
  - (Paper Network) Export the paper "ResNet," its cited references, and the references of those references (a 2-hop citation
    network) to construct an academic background graph.
  - (Transaction Transfer) Extract all mutual transfer records between accounts A, B, and C to form a small-scale fund interaction
    network.
  - (Social Network) Export the local network topology centered around a "certain influential user," including their followers
    and the relationships among these followers.
- id: get_paths_between_two_nodes
  task_type_id: Graph Query
  Application_scenario: Path queries are critical for tracing relationships, logistics, and root cause analysis. In a knowledge
    graph, it answers "How is Person A related to Company B?"; in navigation apps, it finds routes between locations; in network
    operations, it traces the physical or logical link between a user and a server to diagnose connectivity issues.
  Principles:
    description: The algorithm searches for sequences of edges that connect a source node to a target node. Depending on the
      specific variation, it can return all simple paths (paths with no repeated nodes), the shortest path (minimum hops or
      weight), or paths constrained by max depth. It reveals the connectivity and intermediate hops required to traverse from
      one entity to another.
  solvable_questions:
  - Find all acyclic paths (All Simple Paths) between node A and node B.
  - Determine whether there is at least one connected path from Start_Node to End_Node (return True/False).
  - List all path sequences between node S and node T with a length strictly equal to 3 hops.
  - (Transaction Transfer) Calculate the total transaction amount of all possible fund flow chains from "source account A"
    to "target account B."
  - (Social Network) Verify whether there is any social connection between user "User_X" and user "User_Y" across the entire
    network (please answer True/False).
  - (Paper Network) List the longest citation transmission path from the early paper "Transformer" to the latest paper "GPT-4."
  - (Transaction Transfer) Detail and calculate the number of paths (including all cases involving multiple intermediaries)
    through which account "Acc_1" transfers money to "Acc_2."
  - (Social Network) Explore all relationship chains between "User_A" and "User_B" and identify the shortest one.
  - (Paper Network) Investigate all academic collaboration chains (i.e., any connections established through co-authors) between
    author "Author_Zhang" and author "Author_Li," and finally list the lengths of each collaboration chain.

- id: find_cycle
  task_type_id: Path
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A directed/undirected graph/multigraph.
          required: true
        source:
          type: node, list of nodes
          description: >-
            The node from which the traversal begins. If None, then a source is chosen arbitrarily and repeatedly until all
            edges from each node in the graph are searched.
          default: null
        orientation:
          type: 'None | ''original'' | ''reverse'' | ''ignore'' (default: None)'
          description: >-
            For directed graphs and directed multigraphs, edge traversals need not respect the original orientation of the
            edges. When set to 'reverse' every edge is traversed in the reverse direction. When set to 'ignore', every edge
            is treated as undirected. When set to 'original', every edge is treated as directed. In all three cases, the yielded
            edge tuples add a last entry to indicate the direction in which that edge was traversed. If orientation is None,
            the yielded edge has no direction indicated. The direction is respected, but not reported.
          default: null
    output_schema:
      type: directed edges
      description: >-
        A list of directed edges indicating the path taken for the loop. If no cycle is found, then an exception is raised.
        For graphs, an edge is of the form `(u, v)` where `u` and `v` are the tail and head of the edge as determined by the
        traversal. For multigraphs, an edge is of the form `(u, v, key)`, where `key` is the key of the edge. When the graph
        is directed, then `u` and `v` are always in the order of the actual directed edge. If orientation is not None then
        the edge tuple is extended to include the direction of traversal ('forward' or 'reverse') on that edge.
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: >-
    The find_cycle algorithm is particularly useful in detecting cycles within directed and undirected graphs, such as in
    task scheduling, deadlock detection in concurrent programming, and analyzing feedback loops in directed network structures.
    It can be applied in various domains including computer science, operations research, and systems engineering where understanding
    cyclic dependencies is essential.
  Principles: >-
    This algorithm operates by traversing the graph starting from a specified source node to search for cycles. It works on
    both directed and undirected graphs and is capable of handling multigraphs. The time complexity is generally O(V + E),
    where V represents the number of vertices and E represents the number of edges, making it efficient for sparse graphs.
  Tuning_Mechanisms:
    source: >-
      Adjusting the source parameter allows the user to specify the starting node for the cycle detection. If set to None,
      the algorithm will arbitrarily select a starting node, which may influence the traversal paths taken but does not affect
      the overall cycle detection capability.
    orientation: >-
      The orientation parameter impacts how edge directions are treated during traversal. By setting it to 'ignore', the algorithm
      treats all edges as undirected, potentially finding cycles that would otherwise be missed in a directed context. Using
      'reverse' examines the graph in the opposite direction, which could reveal different cycles depending on the graph's
      structure.
  solvable_questions:
    - List all circular transaction paths related to Anna.
    - List all circular transaction paths related to Anna.