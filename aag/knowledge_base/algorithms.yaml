    description: The bfs_tree algorithm implements the breadth-first search (BFS)
      strategy to create an oriented tree that represents reachable nodes from a specified
      source node. It is specifically designed for both directed and undirected graphs
      and takes into account parameters like traversal depth and neighbor sorting.
      The time complexity is O(V + E), where V is the number of vertices and E is
      the number of edges, making it efficient for exploring large graphs.
