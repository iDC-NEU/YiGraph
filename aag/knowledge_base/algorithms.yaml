          required: true
        demand:
          type: string
          description: 'Nodes of the graph G are expected to have an attribute demand
            that indicates how much flow a node wants to send (negative demand) or
            receive (positive demand). Note that the sum of the demands should be
            0 otherwise the problem in not feasible. If this attribute is not present,
            a node is considered to have 0 demand. Default value: ''demand''.'
          default: demand
        capacity:
          type: string
          description: 'Edges of the graph G are expected to have an attribute capacity
            that indicates how much flow the edge can support. If this attribute is
            not present, the edge is considered to have infinite capacity. Default
            value: ''capacity''.'
          default: capacity
        weight:
          type: string
          description: 'Edges of the graph G are expected to have an attribute weight
            that indicates the cost incurred by sending one unit of flow on that edge.
            If not present, the weight is considered to be 0. Default value: ''weight''.'
          default: weight
        heap:
          type: class
          description: 'Type of heap to be used in the algorithm. It should be a subclass
            of :class:`MinHeap` or implement a compatible interface. If a stock heap
            implementation is to be used, :class:`BinaryHeap` is recommended over
            :class:`PairingHeap` for Python implementations without optimized attribute
            accesses (e.g., CPython) despite a slower asymptotic running time. For
            Python implementations with optimized attribute accesses (e.g., PyPy),
            :class:`PairingHeap` provides better performance. Default value: :class:`BinaryHeap`.'
          default: <class 'networkx.utils.heaps.BinaryHeap'>
    output_schema:
      type: integer
      description: 'Cost of a minimum cost flow satisfying all demands. flowDict :
        dictionary If G is a digraph, a dict-of-dicts keyed by nodes such that flowDict[u][v]
        is the flow on edge (u, v). If G is a MultiDiGraph, a dict-of-dicts-of-dicts
        keyed by nodes so that flowDict[u][v][key] is the flow on edge (u, v, key).'
    graph_type:
      directed: both
      multigraph: true
      weighted: true
      heterogeneous: false
  Application_scenario: The capacity_scaling algorithm is typically applied in transportation
    and logistics networks where the flow of goods or resources must meet specific
    supply and demand requirements. It is particularly useful for optimizing costs
    while ensuring that all demands are satisfied in networks with various capacity
    limitations, such as in urban transportation planning or network data routing.
  Tuning_Mechanisms:
    demand: Adjusting the 'demand' parameter allows users to specify which node attributes
      to consider for flow demands, thereby affecting the feasibility of flow solutions
      and overall cost calculations.
    capacity: Modifying the 'capacity' parameter enables users to set edge attributes
      that limit flow, influencing both the maximum flow possible and the potential
      costs incurred in the flow optimization process.
  Principles:
    description: The core principle of the capacity_scaling algorithm is to iteratively
      augment flow in the network while maintaining minimum cost, leveraging capacities
      of edges and the demands of nodes. It is suitable for directed graphs (digraphs)
      and handles constraints effectively, with time complexity typically being O(E
      log U), where U is the maximum capacity. The algorithm requires that the sum
      of demands equals zero for a feasible solution, and edges can have infinite
      capacity if not specified.
    time_complexity: O(E^2 log C)
