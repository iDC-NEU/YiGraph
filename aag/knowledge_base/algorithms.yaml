- id: transitivity
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: Parameter 'G' for transitivity
          required: true
    output_schema:
      type: float
      description: Transitivity
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The transitivity algorithm is often used in social network
    analysis to evaluate the degree of clustering in a graph. It is particularly relevant
    in undirected networks where relationships among nodes can be represented as triangles,
    helping to identify tightly knit groups. For instance, in a recommendation system,
    transitivity can assist in identifying communities with strong interconnections
    among users.
  Tuning_Mechanisms: {}
  Principles:
    description: The transitivity algorithm measures the extent to which pairs of
      vertices in a graph tend to cluster together. It calculates the ratio of the
      number of closed triplets (triangles) to the number of all possible triplets
      in the graph. This algorithm is designed for undirected graphs and operates
      with a time complexity of O(n^3) in the worst case, making it effective for
      analyzing small to medium-sized networks.
    time_complexity: O(V * d^2)
- id: triangles
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: graph
          description: A networkx graph
          required: true
        nodes:
          type: node, iterable of nodes, or None (default=None)
          description: If a singleton node, return the number of triangles for that
            node. If an iterable, compute the number of triangles for each of those
            nodes. If `None` (the default) compute the number of triangles for all
            nodes in `G`.
          default: null
    output_schema:
      type: dict or int
      description: If `nodes` is a container of nodes, returns number of triangles
        keyed by node (dict). If `nodes` is a specific node, returns number of triangles
        for the node (int).
    graph_type:
      directed: false
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The triangles algorithm is commonly used in social network
    analysis to identify tightly knit groups of nodes, such as friends in a social
    media platform or collaborators in a research network. It helps in understanding
    the structure and connectivity of the network by revealing the presence of interconnected
    triplets. This algorithm can also be applicable in recommendation systems, where
    the existence of triangles may indicate stronger relational ties that can enhance
    the quality of suggestions.
  Tuning_Mechanisms:
    nodes: Adjusting the 'nodes' parameter allows the user to specify which nodes
      they are interested in assessing for triangle counts. If an iterable is provided,
      the algorithm will compute triangles for each node, potentially leading to a
      more computationally intensive operation if many nodes are specified. If set
      to None, the algorithm computes triangles for all nodes, simplifying the user
      request but possibly resulting in excessive computation for large graphs.
  Principles:
    description: The triangles algorithm operates on both directed and undirected
      graphs to count the number of triangles (i.e., sets of three interconnected
      nodes). It does this by examining the adjacency relationships between nodes
      and checking for the presence of complete subgraphs of three nodes. The input
      can be either a single node, an iterable of nodes, or None, with the algorithm
      returning a dictionary of triangle counts per node or a single integer count
      for a specific node. The time complexity is generally O(n^3) due to the need
      to evaluate connections among triplets, making it more suitable for relatively
      small graphs.
    time_complexity: O(V * d^2) or O(E^1.5)
- id: greedy_color
  task_type_id: Matching & Coloring
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for greedy_color
          required: true
        strategy:
          type: string or function(G, colors)
          description: A function (or a string representing a function) that provides
            the coloring strategy, by returning nodes in the ordering they should
            be colored. ``G`` is the graph, and ``colors`` is a dictionary of the
            currently assigned colors, keyed by nodes. The function must return an
            iterable over all the nodes in ``G``. If the strategy function is an iterator
            generator (that is, a function with ``yield`` statements), keep in mind
            that the ``colors`` dictionary will be updated after each ``yield``, since
            this function chooses colors greedily. If ``strategy`` is a string, it
            must be one of the following, each of which represents one of the built-in
            strategy functions. * ``'largest_first'`` * ``'random_sequential'`` *
            ``'smallest_last'`` * ``'independent_set'`` * ``'connected_sequential_bfs'``
            * ``'connected_sequential_dfs'`` * ``'connected_sequential'`` (alias for
            the previous strategy) * ``'saturation_largest_first'`` * ``'DSATUR'``
            (alias for the previous strategy)
          default: largest_first
        interchange:
          type: bool
          description: Will use the color interchange algorithm described by [3]_
            if set to ``True``. Note that ``saturation_largest_first`` and ``independent_set``
            do not work with interchange. Furthermore, if you use interchange with
            your own strategy function, you cannot rely on the values in the ``colors``
            argument.
          default: false
    output_schema:
      type: any
      description: A dictionary with keys representing nodes and values representing
        corresponding coloring.
    graph_type:
      directed: both
      multigraph: false
      weighted: false
      heterogeneous: false
  Application_scenario: The greedy_color algorithm is typically used in graph coloring
    problems, which arise in scheduling, resource allocation, and register allocation
    in compiler design. For instance, it can be applied to assign frequencies to radio
    towers in a telecommunications network to avoid interference, or to schedule exams
    for students while ensuring that no two students with overlapping subjects are
    assigned the same time slot.
  Tuning_Mechanisms:
    strategy: Adjusting the 'strategy' parameter allows for the customization of the
      node ordering, which can significantly impact the efficiency and quality of
      the coloring. Different strategies may lead to varying results in terms of the
      number of colors used and performance.
    interchange: Setting the 'interchange' parameter to True activates a color interchange
      phase that aims to optimize the initial coloring by reducing the total number
      of colors used. This can lead to better coloring solutions but is not compatible
      with all strategies, which may hinder its effectiveness.
  Principles:
    description: The greedy_color algorithm employs a strategy of color assignment
      based on a specified ordering of nodes, coloring them iteratively while respecting
      the constraints of adjacent nodes receiving different colors. It works on both
      directed and undirected graphs, with time complexity primarily influenced by
      the node ordering strategy chosen, and it can be efficient for sparse graphs.
      However, certain strategies may impose specific restrictions on the use of additional
      features like color interchange.
    time_complexity: O(V + E)
- id: greedy_modularity_communities
  task_type_id: Clustering & Community
  Deployment_method:
    support_engine: networkx
    input_schema:
      parameters:
        G:
          type: NetworkX graph
          description: Parameter 'G' for greedy_modularity_communities
          required: true
        weight:
          type: string or None, optional (default=None)
          description: The name of an edge attribute that holds the numerical value
            used as a weight.  If None, then each edge has weight 1. The degree is
            the sum of the edge weights adjacent to the node.
          default: null
        resolution:
          type: float, optional (default=1)
          description: If resolution is less than 1, modularity favors larger communities.
            Greater than 1 favors smaller communities.
          default: 1
        cutoff:
          type: int, optional (default=1)
          description: A minimum number of communities below which the merging process
            stops. The process stops at this number of communities even if modularity
            is not maximized. The goal is to let the user stop the process early.
            The process stops before the cutoff if it finds a maximum of modularity.
          default: 1
        best_n:
          type: int or None, optional (default=None)
          description: A maximum number of communities above which the merging process
            will not stop. This forces community merging to continue after modularity
            starts to decrease until `best_n` communities remain. If ``None``, don't
            force it to continue beyond a maximum.
          default: null
    output_schema:
      type: any
      description: 'communities: list A list of frozensets of nodes, one for each
        community. Sorted by length with largest communities first.'
    graph_type:
      directed: false
      multigraph: false
      weighted: true
      heterogeneous: false
  Application_scenario: The greedy_modularity_communities algorithm is typically applied
    in the analysis of complex networks such as social networks, biological networks,
    and information networks. It addresses the problem of community detection, providing
    insights into the structure of the network by identifying clusters of densely
    connected nodes. For example, it can be used to uncover communities within social
    media platforms to enhance targeted marketing strategies.
  Tuning_Mechanisms:
    weight: Adjusting the weight parameter allows the algorithm to take edge weights
      into account when calculating the degree and determining community structure.
      Setting a specific edge weight can lead to more nuanced community identification,
      particularly in weighted networks, where relationships have varying strengths.
    resolution: Modifying the resolution parameter influences the scale of detected
      communities. A resolution less than 1 will result in larger, more inclusive
      communities, while a value greater than 1 encourages smaller, more granular
      communities. This flexibility allows users to tailor the community detection
      process to suit their analytical needs.
  Principles:
    description: This algorithm operates on the principle of modularity optimization,
      where it identifies communities by maximizing the modularity score through an
      iterative merging process. It is suitable for undirected and weighted graphs,
      and is generally efficient with a time complexity of O(n log n) and space complexity
      proportional to the graph size. Input constraints include the requirement for
      the graph to be connected and the presence of edge weights if specified.
    time_complexity: O(V * (V + E)) (Naive) to O(E log V) (Optimized)
- id: is_partition
