      on both directed and undirected graphs, with the algorithm's performance influenced
      by the graph's density and the presence of cycles. The time complexity is generally
      O((n + e)(c + 1)), where n is the number of nodes, e is the number of edges,
      and c is the number of cycles found.
    time_complexity: O((V + E) * (C + 1)) where C is number of cycles
