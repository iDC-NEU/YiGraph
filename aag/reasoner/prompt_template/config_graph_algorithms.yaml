# 图算法配置
# 用于指定可用的图算法，分为传统图算法和图神经网络算法两大类


graph_algorithms:
  # 传统图算法配置
  traditional_algorithms:
    # 图遍历算法
    traversal:
      - "bfs"      # 广度优先搜索
      - "dfs"      # 深度优先搜索
      - "a_star"   # A*搜索算法
      - "dijkstra" # Dijkstra最短路径
      - "bellman_ford" # Bellman-Ford算法
    
    # 中心性算法
    centrality:
      - "pagerank"              # PageRank算法
      - "betweenness_centrality" # 介数中心性
      - "closeness_centrality"   # 接近中心性
      - "eigenvector_centrality" # 特征向量中心性
      - "degree_centrality"      # 度中心性
    
    # 社区检测算法
    community_detection:
      - "louvain"           # Louvain社区检测
      - "label_propagation" # 标签传播算法
      - "girvan_newman"     # Girvan-Newman算法
      - "spectral_clustering" # 谱聚类
      - "infomap"           # Infomap算法
    
    # 图连通性算法
    connectivity:
      - "connected_components"        # 连通分量检测
      - "strongly_connected_components" # 强连通分量检测
      - "articulation_points"        # 关节点检测
      - "bridges"                    # 桥边检测
      - "biconnected_components"     # 双连通分量
    
    # 图匹配算法
    matching:
      - "maximum_matching"    # 最大匹配
      - "perfect_matching"    # 完美匹配
      - "stable_matching"     # 稳定匹配
      - "weighted_matching"   # 加权匹配
      - "bipartite_matching"  # 二分图匹配

  # 图神经网络算法配置
  graph_neural_networks:
    # 消息传递神经网络
    message_passing:
      - "gcn"        # 图卷积网络 (Graph Convolutional Network)
      - "gat"        # 图注意力网络 (Graph Attention Network)
      - "graphsage"  # GraphSAGE
      - "gin"        # 图同构网络 (Graph Isomorphism Network)
      - "chebnet"    # Chebyshev图卷积网络
    
    # 图池化网络
    pooling:
      - "diffpool"   # DiffPool层次化图池化
      - "sagpool"    # SAGPool自注意力图池化
      - "edgepool"   # EdgePool边池化
      - "asapool"    # ASAPool自适应结构感知池化
      - "hierarchical_pool" # 层次化池化
    
    # 图生成网络
    graph_generation:
      - "vgae"       # 变分图自编码器 (Variational Graph Autoencoder)
      - "graphvae"   # GraphVAE
      - "graphgan"   # GraphGAN
      - "molgan"     # MolGAN
      - "graphrnn"   # GraphRNN
    
    # 图对比学习
    contrastive_learning:
      - "graphcl"    # Graph Contrastive Learning
      - "gca"        # Graph Contrastive Augmentation
      - "mvgrl"      # Multi-View Graph Representation Learning
      - "graphlog"   # GraphLog
      - "bgrl"       # Bootstrap Graph Representation Learning
    
    # 图强化学习
    reinforcement_learning:
      - "gnn_rl"     # GNN强化学习
      - "graph_rl"   # 图强化学习
      - "policy_gnn" # 策略图神经网络
      - "value_gnn"  # 价值图神经网络
      - "actor_critic_gnn" # Actor-Critic图神经网络

  
